body:
  text: 南齊文紀卷五明梅鼎祚編栁世隆字彥緒河東解人厯尚書令侍中左光祿大夫與劉懷慰書尺牘作蕭緬與劉懷惠並誤懷慰為齊郡太守太祖手敕褒賞世隆為兖州刺史與懷慰書膠東流化潁川致美以今方古曾何足云南史論土斷條格奏南兖州鎮廣陵永明元年刺史栁世隆奏于是濟隂下邳淮陽東莞屬縣之散居無實土者及州治立見省民户帖屬南齊書尚書符下土斷條格并省僑郡縣凡諸流寓本無定憩十家五落各自星處一縣之民散在州境西至淮畔東届海隅今專罷僑邦不省荒邑雜居舛止與先不異離為區斷無革游濫謂應同省隨界并帖若鄉屯里聚二三百家井甸可修區域易分者别詳立劉善明平原人懷珍族弟厯宣城太守卒上髙帝陳事表太祖踐阼以善明勳誠拜授淮南宣城二郡太守至郡上表陳事周以三聖相資再駕乃就漢值海內無主纍敗方登魏挾主行令實踰二紀晉廢立持權遂厯四世景祚攸集如此之難者也陛下凝輝自天照湛神極睿周萬品道洽無垠故能髙嘯間軒鯨鯢自翦垂拱雲帟九服載晏靡一戰之勞無半辰之棘苞池江海籠苑嵩岱神祇樂推普天歸奉二三年間允膺寶命胄臨皇厯正位宸居開闢以來未有若斯之盛者也夫常勝者無憂恆成者好怠故雖休勿休姬旦作誥安不忘危尼父垂範今皇運草創萬化始基乘宋季葉政多澆苛億兆倒懸仰齊蘇振臣早䝉殊養志輸肝血徒有其誠曾闕埃露夙宵慙戰如墜淵谷不識忌諱謹陳愚管瞽言芻議伏待斧鉞所陳事凡十一條其一以為天地開創人神慶仰宜存問逺方宣廣慈澤其二以為京師浩大逺近所歸宜遣醫藥問其疾苦年九十以上及六疾不能自存者隨宜量賜其三以為宋氏赦令䝉原者寡愚謂今下赦書宜令事實相副其四以為丐奴未滅劉昶猶存秋風揚塵容能送死境上諸城宜應嚴備特簡雄略以待事機資實所須皆宜豫辦其五以為宜除宋氏大明太始以來諸苛政細制以崇簡易其六以為凡諸土木之費且可權停其七以為帝子王姬宜崇儉約其八以為宜詔百官及府州郡縣各貢讜言以𢎞唐虞之美其九以為忠貞孝悌宜擢以殊階清儉苦節應授以民政其十以為革命惟始天地大慶宜時擇才辨北使丐奴其十一以為交州險敻要荒之表宋末政苛遂致怨叛今大化創始宜懷以恩德未應逺勞將士搖動邉氓且彼土所出唯有珠寶實非聖朝所須之急討伐之事謂宜且停遺崔祖思書善明與祖思友善祖思出為青冀二州善明遺書昔時之遊于今邈矣或攜手春林或負杖秋澗逐清風于林杪追素月于園垂如何故人徂落殆盡足下方擁旄北服吾剖竹南甸相去千里間以江山人生如寄來㑹何時嘗覽書史數千年來略在眼中矣厯代參差萬理同異夫龍虎風雲之契亂極必夷之機古今豈殊此實一揆日者沈攸之擁長蛇于外粲秉復為異識所推惟有京鎮創為聖基遂乃擢吾為首佐授吾以大郡付吾關中委吾留任既不辨有抽劔兩城之用橫槊搴旗之能徒以挈瓶小智名參佐命常恐朝露一下深恩不酬憂深責重轉不可據還視生世倍無次緒藿羮布被猶篤鄙好惡色憎聲暮齡尤甚出蕃不與台輔别入國不與公卿遊孤立天地之間無猜無託惟知奉主以忠事親以孝臨民以潔居家以儉足下今鳴笳舊鄉衣繡故國宋季荼毒之悲已䝉蘇泰河朔倒懸之苦方須救拔遣遊辨之士為鄉導之使輕裝啓行經營舊壤令泗上歸業稷下還風君欲誰讓耶聊送諸心敬申貧贈南齊書崔祖思字敬元清河東武城人琰七世孫厯督青冀二州刺史上太祖陳政事啓太祖齊國建祖思遷齊國內史建元元年轉長兼給事黃門侍郎啓陳政事上優詔報答禮誥者人倫之襟冕帝王之樞柄自古開物成務必以教學為先世不習學民忘志義悖競因斯而興禍亂是焉而作故篤俗昌治莫先道教不得以夷禍革慮儉泰移業今無員之官空受祿力三載無考績之效九年闕登黜之序國儲以之虛匱民力為之凋散能否無章涇渭混流宜太廟之南引修文序司農以北廣開武校臺州列國限外之職問其所樂依方課習各盡其能月供僮幹如先充給若有廢墮遣還故郡殊經奇藝待以不次士修其業必有異等民識其利能無勉勵又漢文集上書囊以為殿帷身衣弋綈以韋帶劔慎夫人衣不曳地惜中民十家之産不為露臺劉備取帳鈎銅鑄錢以充國用魏武遣女皂帳婢十人東阿婦以繡衣賜死王景興以折米見誚宋武節儉過人張妃房帷碧綃蚊幬三齊苮席五盞盤桃花米飯殷仲文勸令畜伎答云我不解聲仲文曰但畜自解又答畏解故不畜厯觀帝王未嘗不以約素興侈麗亡也伏惟陛下體唐成儉踵虞為朴寢殿則素木卑構膳器則陶匏充御瓊簮玉箸碎以為塵珍裘繡服焚之如草斯實風髙上代民偃下世矣然教信雖孚氓染未革宜加甄明以速歸厚詳察朝士有柴車蓬館髙以殊等雕牆華輪卑其稱謂馳禽荒色長違清編嗜音酣酒守官不徙物識義方且懼且勸則調風變俗不俟終日又憲律之重由來尚矣故曹參去齊惟以獄市為寄餘無所言路溫舒言秦有十失其一尚在治獄之吏是也實宜清置廷尉茂簡三官寺丞獄主彌重其選研習律令刪除繁苛詔獄及兩縣一月三訊觀貌察情欺枉必達使明慎用刑無忝大易寧失不經靡愧周書漢來治律有家子孫並世其業聚徒講授至數百人故張于二氏潔譽文宣之世陳郭兩族流稱武明之朝決獄無寃慶昌枝裔槐衮相襲蟬紫傳輝今廷尉律生乃令史門户族非咸𢎞庭缺于訓刑之不措抑此之由如詳擇篤厚之士使習律令試簡有徵擢為廷尉僚屬茍官世其家而不美其績鮮矣廢其職而欲善其事未之有也若劉纍傳守其業庖人不乏龍肝之饌斷可知矣又樂者動天地感鬼神正情性立人倫其義大矣按前漢編户千萬太樂伶官方八百二十九人孔光等奏罷不合經法者四百四十一人正樂定員惟置三百八十八人今户口不能百萬而太樂雅鄭元徽時校試千有餘人後堂雜伎不在其數靡廢力役傷敗風俗今欲撥邪歸道莫若罷雜伎王庭惟置鍾簴羽戚登歌而已如此則官充給養國反淳風矣又論儒者以德化為本談法者以刻削為體道教治世之粱肉刑憲亂世之藥石故以教化比雨露名法方風霜是以有恥且格敬讓之樞紐令行禁止為國之關楗然則天下治者賞罰而已矣賞不事豐所病於不均罰不在重所困於不當如令甲勳少乙功多賞甲而捨乙天下必有不勸矣丙罪重丁眚輕罰丁而赦丙天下必有不悛矣是賞罰空行無當乎勸沮將令見罰者寵習之臣受賞者仇讎之士戮一人而萬國懼賞匹夫而四海悅又籍稅以厚國國虛民貧廣田以實廩國富民贍堯資用天之儲實拯懷山之數湯憑分地之積以勝流金之運近代魏置典農而中都足食晉開汝潁而汴河委儲今將掃闢咸華題鏤龍漠宜簡役敦農開田廣稼時罷山池之威禁深抑豪右之兼擅則兵民優贍可以出師又古者左史記言右史記事故君舉必書盡直筆而不汚上無妄動知如絲之成綸今者著作之官起居而已述事之徒褒諛為體世無董狐書法必隱時闕南史直筆未聞又廢諌官聽納靡依雖課勵朝僚徵訪芻輿莫若推舉質直職思其憂夫越任于事在言為難當官而行處辭或易物議既以無言望巳巳亦當以吞默慙人中丞雖謝咸𤣥未有全廢劾簡廷尉誠非釋之寧容都無訊牒故知與其謬人寧不廢職目前之明效也漢徵貢禹為諫大夫矢言先策夏侯勝狂直拘繫出補諷職伐柯非遐行之即善又天地無心賦氣自均寧得誕秀往古而獨寂寥一代將在知與不知用與不用耳夫有賢而不知知賢而不用用賢而不委委賢而不信此四者古今之通患也今誠重郭隗而招劇辛任鮑叔以求夷吾則天下之士不待召而自至矣並南齊書虞玩之字茂瑶㑹稽餘姚人仕宋為尚書右丞齊遷驍騎將軍黃門郎領本部中正上宋後廢帝陳時事表元徽四年玩之為尚書右丞上表帝優詔報之天府虛散垂三十年江荆諸州稅調本少自頃以來軍募多乏其穀帛所入折供文武豫兖司徐開口待哺西北戎將裸身求衣委輸京都蓋為寡薄天府所資唯有淮海民荒財單不及曩日而國度引費四倍元嘉二衛臺坊人力五不餘一都水材官朽散十不兩存備豫都庫材竹俱盡東西二􅀈磚瓦雙匱敕令給賜悉仰交市尚書省舍日就傾穨第宅府署類多穿毁視不遑救知不暇及尋所入定調用恆不周既無儲畜理至空盡積弊纍耗鍾于今日昔嵗奉敕課以揚徐衆逋凡入米穀六十萬斛錢五千餘萬布絹五萬匹雜物在外賴此相贍故得推移即今所懸轉多興用漸廣深懼供用頓闕軍器輟功將士飢怨百官蹇祿署府謝雕麗之器土木停緹紫之容國戚無以贍勳求無以給如愚管所慮不月則嵗矣經國逺謀臣所不敢言朝夕祗勤心存于匪懈起伏震遽事屬冒聞伏願陛下留須㬰之鑒垂永代之計發不世之詔施必行之典則氓祇齊歡髙卑同泰宋書上髙帝言黃籍表太祖詔朝臣以黃籍巧僞欲革其弊玩之上表納之宋元嘉二十七年八條取人孝建元年書籍衆巧之所始也元嘉中故光祿大夫傅隆年出七十猶手自書籍躬加隱校隆何必有石建之慎髙柔之勤蓋以世屬休明服道修身故耳今陛下日旰忘食未明求衣詔逮幽愚謹陳妄說古之共治天下唯良二千石今欲求治取正其在勤明令長凡受籍縣不加檢合但封送州州檢得實方却歸縣吏貪其賂民肆其姧姧彌深而却彌多賂愈厚而答愈緩自泰始三年至元徽四年揚州等九郡四號黃籍共却七萬一千餘户于今十一年矣而所正者猶未四萬神州奧區尚或如此江湘諸部倍不可念愚謂宜以元嘉二十七年籍為正民惰法既久今建元元年書籍宜更立明科一聽首悔迷而不反依制必戮使官長審自檢校必令明洗然後上州永以為正若有虛昧州縣同咎今户口多少不減元嘉而板籍頓闕弊亦有以自孝建以來入勳者衆其中操干戈衛社稷者三分殆無一焉勳簿所領而詐注辭籍浮逰世要非官長所拘録復為不少尋蘇峻平後庾亮就溫嶠求勳簿而嶠不與以為陶侃所上多非實録尋物之懷私無世不有宋末落紐此巧尤多又將位既衆舉恤為祿實潤甚微而入領數萬如此二條天下合役之身已據其大半矣又有改注籍狀詐入仕流苦為人役者今反役人又生不長髮便謂為道填街溢巷是處皆然或抱子并居竟不編户遷徙去來公違土斷屬役無滿流亡不歸寧喪終身疾病長臥法令必行自然競反又四鎮戍將有名寡實隨才部曲無辨勇懦署位借給巫媪比肩彌山滿海皆是私役行貨求位其塗甚易募役卑劇何為投補坊吏之所以盡百里之所以單也今但使募制明信滿復有期民無徑路則坊可立表而盈矣為治不患無制患在不行不患不行患在不久得實一作得知部作郡苦為一作昔為告退表玩之以久宦衰疾上表告退許之臣聞負重致逺力窮則困竭誠事君智盡必傾理固然也四十仕進七十懸車壯則驅馳老宜休息臣生於晉長於宋老於齊世厯三代朝市再易臣以宋元嘉二十八年為王府行佐於兹三十年矣自頃以來衰耗漸篤為性不懶惰而倦怠頓來耳目本聰明而聾矒轉積腳不支身喘不緒氣景刻不推朝晝不保大功兄弟四十有二人通塞壽夭唯臣獨存朝露末光寧堪長久且知足不辱臣已足矣稟命饑寒不求富貴銅山由命臣何恨焉久甘之矣直道事人不免縲絏屬遇聖明知其非罪臣之幸厚矣受命於道消之晨效節於百揆之日臣忠之效也降慶於文明之初荷澤於天飛之運臣命之偶也不謀巧宦而位至九卿德慚李陵而忝居門下堯舜無窮臣亦通矣年過六十不為夭矣榮期之三樂東平之一善臣俱盡之矣經昏踐亂涉艱履危仰聖德以求全慿賢輔以申節未嘗厭屈于勳權長溺于狐鼠臣立身之本於斯不虧在其壯也當官不讓及其衰也豪露靡因伏願慈臨賜臣骸骨非為希髙慕古愛好泉林特以下運孤貧養禮多闕風樹之感夙自纒心庶天假其辰得二三年間掃守邱墓以此歸全始終之報遂矣劉休字𢎞明沛郡相人厯豫章內史與親知書虞玩之建元時為黃門郎告退許之宋末王儉舉員外郎孔逖使魏玩之言論不相饒儉逖並恨之至是東歸儉不出送朝廷無祖餞者中丞劉休與親知書虞公散髮海隅同古人之美而東都之送殊不藹藹南史上髙帝辭御史大夫啓臣自塵榮南憲星晷交春謬聞弱奏劾無空月豈唯不能使蕃邦斂手豪右屏氣乃遣聽已暴之辜替網觸羅之鳥而猶以此里失鄉黨之和朝絶比肩之顧覆背騰其喉脣武人厲其觜吻怨之所聚勢難久堪議之所裁孰懷其允臣竊尋宋氏載祀六十厯職斯任者五十有三校其年月不過盈嵗於臣叨濫宜請骸骨髙帝答卿職當國司以威裁為本而忽憚世誚卿便當辭之如事可獲何惰晚節耶南齊書孔顗上髙帝鑄錢均貨議宋代太祖輔政欲鑄錢未及施行建元四年奉朝請孔顗上議辭證甚博時議者多以錢貨轉少宜更廣鑄重其銖兩以防民姦㑹晏駕事寢食貨相通理勢自然李悝曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧甚賤與甚貴其傷一也三吳國之關閫比嵗被水潦而糴不貴是天下錢少非穀穰賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為纍輕輕錢弊盜鑄而盜鑄為禍深民所盜鑄嚴法不禁者由上鑄錢惜銅愛工也惜銅愛工者謂錢無用之器以通交易務欲令輕而數多使省工而易成不詳慮其為患也自漢鑄五銖錢至宋文帝厯五百餘年制度世有廢興而不變五銖錢者明其輕重可法得貨之宜以為宜開置泉府方牧貢金大興鎔鑄錢重五銖一依漢法府庫已實國用有儲乃量奉祿薄賦稅則家給民足頃盜鑄新錢者皆效作翦鑿不鑄大錢也摩澤緇染始皆類故交易之後渝變還新良民弗售緇染不復行矣所鬻賣者皆徒失其物盜鑄者復賤買新錢緇染更用反覆生詐循環起姦此明主尤所宜禁而不可長也若官鑄已布于民使嚴斷翦鑿小輕破缺無周郭者悉不得行官錢細小者稱合銖兩銷以為大利貧良之民塞姦巧之路錢貨既均逺近若一百姓樂業市道無爭衣食滋殖矣胡諧之豫章南昌人厯度支尚書領衛尉上髙帝解職表諧之為太子中庶子領左衛率兄謨之亡上表解職不許臣私門罪釁早備茶苦兄弟三人共相撫鞠嬰孩抱疾得及成人長兄臣諶之復早殞沒與亡弟二兄臣謨之銜戚家庭得䝉訓長情同極廕何圖一旦奄見弃放吉凶分違不獲臨奉乞解所職陸澄字彥淵吳人領國子祭酒厯散騎常侍宋皇太子朝賀服議宋泰始六年詔皇太子朝賀服衮冕九章澄時兼左丞與儀曹郎丘仲起議服冕以朝實著經文秦除六冕漢明還備魏晉以來不欲令臣下服衮冕故位公者加侍官今皇太子禮絶羣后宜遵聖王盛典革近代之制上齊髙帝自理表建元元年驃騎咨議沈憲等坐家奴客為劫子弟被劾憲等晏然時澄為御史中丞左丞任遐奏澄不糾請免官澄上表自理詔付外詳議尚書令褚淵奏髙帝下詔周稱舊章漢言故事爰自河雒降逮淮海朝之憲度動尚先准若乃任情違古率意專造豈謂酌諸故實擇其茂典案遐啓彈新除咨議參驃騎大將軍軍事沈憲太子庶子沈曠并弟息敕付建康而憲被使曠受假俱無歸罪事狀臣以不糾憲等為失伏尋晉宋左丞案奏不乏於時其及中丞者從來殆無王獻之習達朝章近代之宗其為左丞彈司徒屬王濛憚罰自解屬疾逰行初不及中丞桓祕不奔山陵左丞鄭襲不彈祕直彈中丞孔欣時又云别攝蘭臺檢校此徑彈中丞之謂唯左丞庾登之奏鎮北檀道濟北伐不進致虎牢陷沒蕃嶽宰臣引咎謝愆而責帥之劾曾莫奏聞請收治道濟免中丞何萬嵗夫山陵情敬之極北伐專征之大祕霸季之貴道濟元勳之盛所以咎及南司事非常憲然祕事猶非及中丞也今若以此為例恐人之貴賤事之輕重物有其倫不可相方左丞江奧彈段景文又彈裴方明左丞甄法崇彈蕭珍又彈杜驥又彈假國又彈范文伯左丞羊𤣥保又彈蕭汪左丞殷景熙彈張仲仁兼左丞何承天彈呂萬齡並不歸罪皆為重劾凡兹十彈差是憲曠之比悉無及中丞之議左丞荀萬秋劉藏江謐彈王僧朗王雲之陶寶度不及中丞最是近例之明者謐彈在今龕􅧰之後事行聖照逺取十奏近徵二案自宜依以為體豈得捨而不遵臣竊此人乏謬奉國憲令遐所糾既行一時若默而不言則向為來准後人被繩方當追請素餐之責貽塵千載所以備舉顯例引通國典雖有愚心不在微躬請出臣表付外詳議若所陳非謬裁由天鑒尚書令褚淵奏宋世左丞荀伯子彈彭城令張道欣等坐界劫纍發不禽免道欣等官中丞王淮不糾亦免官左丞羊𤣥保彈豫州刺史管義之譙梁羣盜免義之官中丞傅隆不糾亦免隆官左丞羊𤣥保又彈兖州刺史鄭從之濫上布及加課租綿免從之官中丞傅隆不糾免隆官左丞陸展彈建康令邱珍孫丹陽尹孔山士劫發不禽免珍孫山士官中丞何朂不糾亦免朂官左丞劉矇彈青州刺史劉道隆失火燒府庫免道隆官中丞蕭惠開不糾亦免惠開官左丞徐爰彈右衛將軍薛安都屬疾不直免安都官中丞張永結免澄謏聞膚見貽擾後昆上掩皇明下籠朝議請以見事免澄所居官髙帝詔澄表據多謬不足深劾可白衣領職與王儉書澄領國子博士時國學置鄭王易杜服春秋何氏公羊麋氏穀梁鄭𤣥孝經澄謂尚書令王儉曰孝經小學之類不宜列在帝典乃與儉書論之儉答書易近取諸身逺取諸物彌天地之道通萬物之情自商瞿至田何其間五傳年未為逺無訛雜之失秦所不焚無崩壞之弊雖有異家之學同以象數為宗數百年後乃有王弼王濟云弼所悟者多何必能頓廢前儒若謂易道盡于王弼方須大論意者無乃仁智殊見四道異傳無體不可以一體求屢遷不可以一遷執也晉太興四年太常荀嵩請置周易鄭𤣥注博士行乎前代于時政由王庾皆俊神清識能言𤣥逺捨輔嗣而用康成豈其妄然泰元立王肅易當以在𤣥弼之間元嘉建學之始𤣥弼兩立逮顔延之為祭酒黜鄭置王意在貴𤣥事成敗儒今若不大𢎞儒風則無所立學衆經皆儒惟易獨𤣥𤣥不可棄儒不可缺謂宜並存所以合無體之義且弼于注經中已舉繫辭故不復别注今若專取弼易則繫說無注左氏泰元取服䖍而兼取賈逵經服傳無經雖在注中而傳又有無經者故也今留服而去賈則經有所闕案杜預注傳王弼注易俱是晚出並貴後生杜之異古未如王之奪實祖述前儒特舉其違又釋例之作所引惟深穀梁泰元舊有麋信注顔益以范寧麋猶如故顔論閏分范注當以同我者親常謂穀梁劣公羊為注者又不盡善竟無及公羊之有何休恐不足兩立必謂范善便當除麋世有一孝經題為鄭𤣥注觀其用辭不與注書相類案𤣥自序所注衆書亦無孝經王儉答書易體微逺實冠羣籍施孟異聞周韓殊㫖豈可專據小王便為該備依舊存鄭髙同來說元凱注傳超邁前儒若不列學官其可廢矣賈氏注經世所罕習穀梁小書無俟兩注存麋略范率由舊式凡此諸義並同雅論疑孝經非鄭所注僕以此書明百行之首實人倫所先七略藝文並陳之六藝不與倉頡凡將之流也鄭注虛實前代不嫌意謂可安仍舊立置並南齊書顧測與太守蕭緬箋測為揚州主簿以兩奴就陸澄弟鮮質錢鮮死子暉誣為賣劵澄為中丞測與書相往反後又箋與緬測遂為澄所排抑世以此少之澄欲遂子弟之非未近義方之訓此趨販所不為况縉紳領袖儒宗勝達乎南齊書何昌㝢字儼望廬江灊人仕宋湘東太守入齊厯侍中吏部尚書領驍騎將軍南齊書何昌㝢傳云祖叔度吳郡太守父佟之太常卿昌㝢齊明帝建武四年卒年五十一梁書何佟之傳云祖劭宋員外散騎常侍父歆齊奉朝請佟之梁天監二年卒年五十五則昌㝢父何佟之别自一人非後載議禮入梁之何佟之也然皆廬江灊人姓名並同時代相接亦是難曉與驍騎大將軍蕭道成啓昌㝢先為建平王景素府主簿以風素見重母老求祿出為湘東太守為齊太祖蕭道成驃騎功曹昌㝢在郡景素被誅昌㝢痛之至是啓道成又與司空褚淵書淵答之道成嘉其義轉為記室伏尋故建平王因心自逺忠孝基性徽和之譽早布國言勝素之情夙洽民聽世祖綢繆太宗眷異朝中貴人野外賤士雖聞見有殊誰不悉斯事者元徽之間政關羣小搆扇異端共令傾覆殷勤之非古人所悼况蒼梧將季能無衒惑一年之中藉者再三有必巔之危無暫立之安行路寒心往來局蹐而王夷慮坦然委之天命惟謙惟敬專誠奉國閨無執㦸之衛門闕衣介之夫此五尺童子所見不假闊曲言也一淪疑似身名頓滅寃結淵泉酷貫穹昊時經隆替嵗改三元曠蕩之惠亟申被枉之澤未流俱沐溫光獨酸霜露明公鋪天地之施散雲雨之潤物無巨細咸被慶渥若今日不䝉照滌則為萬代寃魂昌㝢非敢慕慷慨之士激揚當世實義切於心痛入骨髓瀝腸紓憤仰希神照辨明枉直亮王素行使還名帝籍歸靈舊塋死而不泯豈忘德於黃壚分軀碎首不足上謝與司空褚淵書天下之可哀者有數而埋寃于黃泉者為甚焉何者百年之壽同于朝露揮忽去留寧足道哉政欲闔棺之日不隕令名竹帛傳芳烈鐘石紀清英是以昔賢甘心於死所者也若懷忠抱義而負枉冥冥之下時主未之矜卿相不為言良史濡翰將被以惡名豈不痛哉豈不痛哉竊尋故建平王地屬親賢德居宗望道心惟沖睿性天峻散情風雲不以塵務嬰襟明發懷古惟以琴書娛志言忠孝行惇慎二公之所深鑒也前者阮楊連黨搆此紛紜雖被明於朝貴愈結怨於羣醜覘察繼蹤疑防重著小人在朝詩史所歎清識飲涕王每永言終日氣淚交橫既推信以期物故日去其備衛朱門蕭條示存典刑而已求解徐州以避北門要任苦乞㑹稽貪處東甌間務此並彰于事迹與公道味相求期心有素方共經營家國劬勞王室何圖時不我與契闊屯昏忠誠弗亮罹此百殃嵗朔亟流已經四載皇命惟新人霑天澤而幽然深酷未䝉照明封殯卑雜窮魂莫寄昭穆不序松柏無行事傷行路痛結幽顯吾等叩心泣血實有望于盛時公以德佐世欲物得其所豈可令建平王枉直不分邪田叔不言梁事袁絲諫止淮南以兩國舋禍尚回帝意豈非親親之義寧存敦厚而今疑似未辨為世大戮若使王心跡得申亦示海內理寃枉明是非存亡國繼絶世周漢之通典有國之所急也昔叔向之理恃祁大夫而獲亮戾太子之寃資車丞相而見察幽靈有知豈不眷眷於明顧碎首抽脅自謂不殞褚淵答書追風古人良以嘉歎但事既昭晦理有逆從建平初阻元徽未悖專欲委咎阮楊彌所致疑于時正亦謬參此機若審如髙論其愧特深並南齊書劉璡字子璥瓛弟厯射聲校尉卒官上髙帝訟宋建平王景素寃書景素敗後故記室參軍王螭故主簿何昌㝢並上書訟寃齊受禪建元初故景素秀才劉璡又上書不省璡初舉秀才為景素征北主簿深見禮遇至永明中詔以王禮葬臣聞曾子孝於其親而沈乎水介生忠於其主而焚於火何則仁也不必可依信也不必可恃昔者墨翟議雲梯於荆臺之下宋人逐之夷叔為衛軍隱難於晉公子殪之李牧北逝彊胡之旗南拒全秦之卒趙王不圖其功賜以利劒陳蕃白首固義忘生事主漢靈不明其忠卒被刑戮彼數子者皆身栖青雲之上而困於泥塵之裏誠以危行不容於衰世孤立聚尤於衆人加讒諂蛆蠱其中謗隙蜂飛而至故也臣聞浸潤之行骨肉離絶疑似一至君臣易心此中山所以歔欷奏樂孟博所以慷慨囊頭者也臣每惟故舉將宋建平王之禍悲徹骨髓氣凝霜霰今琁鼎啓運人神改物生罪尚宥死寃必申臣誠不忍王之負謗而不雪故敢明言其理臣聞孝悌為志者不以犯上曾子不逆薪而爨知其不為暴也秦仁獲麑知其可為傅也臣聞王之事獻太妃也朝夕不違養甘苦不見色帳下進珍饌太妃未食王投箸輟飯太妃起居有不安王傍行蓬髮臣聞求忠臣者於孝子之門安有孝如王而不忠者乎其可明一也當太始元徽中王公貴人無謁景寧陵者王獨抗情而行不以趨時捨義出鎮入朝必俯拜陵所王尚不弃先君豈避今君乎其可明二也王博聞而容衆與諫而愛士與人言詬詬若有傷聞人之善譽而進之見人之惡掩而誨之李蔚之蓬廬之寒素也王枉駕而訊之何季穆等宣簡王之舊也王提挈以升之王虛已以厚天下之士尚不欲傷一人之心何乃親戚圖相葅膾乎其可明三也臣昔以法曹參軍奉訊于聽朝之末王每斷獄降聲辭和顔色以待士女之訟時見夏伯以童子縲縶王愴然改貌用不加刑徐州嘗嵗飢王散秩粟俸帛以繼民之乏蠲理寃疑咸息繇務所在皆有愛于民臣聞善人國之紀也安有仁于民庶而虐其宗國者乎其可明四也王修身潔行言無近雜內去聲酌之娛外無田弋之好每所臨踐不加穿築直衛不繁第宅無改荆州髙齊刻楹柏構王廢而不處昔朝廷欲賜王東陵甲第又辭而不當兩宫所遺珍玩塵於笥篋無它嬖私不耽內寵姬嬙數人皆詔令所賜王身食不踰一肉器用瓦素時有獻鏤玉器王顧謂何昌㝢曰我持此安所用哉乃謝而反之王恭已蹈義若此其可明五也王之在荆州也時獻太妃初薨宋明帝新棄天下京畿諸王又相繼非命王乃徵入為太常楚下人士並勸勿下王謂為臣而距先皇之命不忠為子不奉親之窀穸不孝於是棄西州之重而匍伏北闕王若志欲倔彊便應髙枕江漢何為屈折而受制於人乎其可明六也王名髙海內義重太山耆幼懷仁士庶慕德故從昏者忌明同枉者毁正搦弦為鈎張一作百行坐咳嚏皆生風塵㑹王季符負罪流謗事㑹讒人之心權醜相扇鴟梟奮翼王雖遘愍離凶而誠分彌欵散情中孚揮斥滿素虞玩之銜使歸旋世子入質京邑績解徐州請身東第後求會稽降階外撫虞玩殷煥實為詮譯誠心殷勤備留聖聽王若侜張跋扈何事若斯其可明七也自是以後日同殊論蒼梧之衰德既彰羣小之姦慝彌廣下盈其毒上不可依時長王並見誅鋤公卿如蹈虎尾衆人翕翕莫不注仰於王廂閣諸人同謀異志王心不從利忠不背本執周天賜而斬之以距王宜與等遣司馬孫謙歸欵朝廷王若欲擬非覬寧當如此乎其可明八也又是年五月以後道路皆謂阮佃夫等欲潛圖宮禁因兵北襲而黃回髙道慶等傅構其事武人奬亂更相恐脅至六月而京師徵賦車徒將講衆北壘都鄙疑駭僉言釁作垣祇祖因民情囂蕩揚聲北奔紿辭惑衆窮亂極禍㑹州人自都還說掖門已閉殊不知臺中安不王既素籍異論謂為信然收率疲弱志在投散氷炭在懷但恐遲後何圖兵以順出翻為逆動乎夫往來之人喧譁幻惑皆出輦轂非從徐州起也且臺以六月晦夜無何呼北兵已至皆登陴抽刃而朱方七月朔猶緩帶從容其晚聞京都變亂始乃鳩兵簡甲耳王豈先造禍哉其可明九也王聞京室有難坐不安食不甘言及太后未嘗不交巾掩泣又臨危之際撫檻而歎曰吾恐三才於斯絶矣兹豈不誠在本朝以天下為憂乎自非深忠逺槩孰能身滅之不恤獨眷眷國家安危哉其可明十也夫王起兵之日止在匡救昏難放殛姦盜非它故也請較言之當時君臣之道治亂云何楊運長阮佃夫為有罪耶為無罪耶若其無罪何故為戮若其有罪討之何辜王豈不知君親之無將乎顧以救火之家豈遑先白丈人非不恭也徒以運屬陵喪智力無所用之蹉跌傾覆此乃時也豈謂反乎果然今日王亡明日宋亡王何負於社稷何愧於天下哉臣聞武王克商未及下車而封王子之墓漢髙定天下過大梁躡燕代修信陵之祀存望諸之裔晉世受命亦追王凌之寃而詔其孫為郎夫比干殷辛之罪人也無忌魏之疑臣也樂毅燕之逃將也彥雲齊之賊而晉害也適逢明聖之君革運創制昭功誠蕩嫌怨請議以天下之善也或殊世而相明故四賢咸濟其令問三后馳光于萬葉君子榮其輝小人服其義今陛下遵英雄之髙軌振逸世之奇聲何至仍衰世之異議以掩賢人之名哉若王之中外不明終始慆德臣懼方今之人不復為善矣且世之興衰何代無有今齊苗裔萬世之後其能無汚隆乎茍前良可廢何以勸後之能者伏願上同周漢西晉之如彼下為來𦙍垂範之如此儻能降明詔箋枉道使往王得洗謗議拯冥魂賜以王禮反葬則民之從義猶若回風之卷草也臣聞鸛鳴臯垤則降隂吐雨騰蛇聳躍而沉雲鬱冥但傷臣言輕落毛身如橫芥神髙聽邈終焉莫省直欲內不負心庶將來知王之意耳宋書顧歡字景怡吳郡鹽官人纍徵不就上髙帝治綱表歡篤志好學隱遁不仕太祖輔政悅歡風教徴為揚州主簿遣中使迎歡及踐阼乃至稱山谷臣顧歡上表東歸臣聞舉網提綱振裘持領綱領既理毛目自張然則道德綱也物勢目也上理其綱則萬機時序下張其目則庶官不曠是以湯武得勢師道則祚延秦項忽道任勢則身戮夫天門開闔自古有之四氣相新絺裘代進今火澤易位三靈改憲天樹明德對時育物搜揚仄陋野無伏言是以窮谷愚夫敢露偏管謹刪撰老氏獻治綱一卷伏願稽古百王斟酌時用不以芻蕘棄言不以人微廢道則率土之賜也微臣之幸也幸賜一疏則上下交泰雖不求民而民悅不祈天而天應應天悅民則皇基固矣臣志盡幽深無與榮勢自足雲霞不須祿養陛下既逺見尋求敢不盡言言既盡矣請從此退劉思效散騎貟外郎上髙帝陳讜言表太祖下詔與顧歡並加顯異宋自大明以來漸見凋弊徴賦有增於往天府尤貧於昔兼軍警屢興傷夷不復戍役殘丁儲無半菽小民嗷嗷無樂生之色貴勢之流貨室之族車服伎樂相爭奢麗亭池第宅競趣髙華至于山澤之人不敢採飲其水草貧富相輝捐源尚末陛下宜發明詔吐德音布惠澤禁邪僞薄賦斂省徭役絶奇麗之賂塞鄭衛之倡變厯運之化應質文之用不亦大哉又彭汴有鴟梟之巢青邱為狐兔之窟虐害踰紀殘暴日滋鬼泣舊泉人悲故壤童孺視編髮而慙生耆老看左袵而恥沒陛下宜仰答天人引領之望下弔氓黎傾首之勤授鉞衛霍之將遺策蕭張之師萬道俱前窮山蕩谷此即恆山不足指而傾渤海不足飲而竭豈徒殘寇塵滅而已哉髙帝詔朕夙旦惟寅思𢎞治道佇夢巖濵垂精管庫旰食縈懷其勤至矣吳郡顧歡散騎郎劉思效或至自邱園或越在冗位並能獻書金門薦辭鳳閣辨章治體有協朕心今出其表外可詳擇所宜以時敷奏歡近己加旍賁思效可付選銓序以顯讜言裴叔業河東聞喜人厯南兖州刺州上髙帝言梁益疏上初即位羣下各獻讜言二年叔業上疏云成都沃壤四塞為固古稱一人守隘萬夫趦趄雍齊亂於漢世譙李寇於晉代成敗之迹事載前史頃世以來朝廷綏馭乖術地惟形勢居之者異姓國實武用鎮之者無兵致寇掠充斥賦稅不斷宜遣帝子之尊臨撫巴蜀揔益梁南秦為三州刺史率文武萬人先啓岫漢分遣郡戍皆配精力搜蕩山源糾䖍姦黨威令既行民夷必服南齊文紀卷五
