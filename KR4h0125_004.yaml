body:
  text: 南齊文紀卷四明梅鼎祚編王僧虔琅琊臨沂人曇首子仕宋為尚書令入齊遷侍中左光祿大夫論舞并三調哥表孝武大明中以鞞拂雜舞合之鍾石施於殿庭順帝升明二年尚書令王僧虔上表言之并論三調哥順帝詔報臣聞風雅之作由來尚矣大者繫乎興衰其次者著於率舞在於心而木石感鏗鏘奏而國俗移故鄭相出郊辨聲知戚延陵入聘觀樂知風是則音不妄起曲豈徒奏哥倡既設休戚已徵清濁是均山琴自應斯乃天地之靈和升降之明節今帝道四達禮樂交通誠非寡陋所敢裁酌伏以三古缺聞六代潛響舞詠與日月偕湮精靈與風雲俱滅追餘操而長懷撫遺器而太息此則然矣夫鍾縣之器以雅為用凱容之制八佾為體故羽籥擊拊以相諧應季氏獲誚將在於此今總章舊佾二八之流袿服既殊曲律亦異推今校古皎然可知又哥鐘一肆克諧女樂以哥為稱非雅器也大明中即以宮縣合和鞞拂節數雖會慮乖雅體將來知音或譏聖世若謂鐘舞已諧不欲廢罷别立哥鐘以調羽佾止於别宴不關朝享四縣所奏謹依雅則斯則舊樂前典不墜於地臣昔已制哥磬猶在樂官具以副鐘配成一部即義沿理如或可安又今之清商實猶銅雀魏氏三祖風流可懷京洛相髙江左彌重諒以金縣干戚事絶于斯而情變聽改稍復零落十數年間亡者將半自頃家競新哇人尚謡俗務在噍危不顧律紀流宕無涯未知所極排斥典正崇長煩淫士有等差無故不可以去禮樂有攸序長幼不可以共聞故喧醜之製日盛於廛里風味之韻獨盡於衣冠夫川震社亡同靈畢戒哀思靡漫異世齊歡咎徵不殊而欣畏並用竊所未譬也方今塵靜畿中波恬海外雅頌得所實在兹辰臣以為宜命典司務勤課習緝理舊聲迭相開曉凡所遺漏悉使補拾曲全者祿厚藝敏者位優利以動之則人思自勸風以靡之可不訓自革反本還源庶可跂踵順帝詔報僧虔表如此夫鐘鼓既陳雅頌斯辨所以憓感人祇化動翔泳頃自金籥弛韻羽佾未凝正俗移風良在兹日昔阮咸清識王度昭奇樂緒增修異世同功矣便可付外遵詳上宋順帝論樂表宋升明二年僧虔為尚書令以朝廷禮樂多違正典民間競造新聲雜曲時太祖輔政僧虔上表夫懸鐘之器以雅為用凱容之禮八佾為儀今總章羽佾音服舛異又歌鐘一肆克諧女樂以歌為務非雅器也大明中即以宮懸合和鞞拂節數雖會慮乖雅體將來知音或譏聖世若謂鐘舞已諧重違成憲更立歌鍾不參舊例四縣所奏謹依雅條即義研理如或可附又今之清商實由銅雀三祖風流遺音盈耳京洛相髙江左彌貴諒以金石干羽事絶私室桑濮鄭衛訓隔紳冕中庸和雅莫復於斯而情變聽移稍復銷落十數年間亡者將半自頃家競新哇人尚謡俗務在譙殺不顧音紀流宕無涯未知所極排斥正曲崇長煩淫士有等差無故不可去樂禮有攸序長幼不可共聞故喧醜之制日盛于廛里風味之響獨盡於衣冠宜命有司務勤功課緝理遺逸迭相開曉所經漏忘悉加補綴曲全者祿厚藝妙者位優利以動之則人思刻厲反本還源庶可跂踵上齊髙帝言郡縣獄表郡縣獄相承有上湯殺囚建元二年為光祿大夫上疏上納其言湯本以救疾而實行寃暴或以肆忿若罪必入重自有正刑若去惡宜疾則應先啓豈有死生大命而潛制下邑愚謂治下囚病必先刺郡求職司與醫對共診驗逺縣家人省視然後處理可使死者不恨生者無怨答髙帝論書啓太祖善書及即位篤好不已示僧虔古迹十一帙就求能書人名僧虔得民間所有帙中所無者十二卷奏之又上羊欣所撰能書人名一卷僧虔啓恩眷罔已賜示古迹十一秩或其人可想或其法可學愛玩彌日暫得忘其沉痾輒率短見并述舊聞具如别箋民間所有秩中所無者或有不好今奉别目二十三卷追懼乖誤伏深悚息吳大皇帝書吳景帝書吳歸命侯孫皓晉安帝亡髙祖丞相導亡曾祖領軍洽亡從祖中書令珉韋仲將張芝索靖張翼衛伯儒右十二卷故州民王僧虔奉法書要録祖南齊書言太即位僧虔奏前古迹而要録所載其原文也稱故州民當是太宗為西昌侯時耳上古來能書人名啓録宋羊欣所傳者臣僧虔啓昨奉敕須古來能書人名臣所知局狹不辨廣悉輒條疏上呈羊欣所撰録一卷尋案未得續更呈聞謹啓按啓此特為僧虔條疏非羊欣所撰録也秦丞相李斯秦中車府令趙髙右二人善大篆秦獄吏程邈善大篆得罪始皇囚於雲陽獄增減大篆體去其繁復始皇善之出為御史名書曰𨽻書扶風曹喜後漢人不知其官善篆𨽻篆小異李斯見師一時陳留蔡雍後漢左中郎將善篆𨽻採斯喜之法真定宜父碑文猶傳於世篆者師焉杜陵陳遵後漢人不知其官善篆𨽻每書一座皆驚時人謂為陳驚座上谷王次仲後漢人作八分楷法師宜官後漢不知何許人何官能為大字方一丈小字方寸千言耿球碑是宜官書甚自矜重或空至酒家先書其壁觀者雲集酒因大售俟其飲足削書而退安定梁鵠後漢人官至選部尚書得師宜官法魏武重之常以鵠書懸帳中宮殿題署多是鵠手也陳留邯鄲淳為魏臨淄侯文學得次仲法名在鵠後毛𢎞鵠弟子今祕書八分皆傳𢎞法又有左子邑與淳小異亦有名京兆杜度為魏齊相始有草名安平崔瑗後漢濟北相亦善草書平符堅得摹崔瑗書王子敬云極似張伯英瑗子實官至尚書亦能草書𢎞農張芝髙尚不仕善草書精徑絶倫家之衣帛必先書而後練臨池學書池水盡墨每書云匆匆不暇草書人謂為草聖芝弟昶漢黃門侍郎亦能草今世云芝草者多是昶作也薑詡梁宣田彥和及司徒韋誕皆英弟子並善草誕書最優誕字仲將京兆人善楷書漢魏宮館寶器皆是誕手寫魏明帝起凌雲臺誤先釘榜而未題以籠盛誕轆轤長絙引之使就榜書之榜去地二十五丈誕甚危懼乃擲其筆以下焚之仍誡子孫絶此楷法著之家令官至鴻臚少卿誕子少季亦有能稱羅暉趙襲不詳何許人與伯英同時見稱西州而矜許自與衆頗惑之伯英與朱寬書自敘云上比崔杜不足下方羅趙有餘河間張超亦善草不及崔張劉德升善為行書不詳何許人潁川鍾繇魏太尉同郡胡昭公車徵二子俱學於德升而胡書肥鍾書瘦鍾書有三體一曰銘石之書最妙者也二曰章程書傳祕書教小學者也三曰行押書相聞者也三法皆世人所善繇子會鎮西將軍絶能學父書改易鄧艾上事皆莫有知也河東衛覬字伯儒魏尚書僕射善草及古文略盡其妙草體微瘦而筆迹精熟覬子瓘字伯玉為晉太保採張芝法以覬法參之更為草藁草藁是相聞書也瓘子恆亦善書博識古文燉煌索靖字幼安張芝姊之孫晉征南司馬亦善草書陳國何元公亦善草書吳人皇象能草世稱沉著痛快滎陽陳暢晉祕書令史善八分晉宮觀城門皆暢書滎陽楊肇晉荆州刺史善草𨽻潘嶽誄曰草𨽻兼善尺牘必珍足無輟行手不釋文翰動若飛紙落如雲肇孫經亦善草𨽻京兆杜畿魏尚書僕射子恕東郡太守孫預荆州刺史三世善草藁晉齊王攸善草行書太山羊忱晉徐州刺史羊固晉臨海太守並善行書江夏李式晉侍中善寫𨽻草弟定子公府能名同式晉中書院李充母衛夫人善鍾法王逸少之師琅琊王廙晉平南將軍荆州刺史能章楷謹傳鍾法晉丞相王導善藁行廙從兄也王恬晉中將軍會稽內史善𨽻書導第二子也王洽晉中書令領軍將軍衆書通善尤能𨽻行從兄羲之云弟書遂不減吾恬弟也王珉晉中書令善𨽻行洽少子也王羲之晉右將軍會稽內史博精羣法特善草𨽻羊欣云古今莫二廙兄子也王獻之晉中書令善𨽻藁骨勢不若父而媚趣過之羲之第七子也兄玄之徽之兄子淳之並善草行王允之衛軍將軍會稽內史亦善草行舒子也太原王濛晉司徒左長史能草𨽻子修琅琊王文學善𨽻行與羲之善故殆窮其妙早亡未盡其美子敬每省修書云咄咄逼人王綏晉冠軍將軍會稽內史善𨽻行髙平郗愔晉司空會稽內史善章草亦能𨽻郗超晉中書郎亦善草愔子也潁川庾亮晉太尉善草行庾翼晉荆州刺史善𨽻行時與羲之齊名亮弟也陳郡謝安晉太傅善𨽻行髙陽許靖民鎮軍參軍善𨽻草羲之髙足晉穆帝時有張翼善學人書寫羲之表表出經日不覺後云幾欲亂真會稽隱士謝敷胡人康昕並攻𨽻草飛白本是宮殿題八分之輕者全用楷法吳時張𢎞好學不仕常著烏巾時人號為張烏巾此人特善飛白能書者無不好之自秦至晉凡六十九人法書要録啓臣僧虔啓劉伯寵陶瑾稱敕二岸雜事悉委臣判聖恩罔已奬使入效斯實臣下驅馳至願且職事所司不應多陳雖奉今旨臣豈敢於外下意不先上聞正當罄率管見令官長啓審可否之宜會須恩裁此乃更亂天聽或致煩壅且得仍舊以待能者恐於事體二三惟允伏願少留神照察鑒所啓非敢辭務懼塵聖化謹冒輸請伏追震怍謹啓又臣僧虔啓南臺御史謝憲乃堪驅使臣門義舊粗是所悉統內新故雜米數十萬斛實須督切憲今請假在此臣欲折以統攝庶得速辨其煩經督運已有前效謹以啓聞伏願聽許謹啓淳化帖答竟陵王子良書南齊書王僧虔本傳載論書一篇鼎按唐張彥逺法書要録所載比史為詳竇衆述書賦注云王僧虔答竟陵王子良書序古善書人評議無不至當本行于世其真迹今御史大夫黎翰得之則此論是為答竟陵王明矣當必前别有啓如答髙帝論書之例復按姚思廉奉詔論書引唐韓方明授筆要説載張芝至筆力驚絶耳為僧虔答竟陵王書益足明證又考謝靜謝敷一條還有所得之下有辱告至方寸千言也一假張懷瓘書斷載竟陵王答僧虔書子邑之紙妍妙輝光仲將之墨一點如漆伯英之筆窮神盡意妙物逺矣邈不可追正此中語則此為竟陵答僧虔書明矣又方寸千言之下有承天涼至不妄言耳一假其為書記無疑第不知是復與竟陵否今並摘出附後宋文帝書自謂不減王子敬時議者云天然勝羊欣功夫不及欣王平南廙是右軍叔自過江東右軍之前惟廙為最畫為晉明帝師書為右軍法亡曾祖領軍洽與右軍書云俱變古形不爾至今猶法鍾張右軍云弟書遂不減吾亡從祖中書令珉筆力過于子敬書舊品云有四匹素自朝操筆至暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸恆欲度驊騮前庾征西翼書少時與右軍齊名右軍後進庾猶不忿在荆州與都下書云小兒輩乃賤家雞皆學逸少書須吾還當比之張翼書右軍自書表晉穆帝令翼寫題後答右軍右軍當時不别久方覺云小子幾欲亂真張芝索靖韋誕鍾會二衛並得名前代古今既異無以辨其優劣惟見筆力驚絶耳張澄書當時亦呼有意郗愔章草亞於右軍晉齊王攸書京洛以為楷法李式書右軍云是平南之流可比庾翼王濛書亦可比庾翼陸機書吳士書也無以校其多少庾亮書亦能入録亡髙祖丞相導亦甚有楷法以師鍾衛好愛無厭喪亂狼狽猶以鍾繇尚書宣示帖衣帶過江後在右軍處右軍借王敬仁敬仁死其母見修平生所愛遂以入棺郗超草書亞于二王緊媚過其父骨力不及也桓玄書自比右軍議者未之許云可比孔琳之謝安亦入能流殊亦自重乃為子敬書嵇中散詩得子敬書有時裂作校紙羊欣邱道護並親授于子敬欣書見重一時行草尤善正乃不稱孔琳之書天然絶逸極有筆力規矩恐在羊欣後丘道護與羊欣俱靣授子敬故當在欣後丘殊在羊欣前范曄與蕭思話同師羊欣然范後背叛皆失故步名亦稍退蕭思話全法羊欣風流趣好殆當不減而筆力恨弱謝靈運書乃不倫遇其合時亦得入流昔子敬上表多於中書雜事中皆自書竊易真本相與不疑元嘉初方就索還上謝太傅殊禮表亦是其例親聞文皇説此謝綜書其舅云緊潔生起實為得賞至不重羊欣欣亦憚之書法有力恨少媚好顔騰之賀道力並便尺牘康昕學右軍草亦欲亂真與南州識道人作右軍書貨孔琳之書放縱快利筆道流便二王後略無其比但工夫少自任故未得盡其妙故當劣于羊欣謝靜謝敷並善寫經亦入能境居鍾索之美邁古流今是以征南還有所得按此下必有闕文要録誤以辱告承天涼二段接上混為一篇鍾公之書謂之盡妙鍾有三體一曰銘石書最妙者也二曰章程書世傳祕書教小學者也三曰行押書行書是也三法皆世人所善張超字子並河間人衛覬字伯儒河東人為魏尚書僕射諡敬侯善草及古文略盡其妙草體如傷瘦而筆迹精殺亦行於代子瓘字伯玉晉司空太保為楚王所害瓘採張芝草法取父書參之更為草藁世傳其善瓘子恆字巨山亦能書索靖字幼安燉煌人散騎常侍張芝姊之孫也傳芝草而形異甚矜其書名其字勢曰銀鈎蠆尾韋誕字仲將京兆人善楷書漢魏宮觀題署多是誕手魏明帝起凌雲臺先釘榜未題籠盛誕轆轤長絙引上使就榜題榜去地將二十五丈誕危懼誡子孫絶此楷法又著之家令官至大鴻臚竟陵王子良報王僧虔書辱告並五紙舉體精雋靈奧執玩反覆不能釋手雖太傅之婉媚玩好領軍之靜逖答緒方之蔑如也昔杜度殺字甚安而筆體微瘦崔瑗筆勢甚快而結字小疏君處二者之間亦猶仲尼方於季孟也夫工欲善其事必先利其器伯喈非流紈體素不妄下筆若子邑之紙研染輝光仲將之墨一點如漆伯英之筆窮神靜思妙物逺矣邈不可追遂令思挫於弱毫數屈於陋墨言之使人於邑若三珍尚存四寶斯覿何但尺素信札動見模式將一字竟丈方寸千言也王僧虔書此書體式不似與竟陵王承天涼體豫復欲繕寫一賦傾遲暉采心目俱勞承閲覽祕府備覩羣迹崔張歸美於逸少雖一代所宗僕不見前古人之迹計亦無以過於逸少既妙盡深絶便當得之實録然觀前世稱目竊有疑焉崔杜之後共推張芝仲將謂之筆聖伯玉得其筋巨山得其骨索氏自謂其書銀鈎蠆尾談者誠得其宗劉得升為鍾胡所師兩賢並有肥瘦之斷元鳴獲釘壁之玩師宜致酒簡之多此亦不能止長胤狸骨右軍以為絶倫其功不可及由此言之而向之論或至投杖聊呈一笑不妄言耳誡子書僧虔子慈終齊廬陵王中軍長史志中書令揖大中大夫彬祕書監寂祕書郎僧虔宋世嘗有書誡子知汝恨吾不許汝學欲自悔厲或以闔棺自欺或更擇美業且得有概亦慰窮生但亟聞斯唱未覩其實請從先師聽言觀行兾此不復虛身吾未信汝非徒然也往年有意於史取三國志聚置床頭百日許復徙業就玄自當小差於史猶未近倣佛曼倩有云談何容易見諸玄志為之逸腸為之抽專一書轉誦數十家注自少至老手不釋卷尚未敢輕言汝開老子卷頭五尺許未知輔嗣何所道平叔何所説馬鄭何所異指例何所明而便盛于塵尾自呼談士此最險事設令袁令命汝言易謝中書挑汝言莊張吳興叩汝言老端可復言未嘗看耶談故如射前人得破後人應解不解即輸賭矣且論注百氏荆州八帙又才性四本聲無哀樂皆言家口實如客至之有設也汝皆未經拂耳瞥目豈有庖厨不修而欲延大賔者哉就如張衡思侔造化郭象言類懸河不自勞苦何由至此汝曾未窺其題目未辨其指歸六十四卦未知何名莊子衆篇何者內外八帙所載凡有幾家四本之稱以何為長而終日欺人人亦不受汝欺也由吾不學無以為訓然重華無嚴父放勳無令子亦各由已耳汝輩竊議亦當云阿越不學在天地間可嬉戲何忽自課謫幸及盛時逐嵗暮何必有所減汝見其一耳不全爾也設令吾學如馬鄭亦必甚勝復倍不如今亦必大減致之有由從身上來也今壯年自勤數倍許勝劣及吾耳世中比例舉眼是汝足知此不復具言吾在世雖乏德素要復推排人間數十許年故是一舊物人或以比數汝等耳即化之後若自無調度誰復知汝事者舍中亦有少負令譽弱冠越超清級者于時王家門中優者則龍鳳劣者猶虎豹失蔭之後豈龍虎之議况吾不能為汝蔭政應各自努力耳或有身經三公蔑爾無聞布衣寒素卿相屈體或父子貴賤殊兄弟聲名異何也體盡讀數百卷書耳吾今悔無所及欲以前車誡爾後乘也汝年入立境方應從官兼有室纍牽役情性何處復得下帷如王郎時耶為可作世中學取過一生耳試復三思勿諱吾言猶捶撻志輩兾脫萬一未死之間望有成就者不知當有益否各在爾身已切身豈復關吾邪鬼惟知愛深松茂柏寧知子弟毁譽事因汝有感故略敘胸懷終日欺人南史作終日自欺人與兄子儉書僧虔好文史解音律宋升元時為尚書令以朝廷禮樂多違正典民間競造新聲雜曲上表宜命有司務勤功課緝理遺逸迭相開曉所經漏忘悉加補綴曲全者祿厚藝妙者位優則人思刻厲反體還源庶可跂踵時太祖輔政見納然所奏雖微有釐改尚多遺失至齊建元初上始欲通使僧虔與兄子儉書事竟不行古語云中國失禮問之四夷計樂亦如苻堅敗後東晉始備金石樂固知不可全誣也北國或有遺樂誠未可便以補中夏之闕且得知其存亡亦一理也但鼓吹舊有二十一曲今所能者十一而已意謂北使會有散役得今樂署一人粗别同異者充此使限雖復延州難追其得知所知亦當不同若謂有此理者可得申吾意上聞否試為思之並南齊書與張緒書緒字思曼吳郡吳人厯金紫光祿大夫領國子祭酒僧虔為會稽太守山隂人孔祐至行通神隱於四明山嘗見山谷中有數百斛錢視之如瓦石不異採樵者競取入手即成砂礫曾有鶴中箭來投祐祐為之養創愈然後去僧虔與緒書孔祐敬康曾孫也行動幽祇德標松桂引為主簿遂不可屈此古之遺德也南史王琰乞郡牒寶章集太子舍人王琰闕十五字牒在職三載家貧仰希江郢所統小郡謹牒七月草四日僧虔啓題尚書省壁僧虔宋升明初為尚書僕射轉尚書令當時嗟賞以比座右銘圓方行止物之定質注之不已則溢髙之不已則栗馳之不已則躓引之不已則逸是故去之宜疾王慈字伯寶僧虔子厯東海太守廬陵王中軍長史上論朝堂諱榜表慈除侍中領步兵校尉上表詔付外詳議慈議不行夫帝后之德綢繆天地君人之亮蟬聯日月至於名族不著昭自方策號諡聿宣載伊篇籍所以魏臣據中以建議晉主依經以下詔朝堂榜志諱字懸露義非綿古事殷中世空失資敬之情徒乖嚴配之道若乃武功鼎臣贊庸元吏或以勳崇或由姓表故孔悝見銘謂標叔舅子孟應圖稱題霍氏况以處一之重列尊名以止仁無二之貴夤沖文而止敬昔東平即世孝章巡宮而灑泣新野云終和熹見似而流涕感循舊類尚或深心矧觀徽迹能無惻隱今扄禁嶔邃動延車蓋若使鑾駕紆覽四時臨閲豈不重增聖慮用感宸衷愚謂空標簡第無益于匪躬直述朝堂寧虧于夕惕伏惟陛下保合萬國齊聖羣生當刪前基之弊軌啓皇齊之孝則博士李撝議據周禮凡有新令必奮鐸以警衆乃退以憲之于王宮注憲表懸之也太常丞王僴之議尊極之名宜率土同諱目可得覩口不可言口不可言則知之者絶知之者絶則犯觸必衆儀曹郎任昉議撝取證明之文僴之即情惟允直班諱之典爰自漢世降及有晉厯代無爽今之諱榜兼明義訓邦之字國實為前事之徵名諱之重情敬斯極故懸諸朝堂搢紳所聚將使起伏晨昏不違耳目禁避之道昭然易從此乃敬恭之深旨何情典之或廢尊稱霍氏理例乖方居下以名故以不名為重在上必諱故以班諱為尊因心則理無不安即事則習行已久謂宜式遵無所創革王奐字彥孫琅邪臨沂人僧朗孫厯雍州刺史以擅殺拒臺命伏誅上髙帝辭南蠻校尉表奐領南蠻校尉南郡內史一嵗三遷上表固讓見許於是罷南蠻校尉官今天地初闢萬物載新荆蠻來威巴濮不擾但使邉民樂業有司修務本府舊州日就殷阜臣昔逰西土較見盈虛兼日者戎燼之後痍毁難復雖復緝以善政未及來蘇今復割撤大府制置偏校崇望不足以助強語實安能以相弊且資力既分職司增廣衆勞務倍文案滋煩非獨臣見其難竊以為國計非允王融字元長琅琊臨沂人僧達孫厯丹陽丞中書郎竟陵王板寧朔將軍鬱林王於獄賜死上武帝啓求自試融博學有文才厯太子舍人以父官不通弱年便欲紹興家業啓世祖求自試臣聞春庚秋蟀集候相悲露木風榮臨年共悅夫惟動植且或有心况在生靈而能無感臣自奉望宮闕沐浴恩私拔迹庸虛參名盛列纓劔紫復趨步丹墀嵗時歸來誇榮邑里然無勤而官昔賢曾議不任而祿有識必譏臣所用慷慨憤悶不遑自安誠以深恩鮮報聖主難逢蒲栁先秋光隂不待貪及明時展悉愚效以酬陛下不世之仁若微誠獲信短才見序文武吏法惟所施用夫君道含𢎞臣術無隱翁歸乃居中自見充國曰莫若老臣竊景前修敢蹈輕節以冒不媒之鄙式罄奉公之誠抑又唐堯在上不參二八管夷吾恥之臣亦恥之願陛下裁覽南齊書上武帝論給虜書疏融遷中書郎時虜使遣求書朝議欲不與融上疏世祖詔答事竟不行臣側聞僉議疑給虜書如臣愚情切有未喻夫虜人面獸心狼猛蜂毒暴悖天經虧違地義逋竄燭幽去來豳朔綿周漢而不悛厯晉宋其踰梗豈有愛敬仁智恭讓廉修慙犬馬之馴心同鷹虎之反目設稿秣有儲筋竿足用必以草竊關燧寇擾邉疆寧容欵塞卑辭承衣請朔陛下務存遵養不時侮亡許其膜拜之誠納裘之賮况復願同文軌儻見欵遣思奉聲教方致猜拒將使舊邑遺逸未知所置衰胡餘噍或能自推一令蔓草難鉏涓流泛酌豈直疥癢輕痾容為心腹重患抑孫武之言也困則數罰窘則多賞先暴而後畏其衆者虜之謂乎前中原士庶雖淪懾殊俗至於婚葬之辰猶巾褠為禮而禁令苛刻動加誅轘于時獯粥初遷犬羊尚結即心徒怨困懼成逃自其將卒奔離資偫銷闕北畏勍蠕西逼南胡民背如崩勢絶防斷於是曲從物情偽竊章服厯年將絶隱蔽無聞既南向而泣者日夜以覬北顧而辭者江淮相屬凶謀嵗窘淺慮無方於是稽顙郊門問禮求樂若來之以文德賜之以副書漢家軌儀重臨畿輔司𨽻傳節復入關河無待八百之師不期十萬之衆固其提漿佇俟揮戈願倒三秦大同六漢一統又虜前後奉使不專漢人必介以胸奴備諸覘獲且設官分職彌見其情抑退舊苗扶任種戚師保則后族馮晉國總録則邽姓直勒渴侯台鼎則邱頽茍仁端執政則目凌鉗耳至於東都羽儀西京簮帶崔孝伯程虞虯久在著作李元和郭季祐上于中書李思沖飾處清官遊明根泛居顯職今經典逺被詩史北流馮李之徒必欲遵尚直勒等類居致乖阻何則胸奴以氈騎為帷牀馳射為糇糧冠方帽則犯沙陵雪服左衽則風驤鳥逝若衣以朱裳戴之玄冕節其揖讓教以翔趨必同艱桎梏等懼氷淵婆娑􅩚躃困而不能前已及夫春草水生阻散馬之適秋風木落絶驅禽之歡息沸脣於桑墟别醍乳於冀俗聽雅韶如聾聵臨方丈若爰居馮李之徒固得志矣虜之凶族其如病何於是風土之思深愎戾之情動拂衣者連裾抽鋒者比鏃部落爭于下酋渠危于上我一舉而兼吞卞莊之勢必也且棘寶薦虞晉疆彌盛大鐘出智宿氏以亡帝略逺孚無思不服鑾光幸岱匪暮斯朝臣請收籍伊瀍兹書復掌猶取之內府藏之外籝於理有愜即事何捐若狂言足採請決敕施行武帝答吾意不異卿今所啓比相見更委悉上武帝陳北伐疏永明末世祖欲北伐使毛惠秀畫漢武北伐圖以融掌其事融好功名因此上表圖成置琅琊城射堂壁上遊幸輒觀覽焉藝文作答敕撰漢武北伐圖啓一作勸髙帝北伐啓誤臣聞情慉自中事符則感象構於始機動斯彰莊敬之道可宗會揖讓其彌肅忠烈之士足貴應鼙鐸以增思肇植生民厥詳既緬降及興運維道有徵莫不有所因循而升皇業者也若夫膏腴既稱天乙知五方之富皮幣已列帝劉測四海之尊異封禪之文則升中之典攸鬯嘆輿地之圖乃席卷之庸是立伏惟陛下窮神盡聖總極居中偶化兩儀均明二曜拯玄綱於頽絶反至道於澆淳可謂區宇儀形齊民先覺者也臣亦遭逢生此嘉運鑿飲耕食自幸唐年而識用昏霾經術疏淺將薖且軸豈蕨與嶶皇鑒燭幽天髙聽下賞片言之或善矜一物之失時湔拂塵蒙霑飾光價拔足草廬厠身朝序復得拜賀嵗時瞻望日月於臣心願曾已畢矣但千祀一逢休明難再思策鉛駑樂陳涓壒竊習戰陳攻守之術農桑牧藝之書申商韓墨之權伊周孔孟之道常願待詔朱闕俯對青蒲請間宴之私談當世之務位賤人微徒深傾欵方今九服清怡三靈和晏木有附枝輪無異轍東鞮獻舞南辮傳歌羌僰踰山秦屠越海舌象玩委體之勤輶譯厭瞻巡之數固將開桂林于鳳山創金城于西守而蠢爾獯狄敢讎大邦假息關河竊命函谷淪故京之爽塏變舊邑而荒涼息反坫之儒衣久伊川之被髮北地殘民東都遺老莫不茹泣吞悲傾耳戴目翹心仁政延首王風若試馳咫尺之書具甄戎旅之卒徇其墮城納其降虜可弗勞弦鏃無待干戈真皇王之兵征而不戰者也臣乞以執殳先邁式道中原澄瀚渚之恆流掃狼山之積霧係單于之頸屈左賢之膝習呼韓之舊儀拜鑾輿之巡幸然後天移雲動勒封岱宗咸五登三追蹤七十百神肅警萬國具僚璯辨星離玉帛雲聚集三燭于蘭席聆萬嵗之禎聲豈不盛哉豈不韙哉昔桓公志在伐莒郭牙審其幽趣魏后心存去漢德祖究其深言臣愚昧忖誠不足以知微然伏揆聖心規模𢎞逺既圖載其事必克就其功臣不勝歡喜又上疏朝廷討雍州刺史王奐融復上疏臣每覽史傳見憂國忘家捐生報德者未嘗不撫卷歎息以為今古共情也然或以片言微感一餐小惠參國士之眄同布素之逰耳豈有如臣獨拔無聞之伍過超非分之位名器雙假榮祿兩升而宴安昃罷之晨優遊旰食之日所以敢布丹愚仰聞宸聽今議者或以西夏為念臣竊謂之不爾其故何哉陛下聖明羣臣悉力順以制逆上而御下指開賞黜之言微示生死之路方域之人皆相為敵既兵威逺臨人不自保雖窮鳥必啄固等命於梁鶉困獸斯驚終並懸於厨鹿凱師勞飲固不待晨臣之寸心獨有微願自獫狁荐食荒侮伊瀍天道禍淫危亡日至母后內難兵力外虛謡言物情屬當今會若藉巫漢之歸師騁士卒之餘憤取函谷如反掌陵關塞若摧枯但士非素蓄無以即用不教民戰是實棄之特希私集部曲豫加習校若蒙垂許乞𨽻監省拘食人身權備石頭防衛之數臣少重名節早習軍旅若試而無績伏受面欺之誅用且有功仰酬知人之哲拜祕書丞謝表臣聞升離戒晨隂牆不照其景膚雲停夕幽草或漏其津至如明兼就日澤深行雨不有聖德誰或其然所以欽至道而出青臯捨布衣而望朱闕懷祿仕在代耕期榮不謀入用豈悟特擢之例事均延祖置左之恩任光元幹踰溢情涯普燭身表畏翹車而必讓誠濡翼之願辭既聖主謂其可施故愚臣默思自勉為王儉讓國子祭酒表竊以庠均義重振古所崇資師道尊有來攸尚匪曰蘭芷疇變入室之情不自朱藍何遷素絲之質太平御覽又表况臣仁慙富似德謝潤身識漏令經器非匣重何以升墜道於殊年反斯文於遙日將使良璣修竹無增瑩羽敬遜務時遂蹇早嵗又表臣聞修瓦方湛弱露霑而取覆懸衡紀正輕塵委而必移况臣才非應俗用乖知治取其集木飲氷旌懸輪騖方臣之念未足言矣謝敕賜御裘等啓雲衣降授仙裾曲委榮振素里澤駭蓬心昔漢帝解裘不獨前寵曹王褫帶復降今恩謝敕賜米啓臣無王陽之術計然之智不能負粟百里分地一㕓上虧溫養自取飢切豈悟外恩橫集天私妄委謝竟陵王賜扇啓竊以六翮風流五明氣重若比圓綃有兼玩實輕踰雪羽潔並霜文子淑賞其如規班姬儷之明月豈直魏王九華漢臣百綺况復動製聖衷垂言炯戒載摹聽視式範樞機謝竟陵王賜納裘啓降飾自尊垂榮及賤玄玉不純曾波奪采南陸方永北風日壯無衣無褐發念聖衷而挾纊之問每流解裘之賜偏委謝司徒賜紫鮓啓東越水羞實罄乘時之美南荆任土方挹鮓魚之最謝武陵王賜弓啓殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的免園掩秀鄴水慚奇融揖讓未工濫陪升飲之賞操弧反正繆奉招賢之錫文韜鏤景逸幹捎雲玩溢百齡佩流千載捎初學記作摽升作下誤謝安陸王賜銀鉢啓素金之貴有訪仙經鐫刻可奇見符神鼎撤膳器於珍羞之錫降寶玩於簞瓢之門並藝文類聚三月三日曲水詩序永明九年上幸芳林園褉宴朝臣使融為曲水詩序文藻富麗虜使宋辨謂融曰昔觀相如封禪以知漢武之德今覽王生詩序用見齊主之盛融曰皇家盛明豈直比蹤漢武更慙鄙製無以逺匹相如臣聞出豫為象鈞天之樂張焉時乘既位御氣之駕翔焉是以得一奉宸逍遙襄城之域體元則大悵望姑射之阿然窅眇寂寥其獨適者已至如夏后兩龍載驅璿臺之上穆滿八駿如舞瑶水之隂亦有饗云固不與萬民共也我大齊之握機創厯誕命建家接禮二宮考庸太室幽明獻期雷風通饗昭華之珍既徙延喜之玉攸歸革宋受天保生萬國度邑靜鹿邱之歎遷鼎息大坰之慙紹清和于帝猷聮顯懿于王表駿發開其逺祥定爾固其洪業皇帝體膺上聖運鍾下武冠五行之秀氣邁三代之英風昭章雲漢輝麗日月牢籠天地彈壓山川設神理以景俗敷文化以柔逺澤普汜而無私法含宏而不殺猶且具明廢寢是晷忘餐念負重于春氷懷御奔于秋駕可謂巍巍弗與蕩蕩誰名秉靈圖而非泰涉孟門其何險儲后睿哲在躬妙善居質內積和順外發英華斧藻至德琢磨令範言炳丹青道潤金璧出龍樓而問豎入虎闈而齒胄愛敬盡于一人光耀究于四海若夫族茂麟趾宗固磐石跨蹍昌姬韜軼炎漢元宰比肩于尚父中鉉繼踵乎周南分陜流勿翦之歡來仕允克施之譽莫不如圭如璋令問令望朱茀斯皇室家君王者也本枝之盛如此稽古之政如彼用能免羣生於湯火納百姓於休和草萊樂業守屏稱事引鏡皆明目臨池無洗耳沈冥之怨既缺薖軸之疾已消興廉舉孝嵗時於外府署行議年日夕于中甸協律總章之司序倫正俗崇文成均之職導德齊禮挈壺宣夜辨氣朔於靈臺書笏珥彤紀言事於仙室褰帷斷裳危冠空履之吏彯搖猛武扛鼎揭旗之士勤恤民隱糾逖王慝射集隼於髙墉繳大風於長隧不仁者逺惟道斯行讒莠蔑聞攘爭掩息稀鳴桴于砥路鞠茂草于圓扉耆年闕市井之遊稚齒豐車馬之好宫鄰昭泰荒憬清夷侮食來王左言入侍離身反踵之君髽首貫胸之長屈膝厥角請受纓縻文鉞碧砮之琛奇幹善芳之賦紈牛露犬之玩乘黃兹白之駟盈衍儲邸充牣郊虞匭牘相尋鞮譯無曠一尉候于西東合車書于南北暢轂埋轔轔之轍緌旌卷悠悠之斾四方無拂五戎不距偃革辭軒銷金罷刃天瑞降地符升澤馬來器車出紫脫華朱英秀佞枝植厯草滋雲潤星暉風揚月至江海呈象龜龍載文方握河沈璧封山紀石邁三五而不追踐八九之遙迹功既成矣世既貞矣信可以優遊暇豫作樂崇德者歟于時青鳥司開條風發嵗粵上斯已惟暮之春同律克和樹草自樂褉飲之日在兹風舞之情咸蕩去肅表乎時訓行慶動於天矚載懷平圃乃眷芳林芳林園者福地奧區之輳丹陵弱水之舊殷殷均乎姚澤膴膴尚於周原狹豐邑之未宏陋譙居之猶褊求中和而經處揆景緯以裁基飛觀神行虛簷雲構離房乍設層樓間起負朝陽而抗殿跨靈沼而浮榮鏡文虹於綺疏浸蘭泉於玉砌幽幽叢薄秩秩斯干曲拂邅回潺湲徑復新蓱泛沚華桐發岫雜夭采於柔荑亂嚶聲于綿羽禁軒承幸清宮俟宴緹帷宿置帟幕宵懸既而滅宿澄霞登光辨色戒道執殳展軨效駕徐鑾警節明鐘暢音七萃連鑣九斿齊軌建旗拂霓揚葭振木魚甲煙聚貝胄星羅重英曲瑵之飾絶景追風之騎昭灼甄部駔駿函列虎視龍超雷駭電逝轟轟隱隱紛紛軫軫羌難得而稱計爾乃回輿駐罕嶽鎮淵渟晬容有穆賔儀式序授几肆筵因流波而成次蕙肴芳醴任激水而推移葆佾陳階金匏在席戚奏翹舞籥動邠詩召鳴鳥于弇州追伶倫于嶰谷發參差于王子傳妙靡于帝江正歌有闋羽觴無算上陳景福之賜下獻南山之壽信凱宴之在藻知和樂於食蘋桑榆之隂不居草露之滋方渥有詔曰今日嘉會咸可賦詩凡四十有五人其辭云爾皇太子哀策文繡幕啓塗銅池從殯葆鐸既行枚綍且引皇帝痛粢盛之闕奉哀匕鬯之有亡憫含嗟乎崇正顧掩欷于承光式眷元良永懷人寶俾兹史策載餘風道其辭曰居辰北極在日重離誕惟妙善克自生知資神為契合聖如規地維缺位月紀愆期哀纒晦朔燧改嵗時􅕷粥不溢薑桂無滋俯終心禮昌我帝基思皇下武纘戎上德將叶人神永貽家國用稽嗣典實𢎞儲則庸器改物徽號崇名往辭緑蓋來馭朱纓旗旗旖旎鸞纛聲明守器宣華訪安永福上漏驂軒初晨戒服慶色伊滿夤儀載肅至誠莫感遐福空辭氛程月志祲動年司素妭犯列青雲失滋中楹軫夢當户陳詩楚藥毁方秦醫反轍髙議虛演奇文徒説逺賔上靈長違昭世痛結宸慈哀震華棣嗚呼哀哉軒帷髙寂庭帳深隂鶴關晝掩鳬燈夜沈仍襲未改容饌如臨曖徽儀而可慕標嗣子之純心嗚呼哀哉韋辨告期麻衣請日辨域展圖揚龜獻吉文物充階具僚在位總葭挽之哀凄視風煙之蕭瑟嗚呼哀哉飾麾輅而南指轉旌羽而北徂車結軫于雕轂馬緩節于金蘇寄靈心於萬象增戀戀於國都嗚呼哀哉光徙靡而欲沈山荒涼而遂晚城闕緬而何期平原忽而超逺情有望而弗追顧如疑於將反嗚呼哀哉永嘉長公主墓志銘作儀阿媛取儷漢妃相金漏質穠李慙暉肅穆婦容靜恭女德顧史求針披圖問則慶善郁夷與仁冥默宵燧亡明曉挽已聲松門嚴濶泉帳寒清悠哉白日鬱彼佳城豫章文獻王墓志銘領袖傾淪人綱弛沒半嶽推峯中河墜月眷然曉隧如何夜臺鯨驂惋慕葆吹徘徊千秋萬祀顧有餘哀永明九年策秀才文五首問秀才髙第明經朕聞神靈文思之君聰明聖德之后體道而不居見善如不及是以崆洞有順風之請華封致乘雲之拜或揚旌求士或設簴待賢用能敷化一時餘烈千古朕寅奉天命恭惟永圖審聽髙居載懷祗懼雖言事必史而象闕未針寤寐嘉猷延佇忠實子大夫選名升學利用賔王懋陳三道之要以光四科之首鹽梅之和屬有望焉又問昔周宣惰千畝之禮虢公納諌漢文缺三推之義賈生直言良以食惟民天農為政本金湯非粟而不守水旱有待而無遷朕式照前經寶兹稼穡祥正而青旗肅事土膏而朱紘戒典將使杏花菖葉耕穫不愆清甽泠風述遵無廢而釋耒佩牛相沿莫反兼貧擅富浸以為俗若爰井開制懼驚擾愚民舄鹵可腴恐時無史白興廢之術矢陳厥謀又問議獄緩死大易深規敬法恤刑虞書茂典自氓俗澆弛法令滋彰胏石少不寃之民棘林多夜哭之鬼朕所以明發動容昃食興慮傷秋荼之密網惻夏日之嚴威永念畫冠緬追刑厝徒以百鍰輕科反行季葉四支重罰爰創前古訪遊禽於絶澗作霸秦基歌雞鳴於闕下稱仁漢牘二途如爽即用兼通昌言所安朕將親覽又問聚人曰財次政曰貨泉流表其不匱懋遷通其有無既龜貝積寢緡繦專用世代滋多銷漏參倍下貧無兼辰之業中産闕洊嵗之資惟瘼恤隱無捨矜歎上帝溥臨賜朕休寶卭斜之谷開而出銅且有後命事兹鎔範充都內之金紹圜府之職但赤仄深巧學之患榆莢難輕重之權開塞所宜悉心以對又問治厯明時昭遷革之運改憲敇法審刑德之原分命顯於唐官文條本於鄒説及嵎夷廢職昧谷虧方漢秉素祇之徵魏稱黃星之驗紛爭徒軫疑論無歸朕獲纂洪基思𢎞至道庶令日月休徵風雨玉燭克明之旨弗逺欽若之義復還於子大夫何如哉其驪翰改色寅丑殊建别白書之永明十一年策秀才文五首問秀才朕秉籙御天握樞臨極五辰空撫九序未歌至於思政明臺訪道宣室若墜之惻每勤如傷之念恆軫故恤貧緩賦省徭慎獄幸四境無虞三秋式稔而多黍多稌不興兩穗之謡無褐無衣必盈七月之歎豈布政未優將罷民難業登爾於朝是屬宏議罔弗同心以匡厥辟又問惟王建國惟典命官上叶星象下符川嶽必待天爵具修人紀咸事然後沿才授職揆務分司是以五正置於朱宣下民不忒九工開於黃序庶績其凝周官三百漢位兼倍厯兹已降遊惰實繁若間冗卑棄則橫議無已冕笏不澄則坐談彌積何則可修善詳其對又問昔者賢牧分陜良守共治下邑必樹其風一鄉可以為績至有旦撫鳴琴日置醇酒文而無害嚴而不殘故能出人於阽危之域躋俗於仁壽之地是以賈誼有言天下之有惡吏之罪也頃深汰圭符妙簡銅墨而春雉未馴秋螟不散入在朕前湊其智略出連城守闕爾無聞豈薪槱之道未𢎞為網羅之目尚簡悉意正辭無侵執事又問朕聞上智利民不述于禮大賢強國罔圖惟舊豈非療飢不期於鼎食拯溺無待於規行是以三王異道而共昌五霸殊風而並烈今農戰不修文儒是競棄本徇末厥弊滋多昔宋臣以禮樂為殘賊漢主比文章於鄭衛豈欲非聖無法將以既道而權今欲專士女於耕桑習鄉閭以弓騎五都復而事庠序四民富而歸文學其道奚若爾無面從又問自晉氏不綱關河蕩析宋人失馭淮汴崩離朕思念舊民永言攸濟故選將開邉勞來安集加以納欵通和布德修禮歌皇華而遣使賦膏雨而懷賔所以關洛動南望之懷獯夷遽北歸之念夫危葉畏風驚禽易落無待干戈聊用辭辨片言而求三輔一説而定五州斯路何階人誰或可進謀誦志以沃朕心王秀之字伯奮琅邪臨沂人厯吳興太守與朝士書虞願字士恭會稽餘姚人宋明帝時為晉平太守以亷惠稱後秀之為郡與朝士書此郡承虞公之後善政猶存遺風易遵差得無事南齊書貽宗測書測少靜退秀之彌所欽慕乃令陸探微畫其形與已相對又貽書昔人有圖畫僑札輕以自方耳南史王逡之字宣約琅邪臨沂人厯光祿大夫加侍中大輅議宋升明三年錫齊王大輅戎輅各一乘黃五路無大輅戎輅左丞王逡之議太尉左長史王儉議宜用金輅九旒大輅殷之祭車故不登周輅之名而明堂位云大輅殷輅也注云大輅木輅也月令中央土乘大輅注云殷輅也禮器大輅繁纓一就注云大輅殷之祭天車也周禮五路玉路金路象路革路木路則周之木輅殷之大輅也周革路建太白以即戎此則戎輅也意謂國之大事在祀與戎故錫以殷祭天之車與周之即戎之路祀則以殷戎必以周者明郊天義逺建前代之禮即戎事近故以今世之制明堂位云魯君孟春乘大輅載十有二旒日月之章祀于帝郊天必以大輅以錫諸侯良有以也今木路即大路也奏彈兼中丞袁彖彖彈謝超宗言辭依違世祖復使右丞王逡之併彈彖詔徙超宗彖禁錮臣聞行父盡忠無禮斯疾農夫去草見惡必耘所以振纓稱良登朝著績未有尸位存私而能保其榮名者也今月九日治書侍御史臣司馬侃啓彈征北咨議參軍事謝超宗稱根性昏動率心險放悖議爽真囂辭犯實親朋忍聞衣冠掩目輒收付廷尉法獄治罪處劾雖重文辭簡略事入主書被却還外其晚兼御史中丞臣袁彖改奏白簡始粗詳備厥初隱衛實彖之由尋超宗植性險戾稟行凶詖豺狼野心久暴遐邇張敬兒潛圖反噬罰未塞愆而稱怨痛枉形于言貌協附姦邪疑間勳烈搆扇異端譏議時政行路同忿有心咸疾而阿昧茍容輕文略奏又彈事舊體品第不簡而舋戾殊常者皆命議親奏以彰深愆况超宗罪逾四凶過窮南竹雖下輒收而文止黃案沈浮并見輕重相乖此而不糾憲綱將替彖才識疏淺質幹無聞慿戚升榮因慈荷任不能克己厲情少酬恩奬撓法容非用申私惠何以糾正邦違式明王度臣等參議請以見事免彖所居官解兼御史中丞輒攝曹依舊下禁止視事如故治書侍御史臣司馬侃雖承稟有由而初無疑執亦合及咎請杖督五十奪勞百日令史卑微不足申盡啓可奉行侃奏彈之始臣等並即經見加推糾案入主書方被却檢疏謬之愆伏追震悚武帝詔超宗舋同大逆罪不容誅彖匿情欺國愛朋罔主事合極法特原收治免官如案禁錮十年王皓逡之從弟圭之子仕中軍參軍上齊職儀啓圭之有史學撰齊職儀永明九年皓啓上詔付祕閣臣亡父故長水校尉圭之籍素為基依儒習性以宋元徽二年被敕使纂集古設官厯代分職凡在墳策必盡詳究是以等級掌司咸加編録黜陟遷補該研記述章服之差兼冠佩之飾屬值啓運軌度惟新故太宰臣淵奉宣敕旨使速洗正刋定未畢臣私門凶禍不揆庸微謹冒啓上凡五十卷謂之齊職儀仰希永升天閣長銘祕府南齊書王晏字士彥琅邪臨沂人厯尚書令進號驃騎大將軍為明帝所誅文惠大子喪服議永明十一年太子薨右僕射王晏等奏詔依所議案喪服經為君之父長子同齊衰期今至尊既不行三年之典止服期制羣臣應降一等便應大功九月功衰是兄弟之服不可以服尊臣等參議謂宜重其衰裳減其月數同服齊衰三月至於太孫三年既申南郡國臣宜備齊衰期服臨汝曲江既非正嫡不得禰先儲二公國臣並不得服又奏詔曰既久廢便停案喪服經雖有妾為君之長子從君而服二漢以來此禮久廢請因循前準不復追行又奏詔依議伏尋御服文惠太子期內不奏樂諸王雖本服期而儲皇正體宗廟服者一同釋服奏樂姻娶便應並通竊謂二等誠俱是嘉禮輕重有異娶婦思嗣事非全吉三日不樂禮有明文宋世期喪降在大功者婚禮廢樂以申私戚通以前典又奏詔可案禮祥除皆先於今夕易服明旦乃設祭尋比世服臨然後改服與禮為乖今東宮公除日若依例皇太孫服臨方易服臣等參議謂先哭臨竟而後祭之應公除者皆於府第變服而後入臨行奉慰之禮啓武帝江斆永明七年徙侍中領驍騎將軍尋轉都官尚書領驍騎將軍王晏啓江斆今重登禮閣兼掌六軍慈渥所覃實有優忝但語其事任殆同間輩天旨既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言武帝答斆常啓吾為其鼻中惡今既以何胤王瑩還門下故有此回換耳王晏右僕射徐孝嗣吏部尚書何胤侍中故太子祔廟奏永明十一年議詔可故太子祔太廟既無先準檢宋元后故事太尉行禮太子拜伏與太尉俱臣等參議依擬前典太常主廟位太尉執禮祔太孫拜伏皆與之俱正禮既畢隂室之祭太孫宜親自祭奠王思逺琅邪臨沂人晏從弟厯侍中度支尚書上明帝固讓吏部郎表思逺以從兄晏為尚書令不欲並居內臺權要之職表上改授司徒左長史近頻煩歸啓實有微槩陛下矜遇之厚古今罕儔臣若孤恩誰當戮力既自誓輕軀命不復以塵點為疑正以臣與晏地惟密親必不宜俱居顯要慺慺丹赤守之以死臣實庸鄙無足奬進陛下甄拔之旨要是許其一節臣果不能以理自固有乖則哲之明犯冒之尤誅責在已謬賞之私惟塵聖鑒權其輕重寧守褊心且亦緣陛下以德御下故臣可得以禮進退伏願思垂拯宥不使霣墜今若祗膺所忝三公不足為泰犯忤之後九泉未足為劇而臣茍求刑戮自棄富榮愚夫不為臣亦庶免此心此志可憐可矜如其上命必行請罪非理聖恩方置之通塗而臣固求擯壓自愍自悼不覺涕流謹冒鈇鉞悉心以請窮則呼天仰祈一照南齊文紀卷四
