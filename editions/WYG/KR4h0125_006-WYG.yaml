body:
  text: 南齊文紀巻六明梅鼎祚編呂安國廣陵人仕宋湘州刺史入齊歴南兗州刺史仍都督湘州遷散騎常侍啓置東平郡永明七年光禄大夫呂安國啓見許北兗州民戴尚伯六十人訴舊壤幽隔飄寓失所今雖創置淮隂而陽平一郡州無實土寄山陽境内竊見司徐青州悉皆新立並有實郡東平旣是望邦衣冠所係希於山陽盱眙二界間割小户置此郡始招集荒落使本壤族姓有所歸依臣尋東平郡旣是此州本領臣賤族桑梓願立此邦沈沖字景綽呉興武康人歴五兵尚書江謐罪奏謐仕宋入齊歴長沙内史行湘州留事遷掌吏部太祖崩以不豫顧命稱疾不入世祖即位又不遷官以此怨望時世祖不豫謐詣豫章王嶷欲為作計上使御史中丞沈沖奏謐前後罪詔賜死謐少懷輕躁長習諂薄交無義合行必利動特以奕世吏局見擢宋朝而阿䛕内外貨賂公行咎盈憲簡戾彰朝聽輿金輦寳取容近習以沈攸之地勝兵强終當得志委心託身嵗暮相結以劉景素親屬望重物應樂推獻誠薦子窺窬非望時艱網漏得全首領太祖匡飭天地方知逺圖薄其艱洗之瑕許其革音之効加以非分之寵推以不次之榮列迹勲良比肩朝德以往昔微勤刀筆小用賞厠河山任忝出入輕險之性在貴彌彰貪昧之情雖富無滿重莅湘郡顯行斷盜及居銓衡肆意受納連席同乘皆詖黷舊侶密筵閑讌必貨賄常客理合升進者以為已惠事宜貶退者並稱中㫖謂販鬻威權姦自不露欺主罔上奸議可掩先帝寢疾彌留人神憂震謐托病私舍曾無變容國諱經旬甫暫入殿叅訪遺詔覘忖時㫖以身列朝流宜䝉兼帶先顧不逮舊位無加遂崇飾惡言肆醜縱悖譏誹朝政訕毁皇猷遍蚩忠賢歴詆台相至於蕃岳入授列代恒規勲戚出撫前王彞則而謐妄發樞機坐構嚻論復敢貶謗儲后不顧辭端毁折宗王毎窮舌杪皆云誥誓乖禮崇樹失宜仰指天俯畫地希幸災故以申積憤犯上之跡旣彰反噬之情已著請免官削爵土收送廷尉獄治罪沈淵沖之兄歴御史中丞沈約見梁薦沈驎士表永明六年吏部郎沈淵中書郎沈約表薦徴太學博士不就吳興沈驎士英風夙挺峻節早樹貞粹本於天然綜博生乎篤習家世孤貧藜藿不給懷書而耕白首無倦挾琴採薪行歌不輟長兄早卒孤姪數四攝尫鞠稚吞苦推甘年踰七十業行無改元嘉以來聘召仍疊玉質踰潔霜操日嚴若使聞政王庭服道槐掖必能孚朝規於邊鄙播聖澤於荒陲沈憲字彦章吳興武康人歴散騎常侍分置二豫啓永明二年割揚州宣城淮南豫州歴陽譙廬江臨江六郡復置南豫州四年冠軍長史沈憲啓二豫分置以桑堁子亭為斷潁川汝陽在南譙歴陽界内悉屬西豫廬江居晉熈汝隂之中屬南豫求以潁川汝陽屬南豫廬江還西豫殷瀰歴尚書右丞牒請二豫分置永明七年南豫州别駕殷瀰牒稱尚書叅議往年慮邊塵須實故啓廻換今淮泗無虞宜許所牒詔可潁川汝陽荒殘來久流民分散在譙歴二境多䝉復除獲有郡名租輸益微府州絶無將吏空受名領終無實益但寄治譙歴於方斷之宜實應屬南豫二豫亟經分置廬江屬南豫濵帶長江與南譙接境民黎租帛從流送州實為便利逺踰西豫非其所願郡領灊舒及始新左縣村竹産府州採伐為益不少府州新創異于舊藩資役多闕實希得廬江請依昔分置庾杲之字景行新野人歴太子右衛率歴太子詹事致隱士劉虯書蓺文任昉為杲之作書廣𢎞明集此書未全自别荆南迄將二紀杲之牽滯形有推遷物役丈人没志外身超然獨善雖心懸咫尺而事阻山河悠悠白雲依然有道金涼佇運想恒納宜沖明在襟屢候無爽體道為用蹈理則和杲之牽綴疲朽愧心已多訪德則山林窅然觀道則風雲自逺嵗暮之期指塗衡岳神虚氣懋無待怡和江湖相望安事行李司徒竟陵王懋於神者言象所絶接乎事者遐邇所宗鍾石非禮樂之本纓褐豈朝野之謂想闇投之懷不以形骸為阻一日通籍梁邸親奉話言夢想清塵為嵗已積以丈人非羔鴈所榮故息蒲帛之典勝寄冥通諒有風期之遲君王卜居郊郭縈帶川阜顯不狥功晦不標迹從容人野之間以窮二者之致且𢎞護為心廣敷真俗思聞繫表共剖衆妙比日式筵山阿虚館川涘實望賁然少酬側遲昔東平樂善旌君大於東閣哲王愛素致吾子於西山豈不盛歟百齡飄驟凝滯自物千載一期為仁由已且凌雪戒塗非滅迹之郊鴻鐘在御豈銷聲之道已標異人之跡故有同物之勞夫山水無情應之以㑹愛閒在我觸地蕭條衡嶽何親鍾山何薄想𢎞思有在不俟繁言藝文類聚臨終上武帝表臣昨夜及旦更增氣疾自省綿痼頃刻危殆無容復卧任居隆顯玷塵明世乞觧所忝待終私庭臣以凡庸謬徼昌運奬擢之厚千載難逢且年踰知命志事榮顯脩夭有分無所厝言若天鑒微誠暫借餘歴傾宗殞元陳力無逺仰違庭闕伏枕鯁戀劉虯字靈預南陽湼陽人累徵不就虯與虬同答竟陵王子良書虯四節卧病三時營灌暢餘隂於山澤託暮情於魚鳥寧非唐虞重恩周邵宏施虯進不研機入𤣥無洙泗稷館之辯退不凝心出類非冢間樹下之節逺澤旣灑仁規先著謹收樵牧之嫌敬加軾鼃之義南齊書宗測字敬微南陽人一字茂深答府召測少静退不樂人間驃騎豫章王嶷徴為叅軍測答府云何為謬傷海鳥横斤山木又答測母喪負土植松柏豫章王復遣書請之辟為叅軍測答之性同鱗羽愛止山壑眷戀松筠輕迷人路縱宕巖流有若狂者忽不知老至而今鬢已白豈容課虚責有限魚慕鳥哉筠南史作雲答魚復侯子響子響為江州厚遣贈遺測曰少有狂疾尋山採藥逺來至此量腹而進松术度形而衣薜蘿淡然已足豈容當此横施並南齊書沈驎士字雲禎吳興武康人隱于餘干吳差山答張永永為吳興太守欲請為功曹使人致意驎士曰明府德履沖素留心山谷民是以被褐負杖忘其疲病必欲飾混沌以蛾眉冠越客於蟬冕走雖不敏請附高節有蹈東海而死耳未忍受此黥劓沈驎士別傳與中書郎沈約書約見梁永明中約表薦驎士徴義行詔徵為太學博士又徴著作郎太子舍人並不就乃與約書名者實之賔本所不庶中央無心空勤南北為惠反凶將在於斯南史沈驎士傳或勸驎士仕答曰魚懸獸檻天下一契聖人𤣥悟所以每履吉先吾誠未能景行坐忘何為不希企日損牘按此是答語耳尺亦載卞彬字士蔚濟隂寃句人歴綏建太守蚤蝨賦序彬建元初除右軍叅軍家貧出為南康郡丞頗飲酒棄捐形骸作蚤蝨賦序其言皆實録也余居貧布衣十年不製一袍之緼有生所託資其寒暑無與易之為人多病起居甚踈縈寢敗絮不能自釋兼攝性懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰加以臭穢故葦席蓬纓之間蚤蝨猥流淫癢渭濩無時恕肉探揣擭撮日不替手蝨有諺言朝生暮孫若吾之蝨者無湯沐之慮絶相弔之憂晏聚乎乆襟爛布之裳服無改換掐齧不能加脱略緩嬾復不勤於捕討孫孫息息三十五嵗焉南齊書息襟南史作袴息作子子禽獸決録目彬險拔有才指斥貴勢多與物忤羊性淫而狠猪性卑而率鵞性頑而率狗性險而出羊謂呂文顯猪謂朱隆之鵞謂潘敞狗謂呂文度卞伯玉祭孫叔敖文謹以醴羞祭楚令尹孫君之靈眇眇千載悠悠舒荆理無不通事隔者形尚想清塵承風效誠超超夫子淡矣道情自心伊貴人爵靡嬰芳風如簫清響如塤景矣行役言戾豫方側聞夫子記憤睢陽靈封穨墓丘塋榛荒幽幽神道為有為亡徘徊永念悽矣其傷熊襄齊典序建元二年初置史官以檀超江淹掌史職超史功未就卒淹撰成之不備也時有豫章熊襄著齊典上起十代其序云尚書堯典謂之虞書則附所述故通謂之齊名為河洛金匱袁彖字偉才陳郡陽夏人歴遷侍中駁國史議彖為祕書丞議駁國史時檀超掌國史欲立處士傳彖曰夫事關業用方得列其名行今栖遁之士排斥皇王陵轢將相此偏介之行不可長風移俗故遷書未傳班史莫編一介之善無縁頓畧宜列其姓業附出他篇茍蔣之胡之爭死議南史彖拜廬陵王諮議時江陵茍蔣之弟胡之婦為曾口寺沙門所淫被蔣之殺胡之自列已殺兄弟爭死荆州刺史廬江王求博議彖議免死夫迅寒急節乃見松筠之操危機迴構方識貞孤之風竊以蔣之胡之殺人原心非暴辯讞之日友于讓生事憐左右義哀行路昔文舉引謗獲漏踈網蔣之心迹同符古人若陷以深刑實傷為義南史奏彈謝超宗超宗仗才使酒多所凌忽前後言誚稍布朝野又娶張敬兒女為子婦世祖甚疑之敬兒誅超宗復有言于李安民上使兼中丞袁彖白簡奏彈猶以彖言辭依違復使左丞王逡之奏徙越州賜自盡風聞征北諮議叅軍謝超宗根性浮淺率情躁薄仕近聲權務先諂狎人裁踈黜亟便詆賤卒然面譽旋而背毁疑間台賢毎窮詭舌訕貶朝政必聲凶言腹誹口謗莫此之甚不敬不諱罕與為二輒攝白從王永先到臺辨問超宗有何罪過詣諸貴皆有不遜言語並依事列對永先列稱主人超宗恒行來詣諸貴要毎多觸忤言語怨懟與張敬兒周旋許結姻好自敬兒死後感歎憤慨今月初詣李安民語論張敬兒不應死安民道敬兒書疏墨迹炳然卿何忽作此語其中多有不遜之言小人不悉盡羅縷諳憶如其辭列則與風聞符同超宗罪自己彰宜附常准超宗少無士行長習民慝狂狡之跡聨代所疾迷慠之舋累朝兼觸剗容掃轍乆理世表屬聖朝廣愛忍禍宣慈捨之憲外許以改過野心不悛在宥方驕才性無親處恩彌戾遂連扇非端空生怨懟恣囂毒于京輔之門揚凶悖于卿守之席此而不翦國章何寄此而可貸孰不可容請以見事免超宗所居官解領記室輒勒外収付廷尉法獄治罪超宗品第未入簡奏臣輒奉白簡以聞劉祥字顯徵東莞莒人歴臨川王驃騎從事中郎連珠十五首祥少好文學性韻剛疎輕言肆行於朝士多所貶忽著連珠十五首以寄其懷有以啓上者世祖令御史中丞任遐奏付廷尉徙廣州卒蓋聞興教之道無尚必同拯俗之方理貴祛弊故揖讓之禮行乎堯舜之朝干戈之功盛于殷周之世清風以長物成春素霜以凋嚴戒節蓋聞鼓鼖懷音待揚桴以振響天地涵靈資昏明以埀位是以俊乂之臣借湯武而隆英達之君假伊周而治蓋聞懸饑在嵗式羨藜藿之飽重炎灼體不念狐白之温故才以偶時為劭道以調俗為尊盖聞習數之功假物可尋探索之明循時則缺故班匠日往繩墨之伎不衰大道常存機神之智永絶盖聞理定於心不期俗賞情貫於時無悲世辱故芬芳各性不待汨渚之哀明白為寳無假荆南之哭盖聞百仞之臺不挺陵霜之木盈尺之泉時降夜光之寳故理有大而乖權物有微而至道盖聞忠臣赴節不必在朝列士匡時義存則幹故包胥垂涕不荷肉食之謀王蠋投身不主廟堂之筭盖聞智出乎身理無或困聲係於物才有必窮故陵波之羽不能浄浪盈岫之木無以輟風盖聞良寳遇拙則竒文不顯達士逢䜛則英才滅耀故墜葉垂䕃明月為之隔輝堂宇留光蘭燈有時不照盖聞跡慕近方必勢遺於逺大情係驅馳固理忘於肥遯是以臨川之士時羨結網之悲負肆之氓不抱屠龍之歎盖聞數之所隔雖近則難情之所符雖逺則易是以陟歎流霜時獲感天之誠泣血從刑而無悟主之智盖聞妙盡於識神逺則遺功接於人情微則著故鍾鼓在堂萬夫傾耳大道居身有時不遇盖聞列草深岫不改先冬之悴植松澗底無奪後凋之榮故展禽三黜而無下愚之譽千秋一時而無上智之聲盖聞希世之寳違時則賤偉俗之器無聖必淪故鳴玉黜于楚岫章甫窮于越人盖聞聽絶於聰非疾響所達神閉於明非盈光所燭故破山之雷不發聾夫之耳朗夜之輝不開矇叟之目任遐奏彈劉祥祥少而狡異長不悛徙請謁絶於私館反脣彰於公庭輕議乗輿歴貶朝望肆醜無避訟言自若厥兄浮櫬天倫無一日之悲南金弗獲嫂姪致其輕絶孤舟敻反存沒相捐遂令暴客掠奪骸柩行路流歎有識傷心攝祥門生孫狼兒列祥頃來飲酒無度言語闌逸道説朝廷亦有不遜之語實不避左右非可稱紙墨兄整先為廣州於職䘮亡去年啓求迎䘮還至大雷聞祥與整妻孟爭計財物瞋忿祥仍委前還後未至鵲頭其夜遭刼内人並為凶人所淫略如所列與風聞符同請免官付廷尉對獄詞獄鞫祥詞祥對被問少習狡異長而不悛頃來飲酒無度輕議乘輿歴貶朝望毎肆醜言無避尊賤迂荅奉㫖囚出身入官二十餘年沈悴草萊無明天壤皇運初基便蒙抽擢祭酒主簿並皆先朝相府聖明御㝢榮渥彌隆諮議中郎一年再澤廣筵華晏必叅末例朝半問訊時奉天暉囚雖頑愚豈不識恩有何怨望敢生譏議囚歴府以來伏事四王武陵功曹凡渉二載長沙諮議故經少時奉𨽻大司馬竝被恩拂驃騎中郎親職少日臨川殿下不遺蟲蟻賜叅辭華司徒殿下文德英明四海傾屬囚不涯卑逺隨例問訊時節拜覲亦沾眄議自餘令王未被祗拜旣不經伏節理無厚薄敕㫖制書令有疑則啓囚以天日懸逺未敢塵穢私之疑事衛將軍臣儉宰輔聖朝令望當世囚自斷才短密以諮儉儉為折衷紙迹猶存未解此理云何敢為歴貶朝望云囚輕議乘輿為向誰道若向人道則應有主甲豈有事無髣髴空見羅謗囚性不耐酒親知所悉强進一升便已迷醉劉悛字士操彭城安上里人歴散騎常侍啓武帝初孔顗上鑄錢議太祖使州郡大市銅炭㑹薨永明八年悛啓從之以功費多乃止南廣郡界䝉山下有城名䝉城可二頃地有燒罏四所高一丈廣一丈五尺從蒙城度水南百許步平地掘土深二尺得銅又有古掘銅坑深二丈并居宅處猶存鄧通南安人漢文帝賜嚴道縣銅山鑄錢今䝉山近青衣水南青衣在側竝是故秦之嚴道地青衣縣又改名漢嘉且䝉山去南安二百里案此必是通所鑄近喚䝉山獠出云甚可經略此議若立潤利無極并獻䝉山銅一片又銅石一片平州鑄鐵刀一口劉瓛字子珪沛國相人有儒學歴㑹稽郡丞除步兵校尉不拜卒于揚烈橋講舍與張融王思逺書思逺琅邪人晏從弟歴侍中瓛宋末為安成王撫軍行叅軍公事免入齊拜彭城郡丞武陵王曅為㑹稽太守太祖欲令瓛為曅講除㑹稽郡丞永明初竟陵王子良請為征北司徒記室瓛與融思逺書不拜奉教使恭召㑹當停公事但念生平素抱有乖恩顧吾性拙人間不習仕進昔嘗為行佐便以不能及公事免黜此皆眷者所共知也量已審分不敢期榮夙嬰貧困加以疎懶衣裳容髮有足駭者中以親老供養褰裳徒步脫爾逮今二代一紀先朝使其更自修正勉厲于階級之次見其繿縷或復賜以衣裳袁褚諸公咸加勸勵終不能自反也一不復為安可重為哉昔人有以冠一免不重加于首毎謂此得進止之儀古者以賢制爵或有秩滿而辭老以庸制禄或有身病而求歸者永瞻前良在已何若又上下年尊益不願居官次廢晨昏也先朝為此曲申從許故得連年不拜榮授而帶帖薄禄旣習此嵗乆又齒長疾侵豈宜攝齋河間之㕔厠迹東平之僚本無絶俗之操亦非能偃蹇為高此又諸賢所當深察者也近奉初敎便自希得託迹于客遊之末而固辭榮級其故何耶以古之王侯大人或以此延四方之士甚美者則有輻輳燕路慕君王之義驤鑣魏闕高公子之仁繼有追申白而入楚羨鄒枚而遊梁吾非敢功夫曩賢庶欲從九九之遺蹤旣於聞道集泮不殊而幸無職司拘礙可得奉温凊展私計志在此爾南齊書史諸賢南作聽覧周顒字彦倫汝南安成人歴國子博士兼著作與聞喜公子良建元初顒為山隂令縣舊訂滂民以供雜使顒言之於太守聞喜公子良竊見滂民之困困實極矣役命有常袛應轉竭蹙迫驅催莫安其所險者或竄避山湖困者自經溝瀆爾亦有摧臂斮手茍自殘落販傭貼子權赴急難毎至滂使發動遵赴常促輒有柤杖被録稽顙階埀泣涕告哀不知所振下官未嘗不臨食罷筯當書偃筆為之久之愴不能已交事不濟不得不就加捶罰見此辛酸時不可過山隂邦治事倍餘城然略聞諸縣亦處處皆躓惟上虞以百户一滂大為優足過此列城不無凋罄宜應有以普救倒懸設流開便則轉患為功得之何逺與杜京産書京産字景齊吳郡錢塘人涉文義脩黄老徴員外散騎侍郎不就子栖字孟山從劉瓛受學善清言名儒貴遊多敬待之顒為中書郎與京産書累辟不就賢子學業清標後來之秀嗟愛之懷豈知云已所謂人之英彦若已有之也英彦册府元龜作彦聖張融字思光暢子歴太子中庶子司徒左長史與從叔永書融家貧願禄與永書又與吏部尚書王僧䖍書時以非治民才不果融昔稱幼學早訓家風雖則不敏率以成性布衣葦席弱年所安簞食瓢飲不覺不樂但世業清貧民生多待榛栗棗脩女贄旣長束帛禽鳥男禮已大勉身就官十年七仕不欲代耕何至此事昔求三吳一丞雖屢舛錯今聞南康缺守願得為之融不知階級階級亦可不知融政以求丞不得所以求郡求郡不得亦可復求丞葦席南史作韋帶屢作屬願作應與王僧䖍書融天地之逸民也進不辨貴退不知賤兀然造化忽如草木實以家貧累積孤寡傷心八姪俱孤二弟頗弱撫之而感古人以悲豈能山海陋禄申融情累阮籍愛東平土風融亦欣晉平閒外並南齊書與從弟瓌書瓌字祖逸永之子仕宋入齊終梁歴給亊中右光禄大夫昇明元年劉彦節有異圖弟遐為吳郡潜相影響齊高帝密令瓌取遐諸張世有豪氣瓌率兵入郡斬之高帝即授瓌吳郡太守融與瓌書吳郡何晩何須王反聞之嗟驚乃是阿兄南史與豫章王嶷牋尺牘作孔稚珪牋以傳首稚珪也鼎意牋稱融等應宜屬融朱謙之吳郡錢塘人父昭之假葬田側為族人幼方所焚謙之雖小便哀戚如持喪亊長不婚娶永明中手刃殺幼方詣獄自繫時嶷為郡刺史别駕孔稚珪兼記室劉璡司徒左西掾張融牋上嶷嶷言之世祖嘉其義乃遣謙之隨曹虎西行將發幼方子惲於津陽門伺殺謙之謙之之兄選之又刺殺惲世祖曰此皆義事不可問悉赦之禮開報仇之典以申孝義之情法斷相殺之條以表權時之制謙之揮刃軒冕旣申私禮繫頸就死又明公法今仍殺之則成當世罪人宥而治之即為盛朝孝子殺一罪人未足𢎞憲活一孝子實廣風德張緒陸澄是其鄉舊應具來由融等與謙之並不相識區區短見深有悢然南齊書海賦序融出為封溪令浮海至交州於海中作海賦蓋言之用也情矣形乎使天形寅内敷情敷外寅者言之業也吾逺職荒官將海得地行關入浪宿渚經波傅懷樹觀長滿朝夕東西無里南北如天反覆懸烏表裏菟色壯哉水之竒也竒哉水之壯也故古人以之頌其所見吾問翰而賦之焉當其濟興絶感豈覺人在我外木生之作君自君矣自序融永明中遇疾為問律自序吾文章之體多為世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當使常有其體丈夫當删詩書制禮樂何至因循寄人籬下且中代之文道體闕變尺寸相資彌縫舊物吾之文章體亦何異何嘗顛温涼而錯寒暑綜哀樂而横歌哭哉政以屬辭多出比事不羈不阡不陌非途非路耳然其傳音振逸鳴節竦韻或當未極亦已極其所矣汝若復别得體者吾不拘也吾義亦如文造次乘我顛沛非物吾無師無友不文不句頗有孤神獨逸耳義之為用將使性入清波塵洗猶沐無得釣聲同利舉價如高俾是道場險成軍路吾昔嗜僧言多肆法辯此盡遊乎言笑而汝等無幸又人生之口正可論道説義惟飲與食此外如樹網焉吾毎以不爾為恨爾曹當振綱也遺令建白旌無旒不設祭令人捉麈尾登屋復䰟吾平生所善自當凌雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人哀事畢各遣還家以吾平生之風調何至使婦人行哭失聲不須暫停閨閤南史音臨卒又戒其子曰手澤存焉父書不讀况文情婉在其韻吾意不然别遺爾音吾文體英絶變而屢竒旣不能逺至漢魏故無取嗟晉宋豈吾天挺盖不隤家聲汝若不看父祖之意欲汝見也可號哭而看之張充字延符吳郡吳人入梁歴尚書僕射吳郡太守與尚書令王儉書充歴尚書殿中郎武陵王友武帝嘗欲以充父緒為尚書僕射訪於儉儉對曰張緒少有清望然東士比無所執緒諸子又多薄行臣謂此宜詳擇帝遂止先是充兄弟皆輕俠充少時又不護細行故儉言之充聞之愠因與儉書儉言之武帝免充官南史云儉以書脱畧弗之重仍以書示緒緒杖之一百又為御史中丞到撝所奏免官禁錮沈約見其書歎曰充始為之敗終為之成吳國男子張充致書於瑯琊王君候侍者頃日路長愁霖韜晦涼暑未平想無虧攝充幸以漁釣之閒鎌採之暇時復以巻軸自娛逍遥前史從横萬古動黙之路多端紛綸百年昇降之徒不一故以圓行方止用之異也金剛水柔性之别也善御性者不違金水之質善為器者不易方圓之用所以北海掛簮帶之高河南降璽言之貴充生平少偶不以利欲干懷三十六年差得以棲貧自澹介然之志峭聳霜厓確乎之情峰横海㟁彯纓天閣旣謝廊廟之華綴組雲臺終慙衣冠之秀所以擯跡江臯􅔭狂隴畔者寔由氣岸疏凝情塗狷隔獨師懷抱不見許於俗人孤秀神崖毎邅回於在世故君山直上蹙壓於當年叔陽敻舉􅀈􅀈乎千載充所以長羣魚鳥畢影松阿半頃之田足以輸稅五畆之宅樹以桑麻嘯歌於川澤之間諷詠於澠池之上汎濫於漁父之游偃息於卜居之下如此而已充何識焉若夫驚巖罩日壯海逢天竦石崩尋分危落仞桂蘭綺靡叢雜於山幽松栢森隂相繚於澗曲元卿於是乎不歸伯休亦以兹長往若乃飛竿釣渚濯足滄洲獨浪烟霞髙卧風月悠悠琴酒岫逺誰來灼灼文談空罷方寸不覺鬰然千里路阻江川毎至西風何嘗不眷聊因疾隙略舉諸襟持此片言輕枉高聽丈人嵗路未彊學優而仕道佐蒼生功横海望入廟則協長倩之誠出議則抗仲子之節可謂盛德維時孤松特秀者也素履未詳斯旅尚眇茂陵之彦望冠盖而長懷霸山之氓竚衣車而聳歎得無惜乎若鴻裝撰御鶴駕軒空則岸不辭枯山被其潤竒禽異羽或巖際而逢迎弱霧輕煙乍林端而菴藹東都不足竒南山豈為貴充崐西之百姓岱表之一民蠶而衣耕且食不能事王侯覓知己造時人騁遊說蓬轉于屠博之間其歡甚矣丈人早遇承華中逢崇禮肆上之眷望溢於早辰鄉下之言謬延於造次然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見掃心胷述平生論語黙所以通夢交魂推襟送抱者其惟丈人而已關山敻阻書罷莫因儻遇樵者妄塵執事梁書同前南史頃日路長霖霞韜晦涼暑未平想無虧攝充幸以漁釣之閑鎌採之暇時復引軸以自娛逍遥乎前史從横萬古動黙之路多端紛綸百年昇降之塗不一故金剛水柔性之别也圓行方止器之異也善御性者不違金水之質善為器者不易方圓之用充生平少長偶不以利欲干懷三十六年差得以棲貧自澹介然之志峭聳霜崖確乎之情峰横海岸至如彯纓天閣旣謝廊廟之華綴組雲臺終愧衣冠之秀寔由氣岸踈凝情塗狷隔獨師懷抱不見許於俗人孤秀神崖毎邅廻於在世長羣魚鳥畢景松阿雖復玉没於訪珪之辰桂掩於捜芳之日汎濫於漁父之游偃息於卜居之㑹如此而已充何識哉若夫驚巖罩日壯海逢天竦石崩尋分危落仞桂蘭綺靡叢雜於山幽松栢隂森相繚於澗側元卿於是乎不歸伯休亦以兹長往至于飛竿釣渚濯足滄洲獨浪烟霞高卧風月悠悠琴酒岫逺誰來灼灼文言空擬方寸不覺鬰然千里路隔江川毎至西風何嘗不歎丈人嵗路未强學優而仕道佐蒼生功横海望可謂德盛當時孤松獨秀者也而茂陵之彦望冠盖而長懷渭川之甿佇簪裾而竦歎得無惜乎充崐西百姓岱表一人蠶而衣耕而食不能事王侯覓知己造時人騁遊說容與於屠博之間其懽甚矣然舉世皆謂充為狂充亦何能與諸君道之哉是以披聞見掃心胷述平生論語黙所可通夢交魂推襟送抱者惟丈人而已闕廷敻阻書罷莫因儻遇樵夫妄塵執事荀㔻字令哲潁川人仕荆州西曹書佐長史坐上書極諫武帝於獄賜死遺王秀之書秀之轉侍中領射聲校尉出為輔國將軍隨王鎮西長史南郡内史㔻為州西曹遺秀之交知書秀之拒不荅乃遺書僕聞居謙之位旣刋于易慠不可長禮明其文是以信陵致夷門之義燕丹收荆卿之節皆以禮而然矣丈夫處世豈可寂漠恩榮空為後代一丘土足下業潤重光聲居朝右不修高世之績將何隔于愚夫僕耿介當年不通羣品饑寒白首望物嗟來成人之美春秋所善薦我寸長開君尺短故推風期德規於相益實非碌碌有求於平原者也僕與足下同為四海國士夫盛衰迭代理之恒數名位參差運之通塞豈品德權行為之者哉第五之號旣無易於驃騎西曹之名復何推於長史足下見答書題乆之以君若此非典何宜施之于國士如其循禮禮無不答謹以相還亦何犯于逆鱗哉君子處人以德不以位相如不見屈于澠池毛遂安受辱于郢門造敵臨事僕必先于二子未知足下之貴足下之威孰若秦楚兩王僕以德為寳足下以位為寳各寳其寳於此敬宜常聞古人交絶不泄惡言僕謂之鄙無以相貽故薦貧者之贈南齊書答尺牘節僕與足下以後作王秀之荀丕又節南史第五之位三語作丕報秀之誤同前南史其丕為荆州西曹書佐長史王秀與書題之云西曹荀君丕報書第五之位不減驃騎亦不知西曹何殊長史且人之處世當以德行稱著何遽以一爵高人耶相如不見屈于澠池毛遂安受辱于郢都造敵臨事僕必先於二子未知足下之貴足下之威孰若秦楚兩王僕以德為寳足下以位為寳各寳其寳於此敬宜與王儉書儉為尚書令當事㔻與儉書南郡綱紀啓隨王子隆罪㔻上書自申乃免足下建髙世之名而不顯髙世之迹將何以書於齊史哉南齊書作世南史並人王植上武帝撰定律章表江左相承用晉世張杜律世祖留心法令詔諸獄官詳正舊註尚書刪定郎王植表奏臣尋晉律文簡辭約㫖通大綱事之所質取斷難釋張斐杜預同注一章而生殺永殊自晉泰始以來唯斟酌叅用是則吏挾威福之勢民懷不對之怨所以温舒獻辭于失政絳侯忼慨而興歎皇運革祚道冠前王陛下紹興光開帝業下車之痛毎惻上仁滿堂之悲有矜聖思爰發德音删正刑律敕臣集定張杜二注謹厲愚䝉盡思詳撰削其煩害録其允衷取張注七百三十一條杜注七百九十一條或二家兩釋於義乃備者又取一百七條其注相同者取一百三條集為一書凡一千五百三十二條為二十巻請付外詳校擿其違謬孔稚珪字德璋㑹稽山隂人歴太子詹事加散騎常侍上武帝論刑律表永明七年尚書删定郎王植撰定律章表奏下公卿入座叅議竟陵王子良多使從輕其中朝議不能斷者制㫖平決至九年稚珪為廷尉上表詔報從事竟不行臣聞匠萬物者以繩墨為正馭大國者以法理為本是以古之聖王臨朝思理逺防邪萌深杜姦漸莫不資法理以成化明刑賞以樹功者也伏惟陛下躡歴登皇乘圖踐帝天地更築日月再張五禮裂而復縫六樂頺而爰緝乃發德音下明詔降恤刑之文申慎罰之典敕臣與公卿入座共删注律謹奉聖㫖諮審司徒臣子良稟受成規創立條緒使兼監臣宋躬兼平臣王植等抄撰同異定其去取詳議入座裁正大司馬臣嶷其中洪疑大議衆論相背者聖照𤣥覽斷自天筆始就成立律文二十巻録敘一巻凡二十一巻今以奏聞請付外施用宣下四海臣又聞老子仲尼曰古之聽獄者求所以生之今之聽獄者求所以殺之與其殺不辜寧失有罪是則斷獄之職自古所難矣今律文雖定必須用之用失其平不異無律律書精細文約例廣疑似相傾故誤相亂一乖其綱枉濫横起法吏無觧旣多謬僻監司不習無以相斷則法書徒明於帙裏寃魂猶結於獄中今府州郡縣十有餘獄如令一獄嵗枉一人則一年之中枉死千餘人寃毒之死上干和氣聖明所急不可不防致此之由又非但律吏之咎列邑之宰亦亂其經或以軍勲餘力或以勞吏暮齒獷情濁氣忍并生靈昏心狠態吞剥民物虐理殘其命曲文被其罪寃積之興復縁斯發獄吏雖良不能為用使于公哭於邊城孝婦寃於遐外陛下雖欲宥之其已血濺九泉矣尋古之名流多有法學故釋之定國聲光漢臺元常文惠績映魏閣今之士子莫肯為業縱有習者世議所輕良由空勤永嵗不逢一朝之賞積學當年終為閭伍所蚩將恐此書水墜下走之手矣今若𢎞其爵賞開其勸慕課業宦流班習胄子拔其精究使處内局簡其才良以居外仕方岳咸選其能邑長並擢其術則臯繇之謀指掌可致杜鄭之業鬰焉何逺然後姦邪無所逃其刑惡吏不能藏其詐如身手之相驅若絃括之相接矣臣以踈短謬司大理陛下發自聖衷憂矜刑網御延奉訓逺照民瘼臣謹仰述天官伏奏雲陛所奏繆允者宜寫律上國學置律助教依五經例國子生有欲讀者䇿試上過髙第即便擢用使處法職以勸士流姦邪一作姦人上明帝請和虜表稚珪建武初遷南郡太守以虜連嵗南侵征役不息百姓死傷乃上表陳之不從匈奴為患自古而然雖三代智勇兩漢權竒筭略之要二塗而已一則鐵馬風馳奮威沙漠一則輕車出使通驛虜庭㩁而言之優劣可覩今之議者咸以丈夫之氣恥居物下况我天威寧可先屈呉楚勁猛帶甲百萬截彼鯨鯢何往不碎請和示弱非國計也臣以為戎狄獸性本非人倫鴟鳴狼踞不足喜怒蜂目蠆尾何闗美惡唯宜勝之以深權制之以逺笇𢎞之以大度處之以蟊賊豈足肆天下之忿捐蒼生之命發雷電之怒爭蟲鳥之氣百戰百勝不足稱雄横尸千里無益上國而蟻聚蠶攅窮誅不盡馬足毛羣難與競逐漢高横威海表窘廹長圍孝文國富刑清事屈陵辱宣帝撫納安靜朔馬不驚光武卑辭厚禮寒山無靄是兩京四主英濟中區輸寳貨以結和遣宗女以通好長轡逺馭子孫是賴豈不欲戰惜民命也唯漢武藉五世之資承六合之富驕心奢志大事匈奴遂連兵積嵗轉戰千里長驅瀚海飲馬龍城雖斬獲名王屠走凶羯而漢之器甲十亡其九故衛霍出闗千隊不反貳師入漢百旅頓降李廣敗於前鋒李陵沒於後陣其餘奔北不可勝數遂使國儲空懸户口减半好戰之功其利安在戰不及和相去何若自西朝不綱東晉遷鼎羣胡沸亂𦍑狄交横荆棘攅於陵廟豺虎咆於宫圍山淵反覆黔首塗地逼迫崩騰開闢未有是時得失略不稍陳近至元嘉多年無事末路不量復挑彊敵遂廼連城覆徙虜馬飲江青徐之際草木為人耳建元之初胡塵犯塞永明之始復結通和十餘年間邊候且息陛下張天造歴駕日登皇聲雷宇宙勢壓河岳而封豕殘魂未屠劒首長蛇餘喘偷窺外甸烽亭不靜五載於斯昔嵗蟻壞瘻食樊漢今兹蟲毒浸􅁋未已興師十萬日費千金五嵗之費寧可貲計陛下何惜匹馬之驛百金之賂數行之詔誘此凶頑使河塞息肩闗境全命蓄甲養民以觀彼弊我䇿若行則為百世之福若不從命不過如戰失一隊耳或云遣使不受則為辱命夫以天下為量者不計細恥以四海為任者寧顧小節一城之沒尚不足惜一使不反曾何取慙且我以權取貴得我略行何嫌其恥所謂尺蠖之屈以求伸也臣不言遣使必得和自有可和之理猶如欲戰不必勝而有可勝之機耳今宜早發大軍廣張兵勢徴犀甲於岷峨命樓船於浦海使自青徂豫候騎星羅㳂江入漢雲陣萬里據險要以奪其魂㫁糧道以折其膽多設疑兵使精銷而計亂固列金湯使神茹而慮屈然後發衷詔馳輕驛辨辭重幣陳列吉凶北虜頑而愛竒貪而好古畏我之威喜我之賂畏威喜賂願和必矣陛下用臣之啟行臣之計何憂玉門之下而無欵塞之胡哉彼之言戰旣慇懃臣之言和亦慊闊伏願察兩途之利害檢二事之多少聖照𤣥省灼然可斷所表謬奏希下之朝省使同博議臣謬荷殊恩奉佐侯岳敢肆瞽直伏奏千里薦杜京産表京産郡召主簿州辟從事稱疾去孔稚圭等並致書以通殷勤永明十年稚珪及光禄大夫陸澄祠部尚書虞悰太子右率沈約司徒右長史張融薦京産不報建武初徴不就竊見呉郡杜京産潔靜為心謙虚成性通和發於天挺敏達表於自然學遍𤣥儒博通史子流連文藝沈吟道奥泰始之朝掛冠辭世遁捨家業隱于太平葺宇窮巖採芝幽澗耦耕自足薪歌有餘確爾不羣淡然寡欲麻衣藿食二十餘載雖古之志士何以加之謂宜釋巾幽谷結組登朝則嵓谷含懽薜蘿起忭矣為王敬則讓司空表故李通豪贍以親寵登司王基才勇以聲華入選先帝擢臣以榮華陛下伸臣以富貴遂得北帶五州東跨六郡内亞三鼎外齊四嶽蟬佩之映則左右交暉龜組之華則縱横吐耀輕輪徐動則劒騎如雲飛蓋暫停則歌鐘成列摐金龍吹鬱其前鳴笳鳯管疊其後鄧禹若不遭漢光則南陽之掾吏微臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啓黄扉而燮五緯躡青帷而調四序讓詹事表太子霞騫青殿日光春宫駕紫谷之英振洛笙之響自非器上白雲韵同明月何以延芳芝苑揷羽瓊條竇嬰戚貴于西京陸曄風素于東國伊人之美方曰可舉臣亦何斯而敢叅冒也奏彈王融竟陵王子良以虜動于東府募人板融寧朔將軍特相友好㑹世祖疾篤融欲立子良不克太孫深忿疾融及即位是為鬰林收融下廷尉獄使中丞孔稚珪倚為奏賜死融姿性剛險立身浮競動迹驚羣抗言異類近塞外微塵苦求將領遂招納不逞扇誘荒傖狡弄聲勢專行權利反覆脣齒之間傾動頰舌之内威福自己無所忌憚誹謗朝政歴毁王公謂已才流無所推下事曝逺近使融依源據答聲勢南史作威聲王融對辭囚實頑蔽觸行多諐但夙忝門素得奉教君子爰自摠髪迄將立年州閭鄉黨見許愚慎朝廷衣冠謂無舋咎過䝉大行皇帝奬育之恩又荷文皇帝識擢之重司徒公賜預士林安陸王曲垂盼接旣身被國慈必欲以死自效前後陳伐虜之計亦仰簡先朝今段犬羊乍擾紀僧真奉宣先敕試語北邊動靜令囚草撰符詔于時即因啓聞希侍鑾輿及司徒宣敕招募同例非一實以戎事不小不敢承教續䝉軍號賜使招集銜枚而行非敢虚扇且格取亡叛不限傖楚狡㺯聲勢應有形迹專行權利又無贓賄反覆脣齒之間未審悉與誰言傾動頰舌之内不容都無彼此但聖主膺教實所沐浴自上甘露頌及銀甕啓三日詩序接虜使語辭竭思稱揚得非誹謗且王公百司唯賢是與髙下之敬等秩有差不敢踰濫豈應訿毁囚才分本劣謬被䇿用悚怍之情夙宵兢惕未嘗誇示里閭彰曝逺邇自循自省並愧流言良由縁淺寡虞致貽囂謗伏惟明皇臨宇普天䝉澤戊寅赦恩輕重必宥百日曠期始䝉旬日一介罪身獨嬰憲劾若事實有徵爰對有在九死之日無恨泉壤叅南史作忝狡㺯聲勢作張㺯威聲奏彈王奐永明十一年奐為雍州刺史輒殺寧蠻長史劉興祖武帝大怒使御史中丞孔稚珪奏其事遣收奐奐拒命為軍人所殺雍州刺史王奐啓錄小府長史劉興祖虚稱興祖扇動山蠻規生逆謀誑言誹謗言辭不遜敕使送興祖下都奐慮所啓欺妄于獄打殺興祖詐啓稱自經死止今體傷楗蒼􅗼事暴聞聽攝興祖門生劉倪到臺辨問列興祖與奐共事不能相和自去年朱公恩領軍征蠻失利興祖啓聞以啓呈奐奐因此便相嫌恨若云興祖有罪便應事在民間民間恬然都無事迹至十年九月十八日奐使仗身三十人來稱敕録興祖付獄安定郡蠻先在郡贓私興祖旣知其取與即牒啓奐不問興祖後執録奐仍令蠻領仗身于獄守視興祖未死之前于獄以物畫漆柈子中出密報家道無罪令啓乞出都一辨萬死無恨又云奐駐興祖嚴禁信使欲作方便殺以除口舌又云奐意乃可奐第三息彪隨奐在州凡事是非皆干豫扇構密除興祖又云興祖家餉糜中下藥食兩口便覺回乞獄子食者皆大利興祖大叫道靡中有藥近獄之家無人不聞又云奐治著興祖日急判無濟理十一月二十一日奐使獄吏來報興祖家道興祖于獄自經死尸出家人共洗浴之見興祖頸下有傷肩胛烏􅗼隂下破碎實非興祖自經死家人及門義共見非是一人重攝檢雍州都留田文喜列與倪符同狀興祖在獄嗛苦望下旣䝉降㫖欣願始遂豈容於此方復自經敕以十九日至興祖以二十一日死推理檢迹灼然矯假尋敕使送下奐輒拒詔所謗諸條悉出奐意毁故丞相陳顯達誹訕朝事莫此之深若彪私隨父之鎮敢亂王法罪並合窮戮謝賜生荔支啓緑葉雲舒朱實星映離離昔聞曄曄今覩信西岷之佳珍諒東鄙之未識藝文類聚火藝文此下云角昴興而靈華敷大中而朱實繁灼灼丹華吐日離離繁星著天七命析龍眼之房也之按王逸荔枝賦曰乃觀荔枝之樹其形色煖若朝雲興森如横天之彗角亢興而靈華敷大火中而朱實繁灼灼若朝霞之吐日離離如繁星之着天張孟陽七命析龍眼之房剖椰子之殻稚珪啓正用逸賦中語七命則孟陽七命也藝文於其上旣脱寫王逸賦又以七命誤連為一耳尺牘用逸賦四語為稚珪啓而前啓乃反不載蓋由襲藝文之誤遂不加考左思蜀都賦傍挺龍目側生荔枝布緑葉之萋萋結朱實之離離禇先生伯玉碑夫河洛摛寳神道之功既傳岱華吐秘仙靈之跡可覩蓋事詳于玉牒理煥于金符雖冥黙難源顯晦異軌測心觀古可得而言焉是以子晉笙歌馭鳯于天海王喬雲舉控鶴于𤣥都有羽化蟬蜕觸影遁形神翥帝宫迹留劒杖遊瑤池而不返宴𤣥圃以忘歸永嘉惡道者窮地之險也欹竇遏日折石横波飛浪突雲奔湍急箭先生攀途躋阻宿枻渉圻而衝飇夜鼓山洪暴激忽乃崩舟墜壑一倒千仞飄地淪篙翻透無底徒侣判其氷碎舟子悲其雹㪚危魂中夜赴阻相尋方見先生恬然安席銘曰關西升妙洛右飛英鳯吹金闕簫歌玉京絶封萬古乃旣先生先生浩浩唯神其道泉石依情煙霞入抱秘影窮岫孤栖幽草心圖上𤣥志通大造北山移文周顒嘗隱鍾山昔經在蜀以蜀草堂寺林壑可懷乃於鍾嶺立寺因號草堂亦名山茨後出為海鹽令稚圭乃假山靈之意移之鍾山之英草堂之靈馳烟驛路勒移山庭夫以耿介拔俗之標蕭灑出塵之想度白雪以方㓗干青雲而直上吾方知之矣若其亭亭物表皎皎霞外芥千金而不盻屣萬乘其如脱聞鳯吹于洛浦值薪歌于延瀨固亦有焉豈期終始參差蒼黄翻覆淚翟子之悲慟朱公之哭乍廻跡以心染或先貞而後黷何其謬哉嗚呼尚生不存仲氏旣往山阿寂寥千載誰賞世有周子儁俗之士旣文旣博亦𤣥亦史然而學遁東魯習隱南郭竊吹草堂濫巾北岳誘我松桂欺我雲壑雖假容於江臯乃纓情於好爵其始至也將欲排巢父拉許由傲百氏蔑王侯風情張日霜氣横秋或歎幽人長徃或怨王孫不游談空空於釋部覈𤣥𤣥於道流務光何足比涓子不能儔及其鳴騶入谷鶴書赴隴形馳魄㪚志變神動爾乃眉軒席次袂聳筵上焚芰製而裂荷衣抗塵容而走俗狀風雲悽其帶憤石泉咽而下愴望林巒而有失顧草木而如䘮至其紐金章綰墨綬跨屬城之雄冠百里之首張英風於海甸馳妙譽於浙右道帙長擯法筵久埋敲朴諠嚻犯其慮牒訴倥偬裝其懷琴歌旣斷酒賦無續常綢繆于結課毎紛綸于折獄籠張趙于往圖架卓魯于前籙希蹤三輔豪馳聲九州牧使我高霞孤映明月獨舉青松落䕃白雲誰侣澗户摧絶無與歸石徑荒涼徒延佇至于還飇入幕寫霧出楹蕙帳空兮夜鶴怨山人去兮曉猿驚昔聞投簪逸海岸今見解蘭縳塵纓于是南岳獻嘲北隴騰笑列壑爭譏攢峯竦誚慨遊子之我欺悲無人以赴弔故其林慙無盡澗愧不歇秋桂遣風春蘿罷月騁西山之逸議馳東臯之素謁今又促裝下邑浪拽上京雖情投于魏闕或假歩于山扃豈可使芳杜厚顔薜荔無恥碧嶺再辱丹崖重滓塵游躅于蕙路汙渌池以洗耳宜扃岫幌掩雲關歛輕霧藏鳴湍截來轅于谷口杜妄轡于郊端于是叢條瞋膽疊穎怒魄或飛柯以折輪乍低枝而掃迹請回俗士駕為君謝逋客祭外兄張長史文惟君之德髙明秀挺浩汗深度昂藏風領學不師古因心則睿筌蹄象繇糠粃莊惠吾與夫子分恊芳金憑風共酒藉月同琴孔琇之會稽山隂人歴呉興太守遷寧朔將軍薦王文殊表文殊呉興故鄣人父没虜文殊泣血蔬食三十餘年永明十一年太守孔琇之表上詔名里曰孝行文殊性挺五常心符三教以父沒獯庭抱終身之痛專席恒居銜罔極之卹服紵縞以經年餌蔬菽以俟命婚義滅於天情官序空於素抱儻降甄異之恩牓其閭里丘雄呉興烏程人上武帝乞贈父書雄父冠先永明中位給事中使蠕蠕國蠕蠕逼令拜執節不從見殺武帝賜其子雄錢一萬布三十疋雄不受詣闕上書不省臣父執節如蘇武守死如谷吉遂不書之良史甄之褒䇿萬代之後誰死社稷建元四年車僧朗銜使不異抗節是同詔贈正員外郎此天朝舊準臣父成例也今僧朗反葬冢塋臣父湮棄絶域語忠烈則亦不謝車論荼苦則彼優而此劇名位不殊禮數宜等乞申哀贈南史南齊書不載綦母珍之自請封牒珍之鬱林時領中書通事舍人凡所論薦事無不允以誅王融功啓帝求封朝議未許又有牒自論于朝廷乃許封汝南縣後謀誅蕭諶事敗死當世祖晏駕之時内外紛擾珍之手抱至尊口行處分忠誠契闊人誰不知今希千戸侯於分非過南史虞悰字景豫㑹稽餘姚人歴光禄大夫上明帝解職表悰領右軍明帝立稱疾不陪位復稱篤還東上表詔給假百日臣族陋海區身微稽土猥屬興運荷竊稠私徒越星紀終慙報答衛養乖方抱疾嬰固寢瘵以來倐踰旬朔頻加醫治曾未瘳損惟此朽頓理難振復乞解所職盡療餘辰虞炎會稽人永明中以文學與沈約俱為文惠太子所遇官至驃騎將軍鮑明逺集序鮑照字明逺本上黨人家世貧賤少有文思宋臨川王愛其才以為國侍郎王薨始興王濬又引為侍郎孝武初除海虞令遷太學博士兼中書舍人時主多忌以文自高照侍左右深達夙㫖作此賦述不復盡其才思出為秣陵令又轉永嘉令大明五年除前軍行參軍侍臨海王鎮荆州掌知内命尋遷前軍刑獄參軍事宋明帝初江外拒命及義嘉敗荆土震擾江陵人宋景因亂掠城為景所殺時年五十餘身旣遇難篇章無遺流遷人間者往往見在儲皇博採羣言遊好文藝片辭隻韻罔不收集照所賦述雖乏精典而有超麗爰命陪趨備加研訪年代稍逺零落者多今所存者儻能半焉南齊文紀巻六
