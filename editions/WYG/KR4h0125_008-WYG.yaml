body:
  text: 南齊文紀巻八明梅鼎祚編江淹字文通濟陽考城人仕宋領南東海郡丞入齊為秘書監兼衛尉終梁金紫光禄大夫按淹厯宋齊梁天監四年卒在梁未久並無文績其集十卷齊時淹所自定故今屬齊奏記詣宋南徐州新安王子鸞字孝羽孝武帝子南徐州刺史淹起家南徐州從事轉奉朝請伏惟明公殿下列譽椒壁蜚聲沖漢爰求儒雅傍招異人削赤野之玉翦燕山之金至如淹者東國之徒步耳方斂影逃形匡坐編蓬之下遂遭烟露餘彩日月末光惟恩知泰變色薰心淹聞齊石既撫無待巴人之唱柏臺已構寧俟不才之木淹幼乏鄉曲之譽長匱芹藻之徳豈宜炫璞鄭氏獻鳳楚門哉願避職吏緩其召書到主簿日牋詣右軍建平王景素淹由巴陵王右常侍轉右軍建平王主簿賔侍累年雅以文章見遇見淹自序淹乃庸人素非竒士既慙鄒魯儒生之徳又謝燕趙俠客之節徒以結髮衛次暫聞仁義常欲永辭冠劒弋釣畎壑而身輕恩重猥奉末光枉白璧之恵降黑貂之私因兹感激未能自反負金羈扵淮呉從後車扵河楚竟不能曜丹雘騰英聲絶白雲負蒼梧至可知矣不謂咸池再暉瑶光重照開髙天之慈布厚地之施承命以驚巡走且失淹聞古人為報常有意焉至乃一說之効齊王動色一劍之感趙王解衣孤心迥槩有殞自天被黜為呉興令辭牋詣建平王景素鎭京口淹又為鎭軍參軍事領南東海郡丞時少帝多失徳景素與腹心日夜謀議淹知禍機将發贈詩十五首以諷焉㑹南東海太守陸澄丁艱淹自謂應行郡事乃用司馬栁世隆淹固求之景素大怒言扵選部黜為建安吳興令淹本遷徙之徒非有儒墨之能亦以轉命溝間待殯巖下誤得步修榥循髙軒伏層檻坐曲池承翠河之潤降璇日之光載筆奉后盛飾立朝扵山東百姓亦己殊甚雖蓐螻蟻拭黄塵不足以塞恵而小人狼狽為鬼為蜮山淵所容衣劍不貸黥赭幽圉皆非報責仰遭大道之行草木勿踐輟鑊斂火吹魂拾骨濯以河漢之流曝以秋陽之景叢然黔首豈不戴天竊思伏皁九載齒録八年以春以秋且恩且顧竟不能抑黑質揚赤文抽精膽報慈光而自為擁腫之異木卒成踴躍之妖金所謂孽由己作匪降自天猶沐造化餘靈宥以遐邑方䝉被霜露裹糧洲島缺鑿山楹為室永與黿鼉為羣猶蹶者不忘起盲者不忘視况罪溢朔方尚駐一等之刑咎過朱崖猶緩再重之施金石無知何以識答昔河濟荆吳必獲陪從京輔闗轂長奉帷席徳音在耳話言如昨淹迺梁昌自投東極晨鳥不蜚遷骨何日一辭城濠旦夕就逺白雲在天山川間之眷然西顧涕下若屑到功曹叅軍牋詣齊驃騎竟陵王子良宋昇明初齊髙帝輔政聞淹才召為尚書駕部郎驃騎竟陵公叅軍事竊惟明使君鉞下道耀神源徳鑄靈極誕涵天聽資河炤聖譽拂宏外芳激震中故衡梁孕秀璿璣流品變瑶光之暉贊玉燭之色功邁翊殷績起匡漢是以赤瑕瓊寳之文睇影而􅞅集青虬追風之乗晞光而逺至如民者盖不足算所志不出繒販所學不遺祝筮業異儒墨行乖曾史既乏脩短之術又慙啓塞之辨不能伏軾撙衘驚燕趙之郊黄金横帶馳澠淄之幣語黙罕緒圓方靡樹謬以一氣之微邀百載之㑹躬奉英睿身蒙青雘故以潤厚累璧恩重兼金不悟懸黎降景靈河瀉潤復獲執覊蘭陳迎笏桂序漏越之琴竊荘文之價缺齧之劒盜頃襄之名心羞秦媵志慮楚犢抱魄踴躍憂集如熏鐫感何日銘報焉期獄中上建平王書宋建平王景素好士淹隨在南兖州廣陵令郭彦文得罪辭連淹繫州獄淹獄中上書景素覽書即日出之昔者賤臣叩心飛霜集扵燕地庶女告天振風襲扵齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壮夫義士伏死而不顧者也下官聞仁不可恃善不可依謂徒虚語乃今知之伏願大王蹔停左右少加憐察下官本蓬户桑樞之民布衣韋帶之士退不飾詩書以驚愚進不買名聲扵天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扃禁者乎竊慕大王之義復為門下之賔備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顔色實佩荆卿黄金之賜竊感豫讓國士之分常欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗􅆙迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之每一念來忽若有遺加以渉旬月迫季秋天光沈隂左右無色身非木石與獄吏為伍此少卿所以仰天搥心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞士君子之行矣其上則隱扵簾肆之間卧扵巖石之下次則結綬金馬之庭髙議雲臺之上次則虜南越之君係單于之頸俱啟丹冊並圖青史寧當争尺寸之末競錐刀之利哉下官聞積毁銷金積䜛糜骨逺則直生取疑扵盜金近則伯魚被名扵不義彼之二子猶或如是况在下官焉能自免昔上将之恥絳侯幽獄名臣之羞史遷下室至扵下官當何言哉夫以魯連之智辭禄而不返接輿之賢行歌而忘歸子陵閉闗扵東越仲蔚杜門扵西秦亦良可知也若使下官事非其虚罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯竒節之人燕趙悲歌之士乎方今聖歴休明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沐義昭景飲醴而下官抱痛圓門含憤獄户一物之微有足悲者仰惟大王少垂明白則梧邱之魂不愧扵沈首鵠亭之鬼無恨扵灰骨不任肝膽之切敬因執事以聞此心既照死且不朽齊臺梁書作齊堂謂徒虚語作始謂徒語憐察作憐鑒顧作盼國士之分下有矣字每一念來上有是以二字尺寸作分寸錐刀作刀錐利哉下有然字逺作古二子作二才如是作如此至于下官作如下官南史伏死而不顧者以此也憐察作矜察民作人名聲作聲名次則虜南越作退則至扵作至如昭景飲醴而已報袁叔明書袁炳字叔明陳郡陽夏人歴國常侍員外郎府功曹臨湘令按淹傳淹出獄後尋舉南徐州秀才對冊上第轉巴陵王國左常侍按書去嵗迫名茂才疑此時僕知之矣髙臯為別執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採藥稽山友人幸甚去嵗迫名茂才冬盡不獲有報引領扵邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其竒者則以紫天為宇環海為池倮身大笑被髪行歌其次則堅坐崩岸僵卧深窟朝飡松屑夜誦仙經其下則辭榮城市退耕巖谷塞逕絶賔杜牆不出然者皆羞為西山之餓夫東國之黜臣而况其鄉黨乎或有社稷之士入而忘歸則争論南宫之前衛主扵邪伏身北闕之下納君扵治至乃一説之竒驚畏左右一劍之功震慄鄰國夫能者惟横議漢庭怒髮燕路且猶不數而况扵隣里乎若僕之行止已無可言矣材不肖文質無所直徒以結髮㳺學備聞士大夫言曰在國忠處家孝取與亷交友義故拂衣扵梁齊之館抗手扵楚趙之門且十年矣容貌不能動人智謀不足自逺竟慙君子之恩卒離飢寒之禍近親不言左右莫教涼秋隂隂獨立閑館輕塵入户飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子長為之執㦸下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俛首求衣斂眉寄食耳若十口之𨽻去扵飢寒從疾舊里斥歸故鄉箕坐髙視舉酒極望雖五侯交書羣公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原彯色水鳥立扵孤洲蒼葭變扵河曲寂然淵視憂心辭矣獨念賢明蚤世英華殂落僕亦何人以堪久長一旦松栢被地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也與交友論隱書淹少孤貧好學沉静寡交㳺其自序云常慕司馬長卿梁伯鸞之徒所與神逰者惟陳留袁叔明而已為吳興令三載復還京師値世道已昏守志閒居不交當軸之士淹者海濵窟穴弋釣為伍自度非竒力異才不足聞見扵諸侯每承梁伯鸞卧扵㑹稽之墅髙伯達坐扵華隂之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史歴巫卜為世俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋弦者有五一則體本疲緩卧不肯起二則人間應脩酷嬾作書三則賔客相對口不能言四則性甚畏動事絶不行五則愚婞妄發輒被口語有五短而無一長豈可處人間耶知短而不可易者所謂輪椎分定也猶如雞騖之有毛不能得鸞鳳之光采矣况今年已三十白髪雜生長夜輾轉亂憂非一以溘至之命如星隕天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好冥黙既信神農服食之言久固天竺道士之說守清浄煉神丹心甚愛之行善業度一世意甚美之今但願拾薇藿誦詩書樂天理性斂骨折步不踐過失之地耳猶以妻孥未奪桃李須隂望在五畝之宅半頃之田鳥赴簷上水匝堦下則請從此隱長謝故人若乃登峨嵋度流沙飡金石讀仙經嘗聞其驗非今日之所言也誰謂難知青鳥明之貴布筆墨然亦焉足道哉敕為朝賢答劉休範書昔媯道鼎昌干羽未能戢姬徳昭宣長旌猶巻舒焚衣毁冕有自來矣皇宋靈武誕命聖道鬰宏三后連光四聖沓軌或經天緯地搆紫靈之符調風偃海隆黄旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟岳降聖重耀函夏延禮璧臺訪道衢室平陽之后巻迹慙靈空同之君斂功謝徳是以綵雲祥風之瑞布濩區中梯山棧火之俗欵徼請吏跨商軼夏洗周滌漢道澤優衍猶不封禪遐靈在天餘惠無泯主上文明金相穆然玉色履璧之禎獲珪之應著在紀嵗仁浸汙河惠愛秋草想亦君之所聞也重以先帝靈略潛通英轡逺馭受話言必忠貞方肅之臣奉風聲必䖍恭匪懈之士明時琴瑟鼎鉉之盛且被扵寧世而忽覿來書以惋以慨君為齊梁楚越之主鼎貴一時金玉滿堂文馬千駟爵授湯沐冠盖于道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂衆遂窺外闗今朝無闕政頓搆凌上之節室無㜸豎坐生莫大之舋鴟梟赭衣號興徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁逺則呉楚見禽于一壁磐石之㜸近則江荆面縛于小将此成敗蘭艾之鑒又亦君之所知也聞彼虹飲䑕舞之異早見物徵河北隴上之謡已露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黄頭駱驛争引熊渠佽飛首尾電發伏波樓船掩江蔽汜渡遼甲卒充野布隰加以先天盖世之略蕩海拔山之威任輔沛陳羽林鷁舟露動龍驤精騎風驅然後六師雲起九軍星連蜺旌外江虹艗中水金甲映平陸鐵馬炤長原蹴南嶽而永慨瞰九派而懐恐伐罪弔民復驗于兹甫刑三千惟此為大僕才等不羈志瀝丹欵故奏禍福行矣悵然袁褚劉蕭等疏袁粲褚淵劉秉蕭道成明時上有脫句任輔沛以下至風驅亦有缺誤江文通集為建平王慶改號啟竊以皇衡永謐則玉歴惟禎國慶方夷則繩澤式茂故五鳳協年甘露應號况今道潤衍溢頌祉載繁嘉生蠲慶風雲瑞節既覯昭晨方鑄昌化延守一隅無以自届不勝荒情為建平王讓鎭南徐州刺史啟臣言臣誓惟殃釁頻寫曲折慊慊狂愚冀蒙哀弔而聖㫖懸嚴便賜斷表神乖意失音影何地吞悲茹號情膽載絶臣荒昧神氣爰自幼稟分踰鼎貴秩髙外州臣乏素能或所不任况在憂年必取黜辱特為開非常之恩借權制之義紊禮滅經實翦治本臣又能身祈命請一感天地躑躅表啟心容己靦猶疑大道之行墨縗不興孝治天下通喪獲遂陛下覆被仁明品物無漏豈扵微臣獨不蠲鑒燋鯁在躬輙復塵觸伏願暫輟聽覽少憐苫草則臣死之日猶生之年臨啓恍惚䰟識無主不勝殞越怵息之心為建平王謝賜石硯等啟臣言奉敕賜石硯及法書五巻天㫖又以臣書小進更使勤習敬閱籀篆側觀硯功張衛慙竒金瓊羞麗臣夙乏翰能素謝篇伎空賁恩輝徒隆慈飾方停烟墨永砥學玩仰結聖造伏銘私荷不任下情為建平王謝賜玉環刀等啟奉敕賜玉環刀等五種珍噐贐儀伏䝉猥降飾軼采朱跨影懸魄崑岡歸琛闕山慙寳謹襲緹素以充握睇垂光既深銘佩更積不任下情蕭領軍讓司空并敦勸啟齊髙帝以宋元徽初平桂陽王休範遷散騎常侍中領軍及蒼梧王見殺迎立順帝進位侍中司空録尚書事臣某言臣㳂心之請丹識以傾詔㫖沖挹便賜斷表伏聞當遣王人猥垂奨勸仰天光休俯增驚厲中謝臣以為槐鉉之任百王攸先具司是屬冠冕式瞻化曜昌煇連基政務事深崇替迹豫興衰故道富一時則風行明令才乏通權則山摧河泣既澆汨蒼祇將紊毁身國臣進退惟疑再三自顧實以陋情悲忘寵極但畏軼超疲伍乃叅鼎軸無徳而貴豈敢偷存才怯任重物所不恕故弱識褊槩頻布前辭枯木朽株永隔蠲恕豈特大車方塵小雅有廢而已哉将據致冦之悔取鑒于兹矣且皇華之命居上之鴻私鳳舉之招為下之殊榮國勲必書史不謬牘况臣連牧圉岳董率職方既鑠近古垂耀中葉揆望揣實為泰已甚而乃復降朱輪之使方枉青冊之勸寤寐悁灼諒無以任輒重素誠冒覬神炤伏願皇靈特垂開愍賜停正台之職并免敦勸之使餘所榮忝誓不敢辭肅恭外屏祈迴恩授則扵臣慊欵復為惠造不任憂戴匪惶之情蕭太尉子姪為領軍江州兖州豫州淮南黄門謝表齊髙帝立宋順帝二年進位太尉臣公言臣頻結崇寵亟延上爵休恩動俗烈榮振古鴻品清飾已藹金圖秀鼎號銘共茂瑶篆永言戚慮鑒寐殷心况乃秩洽朝門慶霑國珮弱息臣諱嶷映晃等文不昭典武不定功出内帷閫升降貂綬或振迹領候職贊禁錡或騰光江甸任鈞屏翼河兖衝要既濫北門之管淮豫險捍又謬西偏之寄兄子臣鸞忝守近畿嫡孫臣某載華省闥皆倐忽晷景頻煩升荷雖咸罄愚識恪居匪替豈足以少塞神渥裁酬皇眷囂黷一盈慙厲彌積談天之辨不能為臣陳辭雕龍之文無以為臣飾愧静然肅念裵徊交集不任憂感沐浴之情並江文通集諱為武帝名賾拜正員外郎表臣邁鄉逺迹曲學末徒不瑩彫龍之采寧照𤣥豹之飾自過被光私濫蒙恩幸屢度經冬亟移春序皇緯如紐慙飛塵之效璿基方峻謝寒露之勤故宜伏影軒間卷氣衡下猶蒙供事紫楹奉役丹殿巡魄擎概榮渥不悟震離徹䆳阿景洞幽復升官清閨列版嚴闥叢識何算爰忝叔則之仕菲質焉樹乃謬仲容之職猥枉青雘增光空質心懅末塵情慙洞户佇首矯迹以銘以奏拜中書郎表榮鬱兩臨恩俊交鏡悄然掔魂乃懼乃逝臣聞汝潁之金或揚采于四豪江淮之珠已馳光于七貴皆聲不妄美第豈虚立未有伎慙湘輿䝉送目之賞工謝綵輪竊歸風之價臣幼乏篆刻長暌圖史智罕効官志闋從政方遽永振風長憂凌雨不悟遭社鳴之屬際河清之㑹𤣥雲素霞必駕蓬萊白毳騂鱗咸蒙解遂仕通物任官登郎掾此實耀靈之私照而微臣之厚幸也仰惟皇衢大融氣品呈觀西傾棧山東鯷航海故竒士端威異人磬折皆相望北闕待詔南宫而臣學無利博文有忮害乃彯裾頓屣伏黄扉之右曳纓轉笏居青瑣之前訪徳扵姑射聞道扵崆峒伊臣之願過為信矣昔望都才麗爵乏上班長岑聞靡身終下秩愚臣方古悠然已泰内燭徘徊眇不識屆建平王讓右将軍荆州刺史表茂寵乃臨炫奪彛典巡恩鏡飾攪情震慮臣聞該秩詔序匪賢莫能孚其職端維裂陜非功無以濫其選所以輪鞅國典締結民紐五威咸平四精或訓者也臣踐行迷方試業敝緒徒以綴采宗莩承渥帝席執圭載筆亟荷出内至乃曳組河縣蔑馴羽之化鳴環京轂謝澤鱗之政聲績兩無風化雙缺而龜紐未剔璽書頻降復改冊湘區分瑞衡服竟無賈琮交部之廉終乏郭伋并壤之信固以雜沓民明湫隘身諷不悟皇靈再煇河海重渥遂踰恒采妄賁異等荆門務要方城任積水交沅灃山通岷峨襟帶百縣縈抱七州上徳懋勲尠居斯地寧臣膠固所宜膺荷是以燋薄魂色驚迫心影謹刷睿情直露弱志伏願陛下停旒弛琪暫炤瑣曲則鑄才式𢎞練物維逺王度既清蒙識以泰不勝慙懅屏營之情建平王慶明帝疾和禮上表臣聞慶動至𤣥則昌衢敦序教孚上雲則紫㝢交泰故祈寒溽暑無以變其和沴火凝隂不能徙其氣伏惟陛下至徳遐穆實天縱聖仁鑄蒼岳道括寰海故丹陵之君欵金泥而謝賢媯墟之后眷龍圖而慚徳頌聲蔽逵歌思匝道而望景暫虧輪光少曖玉櫺違和金幌輟念百祠未遑四嶽匪處吉蠲為慶神御方休瑞廣文齡祥深武日具惟涵教倡愉兼薦臣班戚奉慈實自慶舞不勝恱豫之情建平王慶安城王拜封表麗采繩河映萼璿圃淑問夙孚令儀早晰撰告候辰昭膺輝序國維富禮皇塗凝衛具生屬慶懐識戴躍臣涵恱楚邊魂馳闗闕不任下情建平王之南徐州刺史辭闕表臣過承寵靈閔㸃假日徒抱皇慈無充横草而品第乃崇軒服逾峻顧兹靦窮彌覯荒昧今便奉官外甸巻跡徐山託慕宸嚴載惟感戀衰疾不獲詣闕不任窮鯁之情蕭驃騎讓封第二表藝文類聚作讓司空表臣某言寫瀝愚丹已續前表猥降前詔未垂鏡恕一省驚慙再悸魂府静躬自察啟居匪地臣聞日薄星迴昊天無以爽其節山盈川沖厚地不能虧其度豈不靈鑄有限神極無爽况世道恒淪人彛剽奪數滿必㳂虚飾小故辭大臣才非古賢任鈞左戚祚開山河兼金叠組爵奓常班寵溢前達以榮以渥且慙且靦雖嘉銘鼎之恭更懼循墟之速矧乃三司業貴上將地崇總録務廣河汾寄深珪㝢方啟劒衛增肅既驚朝野足震城邑殷周富士猶難其人漢魏多才亦罕兼職且麟閣之臣尚有位不及鉉全器之侯猶或任不並台名爵無假前世之雄規車旗勿濫中葉之英軌况鴻誥欎集懋冊頓萃諒非虚薄輕所膺符今殷夏既聲封國式固故天地燀燿日月更輝陛下停若鏡之明流如雲之愛方求士扵板巖宜思賢扵屠肆而私臣以闈廟寵臣以帷鼎位兼文武職總内外非所以發夢渭濵儲精河藪鐫金刻石既不可詮輿歌里頌其謂臣何仰縁大道方行蒼祇宅氣威靈所燭九功咸詠寧扵庸臣獨隔恩耀誓守愚𠂻重扣雲日如䝉恩宥實生之幸不任慊欵之誠日薄藝文作日發屠作蜀並誤第三表臣某言臣再抽慊請辭為理屈側守圭漏伏望𠂻鑑而宸緯嚴祕㦗悰徒懸優奨之降非復常㫖肅奉驚懅曛曉如失臣炤冊訪古誦史稽昔以為敷道之寄管物成務總録之重匡績毗風莫不下協河岳上踵光緯先王所以長世後睿所以字氓讚金圖之要輔樞歴之機者也臣本瑣姿不慕聞達昔値英世頻遘時來感激光私未能自返烏可超乗厚任妄據髙圖天道既平鬼神好謙臣亦何人而獨斯處所以不恤色忤頻犯鴻威者正以方圓之景已滿丹彩之色難加政能緯俗匪務傍職坐而燮道必在其人若臣武未燭鞬櫜之分文不藹樽俎之間徳非時秀道乖物宗虚飾疲伍空貽上位則天變彰扵飛流地眚見扵震壓驚蕩民聽蕪沮物議綸言之出不追金石之謬已逺豈唯敗錦傷經毁鼎覆餗而已哉自非西京上績東都名勲河右羣賢江左諸彦寧有誣叨天爵以為己功者也昔南楚偏君鄢郢小政執珪柱國尚不輕授况車軌同文四溟同宅而以鄙蔽超居金鉉殊任鬱起臣心憂魄悚視丹如緑伏願陛下暫停冕纊少察愚實鑒臣靦情愍臣孤志廣天下之惠可匹夫之諒中則國步永清門下永無謬誤不任憂駭之情蕭驃騎録尚書事到省表臣某言臣自妄䝉異寵輕荷殊爵晝昃猶聳夜艾方驚誠以設器瑶陛取監沖滿懸魄金波徵驗虧闕兹乃天數去盈人經好退后所以裁成萬品下所以各愼百司未有違才易貫尅負永業者也且量力之誥實炯前書辭科之誨且招昔牒况臣徒竭弱質忠貞未懟猶叨今恩山岳非重故慙屬交喪頻煩表疏必謂巡崖之慊不忽俟河之清可期不悟皇明神邈鴻奨彌深雖守丹愚競絶蠲恕今輙燿纓上序鏘珮中軒徳輕施重左右生華志盡輸謝終愧報效不任下情蕭驃騎謝甲仗入殿表臣某言臣即日被敕賜給甲仗五十人入禁儀武殿飾冠疇典局荷此盛恩五情銘載臣聞國之利器在祀與戎蘭錡之設實允儲方故官騎辰居羽林天部瞰城龍塞言伏鬼方臣股肱之力不足以染丹青横草之勤寧可以鏤金石而魚服象弭一旦虚授誕錫金珪方兹為絢黄河如帶比今非賞故異寵之襲心魄共驚不世之服蒼祗同灼雖攀靈河漢駿奔明哲慙迹駭𠂻無情以處蕭驃騎讓豫司二州表臣某言臣傾心駐氣不蒙睿感憂讋交鏡中寐再驚臣聞國歷惟燿則藩伯緝其才朝緯伊序則方率司其度用能璿紐弗虧民教可變者也臣自少器業無聞𢎞大誤變燕鼎超憑吳舟託翰負組假翼要瓊質圖𤣥素文寫青雘爵富諸公任髙羣彦銓梁既失輻誚所湊雖仄影毗道狥身贊徳朝徽不昭民聽具溢豈非性力知限鑒度有崖乗兹而處猶懼紊辱之恥况此以任何堪湧溢之賜且董督條興皆非盛古至乃河襄初授或體兼上才江表廣任或功為物首臣積陋扵國不勤睿朝寵集若是非所尅敢終抱寸襟重露愚見伏願天鑄廣裁地靈厚載特垂蠲渥使不矜盈則藿質蓬性庶無矯奪不任匪晏之情蕭驃騎上頓表臣某言伏見明詔鑾輿便御親六師臣又謬總羣帥竊聞金火告燿昏明代巻雲電溉湊經綸相襲所以草昧縣㝢昭晰區宙况乃逆徒阻兵器掩西服雖蟻衆䑕竊勢必褫散然尋仞難貸原烟易滅臣受筭内楹稜威外閫按甲視夕沾襟待旦翦此凶渠庶匪曠旬但遂玉輅躬臨雲蹕親駕悚慨交心實百常憤今便嚴率所統尅此月二十六日出次戎郊故已望江源以軫歎想荆山而增厲矣進止之宜更聽敇㫖不任悚企匪寧之心蕭驃騎謝被侍中慰勞表臣某言即日侍中祕書監臣戢至奉宣詔㫖慰勞便受轂中帷練甲外壘旍麾蔽景輿徒競氣人懐秋嚴士蓄霜斷晦魂已掩氛豎未懸稽鉞竚威寝興震慨今王人臨郊皇華降庭煇燿望實将激威武戴鶡之夫迎光蹀恩投石之師攀炤竦恵楚纊越醪方兹慙潤臣忝屬閫私彌抱渥洽不任下情蕭驃騎慶平賊表臣某言狂賊沈攸之棄天犯紀毁禮滅緯外陵南畿内壘西夏禀血涵氣咸百讎憤賴皇威遐制璿圖廣馭四海競順其㑹如林仰綴宗稷之靈俯輯士民之効故嚴校裁交妖鋒折首凱期既届樂飲在晨斯乃紫歴方永蒼氓同慶臣備符寵私時深抃舞不任踴躍之情蕭驃騎解嚴輸黄鉞表臣某言逆沴電熾凶妖霧舒志夫禋天情已類社故乃馳羽江郊騖燧山甸雖藏智審其黥戮涵識判其奔沮然兵扈難輕義險宜備故膺寵無辭奉鉞不讓今元凶既殪醜徒自紊祲靄方卷郢氛已廓樂琯登肆禮衣曳朝不宜復假殊服取缺彛則輙上還王府永戢祕館蕭驃騎讓太尉增封第三表臣某言以鉉司崇貴衮位淵嚴非徳非功無忝無溢故誓魂肆請舒𠂻仰謁不能曲流慈炤遂乃徒洽恩奨周覽未交靈爽以懼臣厯古㳂圖循逺訪繪未嘗不麗選台衡妙簡槐采者也魯鄭之賢戚曹蕭之勲彦呉鄧之盛功王鍾之素業孔明之居蜀茂𢎞之在晉皆僉曰伊人是以處無懦色臣官逢昌世運漸時明頻煩紫渥綢繆璿命身薄施厚感厲愈深遂負機繩之託猥集衡梁之任風軌不樹徽猷罕宣無以式翦冦兆載弭姦萌致虹沴阻于上京蜺妖扇于下國實賴藩伯鞠旅侯甸入守攙搶旬始烟祛霧巻故皇道威稜之由神緯昭昌之効臣豈有探夐察幽之㫖攻城野戰之力哉今迹無小功事貽大賞愧寤終朝慙夢流夜咨此庸弱何以任忝伏惟淮泗猶梗趙魏未賔中原久蕪神州方翳思樂盛猷願厲聲頌将陪雲驂以北守扈朝服以濟師乃為少雪庸誠微謝天眷耳寧容遽竊茂爵輕頒鴻名者乎伏願聖渥遐覃賜以矜宥霈焉垂仁穆然惠徳血祈旦亮慊志夕滿雖蹈疵戾猶深抃躍蕭驃騎讓太尉增封表臣某言撰心求私精衷請亮情不感神理無動天詔飾既降辭表是絶朱紱方臻金鉉未宥魄慮再馳詵然改席臣局心久戰淺槩已領具煩寸管備黷尺史曠旬浹景祈指遂宜猶謂設品分職實以仰銓璧緯列寵懸榮故乃俯酌瑶陛迹聨盈缺道協興降上睿所以僉舉前英所以詳能今若第隨私貴爵與私富紊蕩邦經斷折民紀豈可還風中葉逖聽遐代者也臣才乏往賢績謝古列妖鋒孽火将炎天地幸郊甸或静江山以閟文軒華劍既榮既峻侯封桂食又盈又滿禄髙誚厚任重責深弱節兼誠誓思不淺伏願隆慈特垂明愍臣奉國猶家慮公若私秉軸之鈞心希在治不任懇懇之情蕭驃騎讓油幢表臣某言奉詔賜車一乗竊以國容方穆旗章式序朝禮永清儀服咸貫故象革建鑣尚炯周圖朱箱𤣥盖猶炤漢篆皆旌羽勿差功庸匪濫臣忝爵山重䝉榮海深襲恩祇冊已慙初筮浮禄素位方疚心路鑒古以惕巡世罔然不宜假文丹幰空飾皁轖仰思至道俯恤物僣伏願聖逺特停華渥書愚上請追深累懼不任下情蕭太尉上便宜表臣公言臣聞經邦緯治去華為急體國字民循素乃安聖誥遺風具騰丹冊賢言流沫備宣青史何嘗不翦削浮奢銷遣文繪然後頌音載興澤洽式廣楚駕百馬民雜國彫秦修萬騎教亡業墜刻桷丹楹禮有常序朱幡皁盖古無濫秩縹衣綸綬漢置前制竒服怪物周設常刑皆節俗約訓反樸還風肅政黎心釐一民志故禮奢寧儉宣尼之髙風以義止利孟軻之宏規若乃文彩利劒道鑒其元彫蟲篆刻世炤其淺雖儒墨異學名法各治至于遵本捨末其槩一也故荀韓之立典管晏之制書賈陸之鴻筆嚴徐之博辭食貨興志鹽鐵生論莫不異說而同儉乖議而共治然世淪物起道缺事遷盖源起西秦波被東漢一魏不變二晉未革所從來者逺矣洎髙祖武皇帝業髙懸㝢化革區宙菲躬謙度方追重華納麓之勤約情撝操乃取文命卑宫之義去金錦之巧無帷帳之飾唯修逺圖綏國之術祈勸力耕濟世之規是以政平刑偃紫階斯廓太祖文皇帝恭已明臺之上聽政衢室之下九官咸静萬績惟凝亦復務抑華詡思裁奓泰輿馬翠翟之麗尠登乎外禁瑶碧綺組之玩罕設扵内宫故大徳立而五路謐鴻名建而四民寧者也自頃政教日替敦遫月虧誰惟厯稔亦曰淹紀至乃帝臺傾海外之寳王城盡天下之秘象席珠履一躡而即収鏤琴綵瑟再撫而己損褧衣隨塵而罷羅袂從風而棄百民染其聲奢萬姓被其馳蕩故闤闠之里富者竊梁楚之乗伎巧之家豪者襲王公之服扵是有文靡虚麗驕邪不典之器精纎空飾妙蠱非常之玩農夫勤耨不充浮伎之資蠶女務織無給㸃刻之費将恐去實就華未知所屆背源從流不識其止求國富兵彊寧可得乎今江南所宅止漢魏兩州之地户口所檢裁文景三郡之民舊齊故魯鞠為茂草全趙盛魏豺狼所嘷陛下方欲鳴鑾中土朝服濟河不改斯術則未見其可也臣謬屬大任竊同憂泰日晏宵分實忘飢寝草治其莠職此為先輒具條便宜可以安邦利民者事事如右率以聞見謹簡聖聽若其咸允謹請敕付外施行讓太傅揚州牧表崇絶之寵降自白日殊甚之禮墜扵青雲祇畏驗盛若奪魂鑒巡席無容當軒改色臣聞天地之大徳曰生聖人之大寳曰位将以啟廓靈緯崇樹神紀百司備列貴賤之分既炳九官咸贊升降之際可明故皇極不爽國步斯泰雖金媯各政姬華異治未有革序變倫而能流英發耀者也臣才慙右賢功媿上烈平趙夷魏之氣無宣扵國書濟河登山之威未亮扵左史既罕龍韜金匱之効又乏楹間帷中之績衛主寧謂提横流匡危不足生細民故小節時顯于艱難大勲無紀乎廊廟而乗軺服冕荷蕭張之賞開城裂域受曹鄧之爵不能翊教緝政釐濟氓隱贊邦𢎞化飾整朝輝是以徳少寵多輿人立規才薄位厚處士興議故玉燭未調道治猶欎者臣之為媿也不悟陛下復停日月之華凝烟露之潤擢臣瑣姿鑒臣陋誠前恩未曠後寵已襲上公祕鉞聲振都鄙文劒彫舄禮殊軒殿深褒之逮方今為絶大賚之降比古為超臣亦何功當處斯忝伏願道邈先帝理鏡衆寂被氣順方涵生獲慶特輟策書時停鴻冊則人歌僉平物抱至歡蕭重讓揚州表臣某言臣以功狹賞峻世誥所讟才弱寵隆道經所諱故寫魂誓膽庶留天矚圖驕慮滿護守私吝不能青蘋引風陽燧要景復降綸冊徽采兼明影迹交戰水烟相薄竊聞周夏異章𤣥素各禮儒道二宗名墨兩教咸以裕俗為急僉以得人為寳扵是尊官上品乃貽玉振之賢鴻等懋列為取金聲之彦或有濟世夷難之略煇燿内區導江疏山之勤纒結中㝢深徳衍溢大功振驚然後超居國右鬱處朝端故九職惟宣六典式序丹青所以傳其藹磬管所以揚其音也臣才蔽識淺非集譽扵鄉曲榮降寵臻乃假翼扵皇極遂事等話言之寄任鈞符負圖之重職總表裏地聨機務位班昔良知闕前修居官不聞其風處秩焉見其政寰域之治未緝街縣之訟方興繒販之士無薦管庫之家寂寞四維不闡五教罕敷安可以底愼財賦交正庶士者也今輟和毗道仄身贊業尚據晦曉獲毗璇圖况異禮更飾褒命復崇名超列辟爵擬羣后上仁居之猶涵慙徳臣實空儒伊何以勝既誣人文将黷𤣥緯凌厯飛流之眚懼失正和晦裂蜺霧之災且濫庶物臣是以寤寐永歎憂國慮私者也伏聞陛下裁天賦品制地平施使曠世之典不遂臻扵末躬迥代之軌無頓被扵兹日素心丹魄皦然靡疚矣不任憂迫之情後讓太傅揚州牧表臣公言臣再辭非謙重讓靡飾實以爵髙中世厯古所難寵冠上俗緜代誰易詳圖辨箴如鏡如水撿崖覽志匪彫匪文魂祈夢請駐心挂氣陛下猶降以璽書之榮被以丹碧之采頓然變容一慮九逝臣以為寒暑繇乎平分晦明辨乎天道咎譽起于微薄悔吝生于小疵故金衡既陳錯髪之異必懸銅墨咸設分撮之殊已傾聖哲不能爽鬼神莫由避况臣鄙槩早盈陋才久溢第超庶后禮絶羣班仰贊東序之賔平參北宫之政窮盈極滿扵斯為甚鑒兹降替淵氷非譬所以坐洞房而不悟下輕帷而歎息也古之馭教當有道焉量能而受賞撰智而錫位深乃裂組逺故分珪前人以為稱首昔賢以為美詠自非上徳横乎天地髙績格于區宇烈譽馥于一時茂名欎乎當世者豈有降今日而莫先哉臣爰蒙殊寄六稔遂交及荷總任二曜忽周未能塞謗生民獲免童訟何盛勲之足題詎深烈之可銘乎而因委忝濫踰溢倫等朱軒躍馬光出電入貂冠紫綬寵藹霞炤臣聞闔宗奉國猶非報殉方将身侍鑾華雪齊魯之侵地手執羈勒騖燕趙之逺郊然後追迹范張濯纓汾射臣之志也華爵盛典非所敢寧伏炤右巡将流聖察無使匹槩血誠不諒扵璿扆宏芬英猷遂蕪扵里聽豈伊庸臣獨䝉其庇亦曰海隅咸被其利焉蕭被侍中敦勸表臣公言即日侍中臣惠基給事黄門侍郎臣王僧珍至朱盖乗雲𤣥軒肅霧墜髙天之㫖集微臣之軀神爽瞿然斂影無地臣初長血心未啟素槩辭從意空言隨事盡不能降陛下一時之恩借俄頃之炤遂枉近侍貂簪軾庭臣自亮無庸何以集此退咎慊誠悲枉垂光進誡朝訓虧兹盛序感慮躑躅榮結夢寐臣檢古少例巡今逾疑豈有妄叨天功虚竊上賞近謬國華坐取隆貴人見其過外惜皇猷内畏私眚昔西京鼎秩漢世權家丹墀網户擊鐘連騎何常不以驕滿貽戾謙沖要福者哉臣不能遵烟洲而謝岐伯迎雲山而抑許由激昻榮華之間沈潛印組之内光飾既超寵靈亦逺江左以來罕見其倫今位冠朝端通侯萬户結象弭于前衝奏金管于後陣都野宗其榮盛視聽驚其炎貴臣一旦居之誰以為不忝者乎而陛下猶崇以異禮者是增臣之戾也况復肅延華勸實深窘迫伏願俯矜單志賜遂前請則世寢横議臣蒙緩責蕭被尚書敦勸重讓表臣公言臣五寫丹翹宜蒙凝炤一降王人遂無蠲察復遣尚書臣岱兼侍中臣奐等奉宣慈靈重賜勉誨鏡伏廻環憫黙失圖心魄交懅淵谷匪譬臣自初被詔迄扵今時載慙載疑以悚以厲豈非深懼鴻典永憂末躬故琴瑟徒鳴不傳廣樂之響燈燼空舉焉續經星之耀何則卓乎小者不足以任大守于蔽者不可以語通臣器乏淵源識暗機務倫濟夷險每憑璿厯之逺龕折氛蜺輒資羣才之効臣寧有採竒鑒隠之能綱國提民之功乎不謂過延渥洽謬攀河漢榮宗蒀葐寵華暐映藉聲探議共知其幸况傅保之崇殷周特貴牧司之寄魏晉稱重上昭妙徳次擬英勲有踰兹序尠不紊裂今陛下方闢金門之聽調繡扆之政何得去禮廢雅近扵臣始既無前章孰表後世臣才孤位峻待罪無日矣情哀理感事盡于斯伏願一運天景微見藿心則物不逃形臣何恨焉不勝燋憂狼狽之至蕭讓劍履殊禮表臣公言近仰跼威靈辭移理奪故欲冒忝傅職必避殊禮不悟復凝令詔雕飾非常鏡睇未周金火交慮臣聞寵以昭賢不濫才外之華榮以麗身豈謀分表之渥哲后所以僉授貞臣所以慎荷故行珪行玉尚無輕頒一爵一號猶宜詳品况劍舄升陛贊唱異儀殆為對越神體抗禮天極漢魏舊載唯斯稱重雖英衮簉朝賢武滿世蒙此典者乃曠古時降耳諒由功饒賞結名髙器深金蟬緑綬未足藹其采瓊珮朱紱不足宣其榮方加以履殿優以勿趨雖至第為上公貴為皇王佇望兹禮猶邈如也臣何燀業寵兼昔人受以懼覆悔豈有及復聞殊㫖增其憂迮抱此愚欵以殯為請伏願天鑒順臣所守則雖歿九幽傳榮萬葉矣蕭拜太尉揚州牧表𤣥文既降雕牒增輝禮謁前英寵華昔典仰震威容俯慙陋識心魂戰慄若殞若殯臣景能驗才無假外鏡撰已練志久測内涯故讓不飾迹辭非謙距寸亮尺素頻觸瑶纊丹誠實理備塵珠冕而神居寂阻九重嚴絶徒懐漢臣伏闕之誠竟無魯人迴日之感所以廻懼鴻威後奔殊令者也既而永鑒隆魏緬思宏晉國之大政在功與位故匡民紐亂不處輿臺之下去勲捨徳寧班衮司之上咸以休對性業裁成器靈詎有移風變範尅耀倫序者乎臣績不炤朝忠豈宜國名爵赫曦僶俛優忝陛下久超以異禮之榮越次殊常之秩雖寝寐矜戰曲垂哀亮而璽冊冲正愈賜砥礪今便肅順天誥恭聞睿典審躬酌私必跋危撓将恐氓俗由此方擾軌訓以之交蕪臣豈不勉智罄忠也未知所以報奉淵聖輸感霄極取諸微躬長為慙荷蕭太傅謝追贈父祖表臣公言即日兼謁者僕射姓名奉宣詔書追贈臣亡祖某太常卿亡父某為散騎常侍特進左光禄大夫寵煇泉扃恩凝松石奉渥銘心祇光慟慮臣行阻祇𤣥躬早荼棘如創之痛昃日不追終身之恤霜露彌慼雖慙曾輿喬木之敬實抱仲路華衮之哀自謬藉珪金空貽組紱爵侈于公禄盈扵私何嘗不静欷其結黙慕交深不悟睿孝動天昭性曠古惠被逺紀澤演慶世丹情靡諒峻冊愈凝大榮集身尚驚異施况寵洽山柏特振殊造銷骨瀝命猶不勝謝不任鯁泗荷珮之誠蕭大傳辭輿駕親幸表臣公言近以神輿将降昌啟丹辭重被還㫖未垂闓允謙尊彌光褒優愈臨慙疚既積敢忘謙請臣乗幸藉私豈曰無僭攀霞鏡月非復常所此必讓徳信在扵兹但恩嚴交泊固守莫從免黙恭典伊榮加戚寧容爰枉鑾駕式驚臣府訪心驗已諒以不夷求物校迹誓無此義且古今異飾紫青變禮取諸臣躬未覿其安伏願陛下賜止冕輅時停雲駕則俗踐知方臣蹈厚泰蕭讓前部羽葆鼓吹表臣聞國容軍禮旌羽昭其華品騎第乗鸞㽔藹其飾所以炎曜仙都崇麗神境世教以之垂采民聽以之流文故勒岫銘海之功鞞革寫其詠龕難夷邦之業簫管凝其聲朱鷺𤣥雲既錫上徳華山芳樹以頒竒勲爰及台賢位髙蕃戚名㳂恩炤寵垂私賞皆為發吹後陣豈曰兼奏前軒兹典罕行此禮實曠臣竊服己𢎞叨光無限才局秩逺常銜炯燿安可二葆同整雙弄頓驚覽躬惕然特貽厚謬伏願明爍日月靡忘情鑒将停盛飾遂臣慊心則涵惠既饒恭錫多矣謝開府辟召表臣公言近被詔㫖賜令臣府自辟僚賢竊聞治以才為寳教以人為貴激風揚㽔實資山東之英凝華重馥良在闗西之彦近以闡耀世經發麗朝序今州策郡聘兹理尚堙台召鉉辟斯文亟曖豈非盛美難嗣故曠寂先芬者哉臣謬贊國機職宜氷鑒未能澄形炤藝薦品任官既乖覆業彌慼深寄仰屬皇心遥覃察政洞俗𢎞此懿典崇臣逺寵輒祇睿恩謹宣巖壑庶幽居之士蘿薜可巻竒武異文無絶扵古蕭上銅鐘芝草衆瑞表臣公言臣聞象際懸通豈以明昧岨運幽岸遥鏡不以人靈異謀威書壁誥既信其綵緑鱗丹字彌驗其文是以業藹鴻經則烟露呈炤精昭景緯則川岳發華故寳鼎白雲瑞集軒世芝房赤鴈祥委漢年𤣥石鴻鐘逺炳晉室玉璧彛器近燿皇宗自大明乗規泰始疊矩朱鬐素毳之至史不絶書竒葉珍柯之獻府無虚月今懋歴啟圖靈基再固頃嵗以來禎應四塞近獲豫州刺史劉懐珍解稱所統建寧郡建寧縣昌村民于萬山中採藥忽聞異響從石上得銅鐘一枚長二尺一寸逺像古鑄近乖今製又州界之内樹生連理二木隔澗縢枝相通越壑跨水合為一榦方之舊說彌復為貴宣城所統臨城縣山中獲草一株交柯攢莖紫盖黄裏貞潤暐􅎡自然天華採掇厯時質色不變闕此三字柄據有徵近獲吳興太守臣王奐云十一月二十九日解所統長城縣令臣張撝解稱其月二十五日甘露降縣東界下山之陰又東太守臣腦解所統武進令臣紀法宗云十一月十日解稱其月二十四日甘露降扵彭山松樹至九日又降如初臣以祥緯雜沓星燭波連斯乃靈迹深覃睿𠂻夐感理宜寫順祇無涵秘稽徃徴古僉欣升泰瑶光日闡玉繩永休謹拜表遣兼長史叅軍臣姓名奉銅鐘芝草以聞懸通一作𤣥通蕭讓太傅相國齊公十郡九錫表備九錫之禮非常之冊分天而降冠古之典開河而出遥然以慙魂交象魏臣聞日月權輿二儀所以尅靈君臣設極三統所以式固惟生與位謂之大寳辨諸文而尊卑既炳觀羣龍而貴賤可正雖復殷因扵夏王資扵帝至乎建侯分職體國經野其揆一焉是以二周之始山河愈廣兩漢之初封賞彌盛然表東海者實牧野之日瞻魯邦者乃負圖之辰西都英相信命世之功闗中上宰亦龕亂之力秬鬯彤弓本西伯之賞虎賁戎路又晉公之典若乃衣裳之㑹九合一匡猶慙徳斯禮也臣實鄙才靡識大體徒以忠貞為槩而勞不足銘雖以丹素為誠而功無可勒豈有經天緯地之略探隱照寂之智哉抑亦何術以堪盛休是以覧雲際而懐古憑軒幌而未寧也伏惟陛下神華馭世理無不鏡賜臣待謗今職守其私滿則天下有道庶人不議矣第二表臣公言臣近勵心罄辭寫情畢議眇望神藻鑒見丹襟而帝閽以秘綸誥方明中外巻容左右軫慮臣以為麗天秉經君上之彜憲儀地執緯臣下之恒軌故皇極載凝庶士交慎昔者重黎勤官裁居炎冥之職羲叔能任方掌日月之序至乎御龍勤夏未閒冠俗之爵大彭翼商豈見超世之典以古先哲后如兹之慎賞也臣乃謬貽國寄志在静難若夫野戰虹蜺伏順者易為威城攻鯨虺奉國者理必全雲氣薄蝕下民咸貴其明恃險與馬舟中皆可異議故昌邑有歸邸吳楚無旋師斯激芬揚蕤物同其幸焚惡去醜世共其庇實為仰憑俯順之効臣亦何力之有焉竊謂禄為十郡必俟禹迹之勤錫以九命乃須周公之美况吕梁不鑿而器重𤣥珪越裳未獻而賦擬千乗京闗識其崇貴畿服知其忝冒鏡前修而慙形覿徃徳而聳慮畏崖之請取誓深水審量之祈呈炤皦景伏願陛下逺牽雄範近覽英規憑霞停詔臨風輟恩豈伊愚臣方被昌化具日遺氓咸蒙其賴矣被百寮敦勸受表臣公言臣欵誠素履頻載縑翰天飾髙奨累降史筆即日尚書臣某等至重宣詔㫖猥辱百僚省睇未交心靈已悸臣聞良宰謀朝不必借威貞臣衛主修已則足故驕滿之失取鏡函闗謙讓之美見炤伊闕臣本庸人識無逺度籍開闢之辰遭欃槍之運姦回内奰則戮力瓊都諸侯放命則抗節瑶祀秉號仗義幸不辱威皆為冕旒遥鑒之明羣士畫圖之助臣寧望伊摯叔旦之爵吕牙申甫之賞哉方欲謝簪東都濯冠汾陽不悟盛禮華典復臻于兹静默迴環祇畏躑躅猶謂遇聰明之朝當時雍之世陛下詠堯風之化歌卿雲之詩日月華采萬方獲性叠慮仰祈必䝉題品而威嚴窈絶斯冀遂阻鑾輿玉駕復許敦幸重臣愆悔無地自安便當謹恭鴻命竭身為限蕭拜相國齊公十郡九錫章殊命寳典欎降雲天采詔軒騎光流城籞震驚華禮神氣交越臣才謝深英器慙逺度進寡兵車召陵之盟退靡朝歌河内之㑹無束馬山戎之績懸車流沙之功故望寵未安踐榮加懼况納陛朱户事絶羣班金璽緑綬儀叅鴻典聞命屏營以憂以墜近申微欵日月之鑒既阻方懼難慊蘭芳之㫖愈峻遂致百辟卿后踟蹰于魏闕鑾輅旗旂方幸于臣府悵然遥慮将貽厚戾文章徒單迄無蠲省而天威咫尺丹懐罔固輒肅恭文物翹拜榮禮違距以深追增怵迫徳輶寵盛于斯為微非臣鄙虚所能酬對蕭相國讓進爵為王第二表臣竭慮歸請三辰未鏡傾魂仰視九天彌阻重炳徽策再錫光誥理晦情震若涉嚴淵臣業不出世績未逮古謬藉明政陳力就列艱多智寡翊贊罔樹若乃洪範不修鍾綴旒之日九黎亂政當摧軸之辰雖瀝命奉時禍提下亟防明之陋貽慙昔人杜險之蔽取愧前英故十萬之師無集槀街之邸千金之貴恒單白藏之府戈船發扵江湖戎車出于石城然後雲徹席巻䖍劉巨禍臣實恧焉不寤上賞亟降華爵必集雖延首紫局翹意宸居執揣守約之志既謝簡文避賢辭智之請終無開允故受任專征逺邇知寵肇封四履侯甸推禮昔虞思勤夏不列殊物之錫晉叔匡周豈頒上公之典燕藩懿親裁䝉衮舄之榮梁國戚屬方忝旌旗之貴而臣包括庶揆總納儀形盖出近古非三代之逺體也公復乃踰九命爰超五等域中之稱麗天作則探情顧抱豈所允安者哉伏願陛下一檢丹崖遂臣慊心無使怵迫深貽疵戾蕭相國拜齊王表臣無佐夏匡殷之功威晉服楚之績業不題于宗器聲靡記于彛典而超居上禮邈乗峻爵静念隆替焦原非譬臣以為衆官咸事帝謨所以式序羣后克讓王猷所以載穆况臣訪徳語勤未洎伊稷之能藉靈懐寵以濫周召之秩故駐魂仰請瀝意歸聞理竭素牒事罄丹史具徽大微備簡玉繩而才輶志淺隔景絶炤朱輪之使日月亟䊸金鑾之尊旦夕将拂巡情覽識豈伊寧處今便肅典内軒恭服外屏大夫有命古或無違王假有廟今臣為叨三省空懦震據于心齊王謝冕旒諸法物表臣王言以軒冕雲蹕既非常之飾宫懸玉戚乃配天之禮故呈襟効慮必祈蠲亮重被還㫖芳訊愈越鏡伏殊私情影逺震昔大啟營丘未備樹羽之賞光宅曲阜始兼龍旂之貴况道狹慶隆身薄器尊粉繡争輝藻火競耀夫太常圖列星之采華盖觀古人之情所以聳絶百縣崇隔萬㝢鳳閣因此而神瓊都由兹而麗故愧功慙徳違儀避榮誠不遥孚理無夐達遂貽嚴誥爰斷辭表驚慄遲迴祈鑒何地便當肅對王休敬昭異寵佩服盛文以慨以懼齊王讓禪表逺規唐虞永揖之典近謨漢魏髙樹之禮既覽金水昬明之數又協雲雷隆替之徵激風太上扇采至公聞命驚爽心靈殞越臣聞天地草昧而樹之君所以平對二儀顯臨萬國膺符受厯總明司幽軒轅陟祚首出庶物顓頊登庸作為民紀雖五徳迭興十代繼運非賢非睿莫預斯位若乃與能之交禪錫之㑹豈伊虚薄所可遵擬昔傅巖佐商秩終上公磻溪翼周名極列伯臣才非半古功愧逮聖獄訟不往謳歌寧歸河乏馬圖之寳天無乗龍之錫元首股肱誓不可異而曠乗之軌忽臻于兹慙慨憂灼罔識其際伏願陛下遺舜禹之心臣守巢由之節則道燿日月澤浸飛泳聲振開闢仁動今古四三王而六五帝不亦休哉南齊文紀巻八
