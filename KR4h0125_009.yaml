body:
  text: 南齊文紀卷九明梅鼎祚編江淹二始安王拜征虜將軍丹陽尹章既耀軒禮涵蕤龔恩爽泗靦默臣少識猶晦哀辛方襲藉以育采上霄搏華中漢飲惠延光偭爵假息不悟瑶離降映繩河低文遂翊言關禁徙第京部進憲蒙淺塵紊徒盈還迷懅悚風製罔樹循伏憂欷滅慮燋衷不勝荷佩之情始安王拜征虜將軍南兖州刺史章絢服騰照懋册凝芬夤對迷墜慙泣交集臣職右南陽蒲鞭之政任重臨淄無遣獄之化自分金帝闕參風尹訟璧緯裁復圭露詎淹不悟旻靈拂采霄景汰色復交書河楚置傳江吳環章清潤旗文肅路寵艷內維榮炫外圉方梗名慮有陋莩識沖生靦氣安以輸謝不勝荒震屏營之情建平王慶少帝登阼章上書皇帝陛下伏承肇嗣天震雲飛璿極戎夏歸服民靈以戴臣聞黃旗紆藻瑞益于姬帝紫雲垂蓋效異于劉后實乃深賜天𠂻廣映祇迹伏惟陛下騫英駕聖涵靈蹤睿矩心明裁繩道哲時遙裔雒符雜沓河紀是以膺符寶宫輯命珍殿誼洗雲密德徽媯夏濬發洪源長禘偉業方絢聲金圖騰華玉厯波淹下氓炎躔上漢臣沿莩締寵誠兼親屏禮升之日守官楚甸不獲勉躬儲外奉􅀈行間魂泣江郊心泫京國不任悲仰哽慰之情建平王慶王太后正位章上書王太后殿下伏承以令日淑辰曾光樞景慶芬祇外禮蔚寰中臣聞道懋第昌業廣祉盛藻秩攸臻憲章斯飾伏惟殿下柔明固天夙資龔懿芬蕙翔聲端簡散譽冠采摯妊騰耀徽姒丹陵藴德玄􅉌棲聖煙煴國牒衍溢民聽涵道席教且泳且洽臣忝任蕃圉無由隨例闕廷不勝荒情建平王慶江皇后正位章上書皇后殿下伏承以嘉月惠時膺曜宸正翠珩照品褕組在飾休遍函夏譽殷靈昧伏惟殿下嶽曜靜德式懷謙順升降圖傳左右詩史夙鏡茂資早摛芳訓故以騰馥祕閨寫問中帷今靈緯載升崇正輝典衛教紫庭麗軌華屋聲激綺組風偃家邦黎玄湊仁雲祇宅慶逺邇有聞莫不傾渥臣限外任無由恭列軒屏不勝荒情建平王拜右衛將軍荆州刺史章圭册停徽車旗寫曜襲禮炫衷迎恩震色臣聞爵以能委命以績降亦有玄雲結吹褒成燻之厚朱箱纍轍崇試宰之髙而臣紐組頒守要玉備政績廢江區聲隘河部浮榮曠年叨光賖日諒以具察輿歌取鏡民誚不悟皇德至凝亭物惟渥復使承官楚封祇秩漳土任班河冀事亞崤陜橫術輻湊殷氓訟積寧曰明哲疇尅勝寄雖歷丹局終懼蒙咎不任銘戴匪處之情蕭領軍拜侍中刺史章上書皇帝陛下即日詔書以臣為侍中驃騎大將軍開府儀同三司班劒三十人等持節都督如故峻命在廷光册充軒虹驂聳服朱曦佇蓋夤對以懅心影若傾臣功乏至道不足以題象魏績非振民無可以書廟閣半漏未晏中鐘而驚實忌微庸起乘盛服竊疑國寵頓萃末躬今寰海順典瓊都咸光調御惟新鎔製就始良宜整變獻經詮明典緯九河式耀三辰載晰不悟陛下皇靈曲溢大賚斯降而鴻賞之行乃于臣始非所以騰振遙風激昻品流輿人之誦具聞其黷頻露慊祈未叨鑒順今使虔禮青軒謹躬丹墀憂符怵惕慙屬兼軫不任屏營之情建平王散五刑聘隱逸教府州國紀綱吾謬紲朝組乃班恩命重渥華蕃踐寵懋甸永言政惠良攪清寐况舊楚地曠前郢氓殷水帶枉渚山匝魯陽自頃田邑榛故封井萊蕪財賦方屈犴獄實繁思所以厚風釐俗變瑟改調自五嵗刑已下未送臺者一皆原遣文武彈坐亦悉復職主局依舊施散薄紓此懷府州國紀綱夫媯夏已沒大道不行雖周惠之富猶有漁潭之士漢教之隆亦見棲山之夫迹絶雲氣意負青天皆待絳螭驤首翠虬來儀是以遺風獨扇百代餘烈激厲後生斯乃王教之助古人之意焉吾稅駕舊楚憩乘汀潭挹於陵之操想漢隂之髙而山川遐久流風無沫養志數人並未徴采善操將棄良用慨然宜速詳舊禮各遣纁招庶暢此幽襟以旌蓬蓽蕭驃騎發徐州三五教州府紀綱沈攸之背慢靈極稽誅之日久矣况稱兵江漢之上圖釁廟闕之下惡熾罪盈民靈所絶朝廷以尅晨纂嚴令輿夙駕吾任先責逺義兼常慨挺刃投袂信見其時方當水斬龍蛟陸斷犀兕雖烈士銜志壯夫投槩然雲羅既舒宜廣威防所統郡縣便普三五咸依舊格以赴戎麾主者飛火施行蕭驃騎築新亭壘埋枯骨教府州綱紀夫汝南稱慈諒由掩胔廣漢流仁實存殯朽近築製兹營崇堞峻塹古墟曩隧時有湮移深松茂草或至刋剃憑壙動懷巡隍增愴宜並為收改勿毁奠祀主局詳辨施行蕭太傅東耕教三府二州綱紀夫寶農賤貨綵照周縢巡耕去販光炎漢籙故能業滋都野産殷紘縣吾任屬𢎞寄思闡治源慮以晨感情以宵嘆今玄司調氣青祇佇節陳闕字既柔服闕字方秀電爍有期桐萌無逺便當躬速紺耦道先列辟事均暫勞迹在永豫可尅日備辦詳典施行為録公拜揚州恩教昔召南分陜流甘棠之德平陽好道深獄市之寄吾忝屬負荷任總侯伯受餞元戎作牧中甸此地五都雜會四方是則而向隅之矜斯積納隍之歎猶繁興念下車無忘待旦其齊禮導德致之仁夀𢎞漏網之寬申在宥之澤遣大使巡詔門下昔明王馭世巡嶽采政睿后司朝觀俗調化故生無鬱滯物獲修通釐風拯患于兹為急朕以輶薄昧于大道因璿璣之歷遵三德之運緬鑒前哲寤寐永歎思所以闢訪治蠧詢求民瘼才寡務殷若無津漈故以情深危薄心疚夙夜矣可普遣大使分行四方推賢薦能問疾舉滯若其采野不闢犴訟有虧妨氓利害擾黷政經者具以奏聞如其讜言嘉話真士智才亦依名騰上隨事均量務取厥中朕將親覽以𢎞逺化賜赦交州詔門下交部昔值時詖負海不朝因迷遂往歸欵莫由今創制萬宇煙煴造物原形四裔澤浹中畿慜彼邊氓未均王化宣𢎞逺仁蕩以更始可曲赦本州統內咸同曠泰李叔獻一人即撫南土其股肱文武詳材選推并遣大使宣揚朝旨斷募士詔門下設募取將懸賞購士蓋出權宜非曰經制頃者民罹氛藹世襲艱阻因時流故浸以成俗斯風蕩而未返且滋長逋逸開罪山湖遂乃黥刑不辱草竊無咎平政察治萌合甄革自今己後可悉斷衆募封江冠軍等詔門下締基緯業序功攸急開厯闡祚酬庸為先故以式藹曩書載炳前軌文仲假等或誠亮艱危效彰屯詖皆績幹兩宣勤圖兼立宜各分圭社以酬厥勞謐大赦詔門下朕思𢎞風教而刑圄猶積永言前烈兢歎載懷今履端告始羣后執贄治洽樂交華夷同泰雖和慙擊石采愧卿雲然景業初基義深恆典慶動玄靈歡溢都縣憫彼幽黔猶隔兹澤思我兆民共煕至化北伐詔門下朕統厯馭政志包函夏庶總文軌無思不服而逖焉狡虜久為邊虞及宋末不庭授策乖律北州外淪威風內毁鑒彼隆替慨歎盈懷冕旒濟河翦彼凶狄咸秩中嶽望祀汾隂則聲教鬯矣猶以經綸惟始恩化甫洽勞民擾衆為政所重故方輟六師按經九伐今淮泗告驚羽書馳聞醜羯妖燼送死北垂徵天人之數撫自來之會無勞逺兵剿撲為易蓋因兹大號蕩其巢藪可遣使某官組甲十萬鐵騎千馬斜趨潁洛衝其要津某官某虎旅八萬舳艫數千沿淮長驅稜威清汴某官某舟師五萬直出淮淝某官控江右之鋭駱驛既進某官某率羽林徑勇為水陸形援某官某甲等並率義勇之衆互盡掎角之機戎車戒路事宜總一使持節都督南徐兖二州諸軍事後軍將軍南徐州刺史長沙王晃出次江都為衆軍節度驍雄競奮火烈風掃尅定中原肅清河洛便可內外纂嚴以時備辦王僕射為左僕射詔門下端二樞祕實惟國楨緝典宣機所寄時彥尚書右僕射領吏部尚書南昌縣開國公儉器懷明亮風情峻逺業積圭璋才兼經緯况乃節亮帷幄譽敷端揆升授之宜蓋允具瞻可左僕射王撫軍為安東吳興詔門下震澤殷奧撫馭須才都官尚書撫軍潯陽郡開國公敬則志幹貞烈秉情開敏忠勤之至形乎出內必能綏懷大邦克隆美政曲赦丹陽等四郡詔門下朕興言民瘼昧旦求政所以庶存簡惠緝兹治道而玉燭未調祥風尚鬱京輔及三吳昔嵗水災秋登既罕今兹厲疾罹患者多納隍之歎為矜良深可曲赦揚州所統丹陽吳興南徐州所統義興等四郡其遭水尤劇之縣自今年以前三調未充而虛例已畢官長局吏應共備償者雖積事為愆情在可亮外詳所除以𢎞優澤王僕射領太子詹事詔門下管司東朝厯代所重自非國華莫允斯任侍中尚書左僕射南昌縣開國公儉鑒識清贍理懷秀徹績亮朝端譽敷僉議贊業攸光物聽斯緝宜總二官以穆彛序何詹事為吏部尚書詔門下官人之職實難其選所以弼諧彞品謨明庶績今思治惟急彌不可曠侍中太子詹事戢業履修平體識詳隱自升宫闥美譽咸聞必能無懈于位燮兹流序王侍中為南蠻校尉詔門下荆楚殷曠任重寄深毗佐之選非良勿授侍中領祕書監驍騎將軍奐秉心貞元志局開亮績譽之美在公屢彰必能贊政南紀播惠西夏王光祿為征南湘州詔門下衡嶽名區荆湘奧壤自頃雕弊綏撫須賢侍中光祿大夫丹陽尹僧虔德履淹邃識局詳正沖素之品朝望攸歸厯職之庸載懷僉聽往任沅湘餘惠在民今宜重敷善政申此懿績栁僕射為南兖州詔門下河兖衝要維扞中畿司牧之任宜詳其授後將軍領軍新除尚書左僕射溳陽郡國公世隆業體淹濟思情通敏功書王府績彰纍任必能宣𢎞恩政威懷萬里雖哀疾毁頓而禮有權奪王僕射加兵詔門下散騎常侍尚書左僕射太子詹事南昌縣開國公儉忠欵昭著任寄隆深既光朝猷允屬民聽宜增威飾以崇望實可加兵二百立學詔門下夫膠庠之典彞倫攸先所以昭振才端啓發性緒𢎞世字氓納之軌儀是故五禮之迹可傳六樂之容不泯朕自膺厯受圖志闡經訓且有司羣寮奏議橫集以戎車屢警文教未敷思樂辟雍永言多慨今關燧無虞時和嵗稔逺邇同風華夷慕義便可式遵前準修建教學精選儒官廣延國胄王鎮軍為中書令右光祿詔門下綸言要密歷選為難優秩崇顯允在舊德使持節都督江州豫州之新蔡晉熙二郡諸軍事鎮南將軍江州刺史延之業履沖約秉情間素譽彰頻試績著纍朝自居南服徽庸尅舉宜升寵章管兼樞祕張令為太常領國子祭酒詔門下庠議既敷縉紳攸屬師氏之任宜歸儒素散騎常侍中書令驍騎將軍揚州大中正緒器識清簡理懷恬約譽洽朝聞聲緝民聽必能闡揚玄宗式範胄子兼掌宗伯望實惟宜蕭冠軍進號征虜詔門下維翰之重實資名品使持節都督郢州司州之義陽諸軍事冠軍將軍郢州刺史南昌縣開國侯鸞體局𢎞濟器操端敏自蒞任夏首美政殷流必能聿宣國化以庇人瘼宜崇顯秩允兹聲望褚侍中為征北長史詔門下蕃佐須才非良莫寄侍中領步兵校尉炫識業清悟思懷淹暢出內之譽日聞其美宜弼諧親屏以申茂績尚書符起都宫軍局符蘭臺宋書沈攸之傳所載附後侍御史大夫尊冠賤履君臣斯位愛順惡逆成敗可曉未有憑陵我江郊侵軼我河縣而不流魂漂骨丹宗血祀者也沈攸之寂寥無聞起自甲卒邀我百戰之軍乘彼一捷之幸鐫山裂地紐紫要金擁旗蕃伯便無北面之禮受符方屏即有專征之釁箕賦深斂毒被郢南枉法矯刑毒聞荆西鬼怪其性故從始而遂終狼戾其志乃延少而待老山陵不奔移殃為慶踐阼無賀按劍稱豫遂乃關馳逆書亭照妖火此而可賖孰不可宥今遣陳成叔彭文之等敢徑三萬前驅電耀吕安國任候伯桓崇祖曹虎頭等樓艦五萬騎射蛟中流茍元賔郭文孝程隱雋等輕舸二萬髙旌蔽日周盤龍張文嘉薛道淵等鐵馬五千龍驤後陳凡此諸帥莫不氣薄日月精變虹霓或飲羽石梁或超踰門樓索鐵拔距孤視萬旅顧盼則前後生風喑嗚則左右激電然鑾戎薄臨驍虎百萬六軍徐軌五輅遲斾丹艦發照素甲生波樓煩白羽投鞍成嶽漁陽黑騎浴鐵為雲于是髙山與深谷同湮紫芝與白艾同滅不亦惜乎符至之日幸加三省其驅逼冦手之人鋒陳塢壁之主若有投命軍門一無所問或能因罪立績賞不示私斬袪射袂唯功是與購募之科具列如上信如白水皎然無二臺明詳旨飛火普加宣下文書千里馳驛尚書符征西府討沈攸之攸之自江陵至沌口聞齊王世子據湓口不敢下因攻郢城時齊王輔政遣軍西討尚書符征西府尊冠賤屨君臣之位奉順忌逆成敗斯兆未有憑陵我郊圻侵軼我河縣而不焚師殪甲靡旗亂轍者也沈攸之少長庸賤擢自閭伍邀百戰之運乘一捷之功鐫山裂地腰金拖紫窮貴于國極富于家擁旄蕃伯便無北面之禮受督方屏即有專征之釁橘柚不薦璆瓉罕入箕賦深斂毒被南郢枉繩矯墨害著西荆叨餮其心溪壑其性從始至終沿壯得老今遂驅迫妖黨繕集尩卒結釁外城送死中甸此而可忍孰不可懷今遣新除使持節督郢州之義陽諸軍事平西將軍郢州刺史聞喜縣開國侯黃回員外散騎常侍冠軍驍騎將軍南臨淮太守重安縣開國子軍主王敬則輔國將軍屯騎校尉長夀縣開國男王宜與輔國將軍南髙平太守軍主陳承叔輔國將軍左軍將軍南濮陽太守葛陽縣開國男軍主彭文之龍驤將軍驃騎行參軍軍主召宰精甲二萬前鋒雲騰又遣散騎常侍領遊擊將軍湘南縣開國男新除使持節督湘州諸軍事征虜將軍湘州刺史軍主吕安國屯騎校尉寧朔將軍崔慧景輔國將軍軍主任候伯輔國將軍驍騎將軍軍主蕭順之輔國將軍遊擊將軍軍主垣崇祖寧朔將軍虎賁中郎將軍主尹略屯騎校尉南城令曹虎頭舳艫二萬駱驛繼邁又遣輔國將軍後軍將軍右軍中兵參軍事軍主茍元賔寧朔將軍撫軍中兵參軍事軍主郭文孝龍驤將軍撫軍中兵參軍事軍主程隱􅖿輕艓一萬截其津要新除持節督廣交越寧湘州之廣興諸軍事領平越中郎將征虜將軍廣州刺史統馬軍主沌陽縣開國子周盤龍輔國將軍後軍統馬軍主張文憘龍驤將軍軍主薛道淵冠軍將軍遊擊將軍并州刺史南清河太守太原公軍主王敕勤龍驤將軍射聲校尉王洪軌龍驤將軍冗從僕射軍主成置等鐵馬五千龍驤後陳凡此諸帥莫不勇力動天徑志駕日接衝拔距鷹瞵鶚視顧盼則前後風生喑嗚則左右電起以此攻城何城不克以此赴敵何陳能堅然後鑾戎薄臨龍虎百萬六軍齊軌五輅輸斾丹檻發照素甲生波樓煩白羽投鞍成嶽漁陽墨騎浴鐵為羣芝艾同焚悔將何及符到之日幸加三省其鋒陳營壁之主驅逼冦手之人若有投命軍門一無所問或能因罪立績終不爾欺斬裾射玦唯功是與能斬送攸之首封三千户縣公賜布絹各五千匹信如河海皎然無二飛火軍攝文書千里驛行慰勞雍州文皇帝謝鎮軍寧蠻二府雍州文武士庶等夫忠為令德或感槩殺軀信實美行或殉義蹈節而沈攸之小豎反覆稱逆西藩袁粲劉康潛使相扇遂擁據石頭並圖廟社粲康既從王憲蒼黎同慶攸之孤州蟻聚勢必燼滅刺史張敬義氣雲騰秣馬星驅全羽十萬殄兹氛鯨曾不旋踵彼州南陽白水將相遺風忠義之士霜戈電發但戎車暫動念原未寧冬寒卿皆無恙袁友人傳友人袁炳字叔明陳郡陽夏人其人天下之士幼有異才學無不覽文章俶儻清贍出一時任心觀書不為章句之學其篤行則信義惠和意罄如也常念蔭松柏詠詩書志氣跌宕不與俗人交俯眉暫仕厯國常侍員外郎府功曹臨湘令粟之入者悉散以贍親其為節也如此數百年未有此人焉至乃好妙賞文獨絶于世也又撰晉史竒功未遂不幸卒官春秋二十有八與余有青雲之交非直銜杯酒而已嗟乎斯才也斯命也天之報施善人何如哉何如哉建平王太妃周氏行狀竊聞侯服之譽非黃冠能敷王室之問寧皂衣所述諒畏褒虛美於君后被空名于鼎貴然有漢臣誄行晉史書德者亦云實而已焉伏見國太妃稟靈惟嶽集慶自逺世擅淮汝族冠疇代故以載曜聲書式炳縢牒矣太妃誕離明之正和涵雲露之中氣凝采齠嵗賁章筓年若乃彤管女圖之學纂組綺縞之工升降處謙之儀柔靜居順之節莫不中道若性不嚴而成故譽滿闈閥聲聞軒殿以元嘉某年歸于故司徒宣簡王既而第髙恆倫秩踰外品青軒華轂用光國輝素壁丹墀實隆家貴具惟姻娣靡不式瞻而居尊以簡訓卑以𢎞躬謹蘭閨身撝椒第若衛娥之炯行樊嬴之映操方之蔑如也大明二年宣簡王薨太妃藉悲用禮撫孤用慈柔懿之德愈彰肅敬之問日被雖文伯之母言不踰閾莒相之主行存乎勤無以過也大明某年拜建平王太妃是時今王春秋方富德業未降藉兹金響終能玉播故綺襦出宰弱冠升朝者亦太妃劬勞之訓也謂天蓋髙降年不永以太豫元年二月三日薨于荆州之內寢凡厥逺邇以哀以歎今祖行有期泉穸無逺素旗望路綵旌思歸所以垂宣徽容髣佛金石者謹詳牒行狀具以申言齊太祖髙皇帝誄日月鬱華風雲黯色傷動紫微悲匝璇極嗚呼哀哉粵夏四月辛卯將遷座于泰安陵龍鑾既整羽衛以陳深酸舊物掩咽故臣嗣皇帝永訣丹掖叫號青墀攀神光之一絶慟逺邇之何期弓劒有慕纂德寫辭僉曰若稽古聖璿圖靈鏡星樞發祥電光啓命誕惟弱齡惠志聰情如金如璧爰秀爰英於鑠冠嵗騰華流藝允文允武克明克睿聿尚登學嚴道遵師宣敷五禮優遊六詩上炫舊滯旁鏡前疑才罄艷采筆盡麗辭在支斯悌于親伊孝儉泰共色夷阻一貌逰情協矩縱心蹈教鄉術式慕州閭是效業優登仕先哲攸懋矧乃寥廓淵規邃構官府天地舟輿宇宙龍靜鳳戢斂竒掩秀昔在帝劉王室放命狡焉偽誕晦朔陵正鋒車北軼爟火南盛太祖時乘爰兹發迹塞井滅勳夷竈龕敵賞鏤王圖功㽔帝册乃厲中葉天未斂難兵百袁曹禍十楚漢吳地前崩越壤首亂街號耀盛火烈金斷聚甲如陵獻俘為觀北楚倔強曾未屈膝雲屯被野魚麗亘日廟勇既消國圖方匱神册天開雄略世出凶劒鱗沈醜戈羽逸隻騎不返踦輪無匹厥庸戾止離珮委他榮鬱閶闔寵重山河皇彛有文朝采方藹頻煩金紐左右緹蓋毗戎肅禁參輦侍斾譽馥區中道薆氓外河濟國險淮泗邦塵要藩重設匪賢則親亦既推轂擁土庇民聲稜絶俗威贍殊鄰宋主陵遐紫殿遏密話言之詔貽在英粹寅亮大寶敷綸妙祕世識機鑒物宗淵懿無敻匪練靡奧不洎三階既馴五精惟至彭蠡九江地盡襟製亦有劉範衣纓是絶躍馬山岫泛舟河澨縞鏑星流紅旗電結鴆翼競扇豺牙爭礪禍纒紫禁兵交丹衛瑶祀若旍金扆如綴朝野傾儀咸歸上德實賴至公瀉家提國懷險實泰襄危必克機簉朝旦功定曛黑妙物更配具章重則深居撝外遙棲綿默髙秩方臻元禮有序王曰念哉輝寵是與職褒宫閣任卷文武飾華麗貂縈金疊組宏猷溢俗曾芬冠古憬彼朱方亦惟宗秩陰圖食昴潛謀貫日征輪未誓偏旗銜律原燎既寂世囂伊謐爰崇爰貴以望以實鴈縣告靜象郡無虞杳鬱逺域清麗瓊都國填氓負朝委事虛實翳哲相嶽曜神居功美既損道富去益再紐契訓重匡禹迹方同范張濯情汾射散簪山郊解珮松石赬霞拂朝蒼煙懵夕韻屬玄經恩流金液靈厭霸德少帝告釁滅慈滅養抵仁抵信枉獄炎爐淫刑霜刃刲忠翦義樊稚斫櫬惵惵萬氓曰怨曰震妖霓將崩災裂昊蒼况乃鼎國資滌資匡臨朝闡命遏昏立綱事綿毗漢義締翼商既綏地職亦懋天工權輿典緯俾作司空黼黻雕戈祐宇升庸徒賜先衮爰永渥沖實曰驃騎卷迹辭功寰宇睦政畿甸綸風沈氏滔天勃逆舊楚氣蹂黃池志轢柏舉裂禮紊度毁經棄序黑騎黟山朱旗赬渚短兵接伍長鎩為羣皓如海岸矗似峰雲合乃霧激離則霰分荆國既軼郢縣方焚袁劉二戾猋起煒發聨謀制外儲兵內襲釁激瓊殿勢崩金闕志乘玄璽圖矯祕鉞鴻妖逝星髙祲棄月惟時諸侯上脫下競圖服淆蕩實綴仁聖輝耀國靈導揚主命曾規近晰深謨逺鏡左輪朱赭表裏斯定七德飾歌九功綷詠乃陟上鉉寵文方輝誕錫有秩綵吹旌旗贊政瑶光翊教太微實曰太傅爰登相國緝氓以禮綜祇以德景福咸湊芳猷允塞羽泳式造紘縣是則金湯無險軌書攸同迥迥寵迹窈窈睿功寶圭黛壤俾王于東絢册是敷懋物既崇設業設虡丹懸碧鏞於穆顯相黎元時雍氷洲炎徼來獻其賝鴈海龍關亦柔好音梁黿棧鼉越險浮深逺戎皆覲上靈必臨山吐石青野降蜜露瑞芝麗草珍柯爛樹人崩俗締玄緯幽數眷此妙德跂我王度簉滯炎旻既變至公萎蕤媯華文祖受命大宋有訓髙撝萬邦容豫慶雲遊衍南風正服寶位圓光玉繩御繡懷古負黼夙興邱礙必靜淵漪咸澄勛扆有作黔牖其義矜卑廣慈合賤兼愛綴機剟賊輕章削罰迹去繁侈情歸素一軒靡龍刻楹無丹密越賤申椒楚輟靈橘陵寢起邑池藻誰縣遙館罕御離房空薦惇教露宫淹神正殿斟酌信義左右律禮瑩彼皇維燁兹國體胄業既樹璧流方啓漢求金岫吳寶銅塹寧若睿德讓駟却劍實才為貴唯功是念火職咸允雲官亦熙既臯乃益匪稷伊夔無􅀈巡風寧俟辨詩玉燭調文金英最節乘山呈瑞航海歸闕不曠景册靡空嵗月受緯機衡兼甄書史孫韓合辨莊墨異理昭政往藹洗鑠前軌逍遙星斗徙倚涼雲春飇方舞秋鴻初分式謡式詠載績載文邈哉我后淪泳賢聖罄品作號盡物歸政蒼黎汰歡玄靈刷慶永戩嘉祉方寅景命締詳有文揚沛將掩理昧人詖道懸世險敻路遺圖忌華徇儉文暗陳几翌明告漸蜆僪鬬食日月朏精矧在乘輿宇折宙傾祲纒鸞掖悲赴紫扃去璇臺之照襲珠蠙之冥嗚呼哀哉帷宫低景輦路戲光惻柏門之黯黯泣松帳之茫茫上宫劈而詔御咽羣后慕而侍衛傷攢靈既儼逺日以筮鬱鬯既奠龍酹方撤素月夜橫翠煙曉結摐虛金而下欷吟空簫而增絶嗚呼哀哉于是颯天駕而從綺輿澀神行而撫文輦傍建春而南蹕徑宣陽而東踐尚葐蒀而未散乍眇默而不轉睇千乘之共啜盼萬騎之相泫悲魏后之戀譙惻漢主之懷沛辭金陵之匪義降雲陽之杳藹風竒響而駐軒煙異色而低斾怨街邑之綵驂弔原野之縞蓋挽夫愴而征馬凝痛縈盈其如帶嗚呼哀哉復林油雲重山減日御房清凄神路冥謐昭徒肅纛幽祇竦蹕攀光灑動臨泉澍泗璪座長嚴雕宫永閟寂帳寂兮寂已逺夜釭夜兮夜何邃嗚呼哀哉宋故尚書左丞孫緬墓志文光靈維周肇祀伊衛照分上代鏡華中世睿誕降明秀芳嗣烈學惟物範行實士節容與書林優逰史藝素巾俄冠朱紱纍轍來訪詩逸入詢禮缺麗名文質齊影儒哲慶履匪舒沴氣遽結殯帷兮既晦泉火兮己閉曖遺波于遙緒颯流馨于逺嵗宋故安成王右常侍劉喬墓志文丹陽韞聖豐鄉降賢玉葉既積金徽方傳乃育伊人克廣克宣騰芬中屬飛藻上年杳杳虛素永永沖關雲意霜拍瓊立氷堅家寶以瑩國才未甄參錯報善芒昧雲玄斂魂幽石委氣空山膚若流波身如絶煙芳菲一逝美懋徒鐫宋故銀青光祿大夫孫敻墓志文川祇效鏡嶽祥獻明碧葉獨秀瑶源自清幼炳器譽夙耀才名體兼遷雲學備儒史紫閣咸趨朱軒既履貴交慕塵素逰企軌騰藻上京振彩下國如彼緑蘭秉芬四塞欷人徑之不平歎天路之冥默貴夫君之為美播靈均與正則齊故御史中丞孫詵墓志文筠以霜藹蘭以風薰深哉若人實好斯文系緒承胄激花驚芬才基魏粲學參漢雲覽志上載洽鏡前聞騰名冠俗揚采絶羣方協明世式贊睿君如何不淑天道難分敢雕窆石永晣幽墳齊故司徒右長史檀超墓志文惟金有銑惟玉有瑶君實淵哉行為世標髙志灑落逸氣寂寥奧學內溢深文外昭嘉采籍譽登國振朝亦既有美筠傷蕙凋人邇運曠世促道遼永矣仁矣流芳無澆蕭驃騎祭石頭戰亡文咸告忠貞之魂曰義惟行首雄實士節嗟爾驍驚稟才蹈烈守玉不渝懷氷可折氣彰靡旗情激亂轍髙墉摧堅巨醜挫鋭深痛克矜寃靈及雪隆恩殊悼臨爾以欷千秋同盡百齡一世魂而有知咸無逺邇嗚呼哀哉蕭太傅東耕呪文敬呪先穡曰攝提方春黍稷未華灼爍發雲昭耀開霞地煦景曖山艷水波側聞農政實為民天競秬獻嵗務畎上年有淹疏潤興雨導泉崇耕巡索均逸共勞命彼倌人稅于青臯羽旗銜蕤雄戟耀毫呈典緇耦獻禮翠壇宜民宜稼克降祈年願靈之降解珮停鑾神之行兮氣為軷神之坐兮煙為蓋使嘉穀與玄鬯永爭光而無沫哉南齊文紀卷九
