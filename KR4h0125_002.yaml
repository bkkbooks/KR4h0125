body:
  text: 南齊文紀卷二明梅鼎祚編明帝名鸞字景栖髙帝兄始安貞王道生子封西昌侯廢鬱林海陵二王而自立在位五年廟曰髙宗建武元年即位詔皇齊受終建極握鏡臨宸神武重輝欽明懿鑠七百攸長磐石斯固而王度中蹇天階薦阻嗣命多違蕃舋孔棘宏圖景厯將墜諸淵宣德皇后逺鑒崇替憲章舊典疇咨台揆允定靈策用集寶命于豫一人猥以虛薄纘承大業仰繫鴻丕顧臨兆民永懷先構若履春氷寅憂夕惕罔識攸濟思與萬國播此惟新大赦天下改元宿衛身普轉一階其餘文武賜位二等逋租宿責換負官物在建武元年以前悉原除劫賊餘口在臺府者可悉原放負舋流徙並還本鄉符斷稅役詔建武元年頃守職之吏多違舊典存私害公實興民蠧今商旅稅石頭後渚及夫鹵借倩一皆停息所在凡厥公宜可即符斷主曹詳為其制憲司明加聽察斷任土恆貢詔建武元年邑宰祿薄俸微不足代耕雖任土作貢亦為勞費自今悉斷銓敘耆齒詔永明中御史中丞沈淵表百官年登七十皆令致仕並窮困私門髙宗建武元年詔曰日者百司耆齒許以自陳東西二省猶沾微俸辭事私庭榮祿兼謝興言愛老實有矜懷自縉紳年及可一遵永明七年以前銓敘之科申枉舉直詔建武元年上覽易遺下情難達是以甘棠見美肺石流詠自月一視黃辭如有含枉不申懷直未舉者蒞民之司並任厥失嚴課農桑詔建武二年食惟民天義髙姬載蠶實生本教重軒經前哲盛範後王茂則布令審端咸必由之朕肅扆巖廊思引風訓深務八政永鑒在勤靜言日昃無忘寢興守宰親民之主牧伯調俗之司宜嚴課農桑罔令遊惰揆景肆力必窮地利固修隄防考校殿最若耕蠶殊衆具以名聞遊怠害業即便列奏主者詳為條格罷東田諸役詔建武二年軌世去奢事殷哲后訓物以儉理鏡前王朕屬流弊之末襲澆浮之季雖恭巳𢎞化刻意隆平而禮讓未興侈華猶競水覽玄風兢言集愧思所以還淳改俗反古移民可罷東田毁興光樓并詔水衡量省御乘修晉帝諸陵詔建武二年舊國都邑望之悵然况乃自經南面負扆宸居或功濟當時德覃一世而塋壠攢穢封樹不修豈直嗟深牧豎悲甚信陵而巳哉昔中京淪覆鼎玉東遷晉元締構伊始簡文遺詠在民而松門夷替埏路榛蕪雖年代殊往撫事興懷晉帝諸陵悉加修理并增守衛學斆詔建武四年嘉肴停爼定芳旨於必甘良玉在攻表圭璋於既就是以陶鈞萬品務本為先經緯九區學斆為大往因時康崇建庠序屯虞荐有權從省廢謳誦寂寥倐移年稔永言古昔無忘旰昃今華夏乂安要荒慕嚮締修東序實允適時便可式依舊章廣延國胄𢎞敷景業光被後昆孔聖祀典詔永泰元年仲尼明聖在躬允光上哲𢎞厥雅道大訓生民師範百王軌儀千載立人斯仰忠孝攸出玄功潛被至德彌闡雖反袂遐曠而祧薦靡闕時祭舊品秩比諸侯頃歲以來祀典陵替爼豆寂寥牲奠莫舉豈所以克昭盛烈永隆風教者哉可式循舊典詳復祭秩使牢餼備禮欽饗兼申誅王敬則詔敬則為會稽太守厯進大司馬明帝既多殺害敬則自以髙武舊臣心懷憂恐帝亦內相疑備諸子在都密以情告徐州行事謝朓為訃朓執使馳啓敬則聞之乃起兵反戰敗斬首諸子皆於宅賜死謝朓啓事騰徐嶽列如右王敬則稟質凶猾本謝人綱直以宋季多艱頗有膐力之用驅奬所至遂升崇顯皇運肇基預聞末議功非匡國賞實震主爵冠執圭身登衣衮固己風雅作刺縉紳側目而溪谷易盈鴟梟難改猜心內駭醜辭外布永明之朝履霜有漸隆昌之世堅氷將著從容附會朕有力焉及景厯惟新推誠盡禮中使相望軒冕成隂乃嫌迹愈興禍圗兹構收合亡命結黨聚羣外候邉警內伺國隙元遷兄弟中萃淵藪姦契潛通將謀竊發朓即姻家嶽又邑子取據匪他昭然巳信方召之美未聞韓彭之舋已積此而可容孰寄刑典便可即遣收掩肅明國憲大辟所加其父子而巳凡諸詿誤一從蕩滌遣陳顯達北討詔虜頻冦雍州衆軍不捷失沔北五郡永泰元年遣顯達北討于南鄉奔敗御史中丞范岫奏免顯達官朝議不許優詔答之晉氏中微宋德將謝蕃臣外叛要荒內侮天未悔禍左衽亂華巢穴神州逆移年載朕嗣膺景業踵武前王靜言隆替思乂區夏但多難甫夷恩化肇洽興師擾衆非政所先用戢逺圗權緩北略冀戎夷知義懷我好音而凶醜剽狡專事侵掠驅扇異類蟻聚西偏乘彼自來之資撫其天亡之會軍無再駕民不重勞傳檄以定三秦一麾而臣禹迹在此舉矣且中原士庶久望皇威乞師請援結軌馳道信不可失時豈終朝宜分命方嶽因兹大號侍中太尉顯達可暫輟槐隂指授羣帥答奏陳顯達詔昔衛霍出塞往往無功馮鄧入關有時虧喪况公規謨肅舉期寄兼深見可知難無損威略方振逺圗廓清朔土雖執憲有常非所得議誅王晏詔晏性便辟甚為太祖所親重遺詔以尚書事付晏隆昌元年髙宗廢鬱林晏即推奉以功轉尚書令封曲江縣侯然髙宗心實猜薄晏及即位有告晏謀反者云於南郊道中竊發乃召晏於華林省誅之下詔晏閭閻凡伍少無特操階緣人乏班齒官途世祖在蕃搜揚擢用棄略疵瑕遂升要重而輕跳險鋭在貴彌著猜忌反覆觸情多端故以兩宫所不容十手所共指既內愧于心外懼憲牘掩迹陳疴多厯年載頻授蕃任輒辭請不行事似謙虛情實詭伏隆昌以來運集艱難匡贊之功頗有心力乃爵冠通侯位登元輔綢繆恩寄朝莫均焉溪壑可盈無厭將及視天畫地遂懷異圗廣求卜相取信巫覡論薦黨附遍滿臺府令大息德元淵藪亡命同惡相濟劍客成羣弟詡凶愚逺相唇齒信驛往來密通要契去歲之初奉朝鮮于文粲備告姦謀朕以信必由中義無與二推誠委任覬能悛改而長惡易流搆扇彌大與北中郎司馬蕭毅臺隊主劉明達等尅期竊發以河東王鉉識用微弱可為其主得志之日當守以虛器明達諸辭炳然具存昔漢后以反脣致討魏臣以虬鬚為戮况無君之心既彰陵上之迹斯著此而可容誰置刑辟並可收付廷尉肅明國典誅蕭諶詔諶世祖時轉左中郎將密事皆使參掌鬱林即位又深委信諶附髙宗勸行廢立髙宗初許事克用為揚州及即位轉南徐州諶甚恚怨建武二年賜死蕭諶擢自凡庸識用輕險因藉幸會早預驅馳永明之季曲頒恩紀鬱林昏悖頗立誠效寵靈優渥期遇兼隆內總戎柄外暢蕃威兄弟榮貴震灼朝野曾不感佩殊荷少答萬一自以勳髙伊霍事均難賞才冠當時耻居物後矯制王權與奪由巳空懷疑懼坐構嫌猜覘候宫掖希覬非望蔽上罔下之心誣君不臣之迹固以彰暴民聽喧䀨遐邇遂潛散金帛招集不逞交結禁衛互為脣齒密契戚邸將肆姦逆朕以其任寄既重爵列河山每加彌縫𢎞以大信庶能懷音翻然悛改而豺狼其性凶謀滋甚夫無將必戮陽秋明義况舋積禍盈若斯之大可收付廷尉速正刑書罪止元惡餘無所問江斆讓賻詔斆領晉安王師卒遺令儉約不受賻贈詔賻錢三萬布百匹子蒨啓讓不受斆貽厥之訓送終以儉立言歸善益有嘉傷可從所請手詔王思逺顧皓之字士明吳人有義行為安西咨議兼著作與思逺並屬文章建武初以疾歸髙宗手詔與思逺此人殊可惜賜謝朏詔朏為吳興太守建武四年詔徵為侍中中書令抗表不應築室郡之西郭明帝下詔夫超然榮觀風流自逺蹈彼幽人英華罕值故長揖楚相見稱南國高謝漢臣取貴良史新除侍中中書令朏早藉羽儀夙摽清尚登朝樹績出守馳聲遂斂迹康衢拂衣林沚抱箕潁之餘芳甘憔悴而無悶撫事懷人載留欽想宜加優禮用旌素槩可賜牀帳褥席俸以卿祿常出在所梁書贈仇池公楊元秀詔仇池公楊元秀氐王苖胤乃心忠勇醜虜凶逼血誠彌厲宣播朝威招誘戎種萬里齊契響然歸從誠效顯著實有可嘉不幸殞喪悽愴于懷夫死事加恩陽秋明義宜追覃榮典以𢎞勸奬贈仇池公氐王楊馥之為仇池公詔氐王楊馥之世纂忠義率厲部曲樹績邉城克殄姦醜復內稟朝律外撫戎荒欵心世昭朕甚嘉之以為持節督北秦雍二州諸軍事輔國將軍平羌校尉北秦州刺史仇池公沙州刺史遺詔徐令可重申八命中書監本官悉如故沈文季可左僕射常侍護軍如故江祏可右僕射江祀可侍中劉暄可衛尉軍政大事委陳太尉內外衆事無大小委徐孝嗣遙光坦之江祏其大事與沈文季江祀劉暄參懷心膂之任可委劉悛蕭惠休崔慧景敇傅昭昭字茂逺北地靈州人入梁厯散騎常侍明帝踐阼引昭為中書通事舍人時居此職皆勢傾天下昭獨亷靖器物率陋身安粗糲常插燭於版牀明帝賜漆合燭盤等敇曰卿有古人之風故賜卿古人之物梁書東昏侯名寶卷字智藏明帝第二子立三年為蕭衍所廢尋弒之誅徐孝嗣沈文季詔孝嗣受髙宗遺託為中書監永元初輔政東昏失德將圗廢立而遲疑不決羣小言於上召入華林省同左僕射沈文季賜死周德方熙三監迷叛漢厯載昌宰臣搆戾皆身膏斧鉞族同煙燼殷鑒上代垂戒後昆徐孝嗣慿藉世資早蒙殊遇階緣際會遂登台鉉匡翼之誠無聞諂黷之迹屢著沈文季門世後缺和帝名寶融字智昭明帝第八子蕭衍立在位二年禪于梁舉義覃惠教帝初封隨郡王改封南康王為荆州刺史永元二年冬長史蕭穎胄奉雍州刺史蕭衍舉義討東昏侯教纂嚴又教吾躬率晉陽剪此凶孽戎事方勤宜覃澤惠所領內繫囚見徒罪無輕重殊死以下皆原遣先有位署即復本職將吏轉一階從征身有家口停鎮給廩食凡諸雜役見在諸軍帶甲之身克定之後悉免為民其功效賞報别有科條普除東征衆軍詔中興元年四月荆雍義舉所基實始王迹君子勞心細人盡力宜加酬奬副其乃誠凡東討衆軍及諸嚮義之衆可普復除並南齊書巴陵王寶義為太尉領司徒詔云不言之化形于自逺宣德王太后名寶明琅邪臨沂人文惠太子妃鬱林即位尊為皇太后至梁天監中薨隆昌元年七月令太孫即位明帝為新安王輔政相疑異遂矯太后令廢帝為鬱林王而立海陵明帝既弒鬱林須太后令徐孝嗣於袖中出而奏之見本傳鎮軍車騎左僕射前將軍領軍左衛衛尉八座自我皇厯啓基受終于宋睿聖繼軌三葉重光太祖以神武創業草昧區夏武皇以英明提極經緯天人文帝以上哲之資體元良之重雖功未被物而德已在民三靈之眷方永七百之基已固嗣主特鍾沴氣爰表弱齡險戾著于緑車愚固彰于宗正狗馬是好酒色方湎所務惟鄙事所疾唯善人世祖慈愛曲深每加容掩兾年志稍改立守神器自入纂鴻業長惡滋甚居喪無一日之哀縗絰為歡宴之服昏酣長夜萬機斯壅發號施令莫知所從閹竪徐龍駒專總樞密奉叔珍之互執權柄自以為任得其人表裏緝穆邁蕭曹而愈信布倚太山而坐平原于是恣情肆意罔顧天顯二帝姬嬪並充寵御兩宫遺服皆納玩府內外混漫男女無别丹屏之北為酤鬻之所青蒲之上開桑中之肆又微服潛行信次忘反端委以朝虛位交戟而守空宫積旬矣宰輔忠賢盡誠奉主誅鋤羣小兾能悛革曾無克巳更深怨憾公卿股肱以異已置戮文武昭穆以德譽見猜放肆醜言將行屠膾社稷危殆有過綴旒昔太宗克光於漢世簡文代興于晉氏前事之不忘後人之師也鎮軍居正體道家國是賴伊霍之舉實寄淵謨便可詳依舊典以禮廢黜中軍將軍新安王體自文皇睿德天秀宜人嗣鴻業永寧四海外即以禮奉迎未亡人屬此多難投筆增慨延興元年十月令明帝進封宣城王又矯太后令廢帝為海陵王而自立司空後將軍丹陽尹右僕射中領軍八座夫明晦迭來屯平代有上靈所以眷命億兆所以歸懷自皇家淳耀列聖繼軌諸侯官方百神受職而殷憂時啓多難荐臻隆昌失德特紊人鬼非徒四海解體乃亦九鼎將移賴天縱英輔大匡社稷崩基重造墜典再興嗣主幼沖庶政多昧且早嬰尫疾弗克負荷所以宗正內侮戚藩外叛覘天視地人各有心雖三祖之德在民而七廟之危行及自非樹以長君鎮以淵器未允天人之望寧息姦宄之謀太傅宣城王胤體宣皇鍾慈太祖識冠生民功髙造物符表夙著謳頌有在宜入承寶命式寧宗祏帝可降封海陵王吾當歸老别館昔宣帝中興漢室簡文重延晉祀庶我鴻基於兹永固言念家國感慶載懷廢東昏侯令東昏即位淫虐不道梁髙祖蕭衍為雍州刺史以誅梅蟲兒茹法珍為名移檄京邑兼衛尉張稷等斬東昏首送衍太后令廢為東昏侯依漢海昏侯故事皇室受終祖宗齊聖太祖高皇帝肇基駿命膺籙受圗世祖武皇帝係明下武高宗明皇帝重隆景業咸降年不永宫車早晏皇祚之重允屬儲元而稟質凶愚發于稚齒爰自保姆迄至成童忍戾昏頑觸途必著髙宗留心正嫡立嫡惟長輔以羣才間以賢戚內外維持兾免多難未及期稔便逞屠戮密戚近親元勳良輔覆族殲門旬月相係凡所任仗盡慝窮姦皆營伍屠販容狀險醜身秉朝權手斷國命誅戮無辜納其財産睚眥之間屠覆比屋身居元首好是賤事危冠短服坐卧以之晨出夜反無復已極驅斥氓庶巷無居人老細奔遑置身無所東邁西屏北出南驅負疾輿尸填街塞陌興築繕造日夜不窮晨搆夕毁朝穿暮塞絡以隋珠方斯已陋飾以璧璫曽何足道時暑赫曦流金鑠石移竹藝果匪日伊夜根未及植葉已先枯畚鍤紛紜勤倦無巳散費國儲専事浮飾逼奪民財自近及逺兆庶恇恇流竄道路府帑既竭肆奪市道工商稗販行號道泣屈此萬乘躬事角抵昻首翹肩逞能橦木觀者如堵曾無怍容芳樂華林並立闤闠踞肆鼓刀手銓輕重干戈鼓譟昏曉靡息無戎而城豈足云譬至于居喪淫宴之愆三年載弄之醜反道違常之舋牝雞晨鳴之慝於事已細故可得而略也罄楚越之竹未足以言校辛癸之君豈或能匹征東將軍忠武奮發投袂萬里光奉明聖翊成中興乘勝席捲掃清京邑而羣小靡識嬰城自固緩戮稽誅倐彌旬月宜速剿定寧我邦家可潛遣間介密宣此旨忠勇齊奮遄加蕩撲放斥昏凶衛送外第未亡人不幸驟此百罹感念存沒心焉如割奈何奈何南康王改封宣城王相國令永元二年冬蕭衍奉王起義稱太后令明年即帝位是為和帝西中郎將南康王宜纂承皇祚光臨億兆方俟清宫未即大號可且封宣城南琅邪南東海東陽臨海新安尋陽南郡竟陵宜都十郡為宣城王相國荆州牧加黃鉞置僚屬選百官西中郎府南康國並如故須軍次近路主者詳依舊典法駕奉迎並南齊書文惠太子長懋字雲喬世祖長子疾篤上世祖表臣地屬元良業微三善光道樹風於焉蓋闕晨宵忷懼有若臨淵攝生舛和構離痾疾大漸惟幾顧隂待謝守器難永視膳長違仰戀慈顔內懷感哽竊惟死生定分理不足悲伏願割無巳之悼損既往之傷寶衛聖躬同休七百臣雖沒九泉無所遺恨豫章王嶷字宣儼髙帝第二子武帝同母弟厯大司馬揚州刺史中書監手啓武帝永明元年嶷領太子太傅手啓上上答之陛下以睿孝纂業萬宇維新諸弟有序臣屢荷隆愛叨授台首不敢固辭俯仰祗寵心魂如失負重量力古今同規臣窮生如浮質操空素任居鼎右巳移氣序自頃以來宿疾稍纒心慮恍惚表于容狀視此根候常恐命不勝恩加以星緯屢見災祥雖修短有恆能不耿介比心欲從俗啓解今職但措辭為鄙或貽物誚所以息意緘默一委時運而可復加寵榮增其顛墜且儲傅之重實非恆選遂使太子見臣必束帶宫臣皆再拜二三之宜何以當此陛下同生十餘今惟臣而已友于之愛豈當獨臣鍾其隆遇别奉啓事仰祈恩照臣近亦侍言太子告意子良具因王儉申啓未知粗上聞未福慶方隆國祚永始若天假臣年得預人位惟當請降貂璫以飾微軀永侍天顔以惟畢世此臣之願也服之不衷猶為身災况寵爵乎殊榮厚恩必誓以命請武帝答事中恐不得從所陳上論州郡秩俸表宋代以來州郡秩俸及供給隨上所出無有定準嶷上表從之循革貴宜損益資用治在夙均政由一典伏尋郡縣長尉俸祿之制雖有定科而其餘資給復由風俗東北異源西南各緒習以為常因而弗變緩之則莫非通規澄之則靡不入罪殊非約法明章先令後刑之謂也臣謂宜使所在各條公用公田秩俸迎送舊典之外守宰相承有何供調尚書精加洗核務令優衷事在可通隨宜開許損公侵民一皆止却明立定格班下四方永為恆制又啓宋元嘉世諸王入齋閣得白服裙帽見人主惟出太極四廂乃備朝服自比以來此事一斷上與嶷同生相友睦宫內曲宴許依元嘉嶷固辭不奉敇惟車駕幸第乃白服烏紗帽以侍宴焉啓自陳上上答之臣自還朝便省儀刀捉刀左右十餘亦省惟郊外逺行或復暫有入殿亦省服身今所牽仗二俠轂二白直共七八十人事無大小臣必欲上啓伏度聖心脫未委曲或有言其多少不附事實仰希即賜垂敇又啓揚州刺史舊有六白領合扇二百拂臣脫以為疑不審此當云何行園苑中乘輿出籬門外乘輿鳴角皆相仍如此非止於帶神州者未審此當云何方有行來不可失衷武帝答儀刀捉刀不應省也俠轂白直乃可共百四五十以還正是耳亦不曾聞人道此吾自不使諸王無仗况復汝耶在私園苑中乘此非疑郊外鳴角及合扇并拂先乃有不復施用此來甚久凡在鎮自異還京師先廣州乃立鼓吹交部遂有輦事隨時而改亦復有可得依舊者汝若有疑可與王儉諸人量衷但令人臣之儀無失便行也又啓臣拙知自處暗於疑訪常見素姓扶詔或著布屩不意為異臣在西朝拜王儀飾悉依宋武陵王例有二鄣扇仍此下都脫不為疑小兒奴子並靑布袴衫臣齋中亦有一人意謂外庶所服不疑與羊車相類曲荷慈旨今悉改易臣昔在邉鎮不無羽衛自歸朝以來便相分遣俠轂白直格置三百許人臣頃所引不過一百常謂京師諸王不煩牽仗若郊外逺行此所不論有仗者非臣一人所以不容方幅啓省又因王儉備宣下情臣出入榮顯禮容優泰第宇華曠事乖素約雖宋之遺制恩處有在猶深非服之慙威衛之請仰希曲照武帝又答傳詔臺家人耳不足涉嫌鄣扇吾識及以來未見故有敇耳小兒奴子本非嫌也吾有所聞豈容不敇汝知令致物議耶吾已有敇汝一人不省俠轂但牽之吾昨不通仗事儉已道吾即令答不煩有此啓須間言自更一二又啓違逺侍宴將踰一紀憂苦間之始得開顔近頻侍坐不勝悲喜沾飲過量實欲仰示恩狎令自下知見以杜遊塵陛下留恩子弟此情何異外物政自強生間節聲其厚薄伏度或未上簡臣前在東田承恩過醉實思歎往秋之謗故言啓至切亦令羣物聞之伏願已照此心前侍幸順之宅臣依常乘車至仗後監伺不能示臣可否便互競啓間云臣車逼突黃屋麾旄如欲相中推此用意亦何容易仰賴慈明即賜垂敇不爾臣終不知暗貽此纍比日禁斷整密此自常理外聲乃云起臣在華林輒捉御刀因此更嚴度情推理必不容爾為復上啓知耳但風塵易至和會實難伏願猶憶臣石頭所啓無生間縫比間侍無次略附茹亮口宣臣由來華素已具上簡每欲存衷意慮不周或有乖常且臣五十之年為玩幾時為此亦復不能以理內自制北第舊邸本自甚華臣改修正而巳小小製置巳自仰簡往歲收合得少雜材并蒙賜故板啓榮內許作小眠齋始欲成就皆補接為辨無乖格製要是柳柏之華一時新淨東府又有齋亦為華屋而臣頓有二處住止下情竊所未安訊訪東宫玄圃乃有柏屋製甚古拙內中無此齋臣乃欲壞取以奉太子非但失之於前且補接既多不可見移亦恐外物或為異論不審可有垂許送東府齋理否臣公家住止率爾可安臣之今啓實無意識亦無言者太子亦不知臣有此屋政以東宫無而臣自處之體不宜爾爾所啓蒙允臣便當敢成第屋安之不疑陛下若不照體臣心便當永廢不修臣自謂今啓非但是自處宜然實為微臣往事伏願必垂降許伏見以諸王舉貨屢降嚴旨少拙營生已應上簡府州郡邸舍非臣私有今巨細所資皆是公潤臣私纍不少未知將來罷州之後或當不能不試學營覓以自贍連年惡疾餘顧影單回無事畜聚惟逐手為樂耳武帝答白澤文惠太子小字茹亮今啓汝所懷及見别紙汝勞疾亦復那得不動何意為作煩長啓事凡諸普敇此意可尋當不關汝一人也宜有敇事吾亦必道頃見汝自更委悉書不欲多及屋事慎勿強厝此意白澤亦當不解何意爾又啓永明四年唐宇之賊起嶷啓上上答之此段小冦出於凶愚天網宏軍理不足論但聖明御世幸可不爾比藉聲聽皆云有由而然但頃小大士庶每以小利奉公不顧所損者大撻籍檢功巧督恤簡小塘藏丁匿口凡諸條制實長怨府此目前交利非天下大計一室之中尚不可精宇宙之內何可周視公家何嘗不知民多巧古今政以不可細碎故不為此實非乖理但識理者百不有一陛下弟兄大臣猶不皆能伏理况復天下悠悠萬品怨積聚黨凶迷相類止於一處何足不除脫復多所便成紛紜久欲上啓間侍無因謹陳愚管伏願特留神思紛紜南史作紜紜武帝答欺巧那可容宋氏混亂以為是不蚊蟻何足為憂已為義勇所破官軍昨至今都應散滅吾政恨其不辨大耳亦何時無亡命耶臨終啓武帝永明十年嶷疾篤表解職不許賜錢百萬營功嶷又啓曰臣自嬰今患亟降天臨醫走術官泉開藏府慈寵優渥備極人臣生年疾迫遽隂無幾願陛下審賢與善極夀蒼昊疆德納和為億兆御世命違昌數奄奪恩憐長辭明世伏涕嗚咽與沙州刺史楊廣香書廣香本氐王楊難當族弟先奔虜為隂平公難當從兄子文𢎞宋末授武平王仇池公齊太祖即位詔廣香為沙州刺史及梁州刺史范柏年被誅其親將李烏奴奔文𢎞攻梁州為刺史王玄邈所破嶷時為荆州遣兵討烏奴與廣香書文𢎞歸降復以為北秦州刺史夫廢興無謬逆順有恆古今共貫賢愚同察梁州刺史范柏年懷挾詭態首鼠兩端既已被伐盤桓稽命遂潛遣李烏奴叛楊文𢎞扇誘邉疆荒雜柏年今已梟禽烏奴頻被摧破計其餘燼行自消夷今遣參軍行晉夀太守王道寶參軍事行北巴西新巴二郡太守任湜之行宕渠太守王安會領鋭卒三千遄塗風邁浮川電掩又命輔國將軍三巴校尉明惠照巴郡太守魯休烈南巴西太守栁𢎞稱益州刺史傳琰並簡徒競騖選甲爭馳雍州水步行次魏興并山東僑舊會於南鄭或泛舟墊江或飛旍劒道腹背飇騰表裏震擊文𢎞容納叛戾專為淵藪外侮皇威內陵國族君奕世忠欵深識理順想即起義應接大軍共為犄角討滅烏奴剋建忠勤茂立誠節沈攸之資十年之積權百旅之衆師出境而城潰兵未戰而自屠朝廷無遺鏃之費士民靡傷痍之弊况蕞爾小竪方之蔑如其取殱殄豈延漏刻忝以寡昧分陜司蕃清氛蕩穢諒惟任職此府器械山積戈旗林聳士卒剽徑蓄鋭積威除難剿冦豈俟徴集但以剪伐萌菌弗勞洪斧撲彼蚊蚋無假多力皇上聖哲應期恩澤廣被罪止首惡餘無所問賞罰之科具寫如别南齊書竟陵王子良字雲英武帝第二子厯司徒進太傅陳高帝言臺使子良宋升明中為會稽太守宋世皆責成郡縣孝武徴求急速始遣臺使公役勞擾及太祖踐阼子良陳之前臺使督逋切調恆聞相望於道及臣至郡亦殊不疏凡此輩使人既非詳慎勤順或貪險﨑嶇要求此役朝辭禁門情態即異暮宿村縣威福便行但令朱鼓裁完鈹槊微具顧盼左右叱吒自專擲宗斷族排輕斥重脅遏津埭恐喝傳郵破岡水逆商旅半引逼令到下先過已船浙江風猛公私畏渡脫舫在前驅令俱發呵蹙行民固其常理侮折守宰出變無窮既瞻郭望境便飛下嚴符但稱行臺未顯所督先訶強寺却攝羣曹開亭正榻便振荆革其次絳標寸紙一日數至徴村切里俄刻十催四鄉所召莫辨枉直孩老士庶具令付獄或尺布之逋曲以當匹百錢餘稅且增為千或誰應質作尚方寄繫東冶萬姓駭迫人不自固遂漂衣敗力競致兼漿值今夕酒諧肉飫即許附申赦格明日禮輕貨薄便復不入恩科筐貢微闕箠撻肆情風塵毁謗隨忿而發及其豚蒜轉積鵝粟漸盈逺則分鬻他境近則託貿吏民反請郡邑助民由緩回刺言臺推信在所如聞頃者令長守牧離此每實非復近歲愚謂凡諸檢課宜停遣使密畿州郡則指賜敇遙外鎮宰明下條源既各奉别旨人競自罄雖復臺使盈湊會取正屬所徒相疑僨反更淹懈凡預衣冠荷恩盛世多以暗緩貽愆少為欺猾入罪若類以宰牧乖政則觸事難委不容課逋上綱偏覺非才但賒促差降各限一期如乃事速應緩自依違糾坐之坐之之科不必須重但令不行期在可速且兩裝之船充擬千緒三坊寡役呼訂萬計每一事之發彌晨方辦粗計近逺率遣一部職散人領無減二十舟船所資皆復稱是長江萬里費固倍之較略一年脫得省者息船優役實為不少兼折姦減竊逺近暫安杜氏通典表云宋文帝元嘉中皆責成郡縣孝武徵求急速以郡縣遲緩始遣臺使自此公役勞擾凡此之輩云云上高帝墾田表時為丹陽尹開私倉賑屬縣貧民建元三年上表內之會遷官事寢京尹雖居都邑而境壤兼跨廣袤周輪幾將千里縈原抱隰其處甚多舊遏古塘非唯一所而民貧業廢地利久蕪近啓遣五官殷濔典籖劉僧瑗到諸縣循履得丹陽溧陽永世等四縣解并村耆辭列堪墾之田合計荒熟有八千五百五十四頃修治塘遏可用十一萬八千餘夫一春就功便可成立上讜言表臣聞明臺既闢承雲之歌闡衢室爰啓南風之頌流莫非降道爝輝紆靈浸澤陛下凝慶協圗席昌屬厯乾臨冬曖海鏡春亭選議鈞俗觀風調紀垂聽革之典降聆金之訓用能詩史無輟工頌有聞是故置四輔立七諫正國度針王闕臣謂當今宜崇諫司專事昭塞職蹈謇諤績宣王化則優其寵秩厚其節禮庶獻鮮之美方髙聖代至乃靡衣偷食曾宇雕墉商貨浮侈田萊蕪替棫朴爽流摽梅失序勉民觀俗之宜設官立事之要隨間興規衮廢能補如此則壤詠無逺轅樂可追上武帝論會土塘役啓王敬則為會稽太守會土邉帶湖海民丁無士庶皆保塘役敬則以工力有餘悉評斂為錢送臺庫以為便宜上許之永明二年子良領司徒上表上不納伏尋三吳內地國之關輔百度所資民庶雕流日有困殆蠶農罕獲飢寒尤甚富者稍增其饒貧者轉鍾其弊可為痛心難以辭盡頃錢貴物賤殆欲兼倍凡在觸類莫不如兹稼穡難劬斛值數倍今機杼勤苦匹裁三百所以然者實亦有由年常歲調既有定期僮恤所上咸是見直民間錢多剪鑿鮮復完者公家所受必須員大以兩代一困於所貿鞭捶質繫益致無聊臣昔忝會稽粗間物俗塘丁所上本不入官良由陂湖宜壅橋路須通均夫訂直民自為用若甲分毁壞則年一修改若乙限堅完則終歲無役今郡通課此直悉以還臺租賦之外更生一調致令塘路崩蕪湖源泄散害民損政實此為劇建元初狡虜遊魂軍用殷廣浙東五郡丁稅一千乃有質賣妻兒以充此限道路愁窮不可聞見所逋尚多收上事絶臣登具啓聞即蒙蠲原而此年租課三分逋一明知徒足擾民實自弊國愚謂塘丁一條宜還復舊在所逋恤優量原除凡應受錢不限大小仍令在所折市布帛若民有雜物是軍國所須者聽隨價準直不必一應送錢于公不虧其用在私實荷其渥昔晉氏初遷江左草創絹帛所直十倍於今賦調多少因時增減永初中官布一匹直錢一千而民間所輸聽為九百漸及元嘉物價轉賤私貨則束直六千官受則匹準五百所以每欲優民必為降落今入官好布匹堪百餘其四民所送猶依舊制昔為損上今為刻下氓庶空儉豈不由之救民拯弊莫過減賦時和歲稔尚爾虛乏儻值水旱寧可熟念且西京熾強實基三輔東都全固實賴三河厯代所同古今一揆石頭以外裁足自供府州方山以東深關朝廷根本夫股肱要重不可不恤宜蒙寬政少加優養略其目前小利取其長久大益無患民資不殷國財不阜也宗臣重寄咸云利國竊如愚管未見可安密啓武帝時武帝新親政水旱不時子良為侍中兼司徒密啓臣思水潦成患良田沃壤變為汙澤農政告祥因髙肆務播殖既周繼以旱虐黔庶呼嗟相視褫氣夫國資于民民資于食匪食匪民何以能政臣每一念此寢不便席本始中郡國大旱宣帝下詔除民租今聞所在逋餘尚多守宰嚴期兼夜課切新稅力尚無從故調于何取給政當相驅為盜耳愚謂逋租宜皆原除少降停恩微紓民命自宋道無章王風陵替竊官假號駢門連室今左民所檢動以萬數漸漬之來非復始適一朝洗正理致沸騰小人之心罔思前恩董之以威反怨後罰獸窮則觸事在匪輕齊有天下日淺恩洽未布一方或飢當加優飬愚謂自可依源削除未宜便充猥役且部曹檢校誠存精密令史姦黠鮮不容情情既有私理或枉謬耳目有限羣狡無極變易是非居然可見詳而後取於事未遲明詔深矜獄圄恩文纍墜今科網嚴重稱為峻察負罪離愆充積牢戶暑時鬱蒸加以金鐵聚憂之氣足感天和民之多怨非國福矣頃土木之務甚為殷廣雖役未及民勤費已積炎旱致災或由於此皇明載逺書軌未一緣淮帶江數州地耳以魏方漢猶一郡之譬以今比古復為逺矣何得不愛其民緩其政救其危存其命哉湘區奧密蠻冦熾強如聞南師未能挫戮百姓齊民積年塗炭疽食侵淫邉虞方重交州敻絶一垂實惟荒服恃逺後賔固亦恆事自靑德啓運欵關受職置之度外不足絓言今縣軍逺伐經途萬里衆寡事殊客主勢異以逸待勞全勝難必又緣道調兵以足軍力民丁烏合事乖習鋭廣州積歲無年越州兵糧素乏加以發借必致恇擾愚謂叔獻所請不宜聽從取亂侮亡更俟後會雖緩歲月必有可禽之理差息發動費役之勞劉楷見甲以助湘中威力既舉蟻冦自服又啓武帝詔折租布二分取錢子良又啓臣一月入朝六登文陛廣殿稠人裁奉顔色縱有所懷豈敢自達比天眚亟見地孽亟臻民下妖訛好生噂􅊱穀價雖和比室飢嗛縑纊雖賤駢門裸質臣一念此每入心骨三吳奧區地惟河輔百度所資罕不自出宜在蠲優使其全富而守宰相繼務在裒剋圍桑品屋以準資課致令斬樹發瓦以充重賦破民財産要利一時東郡使民年無常限在所相承準令上直每至州臺使命切求懸急應充猥役必由窮困乃有畏失嚴期自殘軀命亦有斬絶手足以避徭役生育弗起殆為恆事守長不務先富民而惟言益國豈有民貧於下而國富於上耶又泉鑄歲逺類多翦鑿江東大錢十不一在公家所受必須輪郭完全遂買本一千加子七百猶求請無地捶革相驅尋完者為用既不兼兩回復遷貿會非委積徒令小民每嬰困苦且錢帛相半為制永久或聞長宰須令輸直進違舊科退容姦利八屬近縣既在京畿發借徵調實煩他邑民特尤貧連年失稔草衣藿食稍有流亡今農政就興宜蒙賑給若逋課未上許以申原兗豫二藩雖曰舊鎮往屬兵虞纍棄鄉土密邇冦庭下無安志編草結菴不違涼暑扶淮聚洛靡有生向俱稟人靈獨絶溫飽而賦斂多少尚均沃實謂凡在荒民應加蠲減又司市之要自昔所難頃來此役不由才舉並條其重資許以賈衒前人增估求俠後人加稅請代如此輪回終何紀極兼復交關津要共相脣齒愚野未間必加陵誑罪無大小橫沒資載凡求試穀帛類非亷謹未解在事所以開容夫獄訟惟平畫一在制雖恩家得罪必宜申憲鼎姓貽愆最合從網若罰典惟加賤下辟書必蠲世族懼非先王立理之本尚書列曹上應乾象如聞命議所出先咨於都都既下意然後付郎謹寫關行愚謂郎官尤宜推擇宋運告終戎車屢駕寄名軍牒動竊數等故非分充朝資奉殷積廣越邦宰梁益郡邑參差調補實允事機且此徒冗雜罕遵王憲嚴加亷視隨違彈斥一二年間可減大半並南齊書諫射雉啓世祖好射雉子良啓諫鑾輿亟動天蹕屢巡陵犯風煙驅馳野澤萬乘至重一羽甚微從甚微之歡忽至重之誡頃郊郛以外科禁嚴重匪直芻牧事罷遂乃窀掩殆廢且田月向登桑時告至士女呼嗟易生噂議棄民從欲理未可安曩時巡幸必盡威防領軍景先詹事赤斧堅甲利兵左右屯衛今馳騖外野交侍疏濶晨出晚還頓遺清道此實愚臣最所震迫狡虜玩威甫獲欵關二漢全富猶加曲待如聞使臣頻亦怨望前會東宫遂形言色昔宋氏遣使舊列階下劉纘銜使始登朝殿今既反命宜賜優禮伏謂中堂雲構實惟峻絶簷陛深嚴事隔涼暑而别為一室如或有疑邉帶廣途訛言孔熾毁立之易過於轉圜若依舊制通敞實允觀聽頃市司驅扇租估過刻吹毛求瑕亷察相繼被以小罪責以重備愚謂宜敇有司更詳優格臣年方朝賢齒未相及以管窺天猶知失得廊廟之士豈暗是非未聞一人開一説為陛下憂國家非但面從亦畏威耳臣若不啓陛下於何聞之諌射雉又一啓在釋部上武帝請贈豫章王嶷啓啓上詔贈嶷假黃鉞都督中外諸軍事丞相揚州牧緑綟綬具九服錫命之禮臣聞春秋所以稱王母弟者以尊其所重故也是以禮秩殊品爵命崇異在漢則梁王備出警入蹕之儀在晉則齊王具殊服九命之贈江左以來尊親是闕故致衮章之典廢而不傳實由人缺其位非禮虧省齊王故事與今不殊締構王業功迹不異凡有變革隨時之宜者政緣恩情有輕重德義有厚薄若事籌前規禮無異則且梁齊闕令終之美猶饗褒贈之榮况故大司馬仁和著於天性孝悌終於立身節義表於勤王寬猛彰於御物奉上無艱劬之貌接下無毁傷之容淡矣止於清貞無喜愠之色悠然栖於靜默絶馳騁之聲詩云靡不有初鮮克有終夫終之者理實為難在於今行無廢斯德東平樂於小善河間恱於詩書勳績無聞艱危不涉尚致卓爾不羣英聲萬代况今協贊皇基經綸霸始功業高顯清譽逾彰富貴隆重亷潔彌峻等古形今孰類兹美臣愚忖度未有斯例凡庶族同氣愛睦尚少豈有仰覩陛下垂友于之性若此者乎共起布衣俱登天貴生平遊處何事不同分甘均味何珍不等未嘗覩貌而天心不歡見形而聖儀不恱爰及臨危捨命親瞻喘息萬分之際沒在聖目號哭動乎天地感慟驚乎鬼神乃至撤膳移寢坐泣遷旦神儀損耗隔宿改容奉瞻聖顔誰不悲悚厯古所未聞記籍所不載既有若斯之大德而典服之贈不彰如其脫致虧忘追改為煩不令千載之下物有遺恨其德不具美者尚荷嘉隆之命况事光先烈者寧可缺兹盛典臣恐有識之人容致其議且庶族近代桓溫庾亮之類亦降殊命伏度天心已當有在啓論玊輅永明初加玉輅為重蓋又作麒麟頭采畫以馬首戴之子良啓臣聞車旗有章載自前史器必依禮服無舛法凡蓋員象天軫方法地上無二天之義下設兩蓋之飾求之志録恐為乖衷乂假為麟首加乎馬頭事不師古鮮或可施與安陸侯緬書緬封安陸侯為五兵尚書出為吳郡太守大著風績子良與書世祖嘉其能轉郢州刺史竊承下風數十年來未有此政並南齊書南史姑蘇未有此政與荆州隱士劉虬書虬為南郡丞自免布衣草屩茅室土帳禮誦長齋研精佛理子良深信正法與虬書要其東下王元長之詞也又與南郡太守劉景蕤書令加資遣復使虬鄉人吏部郎庾杲之致書喻旨虬內固已決非復外物所動建武二年冬疾移江州卒諡曰文範玊燭登年金商在律炎涼始貿動靜惟安勤味道腴幸遵雅尚豈不樂哉僕誠幸甚百姓一心衆生不疾比屋可封將又何求但良書獨擁善談無析願言之子實痗我心所以不逺千里尺書道意自淳清既辨澆漓代襲隱顯之術參差語默之途紛互或飾智以警愚或激情以悟俗或穢已以暗通或謬歌以明道屠羊駔馬未足磷其堅佯狂如愚豈能緇其白官楚蕃魏人外之氣逾邈入漢遊梁區中之韻彌少及榷其輕重品其得失則淵懷洞賞寧或符之僕夙養間襟長慕出槩迹塵圭組心逸江湖末面自親聞風如舊而回駕之念徒軫式閭之禮無階固已佇軸深𠂻傾筐遐路者矣君矯然獨逺確乎難拔素志與白雲同悠髙情與青松共爽宣習質文緇林枯而重䓲昭辨空有連河壅而復滔所謂忘言之人可論天人之際豈能鳳舉鶴翻有心儀萃髙踰愛海比策禪衢沾濠射之冥遊屈祗鷲之法侣闡三乘於窮子發二諦於困蒙有是因也何其暢歟今皇風具穆至道𢎞被四海不溢五嶽無塵膠序肇修經法敷廣人賤璣璜家習禮讓樵蘇必時郊林全鬱罿網有節鱗羽偕翔至于層山絶澗還帶畿畎膏田沃野亘望廡躔信可以招往隱淪栖集勝寄故文舉築室冶城之阿次宗植援西山之趾葛洪考槃於海岫釋逺肥遁於鍾幽每踐其遺蹤輒深九原之歎若髙步可遷復何懷乎四子昔宣尼之見伯雪師利之往維摩豈不知相忘之道哉諒有以也未敘之間為道自愛一二令凌琚之口具廣𢎞明集此本王融代作宜以屬融而下與南郡書又不言何人作故但統附竟陵劉虯答竟陵王書虯字靈預南陽涅陽人纍徴不就虯與虬同虯四節卧病三時營灌暢餘隂於山澤託暮情於魚鳥寧非唐虞重恩周召宏施虯進不研幾入玄無洙泗稷館之辨退不凝心出纍非冢間樹下之節逺澤既灑仁規先著謹收樵牧之嫌敬加式蛙之義南齊書與南郡太守劉景蕤書去冬因君與劉居士書今春得其返價辭趣翩翩足有才藻實子雲之筆札元瑜之書記伸復咨嗟彌用欽想此子含貞抱璞比調雲霞背俗居幽寓歡林溆養志南荆可與卞寶爭價韜光梵服固同隋照共明雖顔段之栖遲偃仰揚鄭之寂漠恬惔取之若人信可同日而語矣且道性天悠禪心自謐敦悅九部研味三乘在家菩薩行之而不艱白衣居士即之而方易逝將燭昏霾於慧炬拯淪溺於法橋扇靈崿之留風鏡貞林之絶影僕栖尚既同情契彌至而悠悠京苑間以江山假復神通逺邇冥交曉曙疇得寫析深襟辨明幽旨迹生滅之中談究真俗之諦義故重有别書招來畿邑居問道之次具為敦請此蘭山桂水既足逍遙儒侣玄宗復多朋往非以一爵相加豈其旌蒲為分直暗投誠素庶必能玄了脫悠爾來儀想時加資遣也廣𢎞明集答張融竟陵張欣為諸暨令罪當死欣父興世宋世討南譙王義宣官軍欲殺融父暢興世以袍覆暢而坐得免興世卒融著髙履負土成墳至是融啓竟陵王子良乞代欣之死子良答曰此乃是長史美事恐朝有常典不得如長史所懷齊書答顧憲之憲之字士思吳郡吳人厯豫章太守太中大夫憲之為南中郎長史行婺州事時司徒竟陵王於宣城臨成定陵三縣界立屯封山澤數百里禁民樵採憲之固陳不可言甚切直王答之即令無禁非君無以聞此德音梁書眼銘惟正是視玄黃匪惑非禮不觀儀形是則慎爾所覿無愆斯德耳銘惟耳是聽仁愛是聞詳察巧言離辨異羣無迷邪諂炫惑莫分口銘惟口是慎慎乎語笑三緘是戒事重周廟戒之戒之無貽厥誚並藝文類聚行宅詩序余稟性端踈屬愛間外往歲羈役浙東備厯江山之美名都勝境極盡登臨山原石道步步新情回池絶澗往往舊識以吟以咏聊用述心登山望雷居士精舍同沈右衛過劉先生墓下詩序沛國劉子圭學優未仕迹邇心遐履信體仁古之遺德潛舟迅景滅賞淪輝言念芳猷式懷嗟述屬舍弟隨郡有示來篇彌績久要之情益深宿草之歎升望西山率爾為答雖因事雷生實申悲劉子云爾賔僚七要松既煙而接漢竹緣嶺而負筠哀過鴻於月曉悲夜猿於霜旻乃鶴駕之非逺信羽車之可鄰鴻池廣象太液染華勢含五水氣疏九河既百尋而照底亦千丈而分沙故乘流以神王或鼓枻而目多豈能從我泛此安波巴東王子響字雲音武帝第四子啓武帝子響為荆州刺史好武事自選帶伏左右六十人又私作錦袍絳襖欲以餉蠻交易器仗長史劉寅等密啓子響執寅等殺之上怒遣衛尉胡諧之中書舍人茹法亮等詣江陵子響白服登城遣使相聞不答因進戰軍敗赴建康臨死啓上削屬籍易姓蛸氏劉寅等入齋檢仗具如前啓臣罪既山海分甘斧鉞奉敇遣胡諧之茹法亮賜重勞某等至竟無宣旨便建旗入津對城南岸築城守臣纍遣書信喚法亮渡乞白服相見某永不肯羣小懼怖遂致攻戰此臣之罪也臣此月二十五日束身投軍希還天闕停宅一月臣自取盡可使齊代無殺子之譏臣免逆父之謗既不遂心今便命盡臨啓哽塞知復何陳同前子響兵敗縊死密作啓數紙藏妃王氏裙帶中具自申明輕舫還闕不得此苦之深惟願矜憐無使竹帛齊有反父之子父有害子之名有司奏魚復侯子響還本豫章王嶷初養子響為子後有子表留為嫡永明六年有司奏請還本乃封巴東郡王附子響體自聖明出繼宗國大司馬臣嶷昔未有胤所以因心鞠養陛下𢎞天倫之愛臣嶷深猶子之恩遂乃繼體扶疏世祚垂改茅蔣菴蔚冢嗣莫移誠欣惇睦之風實虧立嫡之教臣等參議子響宜還本隨郡王子隆字雲興武帝第八子厯荆州刺史侍中中軍大將軍為明帝所害山居序西園多士平臺盛賔鄒馬之客咸在伐木之歌屢陳是用追芳昔娛神遊千古故亦一時之盛事始安王遙光字元暉髙帝次兄道生子嗣父爵厯侍中申書令東昏時謀逆敗誅啓誅謝朓朓以告王敬則反遷尚書吏部郎及東昏失德江祏等欲立遙光遙光亦遣人密致意朓自以受恩髙宗不答乃稱敇召朓付廷尉與徐孝嗣祏暄等連名啓誅朓謝朓資性險薄大彰逺近王敬則往搆凶逆微有誠效自爾升擢超越倫伍而溪壑無厭著於觸事比遂扇動內外處處姦説妄貶乘輿竊論宫禁間謗親賢輕議朝宰醜言異計非可具聞無君之心既著共棄之誅宜及臣等參議宜下北里肅正刑書東昏侯詔公等啓事如此朓資性傾險久彰物議直以雕蟲薄伎見齒衣冠昔在渚宫搆扇蕃邸日夜從臾仰窺俯畫及還京師翻自宣露江漢無波以為巳功素論於兹而盡縉紳所以側目去夏之事頗有微誠賞擢曲加逾邁倫序感恱未聞陵競彌著遂復矯構風塵妄惑朱紫詆貶朝政疑間親賢巧言利口見醜前志涓流纎孽作戒逺圗宜有少正之刑以申去害之義便可收付廷尉肅明國典尚書符討始安王遙光遙光為太祖次兄道生子襲父封東昏侯即位以侍中中書令輔政潛與江祏兄弟謀自樹立及祏被誅遙光不自安遂舉兵攻臺衆散為臺軍所殺逆順之數皎然有徴干紀亂常刑兹罔赦蕭遙光宗室蚩庸才行鄙薄緹裙可望天路何階受遇自昔恩加猶子禮絶帝體寵越皇季旗章車服窮千乘之尊闉隍爽塏踰百雉之制及聖后在天親受顧託話言在耳德音猶存侮蔑天明罔畏不義無君之心履霜有日遂乃稱兵內犯竊發京畿自古巨舋莫斯為甚今便分命六師𢎞宣九伐皇上當親御戎軒𢎞此廟略信賞必罰有如大江安陸侯緬字景業齊宗室封安陸侯厯雍州刺史贈王與王儉書庾呆之字景行新野人纍遷尚書左丞王儉謂人曰昔袁公作衛軍欲用我為長史雖不獲就要是意向如此今亦應須如我輩人也乃用杲之為衛將軍長史緬與儉書時人以入儉府為蓮花池故緬書美之世説云王僕射高自標位常自比李膺時人呼儉府為入芙蓉池盛府元僚實難其選庾景行泛緑水依芙蓉何其麗也南史蕭景先太祖從子厯征虜將軍丹陽尹遺言景先假節司州遇疾遺言此度疾病異於前後自省必無起理但夙荷深恩今謬充戎寄暗弱每事不稱上慙慈旨便長違聖世悲哽不知所言可為作啓事上謝至尊粗申愚心毅雖成長素闕訓範貞等幼稚未有所識方以仰纍聖明非殘息所能陳謝自丁荼毒以來妓妾已多分張所餘醜猥數人皆不似事可以明月佛女桂枝佛兒王女美玉上臺美滿艷華奉東宫私馬有二十餘匹牛數頭可簡好者十匹牛二頭上臺馬五匹牛一頭奉東宫大司馬司徒各奉二匹驃騎鎮軍各奉一匹應私仗器亦悉輸臺六親多未得料理可隨宜漫恤微申素意所賜宅曠大恐非毅等所居須喪服竟可輸還臺劉家前宅久聞其貨可合率市之直若短少啓官乞足三處田勤作自足供衣食力少更隨宜買粗猥奴婢充使不須餘營生周旋部曲還都理應分張其久舊勞勤者應料理隨宜啓聞乞恩蕭穎胄字雲長太祖從祖弟赤斧子厯侍中尚書令移檄京邑和帝初為南郡王以穎胄為南郡太守時梁高祖蕭衍為雍州刺史東昏即位殺戮大臣諸鎮懷異遣兵將襲荆雍衍與穎胄合謀起義師穎胄移檄京邑立南郡王於江陵是為和帝西中郎府長史都督行留諸軍事右軍將軍南郡太守南豐縣開國侯蕭穎胄司馬征虜將軍新興太守夏侯詳告京邑百官諸州郡牧守夫運不常夷有時而陂數無恆剝否極則亨昔商邑中微彭韋投袂漢室方昏虛牟效節故風聲永樹卜世長久者也昔我太祖髙皇帝德範生民功格天地仰緯彤雲俯臨紫極世祖嗣興增光前業雲雨之所沾被日月之所出入莫不舉踵來王交臂納貢鬱林昏迷顛覆厥序俾我大齊之祚翦焉將墜髙宗明皇帝建道德之盛軌垂仁義之至蹤紹二祖之洪基繼三五之絶業昧旦丕顯不明求衣故竒士盈朝異人輻輳若乃經禮緯樂之文定鼎作洛之制非雲如醴之祥白質黑章之瑞諒以則天比大無德稱焉而嗣主不綱窮肆陵暴十愆畢行三風咸襲喪初而無哀貌在戚而有喜容酣酒嗜音罔懲其侮讒賊狂邪是與比周遂令親賢嬰荼毒之誅宰輔受葅醢之戮江僕射蕭劉領軍徐司空沈僕射曹右衛或外戚懿親或皇室令德或時宗民望或國之虎臣並勳彰中興功比周召秉鈞贊契受遺先朝咸以名重見疑正直貽斃害加黨族虐及嬰孺曾無渭陽追逺之情不顧本枝殱落之痛信必見疑忠而獲罪百姓業業罔知攸暨崔慧景內逼淫刑外不堪命驅土崩之民為免死之計倒戈回刃還指宫闕城無完守人有異圗賴蕭令君勳濟宗祏業拯蒼氓四海蒙一匡之德億兆憑再造之功江夏王拘迫威強牽制巨力迹屈當時乃心可亮竟不能內恕探情顯加鴆毒蕭令自以親惟族長任實宗臣至誡苦言朝夕獻入讒醜交搆漸見疏疑浸潤成災奄離怨酷用人之功以寧社稷刈人之身以騁淫濫台輔既誅姦小競用梅蟲兒茹法珍妖忍愚戾窮縱醜惡販鬻主威以為家勢熒惑嗣主恣其妖虐宫女千餘裸服宣淫孽臣數十袒裼相逐帳飲闤肆之間宵遊街陌之上提挈羣豎以為歡笑劉山陽潛受凶旨規肆狂逆天誘其𠂻即就梟翦夫天生蒸民樹之以君使司牧之勿使失性豈有尊臨宇縣毒遍黔首絶親戚之恩無君臣之義功重者先誅勳髙者速斃九族內離四夷外叛封境日蹙戎馬交馳帑藏既空百姓已竭不恤不憂慢遊是好民怨於下天懲於上故熒惑襲月孽火燒宮妖水表災震蝕告沴七廟阽危三才莫紀大懼我四海之命永淪於地南康殿下體自髙宗天挺英懿食葉之徵著於弱年當璧之祥兆乎綺歲億兆顒顒咸思戴奉且勢居上遊任總戎略家國之否寧濟是當莫府身備皇宗忝荷顧託憂深責重誓清時難今命冠軍將軍西中郎咨議領中直兵參軍軍主楊公則寧朔將軍領中兵參軍軍主王法度冠軍將軍咨議參軍軍主龎翽輔國將軍咨議參軍領别駕軍主宗夬輔國將軍咨議參軍軍主樂藹等領徑卒三萬陵波電邁徑造秣陵冠軍將軍領咨議中直兵參軍軍主蔡道恭輔國將軍中直兵參軍右軍府司馬軍主席闡文輔國將軍中直兵參軍軍主任漾之寧朔將軍中直兵參軍軍主韓孝仁寧朔將軍中直兵參軍軍主朱斌中直兵參軍軍主宗冰之建威將軍中直兵參軍軍主朱景舒寧朔將軍中直兵參軍軍主庾域寧逺將軍軍主庾略等被甲二萬直指建業輔國將軍武寧太守軍主鄧元起輔國將軍前軍將軍軍主王世興等鐵騎一萬分趨白下征虜將軍領司馬新興太守夏侯詳寧朔將軍咨議參軍軍主栁忱寧朔將軍領中兵參軍軍主劉孝慶建威將軍軍主江陵令江詮等帥組甲五萬駱驛繼發雄劒髙麾則五星從流長戟逺指則雲虹變色天地為之矞皇山川以之崩沸幕府親貫甲胄授律中權董帥熊羆之士十有五萬征鼓紛沓雷動荆南寧朔將軍南康王友蕭穎達領虎旅三萬抗威後拒蕭雍州勳業蓋世謀猷淵肅既痛家禍兼憤國難泣血枕戈誓雪怨酷精卒十萬已出漢川張郢州節義慷慨悉力齊奮江州邵陵王湘州張行事王司州皆逺近懸契不謀而同並勒驍猛指景風驅舟艦魚麗萬里蓋水車騎雲屯平原霧塞以同心之士伐倒戈之衆盛德之師救危亡之國何征而不服何誅而不克哉今兵之所指唯在梅蟲兒茹法珍二人而已諸君德載纍世勳著先朝屬無妄之時居中否之運受迫羣豎念有危懼大軍近次當各思拔迹來赴軍門檄到之日有能斬送蟲兒法珍首者封二千户開國縣侯若迷惑凶黨敢拒命者刑兹無赦戮及宗族賞罰之信有如皎日江水在此余不食言上和帝遺表中興元年穎胄輔帝出居上流憂慮感氣卒臣疹患數日不謂便至困篤氣息綿微待盡而已臣雖庸薄忝籍葭莩過受先朝殊常之眷循寵礪心誓生以死屬皇業中否天地分崩總率諸侯翼奉明聖賴社稷靈長大明在運故兵之所臨無思不服今四海垂平干戈行戢方希陪翠華奉法駕反東都觀舊物不幸遘疾奄辭明世懷此深恨永結泉壤竊惟王業至重萬機甚大登之甚難守之未易陛下富於春秋當逺尋祖宗創業艱難殷鑒季末顛覆厥緒思所以念始圗終康此兆庶征東大將軍臣衍元勳上德光贊天下陛下垂拱仰成則風流日化臣雖萬沒無所遺恨南齊文紀卷二
