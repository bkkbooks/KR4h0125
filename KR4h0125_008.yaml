body:
  text: 南齊文紀卷八明梅鼎祚編江淹字文通濟陽考城人仕宋領南東海郡丞入齊為祕書監兼衛尉終梁金紫光祿大夫按淹厯宋齊梁天監四年卒在梁未久並無文績其集十卷齊時淹所自定故今屬齊奏記詣宋南徐州新安王子鸞字孝羽孝武帝子南徐州刺史淹起家南徐州從事轉奉朝請伏惟明公殿下列譽椒壁蜚聲沖漢爰求儒雅傍招異人削赤野之玉翦燕山之金至如淹者東國之徒步耳方斂影逃形匡坐編蓬之下遂遭煙露餘彩日月末光惟恩知泰變色薰心淹聞齊石既撫無待巴人之唱柏臺已構寧俟不才之木淹幼乏鄉曲之譽長匱芹藻之德豈宜炫璞鄭氏獻鳳楚門哉願避職吏緩其召書到主簿日箋詣右軍建平王景素淹由巴陵王右常侍轉右軍建平王主簿賔侍纍年雅以文章見遇見淹自序淹乃庸人素非竒士既慙鄒魯儒生之德又謝燕趙俠客之節徒以結髮衛次暫聞仁義常欲永辭冠劒弋釣畎壑而身輕恩重猥奉末光枉白璧之惠降黑貂之私因兹感激未能自反負金羈于淮吳從後車于河楚竟不能曜丹雘騰英聲絶白雲負蒼梧至可知矣不謂咸池再暉瑶光重照開髙天之慈布厚地之施承命以驚巡走且失淹聞古人為報常有意焉至乃一説之效齊王動色一劍之感趙王解衣孤心迥槩有殞自天被黜為吳興令辭箋詣建平王景素鎮京口淹又為鎮軍參軍事領南東海郡丞時少帝多失德景素與腹心日夜謀議淹知禍機將發贈詩十五首以諷焉會南東海太守陸澄丁艱淹自謂應行郡事乃用司馬栁世隆淹固求之景素大怒言于選部黜為建安吳興令淹本遷徙之徒非有儒墨之能亦以轉命溝間待殯巖下誤得步修榥循髙軒伏層檻坐曲池承翠河之潤降璇日之光載筆奉后盛飾立朝于山東百姓亦己殊甚雖蓐螻蟻拭黃塵不足以塞惠而小人狼狽為鬼為蜮山淵所容衣劍不貸黥赭幽圉皆非報責仰遭大道之行草木勿踐輟鑊斂火吹魂拾骨濯以河漢之流曝以秋陽之景叢然黔首豈不戴天竊思伏皂九載齒録八年以春以秋且恩且顧竟不能抑黑質揚赤文抽精膽報慈光而自為擁腫之異木卒成踴躍之妖金所謂孽由己作匪降自天猶沐造化餘靈宥以遐邑方蒙被霜露裹糧洲島缺鑿山楹為室永與黿鼉為羣猶蹶者不忘起盲者不忘視况罪溢朔方尚駐一等之刑咎過朱崖猶緩再重之施金石無知何以識答昔河濟荆吳必獲陪從京輔關轂長奉帷席德音在耳話言如昨淹乃梁昌自投東極晨鳥不蜚遷骨何日一辭城濠旦夕就逺白雲在天山川間之眷然西顧涕下若屑到功曹參軍箋詣齊驃騎竟陵王子良宋升明初齊髙帝輔政聞淹才召為尚書駕部郎驃騎竟陵公參軍事竊惟明使君鉞下道耀神源德鑄靈極誕涵天聽資河照聖譽拂宏外芳激震中故衡梁孕秀璿璣流品變瑶光之暉贊玉燭之色功邁翊殷績起匡漢是以赤瑕瓊寶之文睇影而􅞅集青虬追風之乘晞光而逺至如民者蓋不足算所志不出繒販所學不遺祝筮業異儒墨行乖曾史既乏修短之術又慙啓塞之辨不能伏軾撙銜驚燕趙之郊黃金橫帶馳澠淄之幣語默罕緒圓方靡樹謬以一氣之微邀百載之會躬奉英睿身蒙青雘故以潤厚纍璧恩重兼金不悟懸黎降景靈河瀉潤復獲執羈蘭陳迎笏桂序漏越之琴竊莊文之價缺齧之劒盜頃襄之名心羞秦媵志慮楚犢抱魄踴躍憂集如熏鐫感何日銘報焉期獄中上建平王書宋建平王景素好士淹隨在南兖州廣陵令郭彥文得罪辭連淹繫州獄淹獄中上書景素覽書即日出之昔者賤臣叩心飛霜集于燕地庶女告天振風襲于齊臺下官每讀其書未嘗不廢卷流涕何者士有一定之論女有不易之行信而見疑貞而為戮是以壯夫義士伏死而不顧者也下官聞仁不可恃善不可依謂徒虛語乃今知之伏願大王暫停左右少加憐察下官本蓬户桑樞之民布衣韋帶之士退不飾詩書以驚愚進不買名聲于天下日者謬得升降承明之闕出入金華之殿何嘗不局影凝嚴側身扃禁者乎竊慕大王之義復為門下之賔備鳴盜淺術之餘豫三五賤伎之末大王惠以恩光顧以顔色實佩荆卿黃金之賜竊感豫讓國士之分常欲結纓伏劍少謝萬一剖心摩踵以報所天不圖小人固陋坐貽謗缺迹墜昭憲身限幽圄履影弔心酸鼻痛骨下官聞虧名為辱虧形次之每一念來忽若有遺加以涉旬月迫季秋天光沈隂左右無色身非木石與獄吏為伍此少卿所以仰天捶心泣盡而繼之以血者也下官雖乏鄉曲之譽然嘗聞士君子之行矣其上則隱于簾肆之間卧于巖石之下次則結綬金馬之庭髙議雲臺之上次則虜南越之君係單于之頸俱啓丹册並圖青史寧當爭尺寸之末競錐刀之利哉下官聞積毁銷金積讒糜骨逺則直生取疑于盜金近則伯魚被名于不義彼之二子猶或如是况在下官焉能自免昔上將之恥絳侯幽獄名臣之羞史遷下室至于下官當何言哉夫以魯連之智辭祿而不返接輿之賢行歌而忘歸子陵閉關于東越仲蔚杜門于西秦亦良可知也若使下官事非其虛罪得其實亦當鉗口吞舌伏匕首以殞身何以見齊魯竒節之人燕趙悲歌之士乎方今聖歷休明天下樂業青雲浮洛榮光塞河西洎臨洮狄道北距飛狐陽原莫不浸仁沐義昭景飲醴而下官抱痛圓門含憤獄户一物之微有足悲者仰惟大王少垂明白則梧邱之魂不愧于沈首鵠亭之鬼無恨于灰骨不任肝膽之切敬因執事以聞此心既照死且不朽齊臺梁書作齊堂謂徒虛語作始謂徒語憐察作憐鑒顧作盼國士之分下有矣字每一念來上有是以二字尺寸作分寸錐刀作刀錐利哉下有然字逺作古二子作二才如是作如此至于下官作如下官南史伏死而不顧者以此也憐察作矜察民作人名聲作聲名次則虜南越作退則至于作至如昭景飲醴而已報袁叔明書袁炳字叔明陳郡陽夏人歷國常侍員外郎府功曹臨湘令按淹傳淹出獄後尋舉南徐州秀才對册上第轉巴陵王國左常侍按書去嵗迫名茂才疑此時僕知之矣髙臯為別執手未期浮雲色曉悵然魂飛前辱贈書知命僕息心越地採藥稽山友人幸甚去嵗迫名茂才冬盡不獲有報引領于邑情詎可及足下推僕者不一二談也僕聞狂士之行有三竊嘗志之其竒者則以紫天為宇環海為池倮身大笑被髮行歌其次則堅坐崩岸僵卧深窟朝餐松屑夜誦仙經其下則辭榮城市退耕巖谷塞徑絶賔杜牆不出然者皆羞為西山之餓夫東國之黜臣而况其鄉黨乎或有社稷之士入而忘歸則爭論南宫之前衛主于邪伏身北闕之下納君于治至乃一説之竒驚畏左右一劍之功震栗鄰國夫能者惟橫議漢庭怒髮燕路且猶不數而况于鄰里乎若僕之行止已無可言矣材不肖文質無所直徒以結髮遊學備聞士大夫言曰在國忠處家孝取與亷交友義故拂衣于梁齊之館抗手于楚趙之門且十年矣容貌不能動人智謀不足自逺竟慙君子之恩卒離飢寒之禍近親不言左右莫教涼秋隂隂獨立間館輕塵入户飛鳥無迹命保琴書而守妻子其可得哉故國史小官也而子長為之執戟下位也而子雲居之僕非有輕車驃騎之略交河雲險之功幸以盜竊文史之末因循卜祝之間故俯首求衣斂眉寄食耳若十口之𨽻去于飢寒從疾舊里斥歸故鄉箕坐髙視舉酒極望雖五侯交書羣公走幣僕亦在南山之南矣此可為智者道難與俗士言也方今仲秋風飛平原彯色水鳥立于孤洲蒼葭變于河曲寂然淵視憂心辭矣獨念賢明蚤世英華殂落僕亦何人以堪久長一旦松柏被地墳壟刺天何時復能銜杯酒者乎忽忽若狂願足下自愛也與交友論隱書淹少孤貧好學沉靜寡交遊其自序云常慕司馬長卿梁伯鸞之徒所與神逰者惟陳留袁叔明而已為吳興令三載復還京師值世道已昏守志間居不交當軸之士淹者海濵窟穴弋釣為伍自度非竒力異才不足聞見于諸侯每承梁伯鸞卧于會稽之墅髙伯達坐于華隂之山心常慕之而未能及也嘗感子路之言不拜官而仕無青組紫紱龜紐虎符之志但欲史歷巫卜為世俗賤事耳而彯然十載竟不免衣食之敗何則性有所短不可韋弦者有五一則體本疲緩卧不肯起二則人間應修酷懶作書三則賔客相對口不能言四則性甚畏動事絶不行五則愚婞妄發輒被口語有五短而無一長豈可處人間耶知短而不可易者所謂輪椎分定也猶如雞騖之有毛不能得鸞鳳之光采矣况今年已三十白髮雜生長夜輾轉亂憂非一以溘至之命如星隕天促光半路不攀長意徒自欺取筋駑髓冷殊多災恙心頑質堅偏好冥默既信神農服食之言久固天竺道士之説守清淨煉神丹心甚愛之行善業度一世意甚美之今但願拾薇藿誦詩書樂天理性斂骨折步不踐過失之地耳猶以妻孥未奪桃李須隂望在五畝之宅半頃之田鳥赴簷上水匝階下則請從此隱長謝故人若乃登峨嵋度流沙餐金石讀仙經嘗聞其驗非今日之所言也誰謂難知青鳥明之貴布筆墨然亦焉足道哉敕為朝賢答劉休範書昔媯道鼎昌干羽未能戢姬德昭宣長旌猶卷舒焚衣毁冕有自來矣皇宋靈武誕命聖道鬱宏三后連光四聖沓軌或經天緯地搆紫靈之符調風偃海隆黃旗之祚莫不頌滿金石聲彯宇宙者也暨我太宗明皇帝惟嶽降聖重耀函夏延禮璧臺訪道衢室平陽之后卷迹慙靈空同之君斂功謝德是以綵雲祥風之瑞布濩區中梯山棧火之俗欵徼請吏跨商軼夏洗周滌漢道澤優衍猶不封禪遐靈在天餘惠無泯主上文明金相穆然玉色履璧之禎獲圭之應著在紀嵗仁浸汙河惠愛秋草想亦君之所聞也重以先帝靈略潛通英轡逺馭受話言必忠貞方肅之臣奉風聲必虔恭匪懈之士明時琴瑟鼎鉉之盛且被于寧世而忽覿來書以惋以慨君為齊梁楚越之主鼎貴一時金玉滿堂文馬千駟爵授湯沐冠蓋于道惟名尊崇誰與為雄而出言效尤吐音入戾舉旗類社志竊神禁稱兵斂衆遂窺外關今朝無闕政頓搆凌上之節室無孽豎坐生莫大之舋鴟梟赭衣號興徒黨主萃淵藪寧滋之甚不臧不軌不忠不義未有若斯者也宗枝之釁逺則吳楚見禽于一壁磐石之孽近則江荆面縛于小將此成敗蘭艾之鑒又亦君之所知也聞彼虹飲鼠舞之異早見物徵河北隴上之謡已露童詠所謂妖由人作孽不可逃然桓侯之患良助寒心今羽林黃頭駱驛爭引熊渠佽飛首尾電發伏波樓船掩江蔽汜渡遼甲卒充野布隰加以先天蓋世之略蕩海拔山之威任輔沛陳羽林鷁舟露動龍驤精騎風驅然後六師雲起九軍星連霓旌外江虹艗中水金甲映平陸鐵馬照長原蹴南嶽而永慨瞰九派而懷恐伐罪弔民復驗于兹甫刑三千惟此為大僕才等不羈志瀝丹欵故奏禍福行矣悵然袁褚劉蕭等疏袁粲褚淵劉秉蕭道成明時上有脫句任輔沛以下至風驅亦有缺誤江文通集為建平王慶改號啓竊以皇衡永謐則玉歷惟禎國慶方夷則繩澤式茂故五鳳協年甘露應號况今道潤衍溢頌祉載繁嘉生蠲慶風雲瑞節既覯昭晨方鑄昌化延守一隅無以自屆不勝荒情為建平王讓鎮南徐州刺史啓臣言臣誓惟殃釁頻寫曲折慊慊狂愚冀蒙哀弔而聖旨懸嚴便賜斷表神乖意失音影何地吞悲茹號情膽載絶臣荒昧神氣爰自幼稟分踰鼎貴秩髙外州臣乏素能或所不任况在憂年必取黜辱特為開非常之恩借權制之義紊禮滅經實翦治本臣又能身祈命請一感天地躑躅表啓心容己靦猶疑大道之行墨縗不興孝治天下通喪獲遂陛下覆被仁明品物無漏豈于微臣獨不蠲鑒燋鯁在躬輒復塵觸伏願暫輟聽覽少憐苫草則臣死之日猶生之年臨啓恍惚魂識無主不勝殞越怵息之心為建平王謝賜石硯等啓臣言奉敕賜石硯及法書五卷天旨又以臣書小進更使勤習敬閲籀篆側觀硯功張衛慙竒金瓊羞麗臣夙乏翰能素謝篇伎空賁恩輝徒隆慈飾方停煙墨永砥學玩仰結聖造伏銘私荷不任下情為建平王謝賜玉環刀等啓奉敕賜玉環刀等五種珍器贐儀伏蒙猥降飾軼采朱跨影懸魄崑岡歸琛闕山慙寶謹襲緹素以充握睇垂光既深銘佩更積不任下情蕭領軍讓司空并敦勸啓齊髙帝以宋元徽初平桂陽王休範遷散騎常侍中領軍及蒼梧王見殺迎立順帝進位侍中司空録尚書事臣某言臣沿心之請丹識以傾詔旨沖挹便賜斷表伏聞當遣王人猥垂奬勸仰天光休俯增驚厲中謝臣以為槐鉉之任百王攸先具司是屬冠冕式瞻化曜昌輝連基政務事深崇替迹豫興衰故道富一時則風行明令才乏通權則山摧河泣既澆汨蒼祇將紊毁身國臣進退惟疑再三自顧實以陋情悲忘寵極但畏軼超疲伍乃參鼎軸無德而貴豈敢偷存才怯任重物所不恕故弱識褊槩頻布前辭枯木朽株永隔蠲恕豈特大車方塵小雅有廢而已哉將據致冦之悔取鑒于兹矣且皇華之命居上之鴻私鳳舉之招為下之殊榮國勳必書史不謬牘况臣連牧圉嶽董率職方既鑠近古垂耀中葉揆望揣實為泰已甚而乃復降朱輪之使方枉青册之勸寤寐悁灼諒無以任輒重素誠冒覬神照伏願皇靈特垂開愍賜停正台之職并免敦勸之使餘所榮忝誓不敢辭肅恭外屏祈回恩授則于臣慊欵復為惠造不任憂戴匪惶之情蕭太尉子姪為領軍江州兖州豫州淮南黃門謝表齊髙帝立宋順帝二年進位太尉臣公言臣頻結崇寵亟延上爵休恩動俗烈榮振古鴻品清飾已藹金圖秀鼎號銘共茂瑶篆永言戚慮鑒寐殷心况乃秩洽朝門慶霑國珮弱息臣諱嶷映晃等文不昭典武不定功出內帷閫升降貂綬或振迹領候職贊禁錡或騰光江甸任鈞屏翼河兖衝要既濫北門之管淮豫險捍又謬西偏之寄兄子臣鸞忝守近畿嫡孫臣某載華省闥皆倐忽晷景頻煩升荷雖咸罄愚識恪居匪替豈足以少塞神渥裁酬皇眷囂黷一盈慙厲彌積談天之辨不能為臣陳辭雕龍之文無以為臣飾愧靜然肅念裴徊交集不任憂感沐浴之情並江文通集諱為武帝名賾拜正員外郎表臣邁鄉逺迹曲學末徒不瑩雕龍之采寧照玄豹之飾自過被光私濫蒙恩幸屢度經冬亟移春序皇緯如紐慙飛塵之效璿基方峻謝寒露之勤故宜伏影軒間卷氣衡下猶蒙供事紫楹奉役丹殿巡魄擎概榮渥不悟震離徹邃阿景洞幽復升官清閨列版嚴闥叢識何算爰忝叔則之仕菲質焉樹乃謬仲容之職猥枉青雘增光空質心懅末塵情慙洞户佇首矯迹以銘以奏拜中書郎表榮鬱兩臨恩俊交鏡悄然掔魂乃懼乃逝臣聞汝潁之金或揚采于四豪江淮之珠已馳光于七貴皆聲不妄美第豈虛立未有伎慙湘輿蒙送目之賞工謝綵輪竊歸風之價臣幼乏篆刻長暌圖史智罕效官志闋從政方遽永振風長憂凌雨不悟遭社鳴之屬際河清之會玄雲素霞必駕蓬萊白毳騂鱗咸蒙解遂仕通物任官登郎掾此實耀靈之私照而微臣之厚幸也仰惟皇衢大融氣品呈觀西傾棧山東鯷航海故竒士端威異人磬折皆相望北闕待詔南宫而臣學無利博文有忮害乃彯裾頓屣伏黃扉之右曳纓轉笏居青瑣之前訪德于姑射聞道于崆洞伊臣之願過為信矣昔望都才麗爵乏上班長岑聞靡身終下秩愚臣方古悠然已泰內燭徘徊眇不識屆建平王讓右將軍荆州刺史表茂寵乃臨炫奪彛典巡恩鏡飾攪情震慮臣聞該秩詔序匪賢莫能孚其職端維裂陜非功無以濫其選所以輪鞅國典締結民紐五威咸平四精或訓者也臣踐行迷方試業敝緒徒以綴采宗莩承渥帝席執圭載筆亟荷出內至乃曳組河縣蔑馴羽之化鳴環京轂謝澤鱗之政聲績兩無風化雙缺而龜紐未剔璽書頻降復改册湘區分瑞衡服竟無賈琮交部之廉終乏郭伋并壤之信固以雜沓民明湫隘身諷不悟皇靈再輝河海重渥遂踰恆采妄賁異等荆門務要方城任積水交沅灃山通岷峨襟帶百縣縈抱七州上德懋勳鮮居斯地寧臣膠固所宜膺荷是以燋薄魂色驚迫心影謹刷睿情直露弱志伏願陛下停旒弛琪暫照瑣曲則鑄才式𢎞練物維逺王度既清蒙識以泰不勝慙懅屏營之情建平王慶明帝疾和禮上表臣聞慶動至玄則昌衢敦序教孚上雲則紫宇交泰故祈寒溽暑無以變其和沴火凝隂不能徙其氣伏惟陛下至德遐穆實天縱聖仁鑄蒼嶽道括寰海故丹陵之君欵金泥而謝賢媯墟之后眷龍圖而慚德頌聲蔽逵歌思匝道而望景暫虧輪光少曖玉櫺違和金幌輟念百祠未遑四嶽匪處吉蠲為慶神御方休瑞廣文齡祥深武日具惟涵教倡愈兼薦臣班戚奉慈實自慶舞不勝恱豫之情建平王慶安城王拜封表麗采繩河映萼璿圃淑問夙孚令儀早晰撰告候辰昭膺輝序國維富禮皇塗凝衛具生屬慶懷識戴躍臣涵恱楚邊魂馳關闕不任下情建平王之南徐州刺史辭闕表臣過承寵靈閔點假日徒抱皇慈無充橫草而品第乃崇軒服逾峻顧兹靦窮彌覯荒昧今便奉官外甸卷迹徐山託慕宸嚴載惟感戀衰疾不獲詣闕不任窮鯁之情蕭驃騎讓封第二表藝文類聚作讓司空表臣某言寫瀝愚丹已續前表猥降前詔未垂鏡恕一省驚慙再悸魂府靜躬自察啓居匪地臣聞日薄星回昊天無以爽其節山盈川沖厚地不能虧其度豈不靈鑄有限神極無爽况世道恆淪人彛剽奪數滿必沿虛飾小故辭大臣才非古賢任鈞左戚祚開山河兼金疊組爵奓常班寵溢前達以榮以渥且慙且靦雖嘉銘鼎之恭更懼循墟之速矧乃三司業貴上將地崇總録務廣河汾寄深圭宇方啓劒衛增肅既驚朝野足震城邑殷周富士猶難其人漢魏多才亦罕兼職且麟閣之臣尚有位不及鉉全器之侯猶或任不並台名爵無假前世之雄規車旗勿濫中葉之英軌况鴻誥欎集懋册頓萃諒非虛薄輕所膺符今殷夏既聲封國式固故天地燀耀日月更輝陛下停若鏡之明流如雲之愛方求士于板巖宜思賢于屠肆而私臣以闈廟寵臣以帷鼎位兼文武職總內外非所以發夢渭濵儲精河藪鐫金刻石既不可詮輿歌里頌其謂臣何仰緣大道方行蒼祇宅氣威靈所燭九功咸詠寧于庸臣獨隔恩耀誓守愚𠂻重扣雲日如蒙恩宥實生之幸不任慊欵之誠日薄藝文作日發屠作蜀並誤第三表臣某言臣再抽慊請辭為理屈側守圭漏伏望𠂻鑑而宸緯嚴祕𢙿悰徒懸優奬之降非復常旨肅奉驚懅曛曉如失臣照册訪古誦史稽昔以為敷道之寄管物成務總録之重匡績毗風莫不下協河嶽上踵光緯先王所以長世後睿所以字氓讚金圖之要輔樞歷之機者也臣本瑣姿不慕聞達昔值英世頻遘時來感激光私未能自返烏可超乘厚任妄據髙圖天道既平鬼神好謙臣亦何人而獨斯處所以不恤色忤頻犯鴻威者正以方圓之景已滿丹彩之色難加政能緯俗匪務傍職坐而燮道必在其人若臣武未燭鞬櫜之分文不藹樽俎之間德非時秀道乖物宗虛飾疲伍空貽上位則天變彰于飛流地眚見于震壓驚蕩民聽蕪沮物議綸言之出不追金石之謬已逺豈唯敗錦傷經毁鼎覆餗而已哉自非西京上績東都名勳河右羣賢江左諸彥寧有誣叨天爵以為己功者也昔南楚偏君鄢郢小政執圭柱國尚不輕授况車軌同文四溟同宅而以鄙蔽超居金鉉殊任鬱起臣心憂魄悚視丹如緑伏願陛下暫停冕纊少察愚實鑒臣靦情愍臣孤志廣天下之惠可匹夫之諒中則國步永清門下永無謬誤不任憂駭之情蕭驃騎録尚書事到省表臣某言臣自妄蒙異寵輕荷殊爵晝昃猶聳夜艾方驚誠以設器瑶陛取監沖滿懸魄金波徵驗虧闕兹乃天數去盈人經好退后所以裁成萬品下所以各愼百司未有違才易貫尅負永業者也且量力之誥實炯前書辭科之誨且招昔牒况臣徒竭弱質忠貞未懟猶叨今恩山嶽非重故慙屬交喪頻煩表疏必謂巡崖之慊不忽俟河之清可期不悟皇明神邈鴻奬彌深雖守丹愚競絶蠲恕今輒耀纓上序鏘珮中軒德輕施重左右生華志盡輸謝終愧報效不任下情蕭驃騎謝甲仗入殿表臣某言臣即日被敕賜給甲仗五十人入禁儀武殿飾冠疇典局荷此盛恩五情銘載臣聞國之利器在祀與戎蘭錡之設實允儲方故官騎辰居羽林天部瞰城龍塞言伏鬼方臣股肱之力不足以染丹青橫草之勤寧可以鏤金石而魚服象弭一旦虛授誕錫金圭方兹為絢黃河如帶比今非賞故異寵之襲心魄共驚不世之服蒼祗同灼雖攀靈河漢駿奔明哲慙迹駭𠂻無情以處蕭驃騎讓豫司二州表臣某言臣傾心駐氣不蒙睿感憂讋交鏡中寐再驚臣聞國歷惟耀則藩伯緝其才朝緯伊序則方率司其度用能璿紐弗虧民教可變者也臣自少器業無聞𢎞大誤變燕鼎超憑吳舟託翰負組假翼要瓊質圖玄素文寫青雘爵富諸公任髙羣彥銓梁既失輻誚所湊雖仄影毗道徇身贊德朝徽不昭民聽具溢豈非性力知限鑒度有崖乘兹而處猶懼紊辱之恥况此以任何堪湧溢之賜且董督條興皆非盛古至乃河襄初授或體兼上才江表廣任或功為物首臣積陋于國不勤睿朝寵集若是非所尅敢終抱寸襟重露愚見伏願天鑄廣裁地靈厚載特垂蠲渥使不矜盈則藿質蓬性庶無矯奪不任匪晏之情蕭驃騎上頓表臣某言伏見明詔鑾輿便御親六師臣又謬總羣帥竊聞金火告耀昏明代卷雲電溉湊經綸相襲所以草昧縣宇昭晰區宙况乃逆徒阻兵器掩西服雖蟻衆鼠竊勢必褫散然尋仞難貸原煙易滅臣受算內楹稜威外閫按甲視夕沾襟待旦翦此凶渠庶匪曠旬但遂玉輅躬臨雲蹕親駕悚慨交心實百常憤今便嚴率所統尅此月二十六日出次戎郊故已望江源以軫歎想荆山而增厲矣進止之宜更聽敇旨不任悚企匪寧之心蕭驃騎謝被侍中慰勞表臣某言即日侍中祕書監臣戢至奉宣詔旨慰勞便受轂中帷練甲外壘旍麾蔽景輿徒競氣人懷秋嚴士蓄霜斷晦魂已掩氛豎未懸稽鉞佇威寢興震慨今王人臨郊皇華降庭輝耀望實將激威武戴鶡之夫迎光蹀恩投石之師攀照竦惠楚纊越醪方兹慙潤臣忝屬閫私彌抱渥洽不任下情蕭驃騎慶平賊表臣某言狂賊沈攸之棄天犯紀毁禮滅緯外陵南畿內壘西夏稟血涵氣咸百讎憤賴皇威遐制璿圖廣馭四海競順其會如林仰綴宗稷之靈俯輯士民之效故嚴校裁交妖鋒折首凱期既屆樂飲在晨斯乃紫歷方永蒼氓同慶臣備符寵私時深抃舞不任踴躍之情蕭驃騎解嚴輸黃鉞表臣某言逆沴電熾凶妖霧舒志夫禋天情已類社故乃馳羽江郊騖燧山甸雖藏智審其黥戮涵識判其奔沮然兵扈難輕義險宜備故膺寵無辭奉鉞不讓今元凶既殪醜徒自紊祲靄方卷郢氛已廓樂琯登肆禮衣曳朝不宜復假殊服取缺彛則輒上還王府永戢祕館蕭驃騎讓太尉增封第三表臣某言以鉉司崇貴衮位淵嚴非德非功無忝無溢故誓魂肆請舒𠂻仰謁不能曲流慈照遂乃徒洽恩奬周覽未交靈爽以懼臣厯古沿圖循逺訪繪未嘗不麗選台衡妙簡槐采者也魯鄭之賢戚曹蕭之勳彥吳鄧之盛功王鍾之素業孔明之居蜀茂𢎞之在晉皆僉曰伊人是以處無懦色臣官逢昌世運漸時明頻煩紫渥綢繆璿命身薄施厚感厲愈深遂負機繩之託猥集衡梁之任風軌不樹徽猷罕宣無以式翦冦兆載弭姦萌致虹沴阻于上京霓妖扇于下國實賴藩伯鞠旅侯甸入守攙搶旬始煙祛霧卷故皇道威稜之由神緯昭昌之效臣豈有探敻察幽之旨攻城野戰之力哉今迹無小功事貽大賞愧寤終朝慙夢流夜咨此庸弱何以任忝伏惟淮泗猶梗趙魏未賔中原久蕪神州方翳思樂盛猷願厲聲頌將陪雲驂以北守扈朝服以濟師乃為少雪庸誠微謝天眷耳寧容遽竊茂爵輕頒鴻名者乎伏願聖渥遐覃賜以矜宥霈焉垂仁穆然惠德血祈旦亮慊志夕滿雖蹈疵戾猶深抃躍蕭驃騎讓太尉增封表臣某言撰心求私精衷請亮情不感神理無動天詔飾既降辭表是絶朱紱方臻金鉉未宥魄慮再馳詵然改席臣局心久戰淺槩已領具煩寸管備黷尺史曠旬浹景祈指遂宜猶謂設品分職實以仰銓璧緯列寵懸榮故乃俯酌瑶陛迹聨盈缺道協興降上睿所以僉舉前英所以詳能今若第隨私貴爵與私富紊蕩邦經斷折民紀豈可還風中葉逖聽遐代者也臣才乏往賢績謝古列妖鋒孽火將炎天地幸郊甸或靜江山以閟文軒華劍既榮既峻侯封桂食又盈又滿祿髙誚厚任重責深弱節兼誠誓思不淺伏願隆慈特垂明愍臣奉國猶家慮公若私秉軸之鈞心希在治不任懇懇之情蕭驃騎讓油幢表臣某言奉詔賜車一乘竊以國容方穆旗章式序朝禮永清儀服咸貫故象革建鑣尚炯周圖朱箱玄蓋猶照漢篆皆旌羽勿差功庸匪濫臣忝爵山重蒙榮海深襲恩祇册已慙初筮浮祿素位方疚心路鑒古以惕巡世罔然不宜假文丹幰空飾皂轖仰思至道俯恤物僣伏願聖逺特停華渥書愚上請追深纍懼不任下情蕭太尉上便宜表臣公言臣聞經邦緯治去華為急體國字民循素乃安聖誥遺風具騰丹册賢言流沫備宣青史何嘗不翦削浮奢銷遣文繪然後頌音載興澤洽式廣楚駕百馬民雜國雕秦修萬騎教亡業墜刻桷丹楹禮有常序朱幡皂蓋古無濫秩縹衣綸綬漢置前制竒服怪物周設常刑皆節俗約訓反朴還風肅政黎心釐一民志故禮奢寧儉宣尼之髙風以義止利孟軻之宏規若乃文彩利劒道鑒其元雕蟲篆刻世照其淺雖儒墨異學名法各治至于遵本捨末其槩一也故荀韓之立典管晏之制書賈陸之鴻筆嚴徐之博辭食貨興志鹽鐵生論莫不異説而同儉乖議而共治然世淪物起道缺事遷蓋源起西秦波被東漢一魏不變二晉未革所從來者逺矣洎髙祖武皇帝業髙懸宇化革區宙菲躬謙度方追重華納麓之勤約情撝操乃取文命卑宫之義去金錦之巧無帷帳之飾唯修逺圖綏國之術祈勸力耕濟世之規是以政平刑偃紫階斯廓太祖文皇帝恭已明臺之上聽政衢室之下九官咸靜萬績惟凝亦復務抑華詡思裁奓泰輿馬翠翟之麗鮮登乎外禁瑶碧綺組之玩罕設于內宫故大德立而五路謐鴻名建而四民寧者也自頃政教日替敦遫月虧誰惟厯稔亦曰淹紀至乃帝臺傾海外之寶王城盡天下之祕象席珠履一躡而即收鏤琴綵瑟再撫而己損褧衣隨塵而罷羅袂從風而棄百民染其聲奢萬姓被其馳蕩故闤闠之里富者竊梁楚之乘伎巧之家豪者襲王公之服于是有文靡虛麗驕邪不典之器精纎空飾妙蠱非常之玩農夫勤耨不充浮伎之資蠶女務織無給點刻之費將恐去實就華未知所屆背源從流不識其止求國富兵強寧可得乎今江南所宅止漢魏兩州之地户口所檢裁文景三郡之民舊齊故魯鞠為茂草全趙盛魏豺狼所嘷陛下方欲鳴鑾中土朝服濟河不改斯術則未見其可也臣謬屬大任竊同憂泰日晏宵分實忘飢寢草治其莠職此為先輒具條便宜可以安邦利民者事事如右率以聞見謹簡聖聽若其咸允謹請敕付外施行讓太傅揚州牧表崇絶之寵降自白日殊甚之禮墜于青雲祇畏驗盛若奪魂鑒巡席無容當軒改色臣聞天地之大德曰生聖人之大寶曰位將以啓廓靈緯崇樹神紀百司備列貴賤之分既炳九官咸贊升降之際可明故皇極不爽國步斯泰雖金媯各政姬華異治未有革序變倫而能流英發耀者也臣才慙右賢功愧上烈平趙夷魏之氣無宣于國書濟河登山之威未亮于左史既罕龍韜金匱之效又乏楹間帷中之績衛主寧謂提橫流匡危不足生細民故小節時顯于艱難大勳無紀乎廊廟而乘軺服冕荷蕭張之賞開城裂域受曹鄧之爵不能翊教緝政釐濟氓隱贊邦𢎞化飾整朝輝是以德少寵多輿人立規才薄位厚處士興議故玉燭未調道治猶欎者臣之為愧也不悟陛下復停日月之華凝煙露之潤擢臣瑣姿鑒臣陋誠前恩未曠後寵已襲上公祕鉞聲振都鄙文劒雕舄禮殊軒殿深褒之逮方今為絶大賚之降比古為超臣亦何功當處斯忝伏願道邈先帝理鏡衆寂被氣順方涵生獲慶特輟策書時停鴻册則人歌僉平物抱至歡蕭重讓揚州表臣某言臣以功狹賞峻世誥所讟才弱寵隆道經所諱故寫魂誓膽庶留天矚圖驕慮滿護守私吝不能青蘋引風陽燧要景復降綸册徽采兼明影迹交戰水煙相薄竊聞周夏異章玄素各禮儒道二宗名墨兩教咸以裕俗為急僉以得人為寶于是尊官上品乃貽玉振之賢鴻等懋列為取金聲之彥或有濟世夷難之略輝耀內區導江疏山之勤纒結中宇深德衍溢大功振驚然後超居國右鬱處朝端故九職惟宣六典式序丹青所以傳其藹磬管所以揚其音也臣才蔽識淺非集譽于鄉曲榮降寵臻乃假翼于皇極遂事等話言之寄任鈞符負圖之重職總表裏地聨機務位班昔良知闕前修居官不聞其風處秩焉見其政寰域之治未緝街縣之訟方興繒販之士無薦管庫之家寂寞四維不闡五教罕敷安可以底愼財賦交正庶士者也今輟和毗道仄身贊業尚據晦曉獲毗璇圖况異禮更飾褒命復崇名超列辟爵擬羣后上仁居之猶涵慙德臣實空儒伊何以勝既誣人文將黷玄緯凌厯飛流之眚懼失正和晦裂霓霧之災且濫庶物臣是以寤寐永歎憂國慮私者也伏聞陛下裁天賦品制地平施使曠世之典不遂臻于末躬迥代之軌無頓被于兹日素心丹魄皎然靡疚矣不任憂迫之情後讓太傅揚州牧表臣公言臣再辭非謙重讓靡飾實以爵髙中世厯古所難寵冠上俗綿代誰易詳圖辨針如鏡如水撿崖覽志匪雕匪文魂祈夢請駐心挂氣陛下猶降以璽書之榮被以丹碧之采頓然變容一慮九逝臣以為寒暑繇乎平分晦明辨乎天道咎譽起于微薄悔吝生于小疵故金衡既陳錯髮之異必懸銅墨咸設分撮之殊已傾聖哲不能爽鬼神莫由避况臣鄙槩早盈陋才久溢第超庶后禮絶羣班仰贊東序之賔平參北宫之政窮盈極滿于斯為甚鑒兹降替淵氷非譬所以坐洞房而不悟下輕帷而歎息也古之馭教當有道焉量能而受賞撰智而錫位深乃裂組逺故分圭前人以為稱首昔賢以為美詠自非上德橫乎天地髙績格于區宇烈譽馥于一時茂名欎乎當世者豈有降今日而莫先哉臣爰蒙殊寄六稔遂交及荷總任二曜忽周未能塞謗生民獲免童訟何盛勳之足題詎深烈之可銘乎而因委忝濫踰溢倫等朱軒躍馬光出電入貂冠紫綬寵藹霞照臣聞闔宗奉國猶非報殉方將身侍鑾華雪齊魯之侵地手執羈勒騖燕趙之逺郊然後追迹范張濯纓汾射臣之志也華爵盛典非所敢寧伏照右巡將流聖察無使匹槩血誠不諒于璿扆宏芬英猷遂蕪于里聽豈伊庸臣獨蒙其庇亦曰海隅咸被其利焉蕭被侍中敦勸表臣公言即日侍中臣惠基給事黃門侍郎臣王僧珍至朱蓋乘雲玄軒肅霧墜髙天之旨集微臣之軀神爽瞿然斂影無地臣初長血心未啓素槩辭從意空言隨事盡不能降陛下一時之恩借俄頃之照遂枉近侍貂簪軾庭臣自亮無庸何以集此退咎慊誠悲枉垂光進誡朝訓虧兹盛序感慮躑躅榮結夢寐臣檢古少例巡今逾疑豈有妄叨天功虛竊上賞近謬國華坐取隆貴人見其過外惜皇猷內畏私眚昔西京鼎秩漢世權家丹墀網户擊鐘連騎何常不以驕滿貽戾謙沖要福者哉臣不能遵煙洲而謝岐伯迎雲山而抑許由激昻榮華之間沈潛印組之內光飾既超寵靈亦逺江左以來罕見其倫今位冠朝端通侯萬户結象弭于前衝奏金管于後陳都野宗其榮盛視聽驚其炎貴臣一旦居之誰以為不忝者乎而陛下猶崇以異禮者是增臣之戾也况復肅延華勸實深窘迫伏願俯矜單志賜遂前請則世寢橫議臣蒙緩責蕭被尚書敦勸重讓表臣公言臣五寫丹翹宜蒙凝照一降王人遂無蠲察復遣尚書臣岱兼侍中臣奐等奉宣慈靈重賜勉誨鏡伏回環憫默失圖心魄交懅淵谷匪譬臣自初被詔迄于今時載慙載疑以悚以厲豈非深懼鴻典永憂末躬故琴瑟徒鳴不傳廣樂之響燈燼空舉焉續經星之耀何則卓乎小者不足以任大守于蔽者不可以語通臣器乏淵源識暗機務倫濟夷險每憑璿厯之逺龕折氛霓輒資羣才之效臣寧有採竒鑒隱之能綱國提民之功乎不謂過延渥洽謬攀河漢榮宗蒀葐寵華暐映藉聲探議共知其幸况傅保之崇殷周特貴牧司之寄魏晉稱重上昭妙德次擬英勳有踰兹序鮮不紊裂今陛下方闢金門之聽調繡扆之政何得去禮廢雅近于臣始既無前章孰表後世臣才孤位峻待罪無日矣情哀理感事盡于斯伏願一運天景微見藿心則物不逃形臣何恨焉不勝燋憂狼狽之至蕭讓劍履殊禮表臣公言近仰局威靈辭移理奪故欲冒忝傅職必避殊禮不悟復凝令詔雕飾非常鏡睇未周金火交慮臣聞寵以昭賢不濫才外之華榮以麗身豈謀分表之渥哲后所以僉授貞臣所以慎荷故行圭行玉尚無輕頒一爵一號猶宜詳品况劍舄升陛贊唱異儀殆為對越神體抗禮天極漢魏舊載唯斯稱重雖英衮簉朝賢武滿世蒙此典者乃曠古時降耳諒由功饒賞結名髙器深金蟬緑綬未足藹其采瓊珮朱紱不足宣其榮方加以履殿優以勿趨雖至第為上公貴為皇王佇望兹禮猶邈如也臣何燀業寵兼昔人受以懼覆悔豈有及復聞殊旨增其憂迮抱此愚欵以殯為請伏願天鑒順臣所守則雖歿九幽傳榮萬葉矣蕭拜太尉揚州牧表玄文既降雕牒增輝禮謁前英寵華昔典仰震威容俯慙陋識心魂戰栗若殞若殯臣景能驗才無假外鏡撰已練志久測內涯故讓不飾迹辭非謙距寸亮尺素頻觸瑶纊丹誠實理備塵珠冕而神居寂阻九重嚴絶徒懷漢臣伏闕之誠竟無魯人回日之感所以回懼鴻威後奔殊令者也既而永鑒隆魏緬思宏晉國之大政在功與位故匡民紐亂不處輿臺之下去勳捨德寧班衮司之上咸以休對性業裁成器靈詎有移風變範尅耀倫序者乎臣績不照朝忠豈宜國名爵赫曦僶俯優忝陛下久超以異禮之榮越次殊常之秩雖寢寐矜戰曲垂哀亮而璽册沖正愈賜砥礪今便肅順天誥恭聞睿典審躬酌私必跋危撓將恐氓俗由此方擾軌訓以之交蕪臣豈不勉智罄忠也未知所以報奉淵聖輸感霄極取諸微躬長為慙荷蕭太傅謝追贈父祖表臣公言即日兼謁者僕射姓名奉宣詔書追贈臣亡祖某太常卿亡父某為散騎常侍特進左光祿大夫寵輝泉扃恩凝松石奉渥銘心祇光慟慮臣行阻祇玄躬早荼棘如創之痛昃日不追終身之恤霜露彌戚雖慙曾輿喬木之敬實抱仲路華衮之哀自謬藉圭金空貽組紱爵侈于公祿盈于私何嘗不靜欷其結默慕交深不悟睿孝動天昭性曠古惠被逺紀澤演慶世丹情靡諒峻册愈凝大榮集身尚驚異施况寵洽山柏特振殊造銷骨瀝命猶不勝謝不任鯁泗荷珮之誠蕭大傳辭輿駕親幸表臣公言近以神輿將降昌啓丹辭重被還旨未垂闓允謙尊彌光褒優愈臨慙疚既積敢忘謙請臣乘幸藉私豈曰無僭攀霞鏡月非復常所此必讓德信在于兹但恩嚴交泊固守莫從免默恭典伊榮加戚寧容爰枉鑾駕式驚臣府訪心驗已諒以不夷求物校迹誓無此義且古今異飾紫青變禮取諸臣躬未覿其安伏願陛下賜止冕輅時停雲駕則俗踐知方臣蹈厚泰蕭讓前部羽葆鼓吹表臣聞國容軍禮旌羽昭其華品騎第乘鸞㽔藹其飾所以炎曜仙都崇麗神境世教以之垂采民聽以之流文故勒岫銘海之功鞞革寫其詠龕難夷邦之業簫管凝其聲朱鷺玄雲既錫上德華山芳樹以頒竒勳爰及台賢位髙蕃戚名沿恩照寵垂私賞皆為發吹後陳豈曰兼奏前軒兹典罕行此禮實曠臣竊服己𢎞叨光無限才局秩逺常銜炯耀安可二葆同整雙弄頓驚覽躬惕然特貽厚謬伏願明爍日月靡忘情鑒將停盛飾遂臣慊心則涵惠既饒恭錫多矣謝開府辟召表臣公言近被詔旨賜令臣府自辟僚賢竊聞治以才為寶教以人為貴激風揚㽔實資山東之英凝華重馥良在關西之彥近以闡耀世經發麗朝序今州策郡聘兹理尚堙台召鉉辟斯文亟曖豈非盛美難嗣故曠寂先芬者哉臣謬贊國機職宜氷鑒未能澄形照藝薦品任官既乖覆業彌戚深寄仰屬皇心遙覃察政洞俗𢎞此懿典崇臣逺寵輒祇睿恩謹宣巖壑庶幽居之士蘿薜可卷竒武異文無絶于古蕭上銅鐘芝草衆瑞表臣公言臣聞象際懸通豈以明昧岨運幽岸遙鏡不以人靈異謀威書壁誥既信其綵緑鱗丹字彌驗其文是以業藹鴻經則煙露呈照精昭景緯則川嶽發華故寶鼎白雲瑞集軒世芝房赤鴈祥委漢年玄石鴻鐘逺炳晉室玉璧彛器近耀皇宗自大明乘規泰始疊矩朱鬐素毳之至史不絶書竒葉珍柯之獻府無虛月今懋歷啓圖靈基再固頃嵗以來禎應四塞近獲豫州刺史劉懷珍解稱所統建寧郡建寧縣昌村民于萬山中採藥忽聞異響從石上得銅鐘一枚長二尺一寸逺像古鑄近乖今製又州界之內樹生連理二木隔澗縢枝相通越壑跨水合為一幹方之舊説彌復為貴宣城所統臨城縣山中獲草一株交柯攢莖紫蓋黃裏貞潤暐􅎡自然天華採掇厯時質色不變闕此三字柄據有徵近獲吳興太守臣王奐云十一月二十九日解所統長城縣令臣張撝解稱其月二十五日甘露降縣東界下山之陰又東太守臣腦解所統武進令臣紀法宗云十一月十日解稱其月二十四日甘露降于彭山松樹至九日又降如初臣以祥緯雜沓星燭波連斯乃靈迹深覃睿𠂻敻感理宜寫順祇無涵祕稽往徴古僉欣升泰瑶光日闡玉繩永休謹拜表遣兼長史參軍臣姓名奉銅鐘芝草以聞懸通一作玄通蕭讓太傅相國齊公十郡九錫表備九錫之禮非常之册分天而降冠古之典開河而出遙然以慙魂交象魏臣聞日月權輿二儀所以尅靈君臣設極三統所以式固惟生與位謂之大寶辨諸文而尊卑既炳觀羣龍而貴賤可正雖復殷因于夏王資于帝至乎建侯分職體國經野其揆一焉是以二周之始山河愈廣兩漢之初封賞彌盛然表東海者實牧野之日瞻魯邦者乃負圖之辰西都英相信命世之功關中上宰亦龕亂之力秬鬯彤弓本西伯之賞虎賁戎路又晉公之典若乃衣裳之會九合一匡猶慙德斯禮也臣實鄙才靡識大體徒以忠貞為槩而勞不足銘雖以丹素為誠而功無可勒豈有經天緯地之略探隱照寂之智哉抑亦何術以堪盛休是以覽雲際而懷古憑軒幌而未寧也伏惟陛下神華馭世理無不鏡賜臣待謗今職守其私滿則天下有道庶人不議矣第二表臣公言臣近勵心罄辭寫情畢議眇望神藻鑒見丹襟而帝閽以祕綸誥方明中外卷容左右軫慮臣以為麗天秉經君上之彜憲儀地執緯臣下之恆軌故皇極載凝庶士交慎昔者重黎勤官裁居炎冥之職羲叔能任方掌日月之序至乎御龍勤夏未間冠俗之爵大彭翼商豈見超世之典以古先哲后如兹之慎賞也臣乃謬貽國寄志在靜難若夫野戰虹霓伏順者易為威城攻鯨虺奉國者理必全雲氣薄蝕下民咸貴其明恃險與馬舟中皆可異議故昌邑有歸邸吳楚無旋師斯激芬揚蕤物同其幸焚惡去醜世共其庇實為仰憑俯順之效臣亦何力之有焉竊謂祿為十郡必俟禹迹之勤錫以九命乃須周公之美况吕梁不鑿而器重玄圭越裳未獻而賦擬千乘京關識其崇貴畿服知其忝冒鏡前修而慙形覿往德而聳慮畏崖之請取誓深水審量之祈呈照皎景伏願陛下逺牽雄範近覽英規憑霞停詔臨風輟恩豈伊愚臣方被昌化具日遺氓咸蒙其賴矣被百寮敦勸受表臣公言臣欵誠素履頻載縑翰天飾髙奬纍降史筆即日尚書臣某等至重宣詔旨猥辱百僚省睇未交心靈已悸臣聞良宰謀朝不必借威貞臣衛主修已則足故驕滿之失取鏡函關謙讓之美見照伊闕臣本庸人識無逺度籍開闢之辰遭欃槍之運姦回內奰則戮力瓊都諸侯放命則抗節瑶祀秉號仗義幸不辱威皆為冕旒遙鑒之明羣士畫圖之助臣寧望伊摯叔旦之爵吕牙申甫之賞哉方欲謝簪東都濯冠汾陽不悟盛禮華典復臻于兹靜默回環祇畏躑躅猶謂遇聰明之朝當時雍之世陛下詠堯風之化歌卿雲之詩日月華采萬方獲性疊慮仰祈必蒙題品而威嚴窈絶斯冀遂阻鑾輿玉駕復許敦幸重臣愆悔無地自安便當謹恭鴻命竭身為限蕭拜相國齊公十郡九錫章殊命寶典欎降雲天采詔軒騎光流城籞震驚華禮神氣交越臣才謝深英器慙逺度進寡兵車召陵之盟退靡朝歌河內之會無束馬山戎之績懸車流沙之功故望寵未安踐榮加懼况納陛朱户事絶羣班金璽緑綬儀參鴻典聞命屏營以憂以墜近申微欵日月之鑒既阻方懼難慊蘭芳之旨愈峻遂致百辟卿后踟蹰于魏闕鑾輅旗旗方幸于臣府悵然遙慮將貽厚戾文章徒單迄無蠲省而天威咫尺丹懷罔固輒肅恭文物翹拜榮禮違距以深追增怵迫德輶寵盛于斯為微非臣鄙虛所能酬對蕭相國讓進爵為王第二表臣竭慮歸請三辰未鏡傾魂仰視九天彌阻重炳徽策再錫光誥理晦情震若涉嚴淵臣業不出世績未逮古謬藉明政陳力就列艱多智寡翊贊罔樹若乃洪範不修鍾綴旒之日九黎亂政當摧軸之辰雖瀝命奉時禍提下亟防明之陋貽慙昔人杜險之蔽取愧前英故十萬之師無集稿街之邸千金之貴恆單白藏之府戈船發于江湖戎車出于石城然後雲徹席卷虔劉巨禍臣實恧焉不寤上賞亟降華爵必集雖延首紫局翹意宸居執揣守約之志既謝簡文避賢辭智之請終無開允故受任專征逺邇知寵肇封四履侯甸推禮昔虞思勤夏不列殊物之錫晉叔匡周豈頒上公之典燕藩懿親裁蒙衮舄之榮梁國戚屬方忝旌旗之貴而臣包括庶揆總納儀形蓋出近古非三代之逺體也公復乃踰九命爰超五等域中之稱麗天作則探情顧抱豈所允安者哉伏願陛下一檢丹崖遂臣慊心無使怵迫深貽疵戾蕭相國拜齊王表臣無佐夏匡殷之功威晉服楚之績業不題于宗器聲靡記于彛典而超居上禮邈乘峻爵靜念隆替焦原非譬臣以為衆官咸事帝謨所以式序羣后克讓王猷所以載穆况臣訪德語勤未洎伊稷之能藉靈懷寵以濫周召之秩故駐魂仰請瀝意歸聞理竭素牒事罄丹史具徽大微備簡玉繩而才輶志淺隔景絶照朱輪之使日月亟紆金鑾之尊旦夕將拂巡情覽識豈伊寧處今便肅典內軒恭服外屏大夫有命古或無違王假有廟今臣為叨三省空懦震據于心齊王謝冕旒諸法物表臣王言以軒冕雲蹕既非常之飾宫懸玉戚乃配天之禮故呈襟效慮必祈蠲亮重被還旨芳訊愈越鏡伏殊私情影逺震昔大啓營丘未備樹羽之賞光宅曲阜始兼龍旗之貴况道狹慶隆身薄器尊粉繡爭輝藻火競耀夫太常圖列星之采華蓋觀古人之情所以聳絶百縣崇隔萬宇鳳閣因此而神瓊都由兹而麗故愧功慙德違儀避榮誠不遙孚理無敻達遂貽嚴誥爰斷辭表驚栗遲回祈鑒何地便當肅對王休敬昭異寵佩服盛文以慨以懼齊王讓禪表逺規唐虞永揖之典近謨漢魏髙樹之禮既覽金水昏明之數又協雲雷隆替之徵激風太上扇采至公聞命驚爽心靈殞越臣聞天地草昧而樹之君所以平對二儀顯臨萬國膺符受厯總明司幽軒轅陟祚首出庶物顓頊登庸作為民紀雖五德迭興十代繼運非賢非睿莫預斯位若乃與能之交禪錫之會豈伊虛薄所可遵擬昔傅巖佐商秩終上公磻溪翼周名極列伯臣才非半古功愧逮聖獄訟不往謳歌寧歸河乏馬圖之寶天無乘龍之錫元首股肱誓不可異而曠乘之軌忽臻于兹慙慨憂灼罔識其際伏願陛下遺舜禹之心臣守巢由之節則道耀日月澤浸飛泳聲振開闢仁動今古四三王而六五帝不亦休哉南齊文紀卷八
