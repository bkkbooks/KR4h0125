body:
  text: 南齊文紀卷七明梅鼎祚編謝朓字𤣥暉陳郡陽夏人歴吏部尚書郎下獄死辭隨王子隆牋子隆為荆州刺史好辭賦數集僚友朓以文才尤被賞愛長史王秀之以朓年少相動密以啓聞世祖敕還都遷新安王中軍記室牋辭子隆時荆州信去倚待朓執筆便成文無點易故吏文學謝朓死罪死罪即日被尚書召以朓補中軍新安王記室叅軍朓聞潢汙之水願朝宗而每竭駑蹇之乘希沃若而中疲何則臯壤揺落對之惆悵岐路東西或以嗚悒况乃服義徒擁歸志莫從邈若墜雨翩似秋蔕朓實庸流行能無筭屬天地休明山川受納褒采一介抽揚小善故得捨耒場圃奉筆兎園東亂三江西浮七澤契濶戎旃從容讌語長裾日曳後乘載脂榮立府庭恩加顔色沐髮晞陽未測涯涘撫臆論報早誓肌骨不寤滄溟未運波臣自蕩渤澥方春旅翮先謝清切藩房寂寥舊蓽輕舟反溯弔影獨留白雲在天龍門不見去德滋永思德滋深惟待青江可望候歸艎于春渚朱邸方開效蓬心於秋實如其簪履或存衽席無改雖復身填溝壑猶望妻子知歸攬涕告辭悲來横集不任犬馬之誠謝宣城集亂願南齊書作思翩作飃南史作泛為王敬則謝㑹稽太守啓敬則晉陵南沙人歴太尉大司馬舉兵反敗誅臣本布衣不謀逺大折衝之勤不舉燮理之義何階常恐覆餗是貽咎徵斯應陛下繼歴聖統日月重光得以桓圭衮服拜奉嵗時視濯獻牲鞠躬郊廟而鴻恩妄假覆授龜符玉節邁於雙璜表東侔于四履臨邉三事旣謝張温潁川再撫亦慙黄霸朓為敬則婿其謀起兵朓先啓聞謝隨王賜紫梨啓味出靈關之隂㫖珍玉津之澨豈徒真定歸美大谷慙滋將恐帝臺妙棠安期靈棗不得孤擅玉盤獨甘仙籍雖秦君傳器漢后推飡望古可儔於今何荅謝隨王子隆賜左傳啓昭晰殺青近發中汗恩勸挾䇿慈勗下帷朓未窺山笥早懵河籍業謝專門說非章句庶得旣困而學括羽瑩其䝉心家藏賜書籝金遺其貽厥披覽神勝吟諷知厚並藝文類聚覩窺初學記作為宣城公拜章惟天為大日星度其象謂地蓋厚河岳宣其氣斯冕旒所以貞觀衮職所以代終慙下穆而上尊豈南征而北怨何以克詠九歌載宣七德銘彼旗常勒斯鐘鼎為齊明帝讓封宣城公表如其懸旌灞滻刷馬伊穀灑酒望屬車之塵整笏侍升平之禮陛下訏謨𤣥覽欽若宏圖鑒臣匪躬共申彞訓雖量能之請近遂微躬則𢎞長之風足軌來世為明帝拜録尚書表升降玉階對揚休命六轡在手千里何偕司㑹天官之統尚書百僚之本𢎞之即庶績惟凝替之則彞倫斯斁修身踐言本慙吾美果行育德未階大正妄屬負圖之寄多謝五仁之績操檜檝于龍津荷梓梁于雲構無以輔位明堂遺象麟閣為百官勸進齊明帝表臣聞時乘在御必待先天之業神化為皇乃叶應期之運况復湯孫有緒纂堯惟德舊邦佇新復禹歸祉大齊之權輿寳歴孕育前古昭格四海克酬三靈而嗣命疾威蕃鄙叛渙委裘御㝢彞鼎如忽陛下文思體道狥齊作聖翦應龍于冀州戮長蛇于沮水榮光之瑞昭回延喜之寳潤色天眷爰發人謀咸贊伏願陛下仰荅靈祇𢎞宣景命誕受多方奄宅萬國齊明皇帝諡册文維永泰元年九月朔日哀子嗣皇帝諱仰惟大行皇帝早棄萬邦聖烈方逺式遵帝世俾鬯鴻猷咸以為無名以化則言繁莫宣其道有求斯應則影響庶圖其功所以永言配命寄心宗極光昭令德允樹風聲伏惟大行皇帝令信四時齊明日月創光大于登庸通機神于授命因時以暢藉九萬而輕舉天保旣定運四海而髙臨及乃開物成務重維國紐風作草偃心往如神左賢右戚内樂外禮緝五材以教民申三驅而在宥用能盡德殷薦美善斯畢皇矣之業旣孚蒸哉之道咸備景化方逺厭世在天龜筮告期逺日無改仰則前王俯詢百辟累德稱睿允極鴻名謹命某甲奉太牢之奠謹上尊諡曰明皇帝廟號高宗天人允恊神其尚饗嗚呼哀哉文苑英華作求藝文作來令信作合信齊明作齊光光大保大風作作風行心作化盡德作盛德齊敬皇后哀䇿文明帝后劉氏名惠端彭城人帝崩遷祔山靈朓撰哀册文齊世莫有及者惟永泰元年秋九月朔日敬皇后梓宮啓自先塋將祔于某陵其日至尊親奉奠某皇帝乃使兼太尉某設祖于行宮禮也翠帟舒阜𤣥堂啓扉俎徹三獻筵巻六衣哀子嗣皇帝懷蜃衛而延首想鸞輅而撫心痛椒塗之先廓哀長信之莫臨身隔兩赴時無二展旋詔左言光敷聖善其辭曰帝唐逺胄御龍遥緒在秦作劉在漢開楚肇惟淑聖克柔克令清漢表靈曾沙應慶爰定厥祥徽音允穆光華沼沚榮曜中谷敬始紘綖敎先穜稑睿問川流神襟蘭郁先德韜光君道方被于佐求賢在謁無詖顧史𢎞式陳詩展義厚下曰仁藏往伊智十亂斯俟四教罔忒思媚諸姑貽我嬪則化自公宮逺被南國軒曜懷光素舒佇德閔予不祐慈訓早違方年沖藐懷袖靡依家臻寳業身嗣昌暉夀宮寂逺清廟虚歸嗚呼哀哉帝遷明命民神胥悦乾景外臨隂儀内缺空悲故劒徒嗟金穴璋瓚奚獻褘褕罔設嗚呼哀哉馮相告祲宸駕長往貽厥逺圖末命是奬懷豐沛之綢繆兮背神京之𢎞敞陋蒼梧之不從兮遵鮒隅以同壤嗚呼哀哉陳象設于園寢兮映輿鋄于松望承明而不入兮度清洛而南游繼池綍于通軌兮接龍帷于造舟廻塘寂其已暮兮東川澹而不流嗚呼哀哉藉閟宮之逺烈兮聞纘女之遐慶始協德于蘋蘩兮終配祀而表命暮方纒于賜衣兮哀日隆于撫鏡思寒泉之罔極兮託彤管于遺詠嗚呼哀哉為隨王粲東耕文穀躔星景穡表踖先八政奚首六府兹宣弊嗟非國登頌有年一夫或怠望嵗誰天祭大雷周何二神文大過在運小雅盡缺瓊鏡日淪金車未晰周生電斷神謨英冠正因部竒風歛雲散晉德如燬功資叶贊山無猛鷙時曠忠賢流王于彘龜鼎忽焉忠肅布衣君親自然驅狐上國斬鯢中川紛綸凱入氛氲配天為諸娣祭阮夫人文婉娩嬪德幽閑媍性眄史𢎞箴陳詩嫻詠嘉言足題清暉可映契闊未幾音塵如昨中景遽傾芳木先落疇昔交觴享也虚薦帶上先結握中遺扇迸淚失聲潺湲如霰臨海公主墓銘長發有祥瑶臺乃搆𤣥鳥歸飛北音斯奏聿來徐土禎符爰授帝體靈柯穠華以秀飾館東魯言歸景族有教公宮無繫車服旣肅簮珥亦崇湯沐率禮衡門降情雲屋彼月斯望在釣維緍瞻須配景望燭齊神霾華崐岫滅采上春慈纒雲陛悲動外姻鬱彼崇芒睠然城輦輜翟按轡龍旒徐轉新安長公主墓銘氛氲長發時惟睿文誕兹明淑玉振蘭芬譽宣女師德侔高行肅穆嬪風優游閫正撫事成箴臨圖作鏡如何冥黙方春委盛鬱林王墓銘緑車旖旎翠㽔掩映癸貳戲良臨祧弛盛毁德歸桐棄尊君鄭宋海陵王墓銘趙宋沈括夢溪筆談云慶歴中予在金陵有饔人以一方石鎮肉視之若有鐫刻試取洗濯乃宋海陵王墓銘謝朓撰并書字如鍾繇朓集不載藝文類聚載十二句未全中樞誕聖膺歴受命於穆二祖天臨海鏡顯允世宗温文著性三善有聲四國無競嗣德方衰時唯介弟景祚云及多難攸啓載驟載獵高闢代邸庶辟欣欣威儀濟濟亦旣負扆言觀帝則正位恭己臨朝淵黙䖍思寳締負荷非克敬順天人高遜明德西光已謝東旭又良龍纛夕儼葆挽晨鏘風揺草色日照松光春秋非我晩夜何長載驟載獵藝文類聚作載驅軨轄為録公拜揚州恩教昔召南分陜流甘棠之德平陽好道深獄市之寄吾忝屬負荷任摠侯伯受餞元戎作牧中甸此地五都雜㑹四方是則而向隅之矜斯積納隍之歎猶繁興念下車無忘待旦其齊禮導德致之仁夀𢎞漏網之寛申在宥之澤餉諸葛璩教朓為東海太守昔長孫東組降龍丘之澤文舉北輜髙通德之稱所以激貪立懦式揚風範處士諸葛璩高風所漸結轍前修豈懷珠披褐韜玉待價將幽貞獨往不事王侯邪聞事親有啜菽之窶就養寡藜蒸之給豈得獨享萬鍾而忘兹五秉可餉穀百斛詶德賦序右衛沈侯以冠世偉才眷余以國士以建武二年余將南牧見贈五言余時病旣以不堪莅職又不獲復詩四年余忝役朱方又致一首迫東偏寇亂良無暇日其夏還京師且事讌言未遑篇章之思沈侯之麗藻天逸固難以報章且欲申之賦頌得其盡體物之㫖詩不云乎無言不酬無德不報言旣未敢為詶然所報者寡於德耳故稱之詶德賦思歸賦序夫鍳之積也無厚而納窮神之照心之徑也有域而懷重淵之深余少而薄遊身缺防方思俄然萬里晩而自省諒非一塗埜鶩賦序有門人斃一埜鶩因以為獻予旹命以登俎用待賔客客有愛其羽毛請余為賦謝朏字敬沖莊次子歴授中書監司徒衛將軍與王儉書夫所貴天下之士者何其上則閟景山壑凌氣風霞次則取緍捨築鬱為上佐次則服秦楚而辭其功振燕魏而逃其賞凡此數輩皆英懿之士也自茲已降參差萬緒或跡著明晦或才兼黙語若桓譚之褰俗馮衍之忤時北海之凝峭中散之峻絶率以方寸之情喪不訾之德盖無取焉若相如之愛竒任達偉長之淹粹𢎞逺樂廣融通裴楷夷淡彼四賢者並純神絶景狥物傷意甚慕之而未可以言但心之所暗咫尺千里志之所符滄洲曖然揣而論之寔山阿之不肖者也藝文類聚與弟卄瀹書卄瀹字義潔歴散騎常侍太子詹事朏侍中求出為吳興太守明帝謀入嗣位引朝廷舊臣朏内圖止足且實避事弟卄瀹時為吏部尚書朏至郡致卄瀹數斛酒還書曰初朏為吳興卄瀹於征虜渚送别朏指卄瀹口此中惟宜飲酒卄瀹建武之朝專以酣飲為事可力飲此勿豫人事南史力尺牘云今致數斛酒可飲酒勿豫人事劉繪字士章彭城人太常俊弟文章談義皆為後進領袖歴大司馬從事中郎為豫章王嶷上武帝請改葬故巴東王子響表子響初養於嶷及以逆誅絶屬籍賜姓蛸氏武帝後亦追憐之豫章王嶷欲求葬子響召繪使為表繪求紙筆須臾便成嶷足八字云提㩦鞠養俯見成人乃嘆曰禰衡何以過此表上不許劉繪傳臣聞將而必戮炳自春秋罄于甸人著于經禮猶懷不忍之言尚有如倫之痛豈不事因法往情以恩留故庶人蛸子響識懷靡樹見淪不逞肆情一朝致陷凶德遂使迹隣非孝事近無君身膏草野未云塞釁但韔矢倒戈歸罪司戮即理原心亦旣迷而知返釁骨不收辜魂莫赦撫事惟往載傷心目昔閔榮伏􅂒愴動墳園思荆就辟側懷丘墓皆兩臣釁結於明時二主議加於盛世積代用之為美歴史不以云非伏願一下天矜爰詔蛸氏使得安兆末郊旋窆餘麓微列葦輤之容薄申封樹之禮豈伊窮骸被德實且天下歸仁臣屬忝皇枝偏留友睦以臣繼别未安子響言承出命提㩦鞠養俯見成人雖輟𦙍蕃條歸體琁萼循執之念不移傅訓之憐何已敢冒宸嚴布此悲乞虞羲字子陽㑹稽人始安王侍郎兼建安記室叅軍事天監中卒見集序南史字士光餘姚人以文學與沈約俱為文惠太子所遇官至驍騎將軍又云卒於晉安王侍郎與蕭令王僕射為袁彖求諡書彖隆昌元年卒諡靖子袁侍中體高亮之𢎞姿挺孤竒之逸操孝友結於衡閭忠正表於邦域懷抱七經該綜百氏清文麗目幾義窮神言非義而不發容遵禮而後動居貧無悶事等安期處顯不驚道均無歎兄弟親從同居共財怡怡雍穆人所不聞顧與善無徵報施徒語岱山委岫崑岳摧鋒四海搢紳誰不掩泣明公德冠時宗道高物表若得横議聖時斟酌今古採茂實於當年標芳流於千載馳徽謚於山道潤貞氣於泉門豈非體國之至公典謨之盛軌者哉藝文類聚陸厥字韓卿吳郡吳人歴後軍行叅軍父閑坐始安王遥光反被誅厥感慟而卒與沈約問聲韻書先是宋太子詹事范曄與諸甥姪書自論云性别宮商識清濁斯自然也觀古今文人多不全了此處縱有㑹此者不必從根本中來言之皆有實證非為空談年少中謝莊最有其分手筆爽易文不拘韻故也吾思乃無定方特能濟難適輕重所稟之分猶當未盡但多公家之言少於事外逺致以此為恨至齊永明末盛為文章厥與沈約謝朓王融以氣類相推轂汝南周顒善識聲韻約等文皆用宮商以平上去入為四聲有平頭上尾蠭腰鶴膝五字之中音韻悉異兩句之内角徴不同不可增減世呼為永明體沈約宋書謝靈運傳後又論其事云夫五色相宣八音協暢由乎𤣥黄律呂各適物宜欲使宮羽相變低昂互節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異妙達此㫖始可言文至於先士茂制諷髙歴賞子建函京之作仲宣灞岸之篇子荆零雨之章正長朔風之句並直舉胸情非傍詩史正以音律調韻取高前式自靈均以來多歴年代雖文體稍精而此秘未覩至於高言妙句音韻天成皆暗與理合匪由思至張蔡曹王曾無先覺潘陸顔謝去之彌逺世之知音者有以得之厥意謂不然與約書約荅之然約論四聲妙有詮辨而諸賦亦往往與聲韻乖范詹事自序性别宮商識清濁特能適輕重濟艱難古今文人多不全了斯處縱有㑹此者不必從根本中來尚書亦云自靈均以來此祕未覩或暗與理㑹匪由思至張蔡曹王曾無先覺潘陸顔謝去之彌逺大㫖欲宮商相變低昂互節若前有浮聲則後須切響一簡之内音韻盡殊兩句之中輕重悉異辭旣美矣理又善焉但觀歴代衆賢似不都闇此處而云此祕未覩近於誣乎案范云不從根本中來尚書云匪由思至斯則揣情謬於𤣥黄摘句著其音律也范又云時有㑹此者尚書云或闇與理合則美韻清謳有辭章調韻者雖有差謬亦有㑹合推此以往可得而言夫思有合離前哲同所不免文有開塞即事不得無之子建所以好人譏彈士衡所以遺恨終篇旣曰遺恨非盡美之作理可詆訶君子執其詆訶便謂合理為闇豈如指其合理而寄詆訶為遺恨耶自魏文屬論深以清濁為言劉楨奏書大明體勢之致齟齬妥帖之談操末續顛之説興𤣥黄於律呂比五色之相宣茍此秘未覩兹論為何所指耶愚謂前英已早識宮徴但未屈曲指的若今論所申至於掩瑕藏疾合少謬多則臨淄所云人之著述不能無病者也非知之而不改謂不改則不知斯曹陸又稱竭情多悔不可力强者也今許以有病有悔為言則必自知無悔無病之地引其不了不合為闇何獨誣其一合一了之明乎意者亦質文時異今古好殊將急在情物而緩于章句情物文之所急美惡猶且相半章句意之所緩故合少繆多義兼于斯必非不知明矣長門上林殆非一人之賦洛神池鴈便成二體之作孟堅精正詠史無虧于東主平子恢冨羽獵不累于慿虚王粲初征他文未能稱是楊脩敏捷暑賦彌日不獻率意寡尤則事促乎一日翳翳愈伏而理賖于七步一人之思遲速天懸一家之文工拙壤隔何獨宮商律呂必責其如一耶論者乃可言未窮其致不得言曾無先覺也沈約答書宮商之聲有五文字之别累萬以累萬之繁配五聲之韻高下低昂非思力所學又非止若斯而己也十字之文顛倒相配字不過十巧歴已不能盡何况復過於此者乎靈均以來未經用之於懷抱固無從得其髣髴矣若斯之妙而聖人不尚何耶此盖曲折聲韵之巧無當於訓義非聖哲立言之所急也是以子雲譬之雕蟲篆刻云壯夫不為自古辭人豈不知宫羽之殊商徴之别雖知五音之異而其中參差變動所昧實多故鄙意所謂此意未覩者也以此而推則知前世文士便未悟此處所以文章之音韻同弦管之聲曲則美惡妍蚩不得頓相乖反譬猶子野操曲安得忽有闡緩失調之聲以洛神比陳思他賦有似異手之作故知天機啓則律呂自調六情滯則音律頓舛也士衡雖云炳若縟錦寧有濯色江波其中復有一片是衛文之服此則陸生之言即復不盡者矣韻與不韻復有精麤輪扁不能言之老夫亦不盡辨此並南齊書不炳南史作煥末句亦辨盡此樂藹字蔚逺南陽淯陽人仕齊為南康王西中郎諮議叅軍入梁終廣州刺史與竟陵王子良牋豫章文獻王嶷寛仁𢎞雅有大成之量性汎愛不樂聞人過失嘗為江荆湘三州刺史羣吏中藹與彭城劉繪吳郡張稷最被親禮薨後藹與竟陵王子良牋道德以可乆傳聲風流以浸逺揮稱雖復青簡締芳未若玉石之不朽飛翰圖藻豈伊雕篆之無沬丞相沖粹表于天真淵照殆乎機象經邦緯民之範體國成務之規故以業茂惟賢功高則哲神輝眇邈叡筭不追感纒奉車恨百留滯下官夙禀名節恩義軫慕望𡑞結哀輒欲率荆江湘三州僚吏建碑壟首庶徽猷有述茂則方存昔子香淳德留銘江介鉅平遣烈墮淚漢南况道尊前往惠積聨綿者哉下官今便反假無由躬事刋斲須至西州鳩集所資託中書侍郎劉繪營辦與右率沈約書藹與約書求為豫章王碑文約答書辭之建武中第二子子恪托約及太子詹亊孔稚珪為文夫道宣餘烈竹帛有時先朽德孚遺事金石更非後亡丞相獨秀生民傍照日月標勝丘園素履穆於忠義譽應華衮功迹著於弼諧無得而稱理絶照載若夫日用閴寂雖無取於錙銖嵗功宏逺諒有寄於衡石竊承貴州士民或建碑表俾我荆南閱感無地且作紀江漢道基分陜衣冠禮樂咸被後昆若其望碑盡禮我州之舊俗傾㕓罷肆鄙土之遺風庶幾前烈或不泯墜荆江湘三州䇿名不少竝欲各率毫釐少申景慕斯文之託歴選惟疑必待文蔚辭宗德僉茂履非高明而誰豈能騁無愧之辭詶式瞻之望吾西州窮士一介寂寥恩周榮譽澤遍衣食永惟道廕日月就逺緬尋遺烈觸目崩心常謂福齊南山慶鍾仁夀吾儕小人貽塵帷盖豈圖一旦遂投此請沈約答書楊云文選有此碑文又作答劉繪誤丞相風道引曠獨秀生民凝猷盛烈方軌伊旦愸遺之感朝野同悲承當刋石紀功傳華千載宜須盛述實允來談郭有道漢末之匹夫非蔡伯喈不足以偶三絶謝安石素族之台輔時無麗藻迄乃有碑無文况文獻王冠冕彞倫儀形㝢内自非一世辭宗難或與此約閭閈鄙人名不入第歘酬今㫖便是以禮許人聞命慙顔已不覺汗之沾背也並南齊書奏請朝直和帝中興元年藹為左丞奏詔可敇㫖以軍旅務殷且停朝直竊謂匪懈于位義昭夙興國家舊典不可頓闕與兼右丞江詮等參議八座丞郎以下宜五日一朝有事郎坐待下鼓無事許從實還外何諲之祭魚用鮮稿議永明六年太常丞何諲之議桑惠度駁不行今祭有生魚一頭干魚五頭少牢饋食禮云司士升魚腊膚魚用鮒十有五上旣云腊下必是鮮其數宜同稱膚足知鱗革無毁記云稿魚曰商祭鮮曰脡祭鄭注商量脡直也尋商㫖裁截脡義在全賀循祭義猶用魚十五頭今鮮頓删約稿皆全用謂宜鮮稿各二頭稿微斷首尾示存古義國子助教桑惠度議記云尚𤣥酒而俎腥魚𤣥酒不容多鮮魚理宜約干魚五頭者以其旣加人功可法於五味以象酒之五齊也今欲鮮稿各雙義無所法功臣配饗議永明十年詔故太宰褚淵太尉王儉司空栁世隆驃騎大將軍王敬則鎮東大將軍陳顯達鎮東將軍李安民六人配饗太祖廟庭祠部郎何諲之議功臣配饗略行宋世檢其遺事題列坐位具書贈官爵諡及名文不稱主便是設板也白虎通云祭之有主孝子以繫心也揆斯而言升配廟庭不宜有主宋時板度旣不復存今之所制大小厚薄如尚書召板為得其衷伏曼容字公儀平昌安丘人仕宋南海太守齊中散大夫入梁終臨海太守服色宜依姓尚議齊時玉金輅建碧旂象木輅建赤旂永明初太子步兵校尉伏曼容議駁不行齊德尚青五路五牛及五色幡旗並宜以先青為次軍容戎事之所乘犧牲繭握之所薦並宜悉依尚色三代服色以姓音為尚漢不識音故還尚其行運之色今旣無善律則大齊所尚亦宜依漢道若有善吹律者便應還取姓尚太子僕周顒議三代姓音古無前記裁音配尚起自曼容則是曼容善識姓聲不復旁假吹律何故能識逺代之宮商而更迷皇朝之律呂而云當今無知吹律以定所尚宜附漢以從闕耶皇朝今以行運為所尚非關不定于音氏如此設有善律之知音不宜遵聲以為尚議五輅奏永明中曼容為步兵校尉奏時駮不行宋大明中尚書左丞荀萬秋議金玉二輅並建碧旂象革木輅並建赤旂非時運所上又非五方之色今五輅五牛及五色幡旗並請准齊所尚青色隋書庾曇隆通直散騎常侍論郊壇立宮室啓建武二年詔付外詳隆議不行伏見南郊壇員兆外内永明中起瓦屋形製宏壯檢案經史無所准據尋周禮祭天於圜丘取其因髙之義兆於南郊就陽位也故以髙敞貴在上昭天明旁流氣物自秦漢已來雖郊祀參差而壇域中間並無更立宮室其意何也政是質誠尊天不自崇樹兼事通曠必務開逺宋元嘉南郊至時權作小陳帳以為退息太始薄加脩廣永明初彌漸髙麗往年工匠遂啓立瓦屋前代帝王豈於上天之祀而昧營構所不為者深有情意記稱掃地而祭於其質也器用陶匏天地之性也故至敬無文以素為貴竊謂郊事宜擬休偃不俟高大以明謙恭肅敬之㫖庶或仰允太靈俯愜羣望國子助教徐景嵩議伏尋三禮天地兩祀南北二郊但明祭取犧牲器用陶匏不載人君偃處之儀今棟瓦之構雖殊俱非千載成例宜務因循太學博士賀瑒議周禮王旅上帝張氊案設皇邸國有故而祭亦曰旅氈案以氈為牀於屋中不聞郊所置屋宇驍騎將軍虞炎議兼左丞王摛議掃地而祭於郊謂無築室之議並同曇隆驍騎將軍虞炎議誠慤所施止在一壇漢之郊祀饗帝甘泉天子自竹宮望拜息殿去壇場旣逺郊奉禮畢旋幸於此瓦殿之輿帷宮謂無簡格祠部郎李撝議周禮凡祭祀張其旅幕張尸次尸則有幄仲師云尸次祭祀之尸所居更衣帳也凡祭之文旣不止于郊祀立尸之言理應關于宗廟古則張幕今也房省宗廟旅幕可變為棟宇郊祀氊案何為不轉製檐甍論封國啓鬱林弟昭秀初封臨海王明帝建武二年曇隆啓改封巴東王周定雒邑天子置畿内之民漢都咸陽三輔為社稷之衛中晉南遷事移威弛近郡名邦多有國食宋武創業依擬古典神州部内不復别封而孝武末年分樹寵子茍私申愛有乖訓准隆昌之元特開母弟之貴竊謂非古聖明御㝢禮舊為先畿内限斷宜遵昔制賜茅授土出典外州蕭琛字彦瑜蘭陵人仕齊尚書左丞入梁歴侍中特進嗣君即位廟見議明帝永泰元年東昏侯即位有司議廟見不尚書令徐孝嗣議嗣君即位並無廟見之文蕃支纂業乃有䖍謁之禮左丞蕭琛議從之竊聞祗見厥祖義著商書朝于武宮事光晉册豈有正位居尊繼業承天而不䖍覲祖宗格于太室毛詩周頌篇曰烈文成王即政諸侯助祭也鄭注云新王即政必以朝享之禮祭于祖考告嗣位也又篇曰閔予小子嗣王朝廟也鄭注云嗣王者謂成王也除武王之喪將始即政朝于廟也則隆周令典煥炳經紀體嫡居正莫若成王又二漢由太子而嗣位者西京七主東都四帝其昭成哀和順五君並皆謁廟文存漢史其惠景武元明章六君前史不載謁事或是偶有闕文理無異説議者乃云先在儲宫已經致敬卒哭之後即親奉時祭則是廟見故無别謁之禮竊以為不然儲后在宮亦從郊祀若謂前䖍可兼後敬開元之始則無假復有配天之祭矣若以親奉時祭仍為廟見者自漢及晉支庶嗣位並皆謁廟旣同有蒸嘗何為獨修繁禮且晉成帝咸和元年改號己謁廟咸康元年加元服又更謁夫時非異主猶不疑二禮相因况位隔君臣而追以一謁兼敬宜逺纂周漢之盛範近黜晉宋之乖義展誠一廟駿奔萬國曹思文上諫廢學表建武四年正月詔立學永泰元年東昏侯即位尚書符依永明舊事廢學領國子助教曹思文上表古之建國君民者必教學為先將以節其邪情而禁其流欲故能化民裁俗習與性成也是以忠孝篤焉信義成焉禮讓行焉尊教宗學其致一也是以成均煥於古典虎門炳於前經陛下體睿淳神纘承鴻業今制書旣下而廢學先聞將恐觀國之光者有以擬議也若以國諱故宜廢昔漢成立學爰洎元始百餘年中未嘗暫廢其間有國諱也且晉武之崩又其學猶存斯皆先代不以國諱而廢學之明文也永明以無太子故廢斯非古典也尋國之有學本以興化致治也天子於以諮謀焉於以行禮焉記云天子出征受命于祖受成于學執有罪反釋奠于學又云食三老五更于太學天子袒而割牲執爵而酳以教諸悌也于斯學是天子有國之基教也或以之所言皆太學事也今引太學恐非證也據臣所見今之國學即古之太學晉初太學生三千人旣多猥雜惠帝時欲辨其涇渭故元康三年始立國子學官品第五以上得入國學天子去太學入國學以行禮也太子去太學入國學以齒讓也太學之與國學斯是晉氏殊其士庶異其貴賤耳然貴賤士庶皆須教成故國學太學兩存之也非有太子故立也然繫廢興於太子者此永明之鉅失也漢崇儒雅幾致刑措而猶道謝三五者以其致教之術未篤也古之教者家有塾黨有庠術有序國有學以諷誦相摩今學非唯不宜廢而己乃宜更崇向其道望古作規使郡縣有學鄉閭立教請付尚書及二學詳議徐孝嗣字始昌東海郯人歴丹陽尹進司空謀廢東昏侯賜死奏劾蕭元蔚等永明初富陽人唐㝢之賊起州縣多委職㪚走御史中丞徐孝嗣奏武帝詔元蔚等免思祖諱文季原闕諱乃西昌侯鸞為明帝風聞山東羣盜剽掠列城雖匪日而殄要暫干王略郡縣闕攻守之宜倉府多侵耗之弊舉善懲惡應有攸歸吳郡所領鹽官令蕭元蔚桐廬令王天愍新城令陸赤奮等縣為首掠破掠並不經格戰委職散走元蔚天愍還臺赤奮不知所在又錢塘令劉彪富陽令何洵乃率領吏民相戰不敵未委歸臺餘建德夀昌在劫斷上流不知被劫掠不吳興所領餘杭縣被劫破令樂琰乃率吏民徑戰不敵委走出都㑹稽所領諸暨縣為刼所破令陵琚之不經格戰委城奔走不知所在案元蔚等妄藉天私作司近服昧斯隱慝職啓䖍劉㑹稽郡丞張思祖謬因承乏摠任是尸涓誠芻効終焉無紀平東將軍吳郡太守文季征虜將軍吳興太守西昌侯諱任屬關河威懷是寄輟下禁止彪琰洵思祖文季視事如故諱等納贖論上明帝立屯田表建武時連年虜動軍國虗乏孝嗣表立屯田事御見納時帝已寢疾竟不施行有國急務兵食是同一夫輟耕於事彌切故井陌壃里長轂盛于周朝屯田廣置勝戈富于漢室降此以還詳略可見但求之自古為論則賒即以當今宜有要術竊尋縁淮諸鎮皆取給京師費引旣殷漕運艱澀聚糧待敵毎若不周利害之基莫此為急臣比訪之故老及經彼宰守淮南舊田觸處極目陂遏不脩咸成茂草平原陸地彌望尤多今邉備旣嚴戍卒增衆逺資餽運近廢良疇士多饑色可為嗟歎愚欲使刺史二千石躬自履行隨地墾闢精尋灌漑之源善商肥确之異州郡縣戍主帥以下悉分番附農今水田雖晩方事菽麥菽麥二種益是北土所宜彼人便之不減粳稻開創之利宜在及時所啓允合請即使至徐兖司豫爰及荆雍各當境規度勿有所遺别立主曹專司其事田器耕牛臺詳所給嵗終言殿最明其刑賞此功克舉庶有𢎞益若縁邉足食則江南自豐權其所饒略不可計婚禮議永明中世祖以婚禮奢費敕諸王納妃上御及六宮依禮止棗栗腵脩加以香澤花粉其餘衣物皆停唯公主降嬪則令止遺舅姑也永泰元年尚書令徐孝嗣議夫人倫之始莫重冠婚所以尊表成德結懽兩姓年代汙隆古今殊則繁簡之儀因時或異三加廢於士庶六禮限於天朝雖因習未乆事難頓改而大典之要深冝損益案士冠禮三加畢乃醴冠者醴則唯一而已故醴辭無二若不醴則毎加輒醮以酒故醮辭有三王肅云醴本古其禮重酒用時味其禮輕故也或醴或醮二三之義詳記於經文今皇王冠畢一酌而已即可擬古設醴而猶用醮辭實為乖衷尋婚禮實篚以四爵加以合巹旣崇尚質之禮又象牉合之義故三飯卒食再酳用巹先儒以禮成好合事終于三然後用巹合儀注先酳巹以再以三有違㫖趣又郊特牲曰三王作牢用陶匏言太古之時無共牢之禮三王作之而用太古之器重夫婦之始也今雖以方崇節約而彌乖昔典又連巹以鏁盖出近俗復别有牢燭雕費采飾亦虧曩制方今聖政日隆聲教惟穆則古昔以敦風存餼羊以愛禮沿襲之規有切治要嘉禮寔重宜備舊章謂自今王侯已下冠畢一酌醴以遵古之義醴即用舊文於事為允婚亦依古以巹酌終酳之酒並除金銀連鏁自餘雜器悉用埏陶堂人執燭足充􅌊燎牢燭華侈亦宜停省庶斲雕可期移俗有漸張欣泰字義亨竟陵人歴雍州刺史未行謀廢東昏侯見殺移魏廣陵侯此雖未言移書然亦不言為文按其體式如末語者竟是書耳建武二年虜圍鍾離城欣泰為軍主隨崔慧景救援欣泰移魏廣陵侯聞攻鍾離是子之深䇿可無謬哉兵法云城有所不攻地有所不爭豈不聞之乎我國家舟舸百萬覆江横海所以案甲于今不至欲以邉城疲魏士卒我且千里運糧行留俱弊一時霖雨川谷涌溢然後乗帆渡海百萬齊進子復奚以御之乃今魏主以萬乗之重攻此小城是何謂歟攻而不拔誰之恥耶假令能拔子守之我將連舟千里舳艫相屬西過夀陽東接滄海仗不再請糧不更取士卒偃卧起而接戰乃魚鼈不通飛鳥斷絶偏師淮左其不能守晈可知矣如其不拔吾將假法于魏之有司以請子之過若挫兵夷衆攻不卒下驅士填隍拔而不能守則魏朝名士其當别有深致乎吾所未能量昔魏之太武佛狸傾一國之衆攻十雉之城死亡大半僅以身返旣智屈于金墉亦雖拔而不守皆筭失所為至今為笑前鑒未逺已忘之乎和門邑邑戲載往意南齊書曹虎字士威下邳人齊散騎常侍右衛將軍為東昏所殺答魏主元宏書建武四年魏冦沔北虎為雍州刺史頓樊城宏移虎書虎答自金精失道皇居徙縣喬木空存茂草方鬱七狄交侵五胡代起顧瞻中原毎用弔焉知棄臯蘭隨水瀍澗伊川之象爰在兹日古人有云匪宅是卜而鄰是卜樊漢無幸咫尺殊風折膠入塞乘秋犯邊親屬窮於斬殺士女困於䖍劉與彼蠢左共為脣齒仁義弗聞苛暴先露乃復改易氊裘妄自尊大我皇開運光宅區夏而式亂逋逃棄同即異毎欲出車鞠旅以征不庭所兾千戚兩階叛命來格遂復遊魂不戢亂猾孔熾孤摠連率任屬方召組甲十萬雄㦸千羣以此戡難何往不克主上毎矜率土哀彼民黎使不戰屈敵兵無血刃故部勒小戍閉壁清野抗威遵養庶能懷音若遂迷復知進忘退當金鉦戒路雲旗北掃長驅燕代併羈名王使少卿忽諸頭曼不祀兵交無逺相為憫然南齊書江祀字景昌濟陽考城人歴南東海太守為東昏所殺薦處士諸葛璩璩字幼玟琅邪陽都人建武初南徐州行事江祀薦于明帝璩不應璩安貧守道悦禮敦詩未嘗投刺邦宰曳裾府寺如其簡退可以揚清厲俗請辟為議曹從事張沖字思約吳郡吳人歴郢州刺史進征虜將軍報鄧元起書元起字仲居南郡當陽人入梁為益州刺史坐罪于州獄自縊元起為武寧太守永元末蠻帥田孔明冦掠三關規襲夏口元起討平之時郢州刺史張沖督河北軍事元起屢與沖書求旋軍沖報書乃表元起為平南中兵叅軍事足下在彼吾在此表裏之勢所謂金城湯池一旦捨去則荆棘生焉梁書庾𢎞逺徐虎龍為陳顯達與朝貴書顯達從太祖有功歴太尉侍中出為江州刺史初王敬則事起始安王遥光啓明帝慮顯達為變欲追軍還事平乃寢及東昏立聞京師大相殺戮又知徐孝嗣等皆死傳聞當遣兵襲江州顯達懼禍舉兵反令長史庾𢎞逺司馬徐虎龍與朝貴書戰敗被殺諸君足下我太祖高皇帝睿哲自天超人作聖屬彼宋季綱紀自頓應禪從民遘此基業世祖武皇帝昭略通逺克纂洪嗣四關罷險三河静塵鬱林海陵頓孤負荷明帝英聖紹建中興至乎後主行悖三才琴横凷席繡積麻筵淫犯先宮穢興閨闥皇陛為市㕓之所雕房起征戰之門任非華尚寵必寒厮江僕射兄弟忠言屬薦正諫繁興覆族之誅于斯而至故乃犴噬之刑四剽於海路家門之舋一起于中都蕭劉二領軍並升御座共禀遺詔宗戚之苦諒不足談渭陽之悲何辜至此徐司空歴葉忠榮清簡流世匡翼之功未著傾宗之罰已彰沈僕射年在懸車將念几杖歡歌圜藪絶影朝門忽招陵上之罰何萬古之傷哉遂使紫臺之路絶縉紳之儔纓組之閤罷金張之𦙍悲哉蟬冕為賤寵之服嗚呼皇陛列劫竪之坐且天人同怨乾象變錯往嵗三州流血今者五地自動昔漢池異色胥王因之見廢吳郡暫震步生以為姦倖况事隆于往怪舋倍于前虐此而未廢孰不可興王僕射王領軍崔護軍中維簡正逆念剖心蕭衛尉蔡詹事沈左衛各負良家共傷時嶮先朝遺舊志在名節同列丹書要同義舉建安殿下秀德沖逺寔允神器昏明之舉往聖流言今忝役戎驅亟請乞路須京塵一静西迎大駕歌舞太平不亦佳哉裴豫州宿遣誠言乆懷慷慨計其勁兵已登淮路申司州志節堅明分見迎合摠勒偏率殿我而進蕭雍州房僧寄並已纂邁旌鼓將及南兖州司馬崔恭祖壯烈超羣嘉驛屢至佇聽烽諜共成唇齒荆郢行事蕭張二賢莫不按劔飡風横戈待節關畿蕃守之儔孰非義侶我太尉公體道合聖杖德修文神武横於七伐雄略震於九綱是乃從彼英序還抗社稷本欲鳴笳細錫無勞戈刃但忠黨有心節義難遣信次之間森然十萬飛旍咽于九派列艦迷於三川此盖捧海澆熒烈火消凍耳吾子其擇善而從之無令竹帛空為後人笑也南齊書崔慰祖字悦宗清河東武城人始安王撫軍墨曹行叅軍轉刑獄兼記室與從弟緯書慰祖著海岱志起太公迄西晉人物為四十卷半成及坐始安王遥光繫尚方臨卒與緯書常欲更注遷固二史採史漢所漏二百餘事在㕑簏可檢寫之以存大意海岱志良未周悉可寫數本付護軍諸從人一通及友人任昉徐寅劉洋裴揆令後世知吾微有素業也南史崔覺清河東武城人與妹書覺為直閤將軍父慧景為平西將軍征夀陽謀廢東昏侯回軍廣陵向京師兵敗被殺覺亡命為道人見執伏法臨刑與妹書祖按慧景本傳慧景回軍還廣陵司馬崔恭開門納之尺牘乃以覺此書為恭祖與妹大誤捨逆旅歸其家以為大樂况得從先君游太清乎古人有力扛周鼎而有立錐之歎以此言死亦復何傷平生素心士大夫皆知之矣旣不得附驥尾安得施名於後世慕古竹帛之事今皆亡矣南齊書崔偃上和帝白父寃書崔慧景授平西將軍謀廢東昏侯與子覺併誅覺弟偃為始安内史藏竄得免和帝西臺立為寧朔將軍詣公車門上書申理詔報臣竊惟太祖高宗之孝子忠臣而昏主之賊臣亂子者江夏王與陛下先臣與鎮軍是也臣聞堯舜之心常以天下為憂而不以位為樂彼孑然之舜壟畆之人猶尚若此况祖業之重家國之切江夏旣行之於前陛下又蹈之於後雖成敗異術而所由同方也陛下初登至尊與天合符天下纎芥之屈尚望陛下申之絲髮之寃尚望陛下理之况先帝之子陛下之兄所行之道即陛下所由哉如此尚弗恤其餘何幾哉陛下德侔造化仁育羣生雖在昆蟲草木有不得其所者覽而傷焉而况乎友愛天至孔懷之深夫豈不懷將以事割此寔左右不明未之或詳惟陛下公聽並觀以詢之芻蕘羣臣有以臣言為不可乞使臣廷辯之則天人之意塞四海之疑釋必若不然倖小民之無識耳使其曉然知此相聚而逃陛下以責江夏之寃朝廷將何以應之哉若天聽沛然回光發惻愴之詔而使東牟朱虚申褒儀父之節則荷戈之士誰不盡死愚戅之言萬一上合事乞留中又疏近冒陳江夏之寃定承聖詔已有褒贈此臣狂疎之罪也然臣所以諮問者不得其實罪在萬没無所復云但愚心所恨非敢以父子之親骨肉之間而僥幸曲陛下之法傷至公之義誠不曉聖朝所以然之意若以狂主雖狂而實是天子江夏雖賢實是人臣元臣奉人臣逆人君以為不可申明詔得矣然未審陛下亦是人臣不而鎮軍亦復奉人臣逆人君今之嚴兵勁卒方指於象魏者其故何哉臣所不死茍存視息非有他故所以待皇運之開泰申寃魂之枉屈今皇運旣已開泰矣而死於社稷盡忠反以為賊臣何用此生陛下世矣臣聞王臣之節竭智盡公以奉其上居股肱之任者申理寃滯薦達羣賢凡此衆臣夙興夜寐心未嘗須㬰之間而不在公故萬物無不得其理而頌聲作焉臣謹案鎮軍將軍臣穎冑宗室之親股肱之重身有伊霍之功荷陛下稷旦之任中領軍臣衍受帷幄之寄副宰相之尊皆所以棟梁朝廷社稷之臣天下所當遑遑匪懈盡忠竭誠欲使萬物得理而頌聲大興者豈復宜踰此哉而同知先臣股肱江夏匡濟王室天命未遂王亡與亡而不為陛下瞥然一言知而不言是不忠之臣不知而言乃不智之臣此而不知將何所知如以江夏心異先臣受制臣力則江夏同致死斃聽可昏政淫刑見殘無道然江夏之異以何為明孔呂二人誰以為戮手御麾幡言輒任公同心共志心若膠漆而以為異臣竊惑焉如以先臣遣使江夏斬之則征東之驛何為見戮陛下斬征東之使寔詐山陽江夏違先臣之請寔謀孔矜天命有歸故事業不遂耳夫唯聖人乃知天命守忠之臣唯知盡死安顧成敗詔稱江夏遭時屯故跡屈行令内恕探情無玷純節今兹之㫖又何以處鎮軍哉臣所言畢矣乞就湯鑊然臣雖萬没猶願陛下必申先臣何則愴惻而申之則天下伏不惻愴而申之天下之人北面而事陛下者徒以力屈耳先臣之忠有識所知南史之筆千載可期亦何待陛下屈申而為褒貶然小臣惓惓之愚為陛下計耳臣之所言非孝于父寔忠于君唯陛下熟察少留心焉臣頻觸宸嚴而不彰露所以每上封事者非自為戇也猶以春秋之義有隱諱之意也臣雖淺薄然今日之事斬足斷頭殘身滅形何所不能為陛下耳臣聞生人之死肉人之骨有識之士未為多感公聽並觀申人之寃秉德任公理人之屈則普天之人爭為之死何則理之所不可以己也陛下若引臣寃免臣兄之罪收往失發惻愴之詔懷可報之意則桀之犬寔可吠堯跖之客實可刺由又何况由之犬堯之客臣非吝生實為陛下重此名於天下已成之基可惜之寳莫復是加寖明寖昌不可不循寖微寖滅不可不慎惟陛下熟察詳擇其衷若陛下猶以為疑鎮軍未之允决乞下征東共詳可否無以向隅之悲而傷陛下滿堂之樂何則陛下昏主之弟江夏亦昏主之弟鎮軍受遺託之恩先臣亦荷顧命之重情節無異所為皆同殊者唯以成敗仰資聖朝耳臣不勝愚忠請使羣臣廷辯者臣乞專令一人精賜本語僥幸萬一天聽昭然則軻沉七族離燔妻子人以為難臣豈不易和帝詔報崔偃具卿寃切之懷卿門首義而旌德未彰亦追以慨然今當顯加贈諡南齊書蕭日南上和帝中興二年二月監南兗州蕭日南上言廣陵宣城内鑿井得鏤麒麟一枚曹景宗字子震新野人入梁歴江州刺史答弟義宗書景宗永明初任竟陵郡其第九弟義宗年少未有位宦居在雍州市邊富人姓向以見錢百萬欲埤義宗以妹適之義宗遣人送書竟陵諮景宗景宗題書後答之義宗貪鏹遂成婚焉買猶未得云何已賣南史高爽廣陵人王儉領丹陽尹舉爽郡孝亷入梁歴晉陽令答人書爽博學多才有人送書與爽告躓云比日守羊困苦爽答之守羊無食何不貨羊籴米謝赫古畵品夫畵品者盖衆畵之優劣也圖繪者莫不明勸戒著升沉千載寂寥披圖可鑒雖畵有六法罕能盡該而自古及今各善一節六法者何一氣韵生動是也二骨法用筆是也三應物象形是也四隨類賦彩是也五經營位置是也六傳移模寫是也唯陸探微衛協備該之矣然迹有巧拙藝無古今謹依逺近隨其品第裁成序引故此所述不廣其源但傳出自神仙莫之聞見也第一品五人陸探微事五代宋明帝吳人窮理盡性事絶言象包前孕後古今獨立非復激揚所能稱贊但價重之極乎上上品之外無他寄言故屈標第一等曹不興五代吳時事孫權吳興人不興之迹殆莫復傳唯祕閣之内一龍而已觀其風骨名豈虚成衛協五代晉時古畵之略至恊始精六法之中迨為兼善雖不說備形妙頗得壯氣凌跨羣雄曠代絶筆張墨荀勗風範氣候極妙叅神但取精靈遺其骨法若拘以體物則未見精粹若取之象外方厭膏腴可謂微妙也第二品三人顧駿之神韻氣力不逮前賢精微謹細有過往哲始變古則今賦彩製形皆創新意若包犧始更卦體史籀初改書法嘗結横層樓以為畵所風雨炎燠之時故不操筆天和氣爽之日方乃染毫登樓去梯妻子罕見畵蟬雀駿之始也宋大明中天下莫敢競矣陸綏體韻遒舉風彩飄然一㸃一拂動筆皆竒傳世盖少所謂希見巻軸故為寳也袁蒨北方陸氏最為髙逸象人之妙亞美前賢但志守師法更無新意然和璧微玷豈貶十城之價也第三品九人姚曇度畵有逸方巧變鋒出􅀈魁神鬼皆能絶妙同流真為雅鄭兼善莫不俊拔出人意表天挺生知非學所及雖纎微長短往往失之而輿皁之中莫與為匹豈直棟梁蕭艾可搪揬璠璵者哉顧愷之五代晉時晉陵無錫人字長康小字虎頭格體精微筆無妄下但迹不逮意聲過其實毛惠逺畵體周贍無適弗該出入窮竒縱横逸筆力遒韻雅超邁絶倫其揮霍必也極妙至于定質塊然未盡其善神鬼及馬泥滯于體頗有拙也夏瞻雖氣力不足而精彩有餘擅名逺代事非虛美戴逵情韻連綿風趣巧拔善圖賢聖百工所範荀衛已後實為領袖及乎子顒能繼其美江僧寳斟酌袁陸親漸朱藍用筆骨梗甚有師法像人之外非其所長也吳暕體法雅媚製置才巧擅美當年有聲京洛張則意思横逸動筆新竒師心獨見鄙於綜採變巧不竭若環之無端景多觸目謝題徐落云此二人後不得預焉陸杲體致不凡跨邁流俗時有合作往往出人㸃畵之間動流恢服傳子後者殆不盈握桂枝一芳足􅀈本性流液之素難効其功第四品五人蘧道愍章繼伯並擅寺壁兼長畵扇人馬分數毫釐不失别體之妙亦為入神顧寳先全法陸家事事宗禀方之袁蒨可謂小巫王微史道碩五代晉時並師荀衛各體善能然王得其細史傳其真細而論之景𤣥為劣第五品三人劉頊用意綿密畵體纎細而筆跡困弱形製單省其於所長婦人為最但纎細過度翻更失真然觀察詳審甚得姿態晉明帝諱紹元帝長子師王厲雖略於形色頗得神氣筆跡超越亦有竒觀劉紹祖善於傳寫不閑其思至於雀䑕筆跡歴落往往出羣時人為之語號曰移畵然述而不作非畵所先第六品二人宋炳炳明於六法迄無適善而含毫命素必有損益跡非準的意足師放丁光雖擅名蟬雀而筆跡輕羸非不精謹乏于生氣南齊文紀卷七
