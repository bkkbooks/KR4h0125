body:
  text: 南齊文紀卷三明梅鼎祚編封建齊國禪代詔策文南齊書王儉傳云時大典將行儉為佐命禮儀詔策皆出于儉禇淵唯為禪詔文使儉參治之今總置禇淵王儉之首策相國齊公九錫宋順帝升明三年天地變通莫大乎炎涼懸象著明莫崇乎日月嚴冬播氣貞松之操自髙光景時昏若華之映彌顯是故英睿當亂而不移忠賢臨危而盡節自景和昏虐王綱弛紊太宗受命紹開中興運屬屯難四郊多壘蕭將軍震威華戎實資義烈康國濟民於是乎在朕以不造夙罹閔凶嗣君失德書契未紀威侮五行䖍劉九縣神厭靈繹海水羣飛彛器已塵宗禋誰主綴旒之殆未足為譬豈直小宛興刺黍離作歌而已哉天贊皇宋實啓明宰爰登寡昧纂承大業鴻緒再維閎基重造髙勳至德振古絶倫昔保衡翼殷博陸匡漢方斯蔑如也今將授公典禮其敬聽朕命乃者袁劉構禍實繁有徒子房不臣稱兵協亂跨蹈五湖憑陵吳越浮祲虧辰沈氛晦景桴鼓振於王畿鋒鏑交乎天邑顧瞻宫掖將成茂草言念邦國翦為仇讎當此之時人無固志公投袂殉難超然奮發執金板而先馳登寅車而戒路軍政端嚴卒乘輯睦麾鉞一臨凶黨氷泮此則霸業之基勤王之始也安都背叛竊據徐方敢率犬羊陵虐淮滸索兒愚悖同惡相濟天祚無象背順歸逆北鄙黔黎奄墜塗炭均人廢職邉師告警公受命宗祊精貫朝日擁節和門氣踰霄漢破釡之捷斬馘蔽野石梁之戰禽其渠帥保境全民江陽即序此又公之功也張淹迷昧弗顧本朝受自南區志圗東夏潜軍間入竊覬不虞於時江服未夷皇塗薦阻公忠誠慷慨在險彌亮深識九變妙察五色以寡致衆所向風偃朝廷無東顧之憂閩越有來蘇之慶此又公之功也胸奴野心侵掠疆場前師失律王旅崩撓灑血成川伏尸千里醜羯侜張勢振彭泗乘勝長驅窺覦京甸冠帶之軌將湮被髮之容行及公奉辭伐罪戒旦晨征兵車始交氛祲時蕩弔死撫傷𢎞宣皇澤俾我淮肥復沾盛化此又公之功也自兹厥後獫狁孔熾封豕長蛇重窺上國而世故相仍師出日老戰士無臨陳之心戎卒有懷歸之思是以下邳精甲望風振恐角城髙壘指日淪陷公眷言王事發憤忘食躬擐甲胄視險若夷短兵才接巨猾鳥散分疆畫界開創青兖此又公之功也泰始之末入參禁旅任兼軍國事同顧命桂陽負衆輕問九鼎裂冠毁冕拔本塞源入兵萬乘之國頓㦸象魏之下烈火焚於王城飛矢集乎君屋機變倏忽終古莫二羣后憂惶元戎無主公按劒凝神則竒謀貫世秉旄指麾則懦夫成勇曾不崇朝新亭獻捷信宿之間宣陽底定雲霧廓清區宇康乂此又公之功也皇室多難舋起戚蕃䢴晉應韓翻為讎敵建平失圗興兵內侮公又指授六師義形乎色役未踰旬朱方寧晏此又公之功也蒼梧肆虐諸夏糜沸淫刑以逞誰則無罪火炎崑岡玊石俱焚黔首相悲朝不謀夕髙祖之業已淪大明之軌誰嗣公逺稽殷漢之義近遵魏晉之典猥以眇身入奉宗祏七廟清謐九區反政此又公之功也袁粲無質劉秉携二韜述相扇成此亂階醜圗潛搆危機竊發據有石頭志犯應路公神謀內運霜鋒外舉妖沴載澄國塗恱穆此又公之功也沈攸之苞禍歲月滋彰蜂目豺聲阻兵安忍哀彼荆漢獨為匪民乃眷西顧緬同異域而經綸維始九伐未申長惡不悛遂逞凶逆驅合姦回勢過虓虎朝野憂疑三軍沮氣公秉鉞出關凝威江甸正情與皎日同亮明略與秋雲競爽至義所感人百其心鼖鼓一麾夏首寧謐雲梯未舉魯山剋定積年逋誅一朝顯戮沮浦安流章臺順軌此又公之功也公有濟天下之勳重之以明哲道庇生民志匡宇宙戮力肆心劬勞王室自東徂西靡有寧晏險阻艱難備嘗之矣若乃締構宗稷之勤造物資始之澤雲布霧散光被六幽弼豫一人永清四海是以秬草騰芳於郊園景星垂輝於清漢遐方欵關而慕義荒服重譯而來庭往哉邈乎無得而名焉朕聞疇庸表德前王盛典崇樹侯伯有國攸同所以文命成功𤣥圭顯錫姬旦秉哲曲阜啓蕃或改玉以𢎞風或胙土以宣化禮絶常班寵冠羣辟爰逮桓文車服異數惟公勳業超於先烈而褒賞闕於舊章古今之道何其爽歟靜言欽數良有缺然今進授相國以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅邪東海晉陵義興揚州之吳郡㑹稽凡十郡封公為齊公錫兹𤣥土苴以白茅定爾邦家用建冢社斯實尚父故藩世作盟主紀綱侯甸率由舊則往者周召建國師保兼任毛畢執圭入作卿士內外之寵同規在昔今命使持節兼太尉侍中中書監司空衛將軍雩都縣開國侯淵授公相國印綬齊公璽紱持節兼司空守尚書令僧䖍授齊公茅土金虎符第一至第五左竹使符第一至第十左相國位總百辟秩踰三事職以禮移號隨事革其以相國總百揆去録尚書之稱送所假節侍中貂蟬中外都督太傅太尉印綬竟陵公印策其驃騎大將軍揚州牧南徐州刺史如故又加公九錫其敬聽後命以公執禮𢎞律儀形區宇遐邇一體人無異業是用錫公大輅戎輅各一𤣥牡二駟公崇修南畝所寶惟穀王府充實百姓繁衍是用錫公衮冕之服赤舄副焉公居身以謙導物以義鎔鈞庶品罔不和悅是用錫公軒縣之樂六佾之舞公翼贊王猷聲教逺洽蠻夷竭歡回首內附是用錫公朱戶以居公明鑒人倫澄辨涇渭官方與能英乂克舉是用錫公納陛以登公保佑皇朝厲身化下杜漸防萌含生夤式是用錫公虎賁之士三百人公禦宄以刑禦姦以德君親無將將而必誅是用錫公鈇鉞各一公鳳舉四維龍騫八表威靈所振異域同文是用錫公彤弓一彤矢百玈弓十玈矢千公明發載懷肅恭禋祀孝敬之重義感靈祇是用錫公秬鬯一卣圭瓉副焉齊國置丞相以下一遵舊式往欽哉其祗服朕命經緯乾坤宏亮洪業茂昭爾大德闡揚我髙祖之休命禪齊詔三年四月癸酉進齊公爵為王辛卯宋帝下詔禪位褚淵撰文惟德動天玉衡所以載序窮神知化億兆所以歸心用能經緯乾坤彌綸宇宙闡揚鴻烈大庇生民晦往明來積代同軌前王踵武世必由之宋德湮微昏毁相襲景和騁悖於前元徽肆虐於後三光再霾七廟將墜琁極委馭含識知泯我文武之祚眇焉如綴靜惟此紊夕惕疚心相國齊王天誕睿聖河嶽炳靈拯傾提危澄氛靜亂匡濟艱難功均造物宏謀霜照祕算雲回旌斾所臨一麾必捷英風所拂無思不偃表裏清夷遐邇寧謐既而光啓憲章𢎞宣禮教姦宄之類覩隆威而隔情慕善之儔仰徽猷而增厲道邁於重華勳超乎文命蕩蕩乎無得而稱焉是以辮髮左衽之酋欵關請吏木衣卉服之長航海來庭豈惟肅慎獻楛越裳薦翬而已哉故四隩載宅六府克和川陸效珍禎祥鱗集卿煙玉露旦夕揚藻嘉穟芝英晷刻呈茂革運斯炳代終彌亮負扆握樞允歸明哲固以獄訟去宋謳歌適齊昔金政既淪水德締構天之厯數皎焉攸徴朕雖寡昧暗於大道稽覽隆替為日已久敢忘列代遺則人神至願乎便遜位别宫敬禪於齊一依唐虞魏晉故事策命齊王伊太古初陳萬物紛綸開耀靈以鑑品物立元后以馭蒸人若夫容成大庭之世宓羲五龍之辰靡得而詳焉自軒黃以降墳素所紀略可言者莫崇乎堯舜披金繩而握天鏡開玉匣而總地維德之休明宸居靈極期運有終歸禪與能所以大唐遜位䜎然興歌有虞揖讓卿雲發采亮符命之攸臻坦至公以成務懷生載懌靈祇效祉遺風餘烈光被無垠漢魏因循弗敢失墜爰逮晉氏亦遵前儀惟我祖宗英睿勳格幽顯從天人而齊七政凝至德而撫四維末葉不造仍世多故日蝕星隕山淪川竭惟王聖哲淵明榮鏡㝢宙體望日之威資就雲之澤臨下以簡御衆以寬仁育羣生義征不譓國塗荐阻𢎞五慮而乂寧皇緒將湮秉六術以匡濟及至權臣內侮蕃屏陵上兵革雲翔萬邦震駭裁之以武風綏之以文化遐邇清夷表裏肅穆戢雕戈而事黼黻委旌門而恭儒館聲化逺洎荒服無塵殊類同歸華戎一揆是以五光來儀於軒庭九穗含芳於郊牧象緯昭徹布新之符已顯圗䜟彪炳受終之義既彰靈祇乃眷兆民引領朕聞至道深微惟人是𢎞天命無常惟德是與所以仰鑒𤣥情俯察羣望敬禪神器授帝位于爾躬四海困窮天祿永終於戲王其允執厥中儀刑前式以副率土之欣望命司裘而謁蒼昊奏雲門而升圓丘時膺大禮永保鴻業豈不盛歟再命璽書皇帝敬問相國齊王大道之行與三代之英朕雖暗昧而有志焉夫昏明相襲晷景之恆度春秋遞運時歲之常序求諸天數猶且隆替矧伊在人能無終謝是故勛華𢎞風於上葉漢魏垂式於後昆昔我高祖欽明文思振民育德皇靈眷命奄有四海晚世多難姦宄實繁鼖鼓宵聞元戎旦警億兆夷人啓處靡厝加以嗣君荒怠敷虐萬方神鼎將遷寶策無主實賴英聖匡濟艱危惟王體天則地含𢎞光大明並日月惠均雲雨國步斯梗則稜威外發王猷不造則淵謨內昭重構閩吳再寧淮濟靜九江之洪波卷海沂之氛沴放斥凶昧存我宗祀舊物惟新三光改照逮至寵臣裂冠則裁以廟略荆漢反噬則震以雷霆麾斾所臨風行草靡神算所指龍舉雲屬諸夏廓清戎翟思韙興文偃武闡揚洪烈明保沖昧翺翔禮樂之場撫柔黔首咸躋仁壽之域自霜露所墜星辰所經正朔不通人跡罕至者莫不踰山越海北面稱蕃欵關重譯修其職貢是以禎祥發采左史載其竒𤣥象垂文保章審其度鳳書表肆類之運龍圗顯班瑞之期重以珠衡日角神姿特挺君人之義在事必彰書不云乎皇天無親惟德是輔民心無常惟惠之懷神祇之眷如彼蒼生之願如此笙管變聲鐘石改調朕所以擁璇持衡傾佇明哲昔金德既淪而傳祚於我有宋厯數告終實在兹日亦以水德而傳于齊式遵前典廣詢羣議王公卿士咸曰惟宜今遣使持節兼太保侍中中書監司空衛將軍雩都縣侯淵兼太尉守尚書令僧䖍奉皇帝璽綬受終之禮一依唐虞故事王其允副幽明時登元后寵綏八表以酬昊天之休命兼太史令將作匠陳文建奏符命六亢位也後漢自建武至建安二十五年一百九十六年而禪魏魏自黃初至咸熙二年四十六年而禪晉晉自太始至元熙二年一百五十六年而禪宋宋自永初元年至升明三年凡六十年咸以六終六受六亢位也驗往揆今若斯昭著敢以職任備陳管穴伏願順天時膺符瑞褚淵字彥回河南陽翟人仕宋為司空中書監入齊進司徒封南康郡公上高帝臧榮緒晉史啓榮緒東莞莒人隱居京口撰晉史百一十卷榮緒朱方隱者昔臧質在宋以國戚出牧彭岱引為行佐非其所好謝疾求免蓬廬守志漏濕是安灌蔬終老與友關康之沈深典素追古著書撰晉史十袠贊論雖無逸才亦足彌綸一代臣歲時往京口早與之遇近報其取書始方送出庶得備録渠閣採異甄善髙帝答褚淵公所道臧榮緒者吾甚志之其有史翰欲令入天祿甚佳上武帝遜位啓太祖崩遺詔以淵為録尚書事頃疾上相星連有變淵表遜位不許又啓乃改授司空臣顧惟凡薄福過災生未能以正情自安逺慚彥輔既內懷耿介便覺晷刻難推叨職未久首歲便嬰疾篤爾來沉痼頻經危殆彌深憂震陛下曲存遲回或謂僉議同異此出於留慈每過愛欲其榮臣年四十有八叨忝若此以疾陳遜豈駭聽察總録之任江左罕授上鄰亞台升降蓋微今受祿弗辭退詘斯願於臣名器非曰貶少萬物耳目皎然共見寧足仰延聖慮少垂矜恤臣若內飾亷譽外循謙後此則憲書行劾刑綱是肅臣赤誠不能行亦幽明所不宥區區寸心歸啓以實自吝寸隂實願萬倍堯世昔王𢎞固請乃於司徒為衛將軍宋氏行之不疑當時物無異議以臣方之曾何足說伏願恢闡宏猷賜開亭造則臣死之日猶生之年並南齊書謝賜玉珮啓傳詔宣敇賜臣玉珮一具製懋姫嬴寶冠荆越璇瑰鎮曜珩玦凝華采賁蓬楹響聞繩戶佩服載驚心容交惕初學記王儉字仲寶僧綽子厯國子祭酒領吏部中書監諫高帝起宣陽門表儉轉左僕射與褚淵叔父僧䖍連名上表手詔酬納臣聞德者身之基儉者德之輿春臺將立晉卿秉議北宫肇構漢臣盡規彼二君者或列國常侯或守文中主尚使諫諍在義即恱况陛下聖哲應期臣等職司隆重敢藉前誥竊乃有心陛下登庸宰物節省之教既昭龍衮琁極簡約之訓彌逺乾華外構采椽不斫紫極故材為宣陽門臣等未譬也夫移心疾於股肱非良醫之美畏影迹而馳騖豈靜處之方且又三農在日千畛咸事輟望歲之勤興土木之役非所以宣昭大猷光示遐邇若以門居宫南重陽所屬年月稍久漸就淪胥自可隨宜修理而合度改作之煩於是乎息所啓謬合請付外施行上高帝固請解選表見許加侍中固讓復為散騎常侍臣逺尋終古近察身事邀恩幸籍未見其倫何者子房之遇漢后公達之逢魏君史籍以為美談君子稱其髙義二臣才堪王佐理非曲私兩主專仗威武有傷寬裕豈與庸流之人慿含𢎞之澤者同年而語哉預在有心胡寧無感如使傾宗殞元有益塵露猶當畢志驅馳仰酬萬一豈容稍在形飾以狥常事九流任要風猷所先玉石朱素由斯而定臣亦不謂文案之間都無微解至于品裁臧否特所未間雖存自勗識不副意兼竊而任彼此俱壅專情本官庶幾髣佛且前代掌選未必具在代來何為於今非臣不可傾心奉國非復退讓之與預同休戚寧俟位任為親陛下若不以此理賜期豈仰望于殊眷頻冒嚴威分甘尤戾上武帝求解選表儉進號衛軍將軍參掌選事乂領國子祭酒再上表見許臣比年辭選具簡天朝欵言彰于侍接丹誠布于朝野物議不以為非聖心未垂矜納臣聞知慧不如明時求之微躬實允斯義妄庸之人沉浮無取命偶休泰遂踐康衢秋葉辭條不假風飆之力太陽躋景無俟螢爝之暉晦往明來五德遞運聖不獨治八元亮采臣逢其時而叨其位常總端右亟管銓衡事涉兩朝歲綿一紀盛年已老孫孺巾冠人物徂遷逝者將半三考無聞九流寂寞能官之詠輟響于當時大車之刺方興於來日若夫珥貂衣衮之貴四輔六教之華誠知匪服職務差簡端揆雖重猶可勉勵至于品藻之任尤懼其阻夙宵罄竭屢試無庸歲月之久近世罕比非唯悔吝在身故乃惟塵及國方今多士盈朝羣才競爽選衆而授古亦何人冒陳微翰必希天照至敬無文不敢煩黷讓左僕射表待臣於常均之外盼臣於代僚之右服乖其章乘非其器霸府方隆超居元佐國朝草昧參贊百揆拜儀同三司章臣聞日中則昃盈虛之定分器滿必傾往復之恆理遂乃班司衮章燮和台曜外參論道內總百司物議惟塵自識非據並藝文類聚朝服議齊國建儉為太尉右長史時朝儀草創衣服制則未有定準儉議從之漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂之明文晉百官表云太尉參軍四人朝服武冠此又宰府之明文乂疑百寮敬齊公之禮儉乂曰晉王受命勸進云沖等眷眷稱名則應盡禮而世子禮秩未定儉人曰春秋曹世子來朝待以上公之禮下其君一等今齊公九命禮冠列蕃世子亦宜異數南史褚淵録尚書事議高帝崩遺詔以褚彥回録尚書事江左以來無單為録者有司擬立優策王儉議宜有策書乃從之見居本官别拜録推理應有策書而舊事不載中朝以來三公王侯則優策並設官品第二策而不優優者褒美策者兼明委寄尚書職居天官政化之本故尚書令品雖第三拜必有策録尚書品秩不見而總任彌重前代多與本官同拜故不别有策即事緣情不容均之凡僚宜有策書用申隆寄既異王侯不假優文南史司空掾屬禮敬議禇淵為司徒改授司空未拜薨司空掾屬疑應為吏敬以否儉議依禮婦在塗聞夫家喪改服而入今掾屬雖未服勤而吏節稟於天朝宜申禮敬司徒府史應服議府史以淵未恭後授府應服以不儉議依中朝士孫德祖從樂陵遷為陳留未入境樂陵郡吏依見君之禮陳留迎吏依娶女有吉日齊衰弔司徒府宜依居官制服南史郊殷禮議建元元年七月有司奏郊殷之禮未詳郊在何年復以何祖配郊殷復在何時未郊得先殷與不明堂亦應與郊同年而祭不若應祭者復有配與無配不祀者堂殿職僚毁置云何八座丞郎通闋博士議曹郎中裴昭明儀曹郎中孔逖議今年七月宜殷祠如舊明堂無配宜應廢祀其殷祀同用今年十月右僕射王儉議詔可明堂可更詳有司乂奏詔依舊案禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯禧二年祫明年春禘自此以後五年再殷禮緯稽命徵曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣初不以先殷後郊為嫌至于郊配之重事由王迹是故杜林議云漢業特起不因緣堯宜以髙帝配天魏髙堂隆議以舜配天蔣濟云漢時奏議謂堯已禪舜不得為漢祖舜亦已禪禹不得為魏之祖今宜以武皇帝配天晉宋因循即為前式又案禮及孝經援神契並云明堂有五室天子每月於其室聽朔布教祭五帝之神配以有功德之君大戴禮記曰明堂者所以明諸侯尊卑也許慎五經異議曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五室鄭𤣥云周人明堂五室帝一室也初不聞有文王之寢鄭志趙商問云說者謂天子廟制如明堂是為明堂即文廟耶鄭答云明堂主祭上帝以文王配耳猶如郊天以后稷配也袁孝尼云明堂法天之宫本祭天帝而以文王配配其父于天位則可牽天帝而就人鬼則非義也泰元十三年孫耆之議稱郊以祀天故配之以后稷明堂以祀帝故配之以文王由斯言之郊為皇天之位明堂即上帝之廟徐邈謂配之為言必有神主郊為天壇則堂非文廟史記云趙綰王臧欲立明堂于時亦未有郊配漢又祀汾隂五畤即是五帝之祭亦未有郊配議者或謂南郊之日已旅上帝若又以無配而特祀明堂則一日再祭於義為黷案古者郊本不共日蔡雍獨斷曰祠南郊祀畢次北郊又次明堂髙廟世祖廟謂之五供馬融云郊天之祀咸以夏正五氣用事有休有王各以其時兆於方郊四時合歲功作相成亦以此月總旅明堂是則南郊明堂各日之證也近代從省故與郊同日猶無煩黷之疑何者其為祭雖同所以致祭則異孔朝云言五帝佐天化育故有從祀之禮旅上帝是也至於四郊明堂則是本祀之所譬猶功臣配饗豈復廢其私廟且明堂有配之時南郊亦旅上帝此則不疑于共日今何故致嫌于同辰又禮記天子祭天地四方山川五祀歲遍尚書堯典咸秩無文詩云昭事上帝聿懷多福據此諸義則四方山川猶必享祀五帝大神義不可略魏文帝黃初二年正月郊天地明堂明帝太和元年正月以武皇帝配天文皇帝配上帝然則黃初中南郊明堂皆無配也又郊日及牲色異議紛然郊特牲云郊之用辛周之始郊也盧植云辛之為言自新潔也鄭𤣥云用辛日者為人當齊戒自新潔也漢魏以來或丁或已而用辛常多考之典據辛日為允郊特牲又云郊牲幣宜以正色繆襲據祭法云天地騂犢周家所尚魏以建丑為正牲宜尚白白虎通曰三王祭天一用夏正所以然者夏正得天之數也魏用異朔故牲色不同今大齊受命建寅創厯郊廟用牲一依晉宋謂宜以今年十月殷祀宗廟自此以後五年再殷來年正月上辛有事南郊宜以共日還祭明堂又用次辛饗祀北郊而並無配犧牲之色率由舊章有司又奏明堂明堂尋禮無明文唯以孝經為正竊尋設祀之意蓋為文王有配則祭無配則止愚謂既配上帝則以帝為主今雖無配不應闕祀徐邈近代碩儒每所折衷其云郊為天壇則堂非文廟此實明據內外百司立議已定如更詢訪終無異說傍儒依史竭其管見既聖㫖惟疑羣下所未敢詳廢置之宜仰由天鑒二郊明堂間歲祀議建元四年世祖即位其秋有司奏尋前代嗣位或於前郊年或别始晉宋以來未冇畫一今年正月已郊未審明年應南北二郊祀明堂與不依舊通關八座丞郎博士議尚書令王儉議張緒等十七人並同儉詔可案秦為諸侯雜祀諸畤始皇併天下未有定祠漢髙受命因雍四畤而起北畤始祠五帝未定郊丘文帝六年新垣平議初起渭陽五帝廟武帝初至雍郊見五畤後常三歲一郊祠雍元鼎四年始立后土祠于汾隂明年立太一祠于甘泉自是以後二歲一郊與雍更祠成帝初即位丞相匡衡於長安定南北郊哀平之際又復甘泉汾隂祠平帝元始五年王莽奏依匡衡議還復長安南北二郊光武建武二年定郊祀兆于洛陽魏晉因循率由漢典雖時或參差而類多間歲至於嗣位之君參差不一宜有定制檢晉明帝太寧五年南郊其年九月崩成帝即位明年改元即郊簡文咸安二年南郊其年七月崩孝武即位明年改元亦郊宋文帝元嘉三十年正月南郊其年二月崩孝武嗣位明年改元亦郊此則二代明例差可依放今聖明係業幽顯宅心言化則頻郊非嫌語事則元號初改禋燎登配孝敬兼遂謂明年正月宜饗禮二郊䖍祭明堂自兹厥後依舊間歲遷郊議永明元年當郊立春在郊後世祖欲遷郊尚書令王儉啓從之案禮記郊特牲云郊之祭也迎長日之至也大報天而主日也易說三王之郊一用夏正盧植云夏正在冬至後傳曰啓蟄而郊此之謂也然則圜丘與郊各自行不相害也鄭𤣥云建寅之月晝夜分而日長矣王肅曰周以冬祭天于圜丘於正月又祭天以祈穀祭法稱燔柴太壇則圜丘也春秋傳云啓蟄而郊則祈穀也謹尋禮傳二文各有其義盧王兩說有若合符中朝省二丘以并二郊即今之郊禮義在報天事兼祈穀既不全以祈農何必俟夫啓蟄史官唯見傳義未達禮㫖又尋景平元年正月三日辛丑南郊其月十一日立春元嘉十六年正月六日辛未南郊其月八日立春此復是近世明例不以先郊後春為嫌若或以元日合朔為礙者則晉成帝咸康元年正月一日加元服二日親祠南郊元服之重百僚備列雖在致齊行之不疑今齊內合朔此即前准若聖心過恭寧在嚴潔合朔之日散官備防非預齊之限者於止車門外别立幔省若日色有異則列于省前望實為允竊謂無煩遷日郊祀明堂異日議王儉議詔可祠部郎中蔡履議郊與明堂本宜異日漢東京禮儀忘南郊禮畢次北郊明堂髙廟世祖廟謂之五供蔡雍所據亦然近世存省故郊堂共日來年郊祭宜有定凖太學博士王祐議來年正月上辛宜祭南郊次辛有事明堂後辛饗祀北郊兼博士劉蔓議漢元鼎五年以辛巳行事自後郊日略無違異元封元年四月癸卯登封泰山坐明堂五年甲子以髙祖配漢家郊祀非盡天子之縣故祠祭之月事有不同後漢永平以來明堂兆于國南而郊以上丁故供修三祀得并在初月雖郊有常日明堂猶無定辰何則郊丁社甲有說則從經禮無文難以意造是以必算良辰而不祭寅丑且禮之奠祭無同共者唯漢以朝日合於報天爾若依漢書五供便應先祭北郊然後明堂則是地先天食所未可也兼太常丞蔡仲熊議鄭志云正月上辛祀后稷於南郊還於明堂以文王配故宋氏創立明堂郊還即祭是用鄭志之說也蓋為志者失非𤣥意也𤣥之言曰未審周明堂以何月於月令則以季秋案𤣥注月令季秋大饗帝云大饗遍祭五帝又云大饗于明堂以文武配其時秋也去啓蟄逺矣又周禮大司樂凡大祭祀宿縣尋宿縣之㫖以日出行事故也若日暗而後行事則無假預縣果日出行事何得方俟郊還東京禮儀志不記祭之時日而志云天郊夕牲之夜夜漏未盡八刻進熟明堂夕牲之夜夜漏未盡七刻進熟尋明堂之在郊前一刻而進獻奏樂方待郊還魏髙堂隆表九日南郊十日北郊十一日明堂十二日宗廟案隆此言是審於時定制是則周禮二漢及魏皆不共日矣禮以辛郊書以丁祀辛丁皆合宜臨時詳擇太尉從事中郎顧憲之議春秋傳以正月上辛郊祀禮記亦云郊之用辛尚書獨云丁巳用牲於郊先儒以為先甲三日辛後甲三日丁可以接事天神之日後漢永平二年正月辛未宗祀光武皇帝於明堂辛既是常郊之日郊又在明堂之前無容不郊而堂則禮應郊堂司徒西閣祭酒梁王議孝經鄭𤣥注云上帝亦天别名如鄭㫖帝與天亦言不殊近代同辰良亦有據魏泰和元年正月丁未郊祀武皇帝以配天宗祀文皇帝於明堂以配上帝此則已行之前准驍騎將軍江淹議郊旅上天堂祀五帝非為一日再黷之謂無俟釐革尚書陸澄議遺文餘事存乎舊書郊宗地近勢可共日不共者義在必異也元始五年正月六日辛未郊髙皇帝以配天二十二日丁亥宗祀孝文於明堂以配上帝永平二年正月辛未宗祀五帝於明堂光武皇帝配章帝元和二年巡狩岱宗柴祭翌日祠五帝於明堂柴山祠地尚不共日郊堂宜異於例益明陳忠奏事云延光三年正月十三日南郊十四日北郊十五日明堂十六日宗廟十七日世祖廟仲逺五祀紹統五供與忠此奏皆為相符髙堂隆表二郊及明堂宗廟各一日摰虞新禮議明堂南郊間三兆禋天饗帝共日之證也又上帝非天昔人言之已詳今明堂用日宜依古在北郊後漢唯南郊備大駕自北郊以下車駕十省其二今祠明堂不應大駕尚書令王儉議前漢各日後漢亦不共辰魏晉故事不辨同異宋立明堂唯據自郊徂宫之義未達祀天旅帝之㫖何者郊壇旅天甫自詰朝還祀明堂便在日昃雖致祭有由而煩黷斯甚異日之議於理為𢎞春秋感精符云王者父天母地則北郊之祀應在明堂之先漢魏北郊亦皆親奉晉泰寧有詔未及遵建咸和八年甫得營繕太常顧和秉議親奉康皇之世已經遵用宋氏因循未遑釐革今宜親祠北郊明年正月上辛祠昊天次辛瘞后土後辛祀明堂御並親奉車服之儀率遵漢制南郊大駕北郊明堂降為法駕衮冕之服諸祠咸用諒暗議奏宋泰豫元年明帝崩博士周洽議權制諒暗之內不親奉四時祀建元四年尚書今王儉採晉中朝諒暗議奏從之權典既行喪禮斯奪事興漢世而源由甚逺殷宗諒暗非有服之稱周王即吉唯宴樂為譏春秋之義嗣君踰年即位則預朝㑹聘享焉左氏云凡君即位卿出並聘踐修舊好又云諸侯即位小國聘焉以繼好結信謀事補闕禮之大者至於諒暗之內而圗婚三年未終而吉禘齊歸之喪不廢搜杞公之卒不徹樂皆致譏貶以明鑒戒自斯而談朝聘蒸嘗之典卒哭而備行婚禘搜樂之事三載而後舉通塞興廢各有由然乂按大戴禮記及孔子家語並稱武王崩成王嗣位明年六月既葬周公冠成王而朝于祖以見諸侯命祝雍作頌襄十五年十一月晉侯周卒十六年正月葬晉悼公平公既即位改服修官蒸于曲沃禮記曾子問孔子曰天子崩國君薨則取羣廟之主而藏諸祖廟禮乎卒哭成事而後主各反其廟春秋左氏傳凡君卒哭而祔祔而後特祀於主蒸嘗禘於廟先儒云特祀于主者特以喪禮奉新亡者至於寢不同於古蒸嘗禘於廟者卒哭成事羣廟之主各反其廟則四時之祭皆即吉也三年喪畢吉禘於廟躋羣主以定新主也凡此諸義皆著在經誥昭乎方冊所以晉宋因循同規前典卒哭公除親奉蒸嘗率禮無違因心允協爰至泰豫元年禮官立議不宜親奉乃引三年之制自天子達又據王制稱喪三年不祭唯祭天地社稷越紼而行事曾不知自天子達本在至情既葬釋除事以權奪委衰襲衮孝享宜申越紼之㫖事施未葬卒哭之後何紼可越復依范宣之難杜預譙周之論士祭並非明據晉武在喪每欲存寧戚之懷不全依諒暗之典至於四時蒸嘗蓋以哀疾未堪非便頓改舊式江左以來通儒碩學所厯多矣守而弗革義豈徒然又宜即心而言公卿大夫則負扆親臨三元告始則朝㑹萬國雖金石輟響而簨簴充庭情深於恆哀而跡降於凡制豈曰能安國家故也宗廟蒸嘗孝敬所先寧容吉事偹行斯典獨廢就令必宜廢祭則應三年永闕乃復同之他故有司攝禮進退二三彌乖典衷謂宜依舊親奉日蝕齊內社柌議永明元年十二月有司奏今月三日臘祀大社稷一日合朔日蝕既在致齊內未審於社祠無疑不曹檢未有前准尚書令王儉議詔可禮記曾子問夫子嘗禘郊社五禮之祭簠簋既陳唯大喪乃廢至於當祭之日火日蝕則停尋伐鼓用牲由來尚矣而簠簋初陳問所不及據此而言致齊初日仍值薄蝕則不應廢祭又初平四年士孫瑞議以日蝕廢社而不廢郊朝議從之王者父天親地郊社不殊此則前准謂不宜廢祭先聖先師議永明三年正月詔立學有司奏宋元嘉舊事學生到先釋奠先聖先師禮又有釋菜未詳今當行何禮用何樂及禮器尚書令王儉議周禮春入學舍菜合舞記云始教皮辨祭菜示敬道也又云始入學必祭先聖先師中朝以來釋菜禮廢今之所行釋奠而已金石俎豆皆無明文方之七廟則輕比之五禮則重陸納車𦙍謂宣尼廟宜依亭侯之爵范寧欲依周公之廟用王者儀范宣謂當其為師則不臣之釋奠日備帝王禮樂此則車陸失於過輕二范傷於太重喻希云若至王者自設禮樂則肆賞於至敬之所若欲嘉美先師則所況非備尋其此說守附情理皇朝屈尊𢎞教待以師資引同上公即事惟允元嘉立學裴松之議應儛六佾以郊樂未具故權奏登歌今金石已備宜設軒懸之樂六佾之舞牲牢器用悉依上公南郡王昭業冠儀議永明五年十月有司奏南郡王昭業冠求儀注未有前准尚書令王儉議詔可皇孫冠事厯代所無禮雖有嫡子嫡孫然而地居正體下及五世今南郡王體自儲暉實為國裔元服之典宜異列蕃案士冠禮主人𤣥冠朝服賔加其冠贊者結纓鄭𤣥云主人冠者之父兄也尋其言父及兄則明祖在父不為主也大戴禮記公冠篇云公冠自為主四加𤣥冕以卿為賔此則繼體之君及帝之庶子不得稱子者也小戴禮記冠義云冠於阼以著代也醮於客位三加彌尊加有成也注稱嫡子冠於阼庶子冠於房記乂云古者重冠故行之于廟所以自卑而尊先祖也據此而言彌與鄭注儀禮相㑹是故中朝以來太子冠則皇帝臨軒司徒加冠光祿贊冠諸王則郎中加冠中尉贊冠今同於儲王則重依於諸王則輕又春秋之義不以父命辭王父命禮父在斯為子君在斯為臣皇太子居臣子之節無專用之道南郡雖處蕃國非支庶之列宜禀天朝之命微申冠阼之禮晉武帝詔稱漢魏遣使冠諸王非古正典此蓋謂庶子封王合依公冠自主之義至于國之長孫遣使惟允宜使太常持節加冠大鴻臚為贊醮酒之儀亦歸二卿祝醮之辭附准經記别更撰立不依蕃國常體國官陪位拜賀自依舊章其日內外二品清官以上詣止車集賀并詣東宫南門通箋别日上禮宫臣亦詣門稱賀如上臺之儀既冠之後尅日謁廟以𢎞尊祖之義此既大典宜通關八座丞郎并下二學詳議朝堂訓諱議晉武太始二年有司奏故事皇后諱與帝諱俱下詔曰禮內諱不出宫近代諱之也建元元年太常上朝堂諱訓僕射王儉議后諱依舊不立訓禮天子諸侯諱羣祖臣𨽻既有從敬之義宜為太常府君諱至于朝堂榜題本施至極既追尊所不及禮降於在三晉之京兆宋之東安不列榜題孫育議稱京兆列在正廟臣下應諱而不上榜宋初博士司馬道敬議東安府君諱宜上榜何承天執不同即為明據其有人名地名犯太常府君及帝后諱者皆改宣帝諱同二名不偏諱所以改承明門為北掖以榜有之字與承並東宫承華門亦改為宣華云髙帝昭皇后遷祔議建元四年髙帝山陵昭皇后應遷祔祠部疑有祖祭及遣啓諸奠九飯之儀不左僕射王儉議奠如大斂賀循云從墓之墓皆設奠如將葬廟朝之禮范寧云將窆而奠雖不稱為祖而不得無祭有司又奏昭皇后神主在廟今遷祔葬廟有虞以安神神既已處廟改葬出靈豈應虞祭鄭注改葬云從廟之廟禮宜同從墓之墓事何容異前代謂應無虞王儉又議從之范寧云葬必有魂車若不為其歸神將安舍中世改葬即墓所施靈設祭何得不祭而毁耶賀循云既窆設奠於墓以終其事雖非正虞亦粗相似晉氏修復五陵宋朝敬后改葬皆有虞今設虞非疑穆妃喪禮議穆妃薨成服日車駕出臨喪朝議疑太子應出門迎左僕射王儉議尋禮記服問君所主夫人妻太子嫡婦言國君為此三人為主喪也今鸞輿臨降自以主喪而至雖因事撫慰義不在弔南郡以下不應出門奉迎但尊極所臨禮有變革權去杖絰移立戶外足表情敬無煩止哭皇太子既一宫之主自應以車駕幸宫依常奉候既當成服之日吉凶不容相干宜以衰幘行事望拜止哭率由舊章尊駕不以臨弔奉迎則惟常體求之情禮如為可安皇太子妃薨前宫臣服議建元二年左僕射王儉議從之禮記文王世子父在斯為子君在斯為臣且漢魏以來宫僚先備臣𨽻之節具體在三存既盡敬亡豈無服昔庾翼妻喪王允滕𢎞謂府吏宜有小君之服况臣節之重耶宜依禮為舊君妻齊衰三月居官之身並合屬假朝晡臨哭悉繫東宫今臣之未從官在逺者於居官之所屬寧二日半仍行喪成服遣箋表不得奔赴太子穆妃卒哭後祭議有司奏穆妃卒哭後靈還在道遇朔望當須設祭不王儉議從之既虞卒哭祭之於廟本是祭序昭穆耳未全同卒吉四時之祭也所以有朔望殷事蕃國不行權制宋江夏王妃卒哭以後朔望設祭帝室既以卒哭除喪無緣方有朔望之祭靈筵雖未升廟堂而舫中即成行廟猶如桓𤣥及宋髙祖長沙臨川二國並有移廟之禮豈復謂靈筵在途便設殷祭耶推此而言朔望不復俟祭宋懿后時舊事不及此益可知太子穆妃服閏月議建元三年有司奏皇太子穆妃以去年七月薨其年閏九月未審當月數閏為應以閏附正月若用月數數閏者南郡王兄弟便應以此四月晦小祥至于祥月不為有疑不左僕射王儉議三百六旬尚書明義文公納幣春秋致譏穀梁云積分而成月公羊云天無是月雖然左氏謂告朔為得禮是故先儒咸謂三年朞喪歲數沒閏大功以下月數數閏夫閏者蓋是年之餘日而月之異朔所以吳商云含閏以正朞允協情理今杖朞之喪雖以十一月而小祥至于祥縞必須周歲凡厭屈之禮要取象正服祥縞相去二月厭降小祥亦以則之又且求之名義則小祥本以年限考於倫例則相去必應二朔今以厭屈而先祥不得謂此事之非朞事既同條情無異貫沒閏之理固在言先設令祥在此晦則去縞三月依附准例益復為礙謂應須五月晦乃祥此國之大典宜共精詳并通關八座丞郎研盡同異尚書令褚淵難厭屈之典由所尊奪情故祥縞備制而年月不申今以十一月而祥從朞可知既計以月數則應數閏以成典若猶含之何以異於縞制疑者正以祥之當閏月數相縣積分餘閏厯象所𢎞計月者數閏故有餘月計年者苞含故致盈積稱禮從制有何不可又答淵難淵又據舊義難儉十餘問儉隨事解釋祠部郎中王圭之議同儉詔可含閏之義通儒所難但祥本應朞屈而不遂語事則名體具存論哀則情無以異迹雖數月義實計年閏是年之歸餘故宜總而苞之朞而兩祥緣尊故屈祥則沒閏象年所申屈申兼著二途具舉經紀之㫖其在兹乎如使五月小祥六月乃閏則祥之去縞事成二月是為十一月以象前朞二朔以倣後歲名有區域不得相參魯襄二十八年十二月乙未楚子卒唯書上月初不言閏此又附上之名義也鄭射王賀唯云朞則沒閏初不復區别杖朞之中祥將謂不俟言矣成休甫云大祥後禫有閏别數之明杖朞之祥不得方於綅縞之末即恩如彼就例如此祠部郎中王圭之議喪以閏施功衰以下小祥值閏則略而不言今雖厭祥名猶存異於餘服計月為數屈追慕之心以逺為邇日既餘分月非正朔含而全制於情惟允僕射儉議理據詳博謹所附同今司徒淵始雖疑難再經往反未同儉議依舊八座丞郎通共博議為允以來五月晦小祥其祥禫自依常限答王逡之問太子穆妃服議尚書左丞兼著作郎王逡之問左僕射王儉中軍南郡王小祥應待聞喜不穆妃七月二十四日薨聞喜公八月發哀計十一月之限應在六月南郡王為當同取六月則大祥復申一月應用八月非復正月在存親之義若各自為祥廬堊相間𤣥素雜糅未審當有此疑不儉答司徒褚淵等二十人並同儉議請為永制詔可送往有已復生有節罔極非服制所申祥縞明示終之斷相待之義經記無聞世人多以廬室衰麻不宜有異故相去一二月者或申以俱除此所謂任情徑行未達禮㫖昔撰喪記已嘗言之逺還之人自有為而未祭在家之子立何辭以不變禮有除喪而歸者此則經記之遺文不待之明據假使應待則相去彌年亦宜必待乃為衰絰永服以窮生吉蠲長絶于宗廟斯不可矣茍曰非宜則旬月之間亦不容申何者禮有偷序義無徒設今逺則不待近必相須禮例既乖即心無取若疑兄弟同居吉凶舛雜則古有異宫之義設無異宫則逺還之子自應開立别門以終喪事靈筵祭奠隨在家之人再朞而毁所以然者奔喪禮云為位不奠鄭𤣥云以其精神不存乎此也聞哀不時實緣在逺為位不奠益有可安此自有為而然不關嫡庶庶子在家亦不待嫡矣而况儲妃正體王室中軍長嫡之重天朝又行權制進退彌復非疑謂不應相待中軍祥縞之日聞喜致哀而已不受弔慰及至忌辰變除昆弟亦宜相就寫情而不對客此國之大典宜通關八座丞郎共盡同異然後奏御又議建元三年妃薨南郡王聞喜公國臣疑制君母服儉又議禮庶人為國君齊衰先儒云庶人在官若府史之屬是也又諸侯之大夫妻為夫人服繐衰七月以此輕微疏逺故不得盡禮今皇孫自是蕃國之王公太子穆妃是天朝之嫡婦宫臣得申小君之禮國官豈得為夫人之敬當單衣白帢素帶哭于中門外每臨輒入與宫官同修史議建元二年初置史官以檀超與驃騎記室江淹掌史職上表立條例開元紀號不取宋年封爵各詳本傳無假年表立十志律厯禮樂天文五行郊祀刑法藝文依班固朝會輿服依蔡雍司馬彪州郡依徐爰百官依范曄合州郡班固五星載天文日蝕載五行改日蝕入天文志以建元為始帝女體自皇宗立傳以備甥舅之重又立處士列女傳詔內外詳議左僕射王儉議詔日月災𨽻天文餘如議金粟之重八政所先食貨通則國富民實宜加編録以崇務本朝㑹志前史不書蔡雍稱先師胡廣說漢舊儀此乃伯喈一家之意曲碎小儀無煩録宜立食貨省朝㑹洪範九疇一曰五行五行之本先乎水火之精是為日月五行之宗也今宜憲章前軌無所改革又立帝女傳亦非淺識所安若有髙德異行自當載在列女若止于常美則仍舊不晝議江斆出繼啓斆為吏部郎以祖母久疾永廢溫清啓乞自解初宋明帝敇斆出繼從叔遜為從祖渟後至是僕射王儉啓斆還本家禮無後小宗之文近世緣情皆由父祖之命未有既孤之後出繼宗族也雖復臣子一揆而義非天屬江忠簡𦙍嗣所寄唯斆一人傍無眷屬斆宜還本若不欲江遜絶後可以斆小兒繼遜為孫尚書參議間世立後禮無其文荀顗無子立孫墜禮之始何期又立此論義無所據何期南史作何琦議分南豫啓宋永初分淮東為南豫州而淮西為豫州至泰始中省淮西沒虜復分淮東置南豫太祖建元二年以分置損費省南豫左僕射王儉啓不從愚意正以江西連接汝潁土曠民希丐奴越逸唯以壽春為阻若使州任得才虜動要有聲聞豫設防禦此則不俟南豫假令或慮一失醜羯之來聲不先聞胡馬倐至壽陽嬰城固守不能斷其路朝廷遣軍厯陽已當不得先機戎車初戒每事草創孰與方鎮常居軍府素正臨時配助所益實少安不忘危古之善政所以江左屢分南豫意亦可求如聞西豫力役尚復粗可今得南譙等郡民戶益薄於其實益復何足云與豫章王嶷箋嶷出為鎮西將軍荆州刺史時太祖輔政務在省約停府州儀迎物及嶷至州坦懷納善側席思政儉為僕射與嶷箋舊楚蕭條仍歲多故荒民散亡實須緝理公臨蒞甫爾英風惟穆江漢來蘇八州慕義自庾亮以來荆楚無復如此美政古人朞月有成而公旬日致治豈不休哉南齊書南史云庾亮以來荆州無復此政古人云朞月有成而公旬日成化荒民散亡南史作政荒人散八州作八荒髙帝哀策文降階執禮泣血纒心感客臺之罷御哀恭館之不臨仰神儀而邈絶視區物而悽隂俾兹良史敬修舊則敢圗鴻規式揚至德其辭曰靈源遙裔肇惟商丘聖功寧夏賢識歸周我皇踵武超冠前猷英風允迪德音孔修月凖敷仁日精表孝則地均和體天合照外𢎞三至內隆七教水祀將傾乾維晦象韋辨長襲鼓磬屬響聲化已淪政刑遂往國圗靡緝民規載爽康世以德撥亂資武威以雷霆潤以風雨六術允昭四義克舉自東徂北遐方即序功被河濟化隆江漢帝謨仰式王維佇幹改步藩屏來登翼贊綢繆總章因循陽館昔在保衡君違斯正爰兹博陸亦鑒靈命放昏以忠登明資敬義煥金石功昭舞詠蠢爾荆漢悖亂人經謀連樞禁兵接神坰禦奸以德禦宄以刑獻捷宗寢飲至王庭政教雲行徽猷天造山鑑紫璇苑茂朱草玊檢騰輝金繩薦寶天鏡既穆地維既肅遐邇一體表裏禔福乃眷斯民昧旦杼軸興文偃武纘禹舊服所尚維簡所保維賢居尊彌約無善不延膠庠載緝風軌克宣上洞清儀下達𤣥泉聽覽間日應物餘景怡慮以文棲心以靜鴻章晨映徽言夕永迹庇區服情深箕潁萬㝢餐和百神受職梁甫欣儀云亭望式輔德伊何奄捐民極嵩嶽長傾宸暉斯昃機照惟寂達鑒靡傷慎終敬始知微知章立言垂範玉潤金相曕仰遺式哀結流霜旋玉軑之皎鏡動雲旗之逶迤振哀笳于八極響清蹕于咸池顧應掖而稍逺視機衡而長離風遲遲而懷暮日憯憯其若垂感衣冠於喬嶽追弓劒之在斯悼丁年之薄祐訴窮心于兩儀皇太子妃哀策文肇惟初識芳猷夙就翩翻禮園徘徊樂囿視秋齊明方春等茂伊宋之季天衢荐阻咨我儲二締縃江滸衛女事齊樊姬贊楚美著嬪嗣徽音踵武數盈則反否極斯昌肅膺靈命經緯三光往儀衡館來式椒堂紃組咸事象服有章八演仰則六幽望景悠悠草昧如何不永方中委曜先秋落穎世有遺塵庭無餘影嗚呼哀哉遵三兆之嘉日逮九筮之靈期澄金波而映鑾斾命飛亷而拂瓊輜揚清笳于漢表動嘶挽于雲基褚淵碑文夫太上有立德其次有立功此之謂不朽所以子産云亡宣尼泣其遺愛隨武既沒趙文懷其餘風於文簡分見之矣公諱淵字彥回河南陽翟人也微子以至仁開基宋段以功髙命氏爰逮兩漢儒雅繼及魏晉以降奕世重暉乃祖太傅元穆公德合當時行比州壤深識臧否不以毁譽形言亮采王室每懷沖虛之道可謂婉而成章志而晦者矣自兹厥後無替前規建官惟賢軒冕相襲公稟川嶽之靈暉含圭璋而挺曜和順內凝英華外發神茂初學業隆弱冠是以仁經義緯敦穆於閨庭金聲玉振寥亮於區宇孝敬淳深率由斯至盡歡朝夕人無間言逍遙乎文雅之囿翺翔乎禮樂之場風儀與秋月齊明音徽與春雲等潤韻宇𢎞深喜愠莫見其際心明通亮用人言必猶於己汪汪焉洋洋焉可謂澄之不清撓之不濁袁陽源才氣髙竒綜核精裁宋文帝端明臨朝鑒賞無昧袁既延譽于遐邇文亦定婚于皇家選尚餘姚公主拜駙馬都尉漢結叔高晉姻武子方斯蔑如也釋褐著作佐郎轉太子舍人濯纓登朝冠冕當世升降兩宫實惟時寶具瞻之範既著台衡之望斯集出參太宰軍事入為太子洗馬俄遷祕書丞贊道槐庭司文天閣光昭諸侯風流籍甚以父憂去職喪過乎哀幾將毁滅有識留感行路傷情服闋除中書侍郎王言如絲其出如綸恪居官次智效惟穆於時新安王寵冠列蕃越敷邦教毗佐之選妙盡國華出為司徒右長史轉尚書吏部郎執銓以平御煩以簡裴楷清通王戎簡要復存于兹泰始之初入為侍中曾不移朔遷吏部尚書時天步初夷王途尚阻元戎啓行衣冠未輯內贊謀謨外匡流品制勝既逺涇渭斯明賞不失勞舉無失德績簡帝心聲敷物聽事寧領太子右衛率固讓不拜尋領驍騎將軍以帷幄之功膺庸祗之秩封雩都縣開國伯食邑五百戶既秉辭梁之介又懷寢丘之志所受田邑不盈百井久之重為侍中領右衛將軍盡規獻替均山甫之庸緝熙王旅兼方叔之望丹陽京輔逺近攸則吳興襟帶實惟股肱頻作二守並加蟬冕政以禮成民是以息明皇不豫儲后幼冲貽厥之寄允屬時望徵為吏部尚書領衛尉固讓不拜改授尚書右僕射端流平衡外寬內直𢎞二八之髙謨宣由庚而垂詠太宗即世遺命以公為散騎常侍中書令護軍將軍送往事居忠貞允亮秉國之均四方是維百官象物而動軍政不戒而備公之登泰階而尹天下君子以為美談亦猶孟軻致欣於樂正羊職悅賞於士伯者也丁所生母憂謝職毁疾之重因心則至朝議以有為為之魯侯垂式存公忘私方進明准爰降詔書敦還攝任固請移歲表奏相望事不我與屈已𢎞化屬值三季在辰戚蕃內侮桂陽失圗窺窬神器鼓棹則滄波振蕩建旗則日月蔽虧出江𣲖而風翔入京師而雷動鳴控弦于宗稷流鋒鏃于象魏雖英宰臨戎元渠時殄而餘黨實繁宫廟憂逼公乃總熊羆之士率不二心之臣戮力盡規克寧禍亂康國祚於綴旒拯王維於已墜誠由太祖之威風抑亦仁公之翼佐可謂德刑詳禮義信戰之器也以靜難之功進爵為侯兼授尚書令中軍將軍給班劍二十人功成弗有固秉撝挹改授侍中中書監護軍如故又以居母艱去官雖事緣義感而情均天屬顔丁之合禮二連之善喪亦曷以踰天厭宋德水運告謝嗣主荒怠於天位彊臣慿陵於荆楚廢昏繼統之功龕亂寧民之德公實仰贊𢎞規參聞神算雖無受賑出車之庸亦有甘寢秉羽之績乃作司空山川攸序兼授衛軍戎政輯睦既而齊德龍興順皇髙禪深達先天之運匡贊奉時之業弼諧允正徽猷𢎞逺樹之風聲著之話言亦猶稷契之臣虞夏荀裴之奉魏晉自非坦懷至公永監崇替孰能光輔五君夤亮二代者哉大啓南康爰登中鉉時膺土宇固辭邦教今之尚書令古之冢宰雖秩輕於衮司而任隆於百辟暫遂沖㫖改授朝端邇無異言逺無異望帝嘉茂庸重申前册執五禮以正民簡八刑而罕用故能騁績康衢延慈哲后義在資敬情同布衣出陪鑾躅入奉帷殿仰南風之髙詠餐東野之祕寶雅議於聽政之晨披文於宴私之夕參以酒德間以琴心曖有餘暉遙然留想君垂冬日之溫臣盡秋霜之戒肅肅焉穆穆焉於是見君親之同致知再三之如一太祖升遐綢繆遺寄以侍中司徒録尚書事稟玉几之顧奉綴衣之禮擇皇齊之令典致聲化於雍熙內平外成實昭舊職增給班劍三十人物有其容徽章斯允位尊而禮卑居髙而思降自夏徂秋以疾陳退朝廷重違謙光之㫖用申超世之尚改授司空領驃騎大將軍侍中録尚書如故景命不永大漸彌留建元四年八月二十一日薨于私第春秋四十有八昔栁莊疾棘衛君當祭而輟禮晏嬰既往齊君趨車而行哭公之云亡聖朝震悼於上羣后恇慟於下豈惟哀纒一國痛深一主而已哉追贈太宰侍中録尚書如故給節羽葆鼓吹班劍為六十人諡曰文簡禮也夫乘德而處萬物不能害其貞虛已以游當世不能擾其度均貴賤於條風忘榮辱於彼我然後可兼善天下聊以卒歲經始圗終式免祗悔誰云克備公實有焉是以義結君子惠霑庶類言象所未形述詠所不盡故吏某甲等感逝川之無捨哀清暉之眇默餐輿誦於丘里瞻雅詠於京國思衛鼎之垂文想晉鐘之遺則方髙山而仰止刋𤣥石以表德其辭曰辰精感運昴靈發祥元首惟明股肱惟良天鑑璿曜踵武前王欽若元輔體微知章永言必孝因心則友仁洽兼濟愛深善誘觀海齊量登嶽均厚五臣兹六八元斯九內謨帷幄外曜台階逺無不肅邇無不懷如風之偃如樂之諧光我帝典緝彼民黎率禮蹈謙諒實身幹跡屈朱軒志隆衡館眇眇𤣥宗萋萋辭翰義既川流文亦霧散嵩構云頺梁隂載缺德猷靡嗣儀刑長遞怊悵餘徽鏘洋遺烈久而彌新用而不竭竟陵王山居贊升堂踐室金暉玉朗亹亹大韶遙遙閒賞道以德𢎞聲由業廣義重實歸情深虛往濠梁在兹安事遐想南齊文紀卷三
