body:
  text: 南齊文紀卷一明梅鼎祚編髙帝姓蕭名道成字紹伯南蘭陵人仕宋位相國封齊王篡宋國號齊都建業在位四年廟曰太祖與中書令褚淵衛將軍袁粲書太祖既平桂楊王休範遷散騎常侍中領軍南兖州刺史進爵為公增邑二千户固讓與淵及粲書淵粲書答之太祖乃受命下官常人志不及逺隨運推斥妄踐非涯才輕任重夙宵氷惕近值國危含氣同奮況在下官寧吝身命履冒鋒炭報效恆理而褒嘉之典偏見甄沐貴登端戎秩加爵土瞻言霄衢魂神震墜下官奉上以誠率性無矯前後忝荷未嘗固讓至若今授特深恇迫實以銜恩先旨義兼陵闕識蔽防萌宗戚構禍引誚歸咎既已靦顔乃復乘災求幸藉亂取貴斯實國家之恥非臣子所忍也且榮不可濫寵不可昧乞蠲中候請停增邑庶保止足輸效淮湄如使伐胸奴凱歸反斾以此受爵不復固辭矣褚淵袁粲答太祖書粲見前淵見後來告穎亮敬挹無已謙貶居心深承非飾此誠此旨久著言外況復造席舒襟迂翰緒意推情顧已信足書紳但今之所宜商榷必以輕重相推世惟多難事屬雕弊四維恇擾邊氓未安國家費廣府藏須備北狄侵邊憂虞交切宇內含識尚為天下危心相與共荷任寄若此當可稍修亷退不求之懷抱實謂不可了其不可理無固執且勍冦窮凶勢過原燎釁逆倉卒終古未聞常時懼惑當慮先定結壘新亭枕戈待敵斷決之策實有由然鋒鏑初交元惡送首總律制竒判於此舉裂邑萬户登爵槐鼎亦何足少酬勳勞粗塞物聽今以近侍禁旅進升中候乘平隨牒取此非叨濟河昔所履牧鎮軍秩不逾本詳校階序愧在未優就加沖損特虧朝制奉職數載同舟無幾劉領軍峻節霜明臨危不顧音迹未晞奄成今古迷途失偶慟不及悲戎謨內寄恆務倍急秉操辭榮將復誰委誠惟軍柄所期自增茂圭社誓貫朝廷匹夫里語尚欲信厚君令必行逡巡何路凡位居物首功在衆先進退之宜當與衆共茍殉獨善何以處物受不自私彌見至公表裏詳究無而後可想體殊常深思然納並南齊書殁桂陽兵至太祖決計出頓新亭領軍劉勔戰太祖從石頭濟淮入衛遣諸將擊平之與王廣之書廣之字林之沛郡相人歷侍中鎮軍將軍廣之仕宋歷徐州刺史鍾離太守沈攸之事起廣之留京師太祖誅黃回回弟駟及從弟馬兄子奴亡逸與廣之書令於江西捕駟等回本竟陵郡軍人纍戰功為郢州刺史嘗圖與袁粲攻太祖事不果太祖撫之如舊後改南兖州以僭侮表奏誅之黃回雖有微勳而罪過轉不可容近遂啓請御大小二輿為刺史服飾吾乃不惜為其啓聞政恐得輿復求畫輪車此外罪不可勝數弟自悉之今啓依法與虞玩之書玩之字茂瑶會稽餘姚人歷光祿大夫玩之元徽中為右丞太祖參政與玩之書玩之上表陳府庫錢帛器械役力州縣轉多興用漸廣慮不支嵗月朝議優報之張華為度支尚書事不徒然今漕藏有闕吾賢居右丞已覺金粟可積也與劉悛書悛字士操彭城安上里人歷五兵尚書悛司空勔之子勔於大桁戰死悛時疾病扶服路次號哭求尸持喪墓側冬月不衣絮太祖代勔領軍素與勔善書譬悛承至性毁瘵轉之危慮深以酸怛終哀全生先王明軌豈有去縑纊徹溫席以此悲號得終其孝性耶當深顧往旨少自抑勉與王延之書延之字希季琅琊臨沂人敬𢎞孫歷吏部尚書僕射王延之阮韜俱是劉湛外甥並有蚤譽湛甚愛之嘗曰韜後當為第一延之其次也延之甚不平後為江州每致餉下都韜與朝士同例太祖與延之書尺牘作世祖書誤韜云卿未嘗有别意當緣劉家月旦故耶世説作緣南史由與崔祖思書祖思見後明僧紹字承烈平原鬲人宋永光中淮北沒虜乃南渡江弟慶符為青州僧紹乏糧食隨慶符之鬱洲住弇榆山栖雲精舍太祖徴為正員外郎稱疾不就與崔祖思書慶符罷任僧紹隨歸住江乘攝山祖思時假節督青冀二州刺史明居士標意可重吾前旨竟未達耶小涼欲有講事卿可至彼具述吾意令與慶符同歸又不食周粟而食周薇古猶發議在今寧得息談耶聊以為笑與世祖書世祖見後栁世隆為晉熙王安西司馬世祖為長史太祖之謀渡廣陵也令世祖率衆下同會京邑是時朝廷疑憚沈攸之密為之防劉懷珍白夏口兵衝要地宜得其人太祖與世祖書汝既入朝當須文武兼資人與汝意合者委以後事世隆其人也以上並高帝在宋時與延之書或即帝位後築壘教高帝既弒蒼梧立順帝威權日盛升明元年袁粲等皆以謀泄被誅詔假黃鉞率大衆出屯新亭中興堂治嚴築壘教曰河南稱慈諒由掩胔廣漢流仁實存殯朽近袤製兹營崇溝峻壘古墟曩隧時有湮移深松茂草或致刊剃憑軒動懷巡隍增愴宜並為收改葬並設薄祀並南齊書江淹集載小異不兩存數沈攸之罪惡檄攸之自江陵起兵攻郢城時髙帝輔政遣衆軍西討出頓新亭馳徼數攸之罪惡夫彎弓射天未見能至揮戈擊地多力安施何則逆順之勢定殊禍福之驗易原也是以違乎天者鬼神不能使其成會乎人者聖哲不能令其毁故劉濞賴七國連兵之勢隗嚻恃跨河據隴之資母邱儉伐其踰海越島之功諸葛誕矜其待士愛民之德彼四子者皆當世雄傑以犯順取禍覆窟傾巢為豎子笑況乎行陳凡才斗筲小器而懷問鼎之志敢搆無君之逆哉逆賊沈攸之出自萊畝寂寥纍世故司空沈公以從父宗蔭愛之若子卵翼吹噓得升官秩廢帝昏悖猜畏柱臣攸之貪競乘機凶忍趨利躬行反噬請銜誅旨又攸之與談金童太一等並受寵任朝為牙爪同功共體世號三侯當時親昵情過管鮑遭仰革運凶黨懼戮攸之狡猾用數圖全賣禍既殺從父又害良朋雖吕布販君酈寄賣友方之斯人未足為酷此其不信不義言詐反覆諸夏之所未有夷狄之所不為也泰始開闢網漏吞舟略其凶險取其搏噬故得階亂獲全因禍保福攸之空淺躁而無謀濃湖崩挫本非己力及北伐彭泗望賊宵奔重討下邳一鼓而遁再鄙王師又應肆法先帝英聖量深河海宥其回溪之敗冀收曲崤之捷故得推遷幸會頓升崇顯內端戎禁外臨方牧聖靈鼎湖逺頒顧命託寄崇深義感金石而攸之知奉國諱喜見于容普天同哀已以為慶此其樂禍幸災大逆之罪一也又攸之纍登蕃兵自郢遷荆晉熙殿下以皇弟代鎮地尊望重攸之肆情陵侮斷割候迎料擇士馬簡算器甲精器鋭士並取自隨郢城所留十不遺一專擅略虜罔顧國典此其包藏禍心不恭不虔大逆之罪二也又攸之踐荆以來恆用姦數既欲發兵宜有因假遂乃蹙迫羣蠻騷擾山谷揚聲討伐盡户發上蟻聚郭邑伺國盛衰從來積年永不解甲遂使四野百縣路無男人耕田載租皆驅女弱自古酷虐未聞有此其侮蔑朝廷大逆之罪三也去昔桂陽竒兵闕起京師內奰宗廟阽危攸之任居上流兵強地廣救援顛沛實宜悉力國家倒懸方思身慮威遣弱卒三千並皆羸老使就郢州稟受節度欲令判否之日委罪晉熙何其平日輈張實輕周召爾時恭謹虛重皇戚此其伏慝藏詐持疑兩端大逆之罪四也又攸之纍據方州跋扈滋甚招誘輕狡往者咸納羈絆行旅過境必留仕子窮困不得歸其鄉商人畢命無由還其土叛亡入境輒加擁護逋逃出界必遣窮追此其大逆之罪五也又攸之自任專恣恃行慘酷視吏若讎遇民如草峻太半之賦暴參夷之刑鞭捶國士全用虜法一人逃亡闔宗補代毒遍嬰孩虐加班白獄囚恆滿市血常流男不得耕女不得織奔馳道路號哭動天皇朝敕令初不遵奉欲殺欲擊故曠蕩之澤長隔彼州此其無君陵上大逆之罪六也蒼梧狂凶釁深桀紂猜二外蕃梟目西顧留其長息元琰以為交質父子分張彌積年稔賴社稷靈長獨夫遄戮攸之豫稟心靈宜同歡幸遂迷惑顛倒深相嗟惜舉言哀桀揚聲吠堯此其不辨是非罔識善惡違情背理大逆之罪七也廢昏立明先代盛典交廣先到梁秦蚤及而攸之密邇內畿川塗弗逺驛書至止晏若不聞未遣表章奄積旬朔防風後至夏典所誅此其大逆之罪八也升明肇厯恩深澤逺申其父子之情矜其骨肉之恩馳遣元琰銜使西歸並加崇授寵貴重疊元琰達西便應反命攸之得此集聚蒙誰之恩不荷盛德反生讎釁此其大逆之罪九也攸之以溪壑之性含梟鴆之腸直置天壤巳稱醜穢況乃舉兵內侮逞肆姦回斯實惡熟罪成之辰決癰潰疽之日幕府過荷朝寄義百常憤董司元戎龔行天罰今皇上聖明將相仁厚約法三章輕刑緩賦年登嵗阜家給人足上有惠和之澤下無樂亂之心攸之不識天時妄圖姦逆舉無名之師驅怨讎之黨是以朝野審其易取含識判其成禽熊羆厲爪蓄攫裂之心虎豹磨牙起吞噬之憤鼓怒則氷原激電奮發則霜野奔靁以此定亂豈移晷刻雖復衆徒梗陸舉郡阻川何足以抗沸海之濤當燒山之焰彼土士民罹毒日久逃竄無路常所憫然今復相逼起接鋒刃交戰之日蘭艾難分土崩倒戈宜為蚤計無使一人迷昧而九族就禍也𢎞宥之典有如皎日上宋順帝請誅黃回表回本竟陵郡軍人纍有戰功封侯爵宋元徽中沈攸之起兵以回為郢州刺史出新亭為前鋒而袁粲據石頭將攻高帝回謀應粲不果攸之敗回至鎮固求為南兖州高帝以回終為禍亂乃上表後廢帝詔收付廷尉黃回出自厮伍本無信行仰值泰始謬被驅馳階藉風雲纍叨顯伍及沈攸之作逆事切戎機臣暗于知人冀其搏噬遣統前鋒竟不接刃軍至郢城乘威迫脅陵掠所加必先尊貴武陵王馬器服咸被虜奪城內文武剝剔靡遺及至還都縱恣彌甚先朝御服猶有二輿弓劒遺思尚在車府回遂啓求以擬私用僭侮無猒罔顧天極又廣納逋亡多受劫盜親信此等並為爪牙觀其凶狡憂在不測惡積罪著非可含忍應加剿除以明國憲尋其釁狀實宜極法但嘗經將帥微有塵露罪疑從輕事炳前策請在降減特原餘嗣臣過荷隆寄言必罄誠謹陳管穴式遵𢎞典伏願聖明特垂允鑒臣思不出位誠昧甄才追言既往伏增慙恧順帝詔報黃回擢自凡豎夙負疵釁貰以憲綱收其搏噬雖勤效纍著而屢懷干紀新亭背叛投拜冦場異規既扇廟律幾殆幸得張敬兒提戈直奮元惡受戮及景素結逆履霜嵗久乃密通音譯潛送器杖氛沴克霽狡謀方顯每存容掩冀能悛革故裂茅升爵均榮勳寵凶詖有本險慝滋深構誘敬兒志相攻陷悖圖未遂狠戾彌甚近軍次郢鎮劫逼府主兼挾私計多所徴索主局咨疑便加捶楚專肆暴慢罔顧彛則膺牧西蕃徽賁惟厚曾不知感猶懷忿怨李安民述任河濟星管未周貪據䘳要若祈回奪黷謁弗巳叨侈無度遂請求御輿僭擬私飾又招萃賊黨初不啓聞傷風蠧化莫此之甚宜明繩裁肅正刑書便收付廷尉依法窮治并宋書即阼告天文建元元年四月皇帝臣道成敢用玄牡昭告皇皇后帝宋帝陟鑒乾序欽若明命以命于道成夫肇自生民樹以司牧所以闡極則天開元創物肆兹大道天下惟公命不于常昔在虞夏受終上代粵自漢魏揖讓中葉咸炳諸典謨載在方册水德既微仍世多故實賴道成匡拯之功以𢎞濟于厥艱大造顛墜再構區宇宣禮明刑締仁緝義晷緯凝象川嶽表靈誕惟天人罔弗和會乃仰協歸運景屬與能用集大命于兹辭德匪嗣至于纍仍而羣公卿士庶尹御事爰及黎獻至于百戎僉曰皇天眷命不可以固違人神無託不可以曠主畏天之威敢不祗從鴻籙敬簡元辰虔奉皇符升壇受禪告類上帝以永答民衷式敷萬國惟明靈是饗改元大赦詔建元元年四月五德更紹帝迹所以代昌三正迭隆王度所以改耀世有質文時或因革其資元膺歷經道振民固以異術同揆殊流共貫者矣朕以寡昧屬值艱季推肆勤之誠藉樂治之數賢能悉心士民致力用獲拯溺龕暴一匡天下業未參古功殆侔昔宋氏以陵夷有徴歷數攸及思宏樂推永鑒崇替爰集天祿于朕躬惟志菲薄辭弗獲昭遂欽從天人式繇景命祗月正于文祖升禋鬯于上帝猥以寡德光宅四海纂革代之蹤託王公之上若涉淵水罔知所濟寶祚初啓洪慶惟新思俾利澤宣被億兆可大赦天下改升明三年為建元元年賜人爵一級文武進位二等鰥寡孤獨不能自存者穀人五斛逋租宿債勿復收有犯鄉論清議贓汙淫盜一皆蕩滌洗除先注與之更始長徒敕繫之囚特皆原遣亡官失爵禁錮奪勞一依舊典降封宋公侯詔建元元年四月繼世象賢列代盛典疇庸嗣美前載令圖宋氏通侯乃宜隨運省替但欽德懷義尚表墳閭況功濟區夏道光民俗者哉降差之典宜遵往制南康縣公華容縣公可為侯萍鄉縣侯可為伯減户有差以繼劉穆之王𢎞何無忌後原赦詔建元元年四月宸運肇創寶命惟新宜𢎞慶宥廣敷蠲汰劫賊餘口沒在臺府者悉原赦諸負舋流徙普聽還本土省置屯稅詔建元元年四月自廬井毁制農桑易業鹽鐵妨民貨鬻傷治歷代成俗流蠧嵗滋援拯遺弊革末反本使公不專利氓無失業二宫諸王悉不得營立屯邸封略山湖太官池籞宫停稅入優量省置減降宋氏第秩詔建元元年五月宸運革命引爵改封宋氏第秩雖宜省替其有預效屯夷宣力齊業者一仍本封無所減降斷衆募詔建元元年五月江淹集載設募取將懸賞購士蓋出權宜非曰恆制頃世艱險浸以成俗且長逋逸開罪山湖是為黥刑不辱亡竄無咎自今以後可斷衆募營恤遺櫬詔建元元年六月宋末頻年戎冦兼災疾凋損或枯骸不收毁櫬莫掩宜速宣下埋藏營恤若標題猶存姓字可識可即運載致還本鄉有司奏遣外監典事四人周行離門外三十五里為限其餘班下州郡無棺器標題者屬所以臺錢供事曲赦交趾詔建元元年七月江淹集載交址比景獨隔書朔斯乃前運方季負海不朝因迷遂往歸欵莫由曲赦交州部內李叔獻一人即撫南土文武詳才選用并遣大使宣揚朝恩録序從軍官詔建元元年十月朕嬰綴世務三十餘嵗險阻艱難備嘗之矣末路屯夷戎車嵗駕誠藉時來之運實資士民之力宋元徽二年以來諸從軍得官者未悉蒙祿可催速下訪隨正即給才堪餘任者訪洗量序若四州士庶本鄉淪陷簿籍不存尋校無所可聽州郡保押從實除奏荒逺闕中正者特許據軍簿奏除或戍扞邊役末由旋反聽于同軍各立五保所𨽻有司時為言列建學詔建元四年正月江淹集載夫膠庠之典彞倫攸先所以招振才端啓發性緒𢎞字黎氓納之軌義是以五禮之迹可傳六樂之容不泯朕自膺歷受圖志闡經訓且有司羣僚奏議咸集蓋以戎車時警文教未宣思樂泮宫永言多慨今關燧無虞時和嵗稔逺邇同風華夷慕義便可式遵前準修建斆學精選儒官廣延國胄蠲戰亡租役詔建元四年正月比嵗申威西北義勇爭先殞氣冦場命盡王事戰亡蠲復雖有恆典主者遵用每傷簡薄建元以來戰亡賞蠲租布二十年雜役十年其不得收尸主軍保押亦同此例詔朝臣建元二年詔虞玩之上表陳其事納之黃籍民之大紀國之治端自頃氓俗巧偽為日已久至乃竊注爵位盜易年月增損三狀貿襲萬端或户存而文書已絶或人在而反託死叛停私而云𨽻役身強而稱六疾編户齊家少不如此皆政之巨蠧教之深疵比年雖却籍改書終無得實若約之以刑則民偽巳逺若綏之以德則勝殘未易卿諸賢並深明治體可各獻嘉謀以振澆化又臺坊訪募此制不近優刻素定間劇有常宋元嘉以前兹役恆滿大明以後樂補稍絶或緣冦難頻起軍蔭易多民庶從利投坊者寡然國經未變朝紀恆存相揆而言隆替何速此急病之洪源晷景之切患何以科算能革斯弊耶南齊書杜氏通典民俱作人治俱作埋死叛作死版勝殘未易作未易可懲詔豫章王嶷嶷見後太祖即位遷嶷為驃騎大將軍揚州刺史封豫章王會北虜動上思為經略乃詔嶷復以為南蠻校尉荆湘二州刺史神牧總司王畿誠為治要荆楚領馭遐逺任寄𢎞隆自頃公私凋盡綏撫之宜尤重恆日與司徒褚淵手詔柳世隆宋末為左將軍吳郡太守丁母憂太祖踐阼起為南豫州刺史手詔與淵向見世隆毁瘠過甚殆欲不可復識非直使人惻然實亦世珍國寶也褚淵答世隆至性純深哀過乎禮陛下在危盡忠喪親居憂杖而後起立人之本二理同極加榮增寵足以厲俗敦風宥王遜詔儉弟遜升明中為丹陽丞告劉秉事不蒙封賞建元初為晉陵太守有怨言儉慮為禍因褚淵啓聞中丞陸澄依事舉奏詔曰儉門世載德竭誠佐命特降刑書宥遜以逺徙永嘉郡詔領軍將軍李安民安民蘭陵承人歷吳興太守淮北泗州聞太祖受命咸欲南歸徐州人桓標之兖州人徐猛于等合衆數萬寨險求援太祖詔安民安民赴救留遲虜急攻標之等皆沒上甚責之青徐泗州義舉雲集安民可長轡遐馭指授羣帥吕安國安集司州民户詔建元二年虜寇邊遣安國郢司之間流雜繁廣宜並加區判定其𨽻屬參詳兩州事無專任安國可暫往經理以本官使持節總荆郢諸軍北討事屯義陽西關詔周盤龍建元二年虜冦壽春以盤龍為軍主助豫州刺史垣崇祖於西澤奮擊破之上喜詔曰醜虜送死敢冦壽春崇祖盤龍正勤義勇乘機電奮水陸斬擊填川蔽野師不淹晨西蕃尅定斯實將率用命之功文武爭伐之力凡厥勳勤宜時銓序可符列上贈劉善明詔善明忠誠夙亮幹力兼宣豫經夷險勤績昭著不幸殞喪痛悼于懷贈左將軍豫州刺史諡烈手詔張融融見後融初辟太祖太傅掾太祖素竒好融即位後手詔賜融衣見卿衣服粗故誠乃素懷有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量詔夏侯恭叔恭叔平西記室參軍上書以栁元景中興功臣劉勔殞身王事宜存封爵詔曰與運隆替自古有之朝議已定不容復厝意也徴明僧紹詔朕側席思士載懷塵外齊郡明僧紹標志高栖耽情墳素幽貞之操宜加賁飾徴為正員外郎封荷知加羅國王詔三韓種也建元元年國王荷知使來獻量廣始登逺夷洽化加羅王荷知欵關海外奉贄東遐可授輔國將軍本國王詔答河南王吐谷渾拾寅宋世遣建武將軍王世武使河南建元元年隨拾寅來獻詔答之皇帝敬問使持節散騎常侍都督西秦河沙三州諸軍事車騎大將軍開府儀同三司領護羌校尉西秦河二州刺史新除驃騎大將軍河南王寶命革授爰集朕躬猥當大業祗惕兼懷夏中增感王世武至得元徽五年五月二十一日表聞之濕熱想比平安又卿欵誠遙著保寧遐壃今詔升徽號以酬忠欵遣王世武銜命拜授又仍使王世武等往芮芮想即資遣使得時達又奏所上馬等物悉至今往别牒錦絳紫碧緑黃青等紋各十匹楊廣香為沙州刺史詔廣香先奔虜宋末為虜攻殺氐王楊文慶以為隂平公齊太祖即位欲綏懷異俗詔授廣香昔絶國入贄美稱前册殊俗內欵聲流往記偽虜葭蘆鎮主隂平郡公楊廣香怨結同族舋起親黨當宋之世遂舉地降敵葭蘆失守華陽暫驚近單使先馳宣揚皇威廣香等追其逺世之誠仰惟新之化肉袒請附復地千里氐羌雜種咸同歸從宜時領納厚加優恤廣香翻迷反正可特量所授部曲酋豪隨名酬賞以廣香為督沙州諸軍事平羌校尉沙州刺史臨終詔司徒褚淵左僕射王儉吾本布衣素族念不到此因藉時來遂隆大業風道沾被升平可期遘疾彌留至于大漸公等奉太子如事吾柔逺能邇緝和內外當令太子敦睦親戚委任賢才崇尚節儉𢎞宣簡惠則天下之理盡矣死生有命夫復何言並南齊書敕柳世隆建元二年世隆進號安南將軍是時虜冦壽陽太祖敕世隆尋又敕之歷陽城大恐不可卒治正宜斷隔之深為保固處分百姓若不將家守城單身亦難可委信也又吾更歷陽外城若有賊至即勒百姓守之故應勝割棄也又宋永初二年分淮東為南豫州治歷陽而淮西為豫州泰始中淮西沒復分淮東治南豫齊太祖建元二年垣崇祖既破虜上欲罷併二豫敕世隆遂省南豫至永明二年割揚州宣城淮南豫州歷陽譙廬江臨江六郡復置南豫州比思江西蕭索二豫兩辦為難議者多云省一足一於事為便吾謂非乃乖謬卿以為云何可具以聞又世隆建元四年出為使持節督南兖兖徐青冀五州軍事安北將軍南兖州刺史江北畏虜冦騷動不安上敕世隆比有北信賊猶治兵在彭城年巳垂盡或當未必送死然豺狼不可以理推為備或不可懈彼郭既無關要用宜開除使去金城三十丈政佳耳發民治之無嫌若作三千人食者已有幾米可指牒付信還民間若有丁多而細口少者悉令戍非疑也又昨夜得北使啓鍾離間賊已渡淮既審送死便當制加剿撲卿好參候之有急令諸小戍還鎮不可賊至不覺也賊既過淮不容邇退散要應有處送死者定攻壽陽吾當遣援軍也又上遣軍助世隆并給軍糧虜退欲土斷江北又敕世隆吕安國近在西土斷郢司二境上雜民大佳民始無驚恐又令垣豫州斷其州內商得崇祖啓事巳行竟近無云云殊稱前代舊意卿視兖部中可行此事不若無所擾春便就手也敕垣崇祖初崇祖見上便自比韓信白起惟上獨許之及為豫州刺史有破虜功聞陳顯達李安民皆增給軍儀啓上求鼓吹橫吹上敕給鼓吹一部韓白何可不與衆異又敕崇祖為豫州刺史上遣使入關參虜消息還敕崇祖因修治芍陂田卿視吾是守江東而已耶所少者食卿但努力營田自然平殄醜虜手敕劉懷慰懷慰字彥泰平原人歷安陸王北中郎司馬本名聞慰懷慰仕宋為步兵校尉齊國建置齊郡治瓜步以懷慰為輔國將軍齊郡太守因手敕之有文事者必有武備今賜卿玉環刀一口又敕薛淵河東汾隂人除淮陵太守加寧朔將軍虜遣偽將薛道摽冦壽春太祖以道摽淵之親近敕懷慰令為淵書與道摽示購之之意虜得書果追道摽遣他將代之聞道摽分明來其兒婦並在都與諸弟無復同生者凡此類無為不多方誤之縱不全信足使豺狼疑惑敕周山圖山圖字季寂義興義陽人歷黃門郎領羽林四廂直衛山圖為兖州刺史建元二年秋虜動上策虜必不出淮隂乃敕山圖虜果冦朐山知卿綏邊撫戎甚有次第應變策略悉以相委恐列醜未必能送死卿丈夫無可藉手耳又敕是時淮北四州起義上使山圖自淮入清倍道應赴又敕山圓會義衆巳為虜所沒山圖拔三百家還淮隂卿當盡相帥馭理每存全重天下事惟同心力山嶽可摧然用兵當使背後無憂慮若後冷然無橫來處閉目痛打無不摧碎吾政應鑄金待卿成勳耳若不藉此平四州非丈夫也努力自運勿令他人得上功敇周盤龍盤龍北蘭陵人歷光祿大夫軍主成買戍甬城虜圍買數重上遣領軍將軍李安民為都督救之敕盤龍甬城漣口賊始復進西道便是無賊卿可率馬步下淮隂就安民軍鍾離船少政可致衣仗數日糧軍人扶淮步下也又手敕盤龍愛妾杜氏上送金叉鑷二十枚手敕曰餉周公阿杜手敕張岱岱字景山吳郡吳人歷南兖州刺史岱出為吳郡太守太祖知岱歷任清直至郡未幾手敕曰大郡任重乃未欲回換但總戎務殷宜須望實今用卿為護軍加給事中敕江謐掌吏部謐建元三年為左民尚書諸皇子出閣文武諸帥皆委謐尋敇江謐寒士誠當不得競等華儕然甚有才幹堪為委遇可遷掌吏部敕崔文仲文仲清河東武城人祖思宗人歷黃門郎領越騎校尉文仲為徐州刺史建元三年淮北義民桓磊磈於抱犢固與虜戰大破之文仲馳啓上敕北間起義者衆深恐良會不再至卿善奬沛中人若能一時攘袂當遣一佳將直入也並南齊書手敕王珍國珍國為南譙太守時郡境苦飢乃發米散財以拯窮乏高帝手敇卿愛人治國甚副吾意也梁書報武陵王煜煜字宜昭高帝第五子歷衛將軍曅性剛穎俊出與諸王共作短句詩學謝靈運體以呈高帝帝報之見汝二十字諸兒作中最為優者但康樂放蕩作體不辨有首尾安仁士衡深可宗尚顔延之抑其次也答陳顯達顯達南彭城人歷侍中太尉東昏時起兵敗誅顯達仕宋為廣州刺史沈攸之事起遣軍援臺至巴丘而攸之平太祖即位遷中護軍轉護軍將軍顯達啓讓上答之朝廷爵人以序卿忠發萬里信誓如期雖屠城殄國之勳無以相加此而不賞典章何在若未必宜爾吾終不妄授於卿數示意同家人豈止於君臣耶過明與王李俱祗召也又敵攻壽陽以顯達為平北將軍南兖州刺史之鎮敵退敕顯達敵經破散後當無復犯關理但國家邊防自應過存備豫宋元嘉二十七年後江夏王作南兖徙鎮盱眙沈司空亦以孝建初鎮彼正當以淮上要於廣陵耳卿謂前代此處分云何今僉議皆云卿應據彼地吾未能決乃當以擾動文武為勞若是公計不得憚之答劉善明善明為淮南宣城二郡太守撰賢聖雜語奏之託以諷諫太祖答之省所獻雜語並列聖之明規衆智之深軌卿能憲章先範纂鏤情識忠欵既昭淵誠肅著當以周旋無忘聽覽也又答善明表諫起宣陽門及宜明守宰賞罰立學校制齊禮開賔館以接鄰國上又答具卿忠讜之懷夫賞罰以懲守宰飾館以待遐荒皆古之善政吾所宜勉更撰新禮或非易制國學之美巳敕公卿宣陽門今敕停寡德多闕思復有聞答蕭景先景先太祖從子歷征虜將軍丹陽尹景先啓稱上德化之美上答之風淪俗敗二十餘年以吾當之豈得頓掃幸得數載盡力救蒼生者必有功于萬物也治天下者雖聖人猶須良佐汝等各各自竭不憂不治也敕答柳引范柏年梓潼人泰始中除晉壽太守討平氐賊為梁州刺史沈攸之事起柏年遣將聲援京師而候望形勢朝廷遣王玄邈代之説柏年許啓為府左史因執誅之引稱啓太祖敕答柏年幸可不爾為之恨恨答晉壽太守楊公則楊文𢎞武都王氐人楊廣香之族先為白水太守廣香死氐衆半奔文𢎞據白水公則啓經略之宜上答曰文𢎞罪不可恕事中政應且加恩耳卿若能襲破白水必加厚賞武帝名賾字宣逺高帝長子在位十一年廟曰世祖與虞悰手書悰字景豫會稽餘姚人領右軍將軍揚州大中正今因江吏郎有白以君情顧意欲相屈與玄元度書建元二年魏主宏遣虜諸將分兵出兖青界圍朐山戍主玄元度出擊大破之初元度自云臂上有封侯痣宋世以示世祖時世祖在東宫書與元度努力成臂上之相也高帝喪禮詔建元四年三月喪禮雖有定制先旨每存簡約內官可三日一還臨外官間一日還臨後有大喪皆如之原蕩諸城詔建元四年三月城直之制歷代宜同頃嵗逋弛遂以萬計雖在憲宜懲而原心可亮積年逋城可悉原蕩自兹以後申明舊科有違糾裁賑恤京師兩岸詔建元四年三月比嵗未稔貧窮不少京師二岸多離其弊遣中書舍人優量賑恤又詔建元四年五月頃水雨頻降潮流荐滿二岸居民多所淹漬遣中書舍人與兩縣官長優量賑恤災異蠲恤詔建元四年六月水潦為患星緯乖序京都囚繫可剋日訊決諸逺獄委刺史以時察判建康秣陵二縣貧民加賑賜必令周悉吳興義興遭水縣蠲除租調戍將恩慶詔建元四年十二月緣淮戍將久處邊勞三元行始宜沾恩慶可遣中書舍人宣旨臨會後每嵗皆如之優奬郡縣丞尉詔永明元年正月經邦之寄實資蒞民守宰祿俸蓋有恆準往以邊虞告警故沿時損益今區宇寧宴庶績咸熙念勤簡能宜加優奬郡縣丞尉可還田秩邦宰滿限詔永明元年三月宋德將季風軌陵遲列宰庶邦彌失其序遷謝遄速公私凋弊泰運初基草昧惟始思述先範永隆治根蒞民之職一以小滿為限其有聲績剋舉厚加甄異理務無庸隨時代黜恩赦詔永明元年三月朕自丁荼毒奄便周忌瞻言負荷若墜淵壑而逺圖尚蔽政刑未理星緯失序隂陽愆度思播先澤兼酬天眚可申辛亥赦恩五十日以期訖為始京師囚繫悉皆原宥三署軍徒優量降遣都邑鰥寡尤貧詳加賑恤袁粲等葬事詔永明元年四月魏矜袁紹恩洽丘墓晉亮兩王榮覃餘裔二代𢎞義前載美談袁粲劉秉與先朝同奬宋室沈攸之于景和之世特有乃心雖末節不終而始誠可録嵗月彌往宜特優降粲秉前年改葬塋兆未修材槨可為經理令粗足周禮攸之及其諸子喪柩在西者可符荆州送反舊墓在所為營葬事小會青溪宫詔永明二年七月夫樂所自生先哲垂誥禮不忘本積代同風是以漢光遲回于南陽魏文殷勤于譙國青溪宫體天含暉則地棲寶光定靈源允集符命在昔期運初開經綸方逺繕築之勞我則未暇時流事往永惟哽咽朕以寡薄嗣奉鴻基思存締構式表王迹考星創制揆日興功子來告畢規模昭備宜申釁落之禮以暢感尉之懷可剋日小會京師二縣沾賚詔永明二年八月窆枯掩骼義重前誥恤老哀癃實惟令典朕永思民瘼勿忘鑒寐聲憓未敷物多乖所京師二縣或有久墳毁發可隨宜掩埋遺骸未櫬並加斂瘞疾病窮困不能自存者詳為條格並加沾賚興學詔永明三年正月春秋國語云生民之有學斆猶樹木之有枝葉果行育德咸必由兹在昔開運光宅華夏方𢎞典謨克隆教思命彼有司崇建庠孰甫就經始仍離屯故仰瞻徽猷嵗月彌逺今遐邇一體車軌同文宜高選學官廣延胄子又詔守宰親民之要刺史按部所先宜嚴課農桑相土揆時必窮地利若耕蠶殊衆足厲浮惰者所在即便列奏其違方驕矜佚事妨農亦以名聞將明賞罰以勸勤怠校核殿最嵗竟考課以申黜陟永明三年蠲田租詔五月氓俗凋弊于兹永久雖年穀時登而歉乏比室凡單丁之身及煢獨而秩養養孤者並蠲今年田租籍田詔九穀之重八材為未是故潔粢豐盛祝史無愧於辭不籍千畝周宣所以貽諫昔期運初啓庶政草昧三推之典我則未暇朕嗣奉鴻基思隆先軌載耒躬親率由舊式可以開春發嵗敬簡元辰鳴青鸞于東郊冕朱紘而蒞事仰薦宗禋俯勗黔皂將使囷庾內充遺秉外牣既富而教兹焉攸在又詔永明四年閏正月夫耕籍所以表敬親載所以率民朕景行前規躬執良耜千畛咸事六稔可期教義克宣誠感兼暢重以天符靈貺嵗月鱗萃寶鼎開玉匣之祥嘉禾發同穗之穎甘露凝暉于坰牧神爵騫翥于蘭囿斯乃宗稷之慶豈寡薄所臻思俾休和覃兹黔皂見刑罪殊死以下悉原宥諸逋負在三年以前尤窮弊者一皆蠲除孝悌力田詳授爵位孤老貧窮賜穀十石凡欲附農而糧種闕乏者並加給貸務在優厚講武班賜詔永明五年正月今親閲六師少長有禮領馭羣帥可量班賜春正普賜詔永明五年正月朕昧爽丕顯思康民瘼雖年穀亟登而飢饉代有今履端肇運陽和告始宜協時休覃兹黎庶諸孤老貧病並賜糧餼遣使親賦每存均普霖雨賑賜詔永明五年六月比霖雨過度水潦洊溢京師居民多離其弊遣中書舍人二縣官長隨宜賑賜優貸丹陽屬縣詔永明五年七月丹陽屬縣建元四年以來至永明三年所逋田租殊為不少京甸之內宜加優貸其非中資者可悉原停九日詔永明五年九月九日出商飈館登高宴羣臣蠲三調詔永明五年九月善為國者使民無傷而農益勸是以十一而稅周道克隆開建常平漢載惟穆岱畎絲枲浮汶來貢杞梓皮革必緣楚往自水德將謝喪亂彌多師旅嵗興飢饉代有貧室盡於課調泉貝傾於絶域軍國器用動資四表不因厥産咸用九賦雖有交貿之名而無潤私之實民咨塗炭實此之由昔在開運星紀未周餘弊尚重農桑不殷于曩日粟帛輕賤于當年工商罕兼金之儲匹夫多飢寒之患良由圜法久廢上幣稍寡所謂民失其資能無匱乎凡下貧之家可蠲三調二年京師及四方出錢億萬糴米穀絲綿之屬其和價以優黔首逺邦嘗市雜物非土俗所産者皆悉停之必是嵗賦攸宜都邑所乏可見直和市勿使逋刻原北兖八州祖調詔永明六年閏十月北兖北徐豫司青冀八州邊接疆場民多懸罄原永明以前所逋租調原雍州逋祖詔永明七年正月雍州頻嵗戎役兼水旱為弊原四年以前逋租又詔春頒秋斂萬邦所以惟懷柔逺能邇兆民所以允殖鄭渾宰邑因姓立名王濬剖符户口殷盛今産子不育雖稟常禁比聞所在猶或有之誠復禮以貧殺抑亦情由俗淡宜節以嚴威敦以惠澤主者尋舊制詳量附定蠲恤之宜務存優厚增俸詔永明七年正月諸大夫年秩隆重祿食殊薄豈所謂下車惟舊趨橋敬老可增俸詳給見役奉聖詔永明七年二月宣尼誕敷文德峻極自天發輝七代陶鈞萬品英風獨舉素王誰匹功隱于當年道深于日月感麟厭世緬邈干祀川竭谷虛丘夷淵塞非但洙泗湮淪至乃饗嘗乏主前王敬仰崇修寢廟嵗月亟流鞠為茂草今學斆興立實稟洪規撫事懷人彌增欽屬可改築宗祊務在爽塏量給祭秩禮同諸侯奉聖之爵以時紹繼婚禮詔永明七年四月婚禮下達人倫攸始周官設媒氏之職國風興及時之詠四爵內陳義不期侈三鼎外列事豈存奢晚俗浮麗歷兹永久每思懲革而民未知禁乃聞同牢之費華泰尤甚膳羞方丈有過王侯富者扇其驕風貧者恥躬不逮或以供帳未具動致推遷年不再來盛時忽往宜為節文頒之士庶並可擬則公朝方樏供設合巹之禮無虧寧儉之義斯在如故有違繩之以法婚葬崇儉詔永明七年十月三季澆浮舊章陵替吉凶奢靡動違矩則或裂錦繡以競車服之飾塗金鏤石以窮塋域之麗至班白不婚露棺纍葉茍相誇衒罔顧大典可明為條制嚴勒所在悉使畫一如復違犯依事糾奏永明八年七月大赦詔隂陽舛和緯象愆度儲胤嬰患淹歷旬晷思仰祗天戒俯紓民瘼可大赦天下並南齊書寬黃籍謫役詔初太祖别置板籍官置令史限人一日得數巧以防懈怠至永明八年謫巧者戍緣淮各十年百姓怨望世祖乃詔曰夫簡貴賤辨尊卑者莫不取信于黃籍豈有假器濫榮竊服非分故所以澄革虛妄式允舊章然舋起前代過非近失既往之愆不足追咎自宋升明以前皆聽復注其有謫役邊疆各許還本此後有犯嚴加翦治賑賜京師詔永明十年十一月頃者霖雨樵糧稍貴京邑居民多離其弊遣中書舍人二縣官長賑賜水旱斷酒詔永明十年五月水旱成災穀稼傷弊凡三調衆逋可同申至秋登京師二縣朱方姑熟可權斷酒沾恤二岸詔永明十一年七月頃風水為災二岸居民多離其患加以貧病六疾孤老稚弱彌足矜念遣中書舍人履行沾恤又詔水旱為災實傷農稼江淮之間倉廩既虛遂草竊充斥互相侵奪依阻山湖成此逋逃曲赦南兖兖豫司徐五州南豫州之歷陽譙臨江廬江四郡三調衆逋宿債並同原除其緣淮及青冀新附僑民復除巳訖更申五年葬宋建平王景素詔宋建平王劉景素名父之子雖末路失圖而原心有本可聽以禮葬舊塋景素父宣簡王宏文帝子委皇太子長懋決獄詔太子乃於玄圃宣猷堂録三署囚原宥有差獄訟之重政化所先太子立年作二宜時詳覽此訊事委以親決增封豫章王嶷邑户詔永明二年漢之梁孝寵異列蕃晉之文獻秩殊恆序況乃地侔前準勳兼往式雖天倫有本而因事增情宜廣田邑用申恩禮增封為四千户答豫章王嶷求解太傅詔永明三年公惟德惟行無所厝辭且魯且衛其誰與二方式範當時流聲史籍豈容屢秉撝謙以乖期寄豫章王嶷喪事詔嶷明德至親勳高業始德懋王朝道光區縣奄至薨逝痛酷抽割不能自勝奈何奈何今便臨哭九命之禮宜備其制斂以衮冕之服溫明祕器命服一具衣一襲喪事一依漢東平王故事大鴻臚持節護喪事大官朝夕送奠大司馬太傅二府文武悉停過葬豫章王嶷贈錫詔寵章所以表德禮秩所以紀功慎終追逺前王之盛策纍行疇庸列代之通誥故使持節都督揚南徐二州諸軍事大司馬領太子太傅揚州刺史新除中書監豫章王嶷體道秉哲經仁緯義挺清譽於弱齡發韶風於早日締綸霸業之初翼贊皇基之始孝睦著於鄉閭忠諒彰乎邦邑及秉德論道總牧神甸七教必荷六府咸理振風潤雨無愆於時候恤民拯物有篤於矜懷雍容廊廟之華儀刑列郡之觀神凝自逺具瞻永集朕友于之深情兼家國方授以神圖委諸廟勝緝頌九紘陪禪五嶽天不愸遺奄焉薨逝哀痛傷惜震慟乎厥心今先逺戒期龜謀襲吉宜加茂典以協徽猷可贈假黃鉞都督中外諸軍事丞相揚州牧緑綟綬具九服錫命之禮侍中大司馬太傅王如故給九旒鸞輅黃屋左纛虎賁班劒百人輼輬車前後部羽葆鼓吹葬送儀依東平王故事褚淵喪事詔司徒奄至薨逝痛怛慟懷比雖尫瘵便力出臨哭給東園祕器朝服一具衣一襲錢二十萬布二百匹蠟二百斤贈褚淵太宰詔夫褒德所以紀民慎終所以歸厚前王習祖盛典咸必由之故侍中司徒録尚書事新除司空領驃騎將軍南康公淵履道秉哲鑒識𢎞曠爰初弱齡清風夙舉登庸應務具瞻允集孝友著于家邦忠貞彰于亮采佐命先朝經綸王化契闊屯夷綢繆終始總録機衡四門惟穆諒以同規往古式範來今謙光彌逺屢陳降挹權從高旨用虧大猷將登上列永翼聲教天不憗遺奄焉薨逝朕用震慟于厥心其贈公太宰侍中録尚書公如故給節加羽葆鼓吹增班劒為六十人葬送之禮悉依宋太保王𢎞故事贈王儉太尉詔永明七年慎終追逺列代通規褒德紀勳彌峻恆策故侍中中書令太子少傅領國子祭酒衛軍將軍開府儀同三司南昌公儉體道秉哲風宇淵曠肇自弱齡清猷自逺登朝應務民望斯屬草昧皇基協隆鼎祚宏謨盛烈載銘彞篆及贊朕躬徽績光茂忠圖令範造次必彰四門允穆百揆時序宗臣之重情寄兼常方正位論道永釐衮職弼兹景化以贊隆平天不憗遺奄焉薨逝朕用震慟于厥心可追贈太尉侍中中書監公如故給節加羽葆鼓吹增班劒為六十人葬禮依故太宰文簡公褚淵故事冢墓材官營辦諡文憲公贈柳世隆司空詔故侍中左光祿大夫貞陽公世隆秉德居業才兼經緯少播清徽長𢎞美譽入參內禁出贊西牧專寄郢郊剋挫巨猾超越前勳功著一代及總任方州民頌寬德翼教崇闥朝稱元正忠謨嘉猷簡于朕心雅志素履邈不可踰將登鉉味用變鴻化奄至薨殞震慟良深贈司空班劒三十人鼓吹一部侍中如故諡曰忠武誅垣崇祖詔豫章王嶷有盛寵于高帝世祖在東宫崇祖不自附結後漸疑異及即位下詔誅之垣崇祖凶詬險躁少無行業昔因軍國多虞採其一夫之用大運光啓頻煩升擢溪壑靡厭浸以彌廣去嵗在西連謀境外無君之心已彰遐邇特加遵養庶或悛革而猜二滋甚志興亂階隨與荀伯玉驅合不逞窺窬非覬構扇邊荒互為表裏寧朔將軍孫景育究悉姦計具以啓聞除惡務本刑兹罔赦便可收掩肅明憲辟誅張敬兒詔敬兒以戰功為雍州刺史歷開府儀同三司及垣崇祖誅常恐懼又遣使與蠻中交關世祖疑其有異志誅之敬兒蠢兹邊裔昏迷不修屬值宋季多難頗獲野戰之力拔迹行伍超登非分而愚躁無已矜伐滋甚鎮蒞本州久苞異志在昔含𢎞庶能懲革位班三槐秩窮五等懷音靡聞姦回屢構去嵗迄今嫌二滋甚鎮東將軍敬則丹陽尹安民每侍接之日陳其凶狡必圖反噬朕猶謂恩義所感本質可移頃者已來釁戾遂著自以子弟在西足動殊俗招扇羣蠻規擾樊夏假託妖巫用相震惑妄設徴祥潛圖問鼎履霜於開運之辰堅冰於嗣業之世此而可忍孰不可容天道禍淫逆謀顯露建康民湯天獲商行入蠻備覩姦計信驛書翰證驗炳明便可收掩式正刑辟同黨所及特皆原宥贈李安民詔安民歷位內外庸績顯著忠亮之誠每簡朕心敷政近畿方申任寄奄至殞喪痛傷于懷贈鎮東將軍鼓吹一部常侍太守如故答薛淵解職詔淵自北南奔母索氏不得自拔私遣購贖報云巳在界首事竟無實淵上表解職詔曰逺隔殊方聲問難審淵憂迫之深固辭朝列昔東關舊典猶通婚宦況母出有差音息時至依附前例不容申許便可斷表速還章服賻高平太守戴僧靜詔僧靜志懷貞果誠著艱難剋殄西墉勳彰運始奄致殞喪惻愴傷懷賻錢五萬布百匹諡壯侯驍騎將軍桓康喪事詔康昔預南勳義兼常懷倍深惻愴凶事所須厚加料理沈沖喪還詔沖喪柩至止惻愴良深以其昔在南蕃特兼憫悼追贈沈沖詔沖貞詳間理志局淹正誠著蕃朝績彰出守不幸早世朕甚悼之追贈太常諡曰恭子蕭景先節度司州諸軍詔永明五年得雍州刺史張瓌啓事蠻虜相扇容或侵軼蜂蠆有毒宜時剿蕩可遣征虜將軍丹陽尹景先總率步騎直指義陽可假節司州諸軍皆受節度賻蕭景先喪詔西信適至景先奄至喪逝悲懷切割自不勝任今便舉哀賻錢十萬布二百匹贈蕭景先侍中詔故假節征虜將軍丹陽尹新吳侯景先器懷開亮幹局通敏綢繆少長義兼勳戚誠著夷險績茂所司方升寵榮用申任寄奄至喪逝悲痛良深可贈侍中征北將軍南徐州刺史給鼓吹一部假節侯如故誅王奐赦詔逆賊王奐險詖之性自少及長外飾亷勤內懷凶慝貽戾鄉伍敢棄衣冠拔其文筆之用擢以顯任出牧樊阿政刑弛亂第三息彪矯弄威權父子均勢故寧蠻長史劉興祖忠于奉國每事匡執奐忿其異己誣以訕謗肆怒囚録然後奏聞朕察奐愚詐詔送興祖還都乃懼姦謀發露潛加殺害欺罔既彰中使辨核遂授兵登陴逆捍王命天威電掃義夫咸奮曾未浹辰罪人斯獲方隅克殄漢南肅清自非犯官兼預同逆謀為一時所驅逼者悉無所問長沙王妃詔奐以逆誅弟胄女為長沙王奐妃世祖詔奐自陷逆節長沙王妃男女並長且奐又出繼前代或當有準可特不離絶贈蕭睿明詔龍驤將軍安西中兵參軍松滋令蕭睿明愛敬淳深色養盡禮喪過乎哀遂致毁滅雖未達聖教而一至可愍宜加榮命以矜善人可贈中書郎封茹法亮詔世祖鎮湓城法亮為上江州典籖善於承奉稍見委信茹法亮近在盆城頻使銜命內宣朝旨外慰三軍義勇齊奮人百其氣險阻艱難心力俱盡宜沾茅土以甄忠績封望蔡縣男食邑三百户封范當根純林邑王詔林邑初楊邁子孫相傳為王夷人范當根純攻奪之永明九年遣使貢獻下詔林邑蠢爾介在遐外世服王化當根純乃誠欵懇到率其僚職逺績克宣良有可嘉宜沾爵號以𢎞休澤可持節都督緣海諸軍事安南將軍林邑王河南王吐谷渾易侯度進號詔吐谷渾拾寅子永明三年詔易侯度守職西蕃綏懷允緝忠績兼舉朕有嘉焉可進號車騎大將軍拜武都王楊集始詔楊後起卒後起奄至殞逝惻愴豫懷綏禦邊服宜詳其選行輔國將軍北秦州刺史武都王楊集始幹局沈亮乃心忠欵必能緝境寧民宣揚聲教可持節輔國將軍北秦州刺史平羌校尉武都王詔報宕昌王梁彌承宕昌使求軍儀及伎雜書詔報之知須軍儀等九種並非所愛但軍器種甚多致之未易內伎不堪涉逺祕閣圖書例不外出五經集注論今特敕賜王各一部封宕昌王梁彌頡詔行宕昌王梁彌頡忠欵內附著績西服宜加爵命式隆藩屏可使持節督河涼二州諸軍事安西將軍東羌校尉河涼二州刺史隴西公宕昌王詔報芮芮國芮芮求醫工等物世祖詔報之知須醫及織成錦工指南車漏刻並非所愛南方治疾與北土不同織成錦工並女人不堪涉逺指南車漏刻此雖有其器工匠久不復存不副為誤並南齊書遺詔永明十一年七月始終大期賢聖不免吾行年六十亦復何恨但王業艱難萬幾事重不能無遺慮耳太孫進德日茂社稷有寄子良善相毗輔思𢎞治道內外衆事無大小悉與鸞參懷共盡下意尚書是職務根本悉委王晏徐孝嗣軍旅捍邊之略委王敬則陳顯達王廣之王玄邈沈文季張瓌薛淵等百辟庶僚各奉爾職謹事太孫勿有懈怠知復何言又詔我識滅之後身上著夏衣畫天衣純烏犀導應諸器服悉不得用寶物及織成等唯裝復夾衣各一通常所服身刀長短二口鐵環者隨我入梓宫祭敬之典本在因心東鄰殺牛不如西家禴祭我靈上慎勿以牲為祭唯設餅茶飲干飯酒脯而已天下貴賤皆同此制未山陵前朔望設菜食陵墓萬世所宅意嘗恨休安陵未稱今可用東三處地最東邊以葬我名為景安陵喪禮每存省約不須煩民百官停六時入臨朔望祖日可依舊諸主六宫並不須從山陵內殿鳯華壽昌耀靈三處是吾所改制夫貴有天下富兼四海宴處寢息不容乃陋謂此為奢儉之中慎勿壞去顯陽殿玉像諸佛及供養具如别牒可盡心禮拜供養之應有功德事可專在中自今公私皆不得出家為道及起立塔寺以宅為精舍並嚴斷之唯年六十必有道心聽朝賢選序巳有别詔諸小小賜乞及閣內處分亦有别牒內外禁衛勞舊諸帥左右悉付蕭諶優量驅使之勿負吾遺意也敕廬陵王子卿子卿字雲長武帝第三子隆昌時領司徒見殺子卿為荆州刺史在鎮營造服飾多違制度上敇之吾前後有敕非復一兩過道諸王不得作乖體格服飾汝何意都不憶吾敕耶忽作玳瑁乘具何意巳成不須壞可速送下純銀乘具乃復可爾何以作鐙亦是銀可即壞之忽用金薄裹箭腳何意亦速壞去凡諸服章自今不啓吾知復專輒作者後有所聞當復得痛杖又汝比在都讀學不就年轉成長吾日冀汝美勿得敕如風過耳使吾失氣敕晉安王子懋子懋字雲昌武帝第七子歷雍州刺史見殺子懋為雍州刺史世祖敕以邊略吾比連得諸處啓所説不異虜必無敢送死理然為其備不可暫解今秋犬羊輩越逸者其亡滅之徴吾今亦行密纂集須有分明指的便當有大處分今普敕鎮守並部偶民丁有事即使應接連巳敇更遣想行有至者汝共諸人量覓可使人數往南陽舞隂諸要處參覘糧食最為根本更不憂人仗常行視驛亭馬不可有廢闕并約語諸州當其界皆爾不如法即周章又吾敕荆郢二鎮各作五千人陳本擬應接彼耳賊若送死者更即呼取之巳敕子真魚繼宗設公愍至鎮可以公愍為城主三千人配之便足汝可好以階級在意勿得人求或超五三階級文章詩筆乃是佳事然世務彌為根本可常憶之汝所啓仗此悉是吾左右御仗也云何得用之品格不可乖吾自當優量覓送又子懋啓求上所好書上答之賜杜預手所定左傳及古今善言知汝常以書讀在心足為深欣也敕隨郡王子隆子隆字雲興武帝第八子歷侍中中軍大將軍為明帝所害謝朓為隨王鎮西功曹轉文學子隆在荆州好辭賦數集僚友朓以文才尤被賞愛流連晤對不捨日夕長史王秀之以朓年少相動密以啓聞世祖敕日侍讀虞雲自宜恆應侍接朓可還都敕王晏晏字子彥琅琊臨沂人𢎞之孫歷吏部尚書侍中尚書令明帝時被誅柳世隆歷侍中左光祿大夫薨世祖敕世隆雖抱疾積嵗志氣未衰兾醫藥有效痊差可期不謂一旦便為異世痛怛之深此何可言其昔在郢誠心夙悃全保一蕃勳業克著尋準契闊增泣悲咽卿同在情亦當無已巳耶世隆為江夏內史行郢州事沈攸之反攻郢城不克又王儉改領中書監參掌選事其年薨晏啓及儉喪上答之儉年當富盛志用方隆豈意暴疾不展救護便為異世奄忽如此痛酷彌深其契闊艱運義重常懷言尋悲切不能自勝痛矣奈何往矣奈何又張緒字思曼吳人歷遷散騎常侍竟陵王子良領國子祭酒世祖敕晏子良竟不拜以緒領國子祭酒吾欲令司徒辭祭酒以授張緒物議以為云何南史如何敕劉祥祥字顯徴東莞莒人祥性韻高疏輕言肆行歷臨川王驃騎從事中郎祥兄整為廣州卒官祥就整妻求還資事聞朝廷于朝士多所貶忽著連珠十五首以寄其懷有啓上者帝令御史中丞任遐奏付廷尉别遣敕祥乃徙廣州卿素無行檢朝野所悉輕棄骨肉侮蔑兄嫂此是卿家行不足乃無關他人卿才識所知蓋何足論位涉清途於分非屈何意輕肆口噦詆目朝士造席立言必以貶裁為口實兾卿年齒巳大能自感厲日望悛革如此所聞轉更增甚喧議朝廷不避尊賤肆口極辭彰暴物聽近見卿影連珠寄意悖慢彌不可長卿不見謝超宗其才地二三故在卿前事殆是百分不一我當原卿性命令卿萬里思愆卿若能改革當令卿得還敕曹虎虎見後魏虎永明十年轉西陽王冠軍司馬廣陵太守上敇虎廣陵須心腹非吾意可委者不可得處此任敕豫章內史虞悰詳袁彖王逡之奏謝超宗令於彼賜自盡勿傷其形體敕中書舍人茹法亮蕭惠休為廣州刺史罷任獻奉傾資上敕法亮可問蕭惠休吾先使卿宣制答其勿以私祿足充獻奉今段殊覺其下情厚於前後人問之故當不復私耶吾欲分受之也南郡王昭業贊冠辭武帝使給事中太常蕭惠基加冠祝曰筮日筮賔肇加元服棄爾幼志從厥成德親賢使能克隆景福醮酒辭旨酒既清嘉肴既盈兄弟具在淑慎儀形永屆眉壽於穆斯寧鬱林王名昭業字元尚文惠太子之長子立一年明帝廢而弒之即阼蠲減征調詔朕以寡薄嗣膺寶政對越靈命欽若前圖思所以敬守成規拱揖羣后哀荒在日有懵大猷宜育德振民光昭睿範凡逋三調及衆債在今年七月三十日前悉同蠲除其備償封籍貨鬻未售亦皆還主御府諸署池田邸冶興廢沿事本施一時於今無用者詳所罷省公宜權禁一以還民關市征賦務從優減放遣北掠餘口詔近北掠餘口悉充軍實刑故無小罔或攸赦撫辜興仁事深睿範宜從蕩宥許以自新可一同放遣還復民籍巳賞賜者亦皆為贖序用勞人詔往嵗蠻虜協謀志擾邊服羣帥授略大殱凶醜革城克捷及舞隂固守二處勞人未有沾爵賞者可分遣選部往彼序用量處貧吏詔東西二省府國長屯所積財單祿寡良以矜懷選部可甄才品能推校年月邦守邑丞隨宜量處以貧為先隆昌元年下州郡詔執耜暫忘懸磬比室秉機或惰無褐終年非怠非荒雖由王道不稂不莠實賴民和頃嵗多稼無爽遺秉如積而三登之美未臻萬斯之基尚逺且風土異宜百民舛務刑章治緒未必同源妨本害政事非一揆冕旒屬念無忘夙興可嚴下州郡務滋耕殖相畝闢疇廣開地利深樹國本克阜民天又詢訪獄市博聽謡俗傷風損化各以條聞主者詳為條格追崇竟陵王子良詔隆昌元年褒崇明德前王令典追逺尊親沿情所隆故使持節都督揚州諸軍事中書監太傅領司徒揚州刺史竟陵王新除督南徐州體睿履正神鑒淵邈道冠民宗具瞻允集肇自弱齡孝友光備爰及贊契協升景業燮曜台陛五教克宣敷奏端朝百揆惟穆寄重先顧任均負圖諒以齊暉二南同規往哲方憑保祐永翼雍熙天不憗遺奄焉薨逝哀慕抽割震于厥心今龜謀襲吉先逺戒期宜崇嘉制式引風烈可追崇假黃鉞侍中都督中外諸軍事太宰領大將軍揚州牧緑綟綬備九服錫命之禮使持節中書監王如故給九旒鸞輅黃屋左纛輼輬車前後部羽葆鼓吹挽歌二部虎賁班劒百人葬禮依晉安平王孚故事徴吳苞詔隆昌元年徴不就苞濮陽鄄城人宋泰始中過江處士濮陽吳苞栖志窮谷秉操貞固沈情味古白首彌厲徴太學博士海陵王名昭文字季尚文惠太子第二子明帝廢鬱林立之一年復為所廢弒即位詔延興元年太祖高皇帝英謀光大受命作齊世祖武皇帝宏猷冠世繼暉下武世宗文皇帝清明懿鑠四海宅心並德漏下泉功昭上象聲教所覃無思不洽洪基式固景祚方融而天步多阻運鍾否剝嗣君昏忍暴戾滋多棄侮天經悖滅人紀朝野重足遐邇側視民怨神恫宗祧如綴賴忠謨肅舉霄漢廓清俾三后之業絶而更紐七百之慶危而復安猥以沖人入纂乾緒載懷馭朽若墜諸淵思與黎元共綏戬福大赦改元文武賜位二等新安國吏詔延興元年新安國五品以上悉與滿敘自此以下皆聽解遣其欲仕者適其所樂銓用淮關徭戍詔延興元年頃者以淮關徭戍勤瘁於行役故覃以榮階薄酬厥勞勳狀淹留未集王府非所以急舍爵之典趣報功之旨便可分遣使部往彼銓用延興元年冬十月癸巳詔周設媒官趣及時之制漢務輕徭在休息之典所以布德𢎞教寬俗阜民朕君制八紘志敷九德而習俗之風為弊未改靜言多愠無忘昏昃督勸婚嫁宜嚴更申明必使禽幣以時標梅息怨正厨諸役舊出州郡徴吏民以應其數公獲二旬私纍數朔又廣陵年常遞出千人以助淮戍勞擾為煩抑亦苞苴是育今並可長停别量所出諸縣使村長路都防城直縣為劇尤深亦宜禁斷南齊文紀卷一
