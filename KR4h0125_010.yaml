body:
  text: 南齊文紀卷十明梅鼎祚編江淹三雲山讚四首并序壁上有雜畫皆作山水好勢仙者五六雲氣生焉悵然會意題為小讚云王太子子喬好輕舉不待煉銀丹控鶴去窈窕學鳳對巑岏山無一春草谷有千年蘭雲衣不躑躅龍駕何時還陰長生隂君惜靈骨圭璧詎為寶日夜名山側果得金丹道憂傷永不至光顔如碧草若度西海時致意三青鳥白雲紫煙世不覿赤鱗庖所捐白雲亦海外葐蒀起三山蕭瑟玉池上容裔帝臺前欲知青都裏乘此乃登天秦女青琴既曠世緑珠亦絶羣猶不及秦女十五乘綵雲璧質人不見瓊光俗詎聞願使洛靈往為我道音芬銅劒讚崇文書目銅劍讚一卷永明初始造舊宫鑿東北之地皆平岡迤隴尤多古冢墓有人得銅劒長尺五寸余既借看歎其古異客有謂余曰古時乃以銅為兵乎其可得而聞不余笑而應曰此證據甚多殆不俟言卿既欲知輒具言之余按山海經曰昆吾之山其上多赤銅郭璞注曰此山出金如火以之切玉如割泥也周穆王時西戎獻之尸子所謂昆吾之劍也越絶書曰赤瑾之山破而出錫若耶之溪涸而出銅歐冶鑄以為純鉤之劍又汲冢中得一銅劍長三尺五及今所記干將者亦皆非鐵明古者以銅錫為兵器也周書稱穆王時征犬戎得昆吾之劒火浣布長尺有咫又有鍊銅赤刀切玉如泥焉又左傳僖公十八年鄭伯始朝于楚楚賜之金既而悔之盟曰無以鑄兵故以鑄三鍾杜預注云楚金利故也古者以銅為兵故禹貢云荆揚貢金三品余以為古者語質而難解今者語文而易了獨詩云元龜象齒其實象牙也書云厥包橘柚乃黃柑也金品上則黃中則赤下則黑黑金是鐵赤金是銅黃金是金黃金可為寶赤金可為兵黑金可為器韓子稱昔智伯繇之伐趙襄子初晉陽襄子金將盡問于張孟談孟談對曰吾聞董安于治晉陽也公室悉以銅為柱質君可發而用之于是發之有餘金矣謂此據蓋可知焉又昔夏后氏使九牧貢金鑄九鼎于荆山之下于昆吾氏之墟白若甘攙之地圖其山川竒怪以形于鼎使民知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舁而自藏不遷而自行九鼎既成定之國都桀有昏德鼎遷于商殷紂暴虐鼎遷于周每人主休明鼎雖小而重其姦回昏亂雖大而輕及周顯王三十二年姬德大衰乃淪入泗水秦始皇之初見于彭城二十七年始皇東逰大發徒出之而不能得焉後漢武帝賔禮百神于汾隂得大鼎時人以為九鼎其詳不可得而審也且荆軻刺秦王之日匕首擊銅柱銅柱火出則古者非直以銅為匕首亦以為殿柱也且始皇之世長狄十二見于臨洮身長三丈足迹六尺于是始皇斂天下之兵鑄而象之故西京賦云髙門有閌列坐金狄是也又造阿房之宫其門悉用鎡石鎡石吸鐵以防外兵之入焉以此推之明知春秋迄于戰國戰國至于秦時攻爭紛亂兵革互興銅既不充給故以鐵足之鑄銅既難求鐵甚易是故銅兵轉少鐵兵轉多年甚一年嵗甚一嵗漸染流遷遂成風俗所以鐵工比肩而銅工稍絶二漢之世逾見其微及漢建安二十四年魏文帝為太子時鑄三寶刀二匕首天下百鍊之精利而悉是鑄鐵不能復鑄銅矣按張華博物志亦稱鑄銅之工不復可得唯蜀地羌中時有解者由此言之斯妙久絶余謂不復能鑄銅者正當不能使利如霜雪光如雲霞陸斬犀兕水斷蛟龍豈復不能鑄銅爐鋺鐙耶然今太極殿前兩大銅鏡即周景王鑄也製作精巧獨絶晚世今之作必不及古猶今鏡不及古鏡今鐘不及古鐘矣昔余為吳興令鑿池又獲銅箭鏑數十枚時有人復于彼山中伐木得銅斧一口古銅鑄為兵豈為一據故備言其詳以發子之蒙矣古貴銅賤鐵非獨此事按皇覽帝王冢墓記稱吳王闔閭冢銅槨三重汞池六尺玉鳬之流扁諸之劍三盤郢魚腸之劒在焉秦始皇冢亦以銅槨水銀為江河關東賊發之至銅槨而取銅深大不可多得因此穴塞漢陳思王冢特奢侈皆生葬取愛幸奴僕婢蓄穀為銅窗以通殉葬者氣息兼以水火守冢給呼召數十年乃不復聞聲矣晚世之葬無復此例然由是大奢大富大盛或傾一國之財或竭一家之寶或爭為宏麗或競相髙尚前漢奢于後漢魏時富于晉世中原既夷至于江左時天下凋喪制度日衰富貴之家猶或厚葬然論古論曩亦減損千萬倍矣世愈貧狹哀禮愈薄又往古之事棺皆不用釘悉用細腰其細腰之法長七寸廣三寸厚二寸五分狀如木枰兩頭大而中央小仍鑿棺際而安之因普漆其外一棺凡用細腰五十四枚大略如此亦可謂至巧矣其法既絶亦有銅釘銅釘之體皆如今柘釘形也銅釘既滑多被發掘自義熙以來乃以柘代桐爰及明器之屬亦多減省必不得已而用烏牙焉相與皆用素棺不得施漆及自棺之外一無所設既由貧富之懸兼以避患之及耳故為此讚以明古今銅鐵之兵刃葬送之事焉乃成讚曰悠悠開闢或聖或賢蚩尤鑄銅為兵幾年天生五材實此為先既古既曩誰測誰傳紛綸百代事無不異况乃金鐵國之利器風胡專精歐冶妙思于昔則出于今則祕聞之釋經萬物淡薄在古必厚在今必惡徒侈徒異徒剷徒削聊舉一槩以明鴻略草木頌十五首并序僕一命之微遭萬代之幸不能鐫心礪骨以報所事擢翼驤首自致丹梯爰乃恭承嘉惠守職閩中且僕生人之樂久己盡矣所愛兩株樹十莖草之間耳今所鑿處前峻山以蔽日後幽晦以多阻飢猿搜索石瀨戔戔庭中有故池水常泱雖無魚梁釣臺處處可坐而葉饒冬榮花有夏色兹赤縣之東南乎何其竒異也結莖吐秀數千餘類心所憐者十有五族焉各為一頌以寫勞魂金荆江南之山連嶂連天既抱紫霞亦漱絳煙金荆嘉柯涵露宅仙姱節詎及幽意誰傳相思竦枝碧澗卧根石林日月斷色霧雨恆隂緑秀八照丹實四臨公子不至山客徒尋豫章伊南有材匪桂匪椒下貫金壤上籠赤霄盤薄廣結捎瑟曾喬七年乃識非曰終朝栟櫚異木之生疑竹疑草攢叢石徑森嵸山道煙岫相珍雲壑共寶不華不縟可避工巧杉桐梓舊麗松栝稱竒焉如兹品獨秀青崖羣木斂望雜草不窺長入煙氣永參鸞螭柳木貴冬榮柳實寒色停黛峰頂插翠石側碧葉菴藹赬柯翕赩方陋筠檟逺笑荆棘楊梅寶跨荔枝芳軼木蘭懷蕊挺實涵黃糅丹鏡日繡壑照霞綺巒為我羽翼委君玉盤山桃惟園有實惟山有叢丹花擎露紫榮繞風引霧如電映煙成虹伊春之秀乃華之宗山中石榴美木艷樹誰望誰待縹葉翠萼紅華絳采照列泉石芬披山海竒麗不移霜雪不改木蓮迸采泉壑騰光淵邱緗麗碧巘紅艷桂洲山人結侣靈俗共逰時至不採為子淹留石上菖蒲藥實虛品爰乃輔性却痾衛福蠲邪養正縹色外妍金光內映草經所珍仙圖是詠黃連黃連上草丹砂之次禦孽辟妖長靈久視驂龍行天馴鳳匝地鴻飛以儀順道則利署預華不可炫葉非足憐微根儻餌棄劒為仙黃金共壽青雘爭妍君謂無妄我驗衡山杜若山中杜若嘉爾翠質不竒不俗載華載實同銜夕露共烘朝日夷險無二沈冥如一藿香桂以過冽麝以太芬摧阻天壽夭折人文詎及藿香微馥微薰攝靈百仞養氣清氛雜體三十首序夫楚謡漢風既非一國魏製晉造固亦二體譬猶藍朱成彩雜錯之變無窮宫角為音靡曼之態不極故蛾眉詎同貌而俱動于魄芳草寧共氣而皆恱于魂不其然歟至于代之諸賢各滯所迷莫不論甘則忌辛好丹則非素豈所謂通方廣恕好逺兼愛者哉乃致公幹仲宣之論家有曲直安仁士衡之評人立矯抗况復殊于此者乎文貴逺賤近人之常情重耳輕目俗之恆蔽是以邯鄲託曲于李竒士季假論于嗣宗此其效也然五言之興諒非敻古但關西鄴下既以罕同河外江南頗為異法故玄黃經緯之辨金碧浮沉之殊僕以為亦各具美兼善而已今作三十首詩斆其文體雖不足品藻淵流庶亦無乖商𣙜云爾倡婦自悲賦序漢有其録而亡其文泣蕙草之飄落憐佳人之埋暮乃為辭焉青苔賦序余鑿山楹為室有苔焉意之所之故為是作云石劫賦序劫一作􅎕海人有食石劫一名紫虈蚌蛤類也春而發華有足異者戲書為短賦蓮華賦序余有蓮華一池愛之如金宇宙之麗難息絶氣聊書竹素儻不滅焉丹砂可學賦序咸曰金不可鑄僕不信也試為此辭精思云爾赤虹賦序東南嶠外爰有九石之山乃紅壁十里青萼百仞苔滑臨水石險帶溪自非巫咸采藥羣帝上下者皆斂意焉于是夏蓮始舒春蓀未歇肅舲波渚緩拽汀潭正逢巖崖相照雨雲爛色俄而雄虹赫然暈光耀水偃蹇山頂舄奕江湄僕追而察之實雨日隂陽之氣信可觀也又憶昔登爐峰上手接白雲今行九石下親弄絳霓二竒難并感而作賦橫吹賦序驃騎公以健卒十萬禦荆人于外郊鐵馬煩而人聳色綵旄耀而士銜威軍容有橫吹僕感而為之賦云傷友人賦序僕之神交者嘗有陳郡之袁炳焉有逸才有妙賞博學多聞明敏而識竒異僕以為天下絶倫黯與秋草同折今不復見才矣既而陳書有念橫瑟無從雖乏張范通靈之感庶同嵇向篤徒之哀乃為辭曰知己賦序陳國之華者故吏部郎殷孚其人也博而能通學無不覽雅賞文章尤愛竒逸雖志隱巖石而名動京師矣才多深見氣有逺度雖安期千里不能尚焉始于北府相值傾蓋無己僕乃得罪嶠外遐路窈然始還舊都會君尋卒故為兹賦以寄深哀學梁王兔園賦序或重古輕今者僕曰何為其然哉無知音則己矣聊為古賦以奮枚叔之製焉傷愛子賦序廣𢎞明集江艽字胤卿僕之第二子也生而神俊必為美器惜哉遘閔涉嵗而卒悲至躑躅乃為此文遂古篇序𢎞明集僕嘗為造化篇以學古制今觸類而廣之復有此文兼象天問以逰思云爾雜三言五首序豫上國不才黜為中山長史待罪三載究識煙霞之狀既對道書官又無職筆墨之勢聊為後文自序淹字文通濟陽考城人幼傳家業六嵗能屬詩十三而孤邈過庭之訓長遂博覽羣書不事章句之學頗留精于文章所誦詠者蓋二十萬言而愛竒尚異深沈有逺識常慕司馬長卿梁伯鸞之徒然未能悉行也所與神逰者唯陳留袁叔明而已弱冠以五經授宋始安王劉子真略傳大義為南徐州王新安從事奉朝請始安之薨也建平王劉景素聞風而恱待以布衣之禮然少年嘗倜儻不俗或為世士所嫉遂誣淹以受金者將及抵罪乃上書見意而免焉尋舉南徐州桂陽王秀才對策上第轉巴陵王右常侍右軍建平王主簿賔待纍年雅以文章見遇而宋末多阻宗室有憂生之難王初欲羽檄徵天下兵以求一旦之幸淹嘗從容曉諫言人事之成敗每曰殿下不求宗廟之安如信左右之計則復見麋鹿霜棲露宿于姑蘇之臺矣終以不納而更疑焉及王移鎮朱方也又為鎮軍參事領東海郡丞于是王與不逞之徒日夜搆議淹知禍機之將發又賦詩十五首略明性命之理因以為諷主遂不悟乃憑奴而黜之為建安吳興令地在東南嶠外閩越之舊境也爰有碧水丹山珍木靈草皆淹平生所至愛不覺行路之逺矣山中無事與道書為偶乃悠然獨往或日夕忘歸放浪之際頗著文章自娛在邑三載朱方竟敗焉復還京師值世道已昏守忠間居不交當軸之士俄皇帝始有大功于四海聞而訪召之為尚書駕部郎驃騎竟陵公參軍事當沈攸之起兵西楚也人懷危懼髙帝嘗顧而問之曰天下紛紛若是君謂如何淹對曰昔項強而劉弱袁衆而曹寡羽號令諸侯竟受一劍之辱紹跨躡四州終為奔北之虜此所謂在德不在鼎公何疑焉帝曰聞此言者多矣其試為我言之淹曰公雄武有竒略一勝也寬容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子而伐逆叛五勝也攸之志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也故豺狼十萬而終為我獲焉帝笑曰君談過矣是時軍書表記皆為草具逮東霸城府猶掌筆翰相府始置仍為記室參軍事及讓齊王九錫備物及諸文表皆淹為之受禪之後又為驃騎豫章王記室參軍鎮東武令參掌詔册並典國史既非雅好辭不獲命尋遷正員散騎侍郎中書侍郎淹嘗云人生當適性為樂安能精意苦力求身後之名哉故自少及長未嘗著書惟集十巷謂如此足矣重以學不為人交不茍合又深信天竺緣果之文偏好老氏清靜之術仕所望不過諸卿二千石有耕織伏臘之資則隱矣常願幽居築宇絶棄人事苑以丹林池以緑水左倚郊甸右帶瀛澤青春爰謝則接武平臯素秋澄景則獨酌虛室侍姬三四趙女數人不則逍遙經紀彈琴詠詩朝露幾間忽忘老之將至淹之所學盡此而已矣尚書殿中曹廟樂歌詩奏建元初詔黃門侍郎謝超宗造廟樂歌詩十二章永明二年尚書殿中曹奏詔可太祖髙皇帝廟神室奏髙德宣烈之舞未有歌詩郊應須歌辭穆皇后廟神室亦未有歌辭案傅玄云登歌廟異其文饗神十室同辭此議為允又尋漢世歌篇多少無定皆稱事立文並多八句然後轉韻時有兩三韻而轉其例甚寡張華夏侯湛亦同前式傅玄改韻頗數更傷簡節之美近世王韶之顔延之並四韻乃轉得賖促之中顔延之謝莊作三廟歌皆各三章章八句此于序述功業詳略為宜今宜依之郊配之日改降尊作主禮殊宗廟穆后母儀之化事異經綸此二歌為一章八句别奏事御奉行移魏淮陽太守文永明十年太嵗某淮陽太守某移淮陽長大齊承乾得一清寧今皇上體聖居震纘戎昌緒仁澤之所灑沾惠風之所偃靡威武之所騰驤刑政之所宣暢浩浩乎其不可涯涘固能徼岷禺關夷海拓沙渚道零山八胤承嗣九垓禔福含齒戴髮其樂只且所以通歡魏境靜息邊民嗟爾黔民共和優泰而魏主不篤我信誓侮弱我慈懷憑陵我南城冦擾我樊鄧元帥逞梟鳶之心鋭卒蓄蜂蠆之毒蠅飛藩棘蟻附池隍我聊命偏將執而俘之連左袵于郊門頻編首于我闕有司將加誅焉天子弗之許也重謁而請天子又不許也更從請所以置之乃制詔曰昔虞帝欽明苗山記倒戈之陳夏后踵武鈞臺載不戰之兵今鋒鏑陵邊彤雲入候加討而後擒待征而知服此乃朕之涼德彼將何德徒哀其積習為性因染遂變不識天時用干人事雖同濵率境自隔王臣直曰斯民獨為索虜父母生乖妻兒死别桑梓悠悠墳塋萬里情甚愍之可解網改祝聽歸巢穴豈直鄰好足鄙特以哀矜自中以時資遣稱朕意焉已遵明詔部送所虜若干人即日在界宜速近獲時施故堡使幽荒之外知皇王之德音故移文苑英華彼將何德鄰好足鄙下有誤有司奏氐王楊集始母除集始母薑氏為太夫人假銀印集始驅狐翦棘仰化邊服母以子貴宜加榮寵八座奏隂平王楊炅進號前將軍並永明中楊炅嗣勤西牧馳欵內昭宜增戎章用輝遐外芮芮國相邢基祇羅回奉髙帝表芮芮國與魏虜世為讐敵太祖輔政嘗遣使芮芮尅期共伐魏及踐阼國邢基祇羅回奉表齊亦不能出師夫四象秉政二儀改度而萬物生焉斯蓋虧盈迭襲厯數自然也昔晉室將終楚桓竊命實賴宋武匡濟之功故能扶危定傾休否以泰祚流九葉而國嗣不繼今皇天降禍于上宋室猜亂于下臣雖荒逺粗窺圖書數難以來星文改度房心受變虛危納祉宋滅齊昌此其驗也水運遘屯木德應運子年垂刈劉穆之記崏嶺有不衽之山京房讖云卯金十六草肅應王歷觀圖緯休徴非一皆云慶鍾蕭氏代宋者齊會有大力法度及於此國使反採訪聖德彌驗天縱之姿故能扶隆皇祚光權定之業翼亮天工濟悖主之難樹勳京師威振海外仗義之功侔蹤湯武冥績既著寶命因歸受終之厯歸于有道况夫帝無常族有德必昌時來之數唯靈是與陛下承乾啓之機因乘龍之運計應符革祚久已踐極荒裔傾戴莫不引領設未龍飛不宜沖挹上違天人之心下乖黎庶之望皇芮承緒肇自二儀拓土載民地越滄海百代一族大業天固雖吳漢殊域義同唇齒方欲尅期中原龔行天罰治兵繕甲俟時大舉振霜戈于并代鳴和鈴于秦趙掃殄凶醜梟翦元惡然後皇輿遷幸光復中華永敦鄰好侔蹤齊魯使四海有奉蒼生咸賴荒餘歸仰豈不盛哉百濟國王牟大牟慶之孫牟都之子上武帝表南齊書有闕南史東夷傳齊永明中除大都督百濟諸軍事鎮東大將軍前假闕報功勞勤實存名烈假行寧朔將軍臣姐瑾等四人振竭忠效攘除國難志勇果毅等威名將可謂扞城固蕃社稷論功料勤宜在甄顯今依例輒假行職伏願恩愍聽除所假寧朔將軍面中王姐瑾厯贊時務武功並列今假行冠軍將軍都將軍都漢王建威將軍八中侯餘古弱冠輔佐忠效夙著今假行寧朔將軍阿錯王建威將軍餘厯忠欵有素文武列顯今假行龍驤將軍邁盧王廣武將軍餘固忠效時務光宣國政今假行建威將軍弗斯侯又表臣所遣行建威將軍廣陽太守兼長史臣髙達行建威將軍朝鮮太守兼司馬臣楊茂行宣威將軍兼參軍臣會邁等三人志行清亮忠欵夙著往太始中比使宋朝今任臣使冒涉波險尋其至效宜在進爵謹依先例各假行職且玄澤靈休萬里所企况親趾天庭乃不蒙賴伏願天監特愍除正達邊效夙著勤勞公務今假行龍驤將軍帶方太守茂志行清一公務不廢今假行建威將軍廣陵太守邁執志周密屢致勤效今假行廣武將軍清河太守武帝命牟大襲封百濟王策於戲惟爾世襲忠勤誠著遐表滄路肅澄要貢無替式循彛典用纂顯命往欽哉其敬膺休命可不愼歟制詔制詔行都督百濟諸軍事鎮東大將軍百濟王牟大今以大襲祖父牟都為百濟王即位章綬等五銅虎威符四王其拜受不亦休乎上明帝表年大受封之嵗魏虜發騎數十萬攻百濟大遣將沙法名等擊虜軍大敗之建武二年上表請賜軍號詔可南齊書有缺按此表云去庚午年則受封為武帝之永明八年也臣自昔受封世被朝榮忝荷節鉞尅攘列辟往姐瑾等並蒙光除臣庶咸泰去庚午年獫狁弗悛舉兵深逼臣遣沙法名等領軍逆討宵襲霆擊胸犁張惶摧崩若海蕩乘奔追斬僵尸丹野由是摧其鋭氣鯨暴韜凶今邦宇謐靜實名等之略尋其功勳宜在褒顯今假沙法名行征虜將軍邁羅王贊首流為行安國將軍辟中王解禮昆為行威武將軍弗中侯木干那前有軍功又拔臺舫為行廣威將軍面中侯伏願天恩特愍聽除又表臣所遣行龍驤將軍樂浪太守兼長史臣慕遺行建武將軍城陽太守兼司馬臣王茂兼參軍行振武將軍朝鮮太守臣張塞行揚武將軍陳明在官忘私唯公是務見危授命蹈難弗顧今任臣使冒涉波險盡其至誠實宜進爵各假行署伏願聖朝特賜除正扶南國王僑陳如闍耶跋摩姓僑隙如名闍耶跋摩上武帝表林邑國西南三千餘里至扶南天竺道人那伽仙附扶南商貨欲歸國遭風至林邑掠其財物皆盡永明二年闍耶跋摩遣那伽仙上表詣京師言其國俗事摩醯首羅天神神常降于摩耽山土氣恆暖草木不落詔報之扶南國王臣僑陳如闍耶跋摩叩頭啓天化撫育感動靈祇四氣調適伏願聖主尊體起居康豫皇太子萬福六宫清休諸王妃主內外朝臣普同和睦鄰境士庶萬國歸心五穀豐熟災害不生土清民泰一切安穩臣及人民國土豐樂四氣調和道俗濟濟並蒙陛下光化所被咸荷安泰又臣前遣使齎雜物行廣州貨易天竺道人釋那伽仙于廣州因附臣舶欲來扶南海中風漂到林邑國王奪臣貨易并那伽仙私財具陳其從中國來此仰序陛下聖德仁治詳議風化佛法興顯衆僧殷集法事日盛王威巖整朝望國軌慈愍蒼生八方六合莫不歸伏如聽其所説則化鄰諸天非可為喻臣聞之下情踊恱若暫奉見尊足仰慕慈恩澤流小國天垂所感率土之民並得皆蒙恩祐是以臣今遣此道人釋那伽仙為使上表問訊奉貢微獻呈臣等丹心并別啓下情但所獻輕陋愧懼唯深伏願天慈曲照鑒其衷丹欵賜不垂責又臣有奴名鳩酬羅委臣逃走別在餘處搆結凶逆遂破林邑仍自立為王永不恭從違恩負義叛主之愆天不容載伏尋林邑昔為檀和之所破久已歸化天威所被四海彌伏而今鳩酬羅守執奴凶自專狼強且林邑扶南鄰界相接親人是臣奴猶尚逆去朝廷遙逺豈復遵舉此國屬陛下故謹具上啓伏聞林邑頃年表獻簡絶便欲永隔朝廷豈有師子坐而安犬鼠伏願遣軍將伐凶逆臣亦自效微誠助朝廷剪撲使邊海諸國一時歸伏陛下若欲立餘人為彼王者伏聽敕旨脫未欲灼然興兵伐林邑者伏願特賜敕在所隨宜以少軍助臣乘天之威殄滅小賊伐惡從善平蕩之日上表獻金五婆羅今輕此使送臣丹誠表所陳啓不盡下情謹附那伽仙并其伴口具啓聞伏願愍所啓天竺道人那伽仙上書吉祥利世間感攝于羣生所以其然者天感化緣明仙山名摩耽吉樹敷嘉榮摩醯首羅天依此降尊靈吉士悉蒙祐人民皆安寧由斯恩波故是以臣歸情菩薩行忍慈本迹起凡基一發菩提心二乘非所期厯生積功業六度行大悲勇猛超劫數財命捨無遺生死不為厭六道化有緣具修于十地遺果度人天功業既已定行滿登正覺萬善智圓備惠日照塵俗衆生感緣應隨機授法藥佛化遍十方無不蒙濟擢皇帝聖𢎞道興隆于三寶垂心覽萬機威恩振八表國土及城邑仁風化清皎亦如釋提洹衆天中最超陛下臨萬民四海共歸心聖慈流無疆被臣小國深武帝報詔具摩醯降靈流施彼土雖殊俗異化遙深欣讚知鳩酬羅于彼背叛竊據林邑聚凶肆掠殊宜剪討彼雖介遐陬舊修蕃貢自宋季多難海譯致壅至化惟新習迷未革朕方以文德來逺人未欲便興干戈王既欵列忠到逺請軍威今詔交部隨宜應接伐叛柔服實惟國典勉立殊效以副所期會稽刻石山大石文會稽剡縣刻石山相傳為名不知文字所在升明末縣民兒襲祖行獵忽見石上文三處刋苔識之大石文曰此齊者黃公之化氣也立石文黃天星姓蕭字某甲得賢帥天下太平小石文刻石者誰會稽南山李斯刻秦望之封也嵩髙山石璽文宋升明三年滎陽人尹午于山東南隅見天雨石墜地石開有璽在其中方二寸其文曰戊丁之人與道俱肅然入草應天符有司奏沸泉木簡文延陵今戴景度稱所領季子廟舊有涌井二所廟祝列云舊井北忽聞金石聲即掘深三尺得沸泉其東忽有聲錚錚又掘得泉沸湧若浪泉中得一銀木簡長一尺廣二寸隱起文曰盧山道人張陵再拜謁詣起居簡木堅白而字色黃謹按瑞應圖浪井不鑿自成王者清靜則仙人主之孔氏世録云叶精帝道孔書明巧當在張陵宋均注云張陵佐封禪一云陵仙人也璽文永明二年虜國民齊祥入靈丘關見山側有紫氣如雲衆鳥回翔其間獲璽方寸四分獸紐師道人惠度覩其文以衣冠正朔在齊送京師坤維聖帝永昌銅獸銘永明三年越州南髙涼俚人海中網魚獲銅獸一頭銘曰作寶鼎齊臣萬年子孫承寶南齊文紀卷十
